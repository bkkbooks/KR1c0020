body:
  text: 毛詩講義詩類提要臣等謹案毛詩講義十二卷宋林岊撰岊字仲山古田人紹熙元年特奏名嘉定間嘗守全州宋史不為立𫝊而福建通志稱其在郡九年頗多惠政重建清湘書院與諸生講學勉敦實行郡人祀之柳宗元廟則亦循吏也是編皆其講論毛詩之語觀其體例蓋在郡時所講授而門人録之成帙者大都取毛鄭而折衷其異同雖範圍不出古人然融㑹貫通要無枝言曲說之病當光寧之際廢序之說方盛岊獨力闡古義以詔後生亦可謂篤信謹守者矣宋史藝文志馬端臨經籍考及文淵閣書目載此書皆作五卷自明初以來久無𫝊本故朱彞尊經義考以為已佚今從永樂大典各韻所載次第彚輯用存其槩永樂大典所原佚者則亦闕焉因篇帙稍繁謹釐為一十二卷不復如其舊目云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:9fcea79776b4ad3819b149b0ef43c7ac5a329e868c24efafdca5502f0754ee53
