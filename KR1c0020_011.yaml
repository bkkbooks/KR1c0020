body:
  text: 毛詩講義卷十一宋林岊撰詩序一關雎后妃之徳也風之始也所以風天下而正夫婦也故用之鄉人焉用之邦國焉風風也教也風以動之教以化之詩者志之所之也在心為志發言為詩情動於中而形於言言之不足故嗟歎之嗟歎之不足故永歌之永歌之不足不知手之舞之足之蹈之也情發於聲聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困詩之大序當自此始詩者志之所之也始曰心曰志曰情曰言曰詩曰嗟歎曰永歌曰聲曰音學者不可不細辨也易書禮春秋皆言而止惟詩言之不足係乎勸善戒惡之情動盪於中不自己也詩之在心為志心則寂然不動志則已有所思情則所思勸善戒惡之正而止乎禮義中庸所謂喜怒哀樂愛惡欲發而皆中節謂之和者由有情故動盪而為言言而成篇章則為詩然詩人之情言一人之善以勸天下後世之善言一人之惡以戒天下後世之惡自有優柔巽入之妙抑揚感慨之深故發言為詩可以詩名自言之不足至於永歌可以聲名而及其聲之成文則不徒以二者名而謂之音矣可以詩名三百篇是也可以聲名朱文公所謂言嗟歎永歌皆聲也皆情發於聲也蓋為詩者其中寓言之不足而且嗟且歎且歌之意賦詩者諷誦弦歌其所抑揚髙下清濁疾徐疏數之節相應而和一唱三歎又皆誦言之不足而嗟歎永歌之其聲纍纍如貫珠若記之歌商歌雅此所謂聲手舞足蹈籟鳴機動也不徒以二者名而可謂之音者蓋言與嗟歎永歌三者單出之聲雜比而成文理則乃謂之音言成篇章歌成音調此則詩之獨而非他經比然而情有正否詩人之情皆正也世有治亂興亡詩人所感不同也故生乎治而為詩者其音安以樂生乎亂而為詩者其音怨以怒生乎亡國而為詩者其音哀以思其賦誦之者亦然識者可以其音而知其政假如玉樹後庭花之詩在陳歌之人知其亡在唐歌之可想陳之亡徵唐太宗遽以為當唐之世儘歌此詩無關治亂此亦非也治世有治世之詩其音安以樂者本乎治而成因其成而歌君臣民物相感以永其和安用歌亂世亡國之詩於庭為哉又如亂世之時人思治世而為詩雖述文武成康之美而意在戒乎幽厲其音自有怨以怒之微㫖此則大田楚茨之𩔖是也或曰音則然矣詩之音與樂之音孰辨曰大序乃論詩之音也虞書乃論樂之音也樂之初未有不本於詩者凡樂器以人聲為主人聲以詩詠為則故舜曰詩言志歌永言聲依永歌永言即序之所謂言嗟歎永歌也聲依永即序之所謂聲成文也至於律和聲八音克諧無相奪倫則說樂之六律六呂以此十二物者和人之聲而施之八音金石絲竹匏土革木無不克諧又如夔之論樂摶拊琴瑟以詠詠之一字専主人聲謂升歌而歌詩所謂言與嗟歎永歌皆總在詠之一字妙矣而玉磬琴瑟摶拊笙鏞下管則皆樂器協於律呂具乎八音以宣輔詠之一字此則詩之協於樂而樂之和乎聲也如今人唱曲樂器有黄鍾大呂而音調亦有黄鍾大呂此六律八音之和諧人聲而人聲之亦合乎律呂八音也故詩序之言音與虞書之言音不可不辨然而此則論詩耳欲求情之正又當細用工夫易曰利貞性情也註者以為情其性則非正性其情則正矣非先正其情安能勸戒他人乎非存其心養其性又安能性其情乎故正得失動天地感鬼神莫近於詩先王以是經夫婦成孝敬厚人倫美教化移風俗此蓋總言三百五篇之詩其功用如此然不可不細論詩者太平之樂經虞夏商以前未論自周言之周公當成王之時制為樂章謂之樂經以授之太師施之郊廟朝廷與夫王之起居燕寢而又有逹於邦國鄉人可通用者其風則關雎麟趾鵲巢騶虞其小雅則鹿鳴至菁莪其大雅則文王至卷阿其頌則清廟至般此皆仁義禮智之言祖宗功徳之盛天命人心之所係國俗王化之所基由此觀之治世之詩祭祀賔客燕居出入弦誦而歌吹之可以正君臣民物之得失動乎天地感乎鬼神而先王以之經正乎夫婦如孟子所謂經正則庶民興成乎孝親敬長之義厚乎人倫美乎教化移乎風俗本三綱之正當時親炙而和平後世聞風而感發漸漬日化而不自知誠莫近乎詩之教也若夫世更治而為亂風雅更正而為變國史所録聖人所删而僅存者精微要妙頓挫沉鬰長吁永歎廣言曲譬亦可以正可以動可以感可以經可以成可以厚可以美可以移而序者之意第言先王恐主乎治世之詩指成周盛時而言若亂世之詩變風變雅存為鑒戒亦本乎先王以詩教天下之意也且正得失主人心而言也動天地感鬼神主交神而言也經夫婦至移風俗主齊家治國平天下而言也詩之功用所以能如此者孔子曰詩三百一言以蔽之曰思無邪夫思無邪者誠也誠者即性其情之謂也至誠之道不言而信不動而章無為而成况乎形於聲詩歌詠之間乎且夫聞祈招之音使其能自克則克念而聖矣聞角招之詩使其不能興發補不足則亦罔念而狂矣舉此一端詩可以正人心之得失上智之人聞詩而省有得無失中智之人聞詩而省正得與失下智之人聞詩而不知省其失不可正而其得又安在哉舉此一端詩雖可正人心之得失而又在乎人心之知所自正也茍為不然執柯伐柯猶以為逺自經夫婦以下皆然不能徧舉天地鬼神亦不特周禮奏樂降神之謂和平怨怒之極足以逹隂陽之氣而致祥召災天地之心鬼神情狀洋洋如在自有所感動矣故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風至於王道衰禮義廢政教失國異政家殊俗而變風變雅作矣國史明乎得失之迹傷人倫之廢哀刑政之苛吟咏情性以風其上逹於事變而懐其舊俗者也故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也詩有六義風雅頌者詩之體賦比興者詩之用賦鋪陳也比取譬也興托物而有感也自風雅頌定體而言之則風主感動雅主齊正頌主贊美自風雅頌雜用賦比興之理而言之則一篇之中或有賦或有比或有興有各得其一義者有一篇而全具者有一篇而兼具者體不易用相參敘賦比興於風之下見雅頌之亦具此義也鄭謂七月之篇有風雅頌孔謂六義皆謂之風其說難從自上以風化下之後當分為三節解先言風之所以名風者何也謂風有風動之義上以風化下如周公制關雎麟趾為王者之風鵲巢騶虞為諸侯之風皆言正家之道所以風天下而化夫婦者又如周公述豳國七月之風皆純乎上以風化下之美也又如周南文王之國風召南文王之國風乃上以此風化下而下以此風美上者也至十二國之變風亦由夫上以此不美之風化下故下以此不美之風刺上而存乎採詩之官著於國史之録主於成文之婉妙而中有微諫故言者無罪聞者知戒而亦可以風名此變風之所以附乎正風也若無巽入之義聖人其删之矣又言變風變雅之為變者何也王道盛道徳一風俗同則詩有正而無變所謂太平樂經之外無詩也王道衰禮義廢政教失國異政家殊俗然後有變風變雅之詩正風之化不行於是有變風之刺雖美鄭武衞文皆變中之正亦如二南在周為美自商末言之變中之正也七月在豳為美自周初言之變中之正也大雅小雅之正盡廢矣於是王朝之公卿陳古刺今而有變小雅變大雅雖先王之見美而昔之所無今之所有亦皆變中之正也國史者諸國皆有史氏因採詩而備録之蓋明乎得失之迹傷人倫之廢哀刑政之苛至其為是詩也皆吟咏其情性以風其上逹於事變而懐其舊俗者也所以録於下而陳於上著於今而示於後也又言變風之發乎情止乎禮義者何也變雅多出於王朝之公卿變風多出於其國中小夫賤𨽻婦人女子之口而或者國之卿大夫士君子採取其言而為之者然得列於變雅而附乎正風則聖人必有以取之矣蓋取其發乎情止乎禮義也人生而禀乎天之所賦者曰性至善具足一毫無偽雖有氣之清濁才之智愚而性之本然此理湛徹故曰人生而静天之性也感於物而動性之情也謂之情則其所發者必有所偏矣有所偏則不得其正而不能勸善懲惡矣今也詩人之詩發乎真情斯為性其情者性其情者又本乎先王也被夫先王之澤而誦治世之詩久矣耳聞目擊躬行心詠皆此熟境也一旦忽見其君父兄與其國人子弟設施注措有異於前日焉安有不陳禮秉義以切磋之乎此所謂流澤之深自葉徂根也使其情不本於性言不本於禮義聖人其删之矣是以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉頌者美盛徳之形容以其成功告於神明者也是謂四始詩之至也一國之事係一人之本謂之風謂一國之事皆係國君風化之本若曹奢衞淫秦强晉弱之𩔖又如王朝詩不出境儕於國風之𩔖又如商之既衰周之始興周南之地化乎文王而有周南國風召南之地化乎文王而有召南國風之𩔖又如豳之一國千百年風俗周公遭變陳之為豳國風之𩔖皆一國之事係一人之本也此其本於衽席施於國都著於耕桑隴畆之間而動化之妙詩能言之故謂之風也言天下之事形四方之風謂之雅此謂凡大小雅若干篇雖正變不同所言皆總天下之事合四方之風而係於天子之身故謂之雅也雅者正也謂其所言先王之政齊正乎天下者故謂之雅者正也言王政之所由廢興也政亦正也小雅自菁莪以上大雅自卷阿以上言王政之興變小雅自六月以下變大雅自民勞以下言王政之廢變雅所陳雖若幽厲之世述文武之盛亦主乎譏王政之廢也若宣王之詩有美刺之雜亦主乎歎王政之廢而復興未能全美也政有小大故有小雅焉有大雅焉謂小雅歌一詩則主一事如燕羣臣則歌鹿鳴遣使臣則歌皇華育人才則歌菁莪凡朝廷之政列於詩歌秩秩不相移易政之小也大雅則本乎周家之興祖宗功徳其來也久自后稷公劉大王王季以至文武自姜嫄姜女大任以至大姒立國尚仁祈天永命凡有可歌莫不揄揚於天地之間始乎受命而終乎求賢所關非止一事政之大也政由小而大故小雅先乎大雅也頌者美盛徳之形容以其成功告於神明也謂周公當武王成王之世制為頌詩大抵施之於郊於廟於羣神所美皆前人之徳徳不可見而美其形容彷彿之可見者功非遽成而以其功之所自成者告於神明明有禮樂幽有鬼神鬼神幽而顯神而且明也如臣工小毖敬之大賚於廟中封爵助祭始朝而歌之並入於頌皆推本前人之徳之功君臣上下相率不忘也是謂四始詩之至也始端也至極也風一也小雅一也大雅一也頌一也是詩之四端也有其端始然後有其名義有其篇章有其音調推𩔖而不窮定名而不越是名也理極其至無以加之故曰詩之至也然則關雎麟趾之化王者之風故繫之周公南言化自北而南也鵲巢騶虞之徳諸侯之風也先王之所以教故繫之召公周南召南正始之道王化之基是以關雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心焉是關雎之義也然則關雎麟趾之化王者之風鵲巢騶虞之徳諸侯之風也此謂四始之中風之名義又自别而為三其一則列國之風十五豳與周南召南在焉其一則周公所為天子后妃房中之樂歌謂之王者之風其一則所為諸侯夫人房中之樂歌謂之諸侯之風關雎葛覃卷耳樛木螽斯桃夭兎罝芣苡麟趾始乎關雎終乎麟趾凡九篇故曰關雎麟趾之化王者之風也鵲巢采蘩草蟲采蘋羔羊小星何彼穠矣騶虞始乎鵲巢終乎騶虞凡八篇故曰鵲巢騶虞之徳諸侯之風也徳則源於化矣諸侯則視乎天子矣周公之為此何也若曰雅施朝廷頌施祭祀天子諸侯閨門燕飲獨無樂歌乎故為此風耳其凡則皆言正家之道天子自家逹之天下諸侯自家逹之國此太平之樂歌而風之純乎正者也故係之周公南言化自北而南先王之所教故係之召公從周公至南言化自北而南凡九字即周南二字也召公二字即召南也此謂文王之為西伯其國中有周召之地周公召公後分采邑採詩者取國俗歌謡以為所貢之詩其人感乎商之習亂而將亡喜乎周之習治而方興故美周而憫商言乎其國未暇及乎天下所以止為文王二南國風周南所得漢廣汝墳二篇召南所得甘棠行露殷其靁摽有梅江有汜野有死麕六篇大師之編樂經以王者之風係附於周南國風而為第一巻又以諸侯之風係附召南國風而為第二卷此以其次第之序而附之也又謂文王昔日曽以此詩之理教其家人及其國人此以其用詩之理而附之也故大序曰先王之所以教而伊川曰古之人有行之者文王是也夫一巻之詩篇章殊時將彼附此則若春秋之係日係月文王之時詩雖未有教以其理不以其辭則若黄帝堯舜之取十三卦然而不以闗雎而以鵲巢何也此因文王之為諸侯而言也嗟乎人但知有周南國風而不知有王者之風知有召南國風而不知有諸侯之風或以后妃為大姒追稱又以夫人為大王王季之妻又以夫人為召南諸侯之妻皆非也故凡王者諸侯之風不指乎文王者皆風人之立義為天下萬世后妃夫人之法也周南召南正始之道王化之基此謂二南國風所詠乃文王正心誠意齊家治國之所感召江沱漢汝之婦人女子彼亦何知而皆由夫婦之理明君臣之義當紂之時何等風俗文王之國藹然禮義如此大人正已而物正豈非文王有以隂驅潜率之乎其後八百年之風聲氣習皆由乎是信乎為正始之道王化之基也孔子曰人而不為周南召南其猶正牆面而立也歟蓋欲學者習其文辭翫其音讀察其意味講其義理而心通黙識之由本至末由内及外由體之用見於躬行踐履之間也夫婦之禮不由君臣之義不明雖日誦二南猶牆面也噫詩之大序最後一叚言風及雅言雅及頌言頌及王者諸侯之風言王者諸侯之風又及二南之風而歸之王化夫化者本也政次之功成又次之反覆而求優哉游哉可不務乎葛覃后妃之本也后妃在父母家則志在於女功之事躬儉節用服澣濯之衣尊敬師傅則可以歸安父母化天下以婦道也謹案自此萹至鄭風末小序解永樂大典皆缺卷巻耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞内有進賢之志而無險詖私謁之心朝夕思念至於憂勤也樛木后妃逮下也言能逮下而無嫉妒之心焉螽斯后妃子孫衆多也言若螽斯不妒忌則子孫衆多也桃夭后妃之所致也不妒忌則男女以正婚姻以時國無鰥民也兎罝后妃之化也關雎之化行則莫不好徳賢人衆多也芣苢后妃之美也和平則婦人樂有子矣漢廣徳廣所及也文王之道被於南國美化行乎江漢之域無思犯禮求而不可得也汝墳道化行也文王之化行於汝墳之國婦人能閔其君子猶勉之以正也麟之趾關雎之應也關雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也鵲巢夫人之徳也國君積行累功以致爵位夫人起家而居有之徳如鳴鳩乃可以配焉采蘩夫人不失職也夫人可以奉祭祀則不失職矣草蟲大夫妻能以禮自防也采蘋大夫妻能循法度也能循法度則可以承先祖共祭祀矣甘棠美召伯也召伯之教明於南國行露召伯聽訟也衰亂之俗微貞信之教興彊暴之男不能侵陵貞女也羔羊鵲巢之功致也召南之國化文王之政在位皆節儉正直徳如羔羊也殷其靁勸以義也召南之大夫逺行從政不遑寜處其室家能閔其勤勞勸以義也摽有梅男女及時也召南之國被文王之化男女得以及時也小星惠及下也夫人無妒忌之行惠及賤妾進御於君知其命有貴賤能盡其心矣江有汜美媵也勤而無怨嫡能悔過也文王之時江沱之間有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也野有死麕惡無禮也天下大亂彊暴相陵遂成淫風被文王之化雖當亂世猶惡無禮也何彼襛矣美王姬也雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雝之徳也騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶𩔖蕃殖蒐田以時仁如騶虞則王道成也柏舟言仁而不遇也衞頃公之時仁人不遇小人在側緑衣衛莊姜傷已也妾上僭夫人失位而作是詩也燕燕衞莊姜送歸妾也日月衞莊姜傷己也遭州吁之難傷已不見答於先君以至困窮之詩也終風衞莊姜傷已也遭州吁之暴見侮慢而不能正也擊鼓怨州吁也衞州吁用兵暴亂使公孫文仲將而平陳與宋國人怨其勇而無禮也凱風美孝子也衞之淫風流行雖有七子之母猶不能安其室故美七子能盡其孝道以慰其母心而成其志爾雄雉刺衞宣公也淫亂不恤國事軍旅數起大夫久役男女怨曠國人患之而作是詩匏有苦葉刺衞宣公也公與夫人並為淫亂谷風刺夫婦失道也衞人化其上淫於新昏而棄其舊室夫婦離絶國俗傷敗焉式微黎侯寓於衞其臣勸以歸也旄丘責衞伯也狄人迫逐黎侯黎侯寓于衞衞不能修方伯連率之職黎之臣子以責于衞也簡兮刺不用賢也衞之賢者仕於伶官皆可以承事王者也泉水衞女思歸也嫁於諸侯父母終思歸寧而不得故作是詩以自見也北門刺仕不得志也言衞之忠臣不得其志爾北風刺虐也衞國並為威虐百姓不親莫不相携持而去焉静女刺時也衞君無道夫人無徳新臺刺衞宣公也納伋之妻作新臺於河上而要之國人惡之而作是詩也二子乘舟思伋壽也衞宣公之二子争相為死國人傷而思之而作是詩也柏舟共姜自誓也衞世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之牆有茨衞人刺其上也公子頑通乎君母國人疾之而不可道也君子偕老刺衞夫人也夫人淫亂失事君子之道故陳人君之徳服飾之盛宜與君子偕老也桑中刺奔也衞之公室淫亂男女相奔至於世族在位相竊妻妾期於幽逺政散民流而不可止鶉之奔奔刺衞宣姜也衞人以為宣姜鶉鵲之不若也定之方中美衞文公也衞為狄所滅東徙渡河野處漕邑齊桓公攘戎狄而封之文公徙居楚丘始建城市而營宫室得其時制百姓說之國家殷富焉蝃蝀止奔也衞文公能以道化其民淫奔之耻國人不齒也相鼠刺無禮也衞文公能正其羣臣而刺在位承先君之化無禮儀也干旄美好善也衞文公臣子多好善賢者樂告以善道也載馳許穆夫人作也閔其宗國顛覆自傷不能救也衞懿公為狄人所滅國人分散露於漕邑許穆夫人閔衞之亡傷許之小力不能救思歸唁其兄又義不得故賦是詩也淇奥美武公之徳也有文章又能聽其規諫以禮自防故能入相於周美而作是詩也考槃刺莊公也不能繼先公之業使賢者退而窮處碩人閔莊姜也莊公惑於嬖妾使驕上僣莊姜賢而不答終以無子國人閔而憂之氓刺時也宣公之時禮義消亡淫風大行男女無别遂相奔誘華落色衰復相棄背或乃困而自悔䘮其妃耦故序其事以風焉美反正刺淫佚也竹竿衞女思歸也適異國而不見答思而能以禮者也芄蘭刺惠公也驕而無禮大夫刺之河廣宋襄公母歸於衞思而不止故作是詩也伯兮刺時也言君子行役為王前驅過時而不反焉有狐刺時也衞之男女失時䘮其妃耦焉古者國有凶荒則殺禮而多昏㑹男女之無夫家者所以育人民也木𤓰美齊桓公也衞國有狄人之敗出處於漕齊桓公救而封之遺之車馬器服焉衞人思之欲厚報之而作是詩也黍離閔宗周也周大夫行役至於宗周過故宗廟宫室盡為禾黍閔周室之顛覆徬徨不忍去而作是詩也君子于役刺平王也君子行役無期度大夫思其危難以風焉君子陽陽閔周也君子遭亂相招為禄仕全身逺害而已揚之水刺平王也不撫其民而逺屯戍於母家周人怨思焉中谷有蓷閔周也夫婦日以衰薄凶年饑饉室家相棄爾兎爰閔周也桓王失信諸侯背叛構怨連禍王師傷敗君子不樂其生焉葛藟王族刺平王也周室道衰棄其九族焉采葛懼讒也大車刺周大夫也禮義陵遲男女淫奔故陳古以刺今大夫不能聽男女之訟焉丘中有麻思賢也莊王不明賢人放逐國人思之而作是詩也緇衣美武公也父子並為周司徒善於其職國人宜之故美其徳以明有國善善之功焉將仲子刺莊公也不勝其母以害其弟叔失道而公弗制祭仲諫而公弗聽小不忍以致大亂焉叔于田刺莊公也叔處于京繕甲治兵以出于田國人說而歸之大叔于田刺莊公也叔多才而好勇不義而得衆也清人刺文公也髙克好利而不顧其君文公惡而欲逺之不能使髙克將兵而禦狄於竟陳其師旅翺翔河上久而不召衆散而歸髙克奔陳公子素惡髙克進之不以禮文公退之不以道危國亡師之本故作是詩也羔裘刺朝也言古之君子以風其朝焉遵大路思君子也莊公失道君子去之國人思望焉女曰雞鳴刺不說徳也陳古義以刺今不說徳而好色也有女同車刺忽也鄭人刺忽之不昏於齊大子忽嘗有功於齊齊侯請妻之齊女賢而不取卒以無大國之助至於見逐故國人刺之山有扶蘇刺忽也所美非美然蘀兮刺忽也君弱臣彊不倡而和也狡童刺忽也不能與賢人圖事權臣擅命也褰裳思見正也狂童恣行國人思大國之正已也丰刺亂也昬姻之道缺陽倡而隂不和男行而女不隨東門之墠刺亂也男女有不待禮而相奔者也風雨思君子也亂世則思君子不改其度焉子衿刺學校廢也亂世則學校不修焉揚之水閔無臣也君子閔忽之無忠臣良士終以死亡而作是詩也出其東門閔亂也公子五争兵革不息男女相棄民人思保其室家焉野有蔓草思遇時也君之澤不下流民窮於兵革男女失時思不期而㑹焉溱洧刺亂也兵革不息男女相棄淫風大行莫之能救焉雞鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉古之聖賢未有不勤於夙興者孟子雞鳴而起孳孳為善舜之徒也禹惜寸隂成湯周公坐以待旦夫晝以訪問夜以安身聖賢曷嘗焦勞勤苦若是哉蓋良心易梏夜氣所存精明純一平旦接物存之則好惡近乎人旦晝所為梏而又梏則放心不逺於禽獸聖賢所懼也故書有夙夜浚明亦有昧爽丕顯之語浚明者日宣三徳早夜思之須明行之昧爽者昧明之時思大明其徳待旦而行之夫如是則勤於夙興有不能安寢者抑亦閨門之内淑女好逑警戒相成之助歟哀公齊太公之五世而荒淫怠慢變風之刺遽由兹始思昔尚父受封菜人侵疆一聞客說不遑旅寐而五世之孫乃若是其怠可不戒哉詩人不徒刺哀公而思賢妃貞女之助有所感而云也大抵風始關雎不淫其色君臣民庶可以通習周王晏朝則有關雎興誦后妃脫珥者房中之樂有益如此齊哀不能夙興夫人無警戒之言風人陳道秉彝者豈不深憂君子因風之始變而觀其譏刺亦本於袵席故曰易首乾坤書釐二女詩係二南禮記云身修而家齊家齊而國治國治而天下平人道之大可不兢兢歟還刺荒也哀公好田獵從禽獸而無厭國人化之遂成風俗習於田獵謂之賢閑於馳逐謂之好焉三章皆士大夫相答之辭上有所好下必甚焉著刺時也時不親迎也門内謂之著親迎之禮孔子與哀公言之詳矣東方之日刺衰也君臣失道男女淫奔不能以禮化也日月取象君臣不能照下亦言朝昏相從無所忌憚之意東方未明刺無節也朝廷興居無節號令不時挈壺氏不能掌其職焉古者挈壺掌漏雞人告時挈壺氏周司馬之屬有之其官下士六人挈讀如潔髪之潔挈者懸繫之名刻謂置箭壺内刻以為節浮之水上令水漏而刻下以記晝夜昏明之度數南山刺襄公也鳥獸之行淫乎其妹大夫遇是惡作詩而去之甫田大夫刺襄公也無禮義而求大功不修徳而求諸侯志大心勞所以求者非其道也有義而後功立惟徳可以來人求大功者欲求為霸主也天子衰諸侯興故曰霸緯候書注云把天子之事國語齊莊僖於是乎小伯韋昭曰襄即莊孫僖子以父祖已為盟㑹之長可為霸業之基又自以國大民衆負恃强力故求為霸也至其弟桓公求而得之盧令刺荒也襄公好田獵畢弋而不修民事百姓苦之故陳古以風焉畢以掩兎爾雅噣謂之畢注隂氣獨起陽氣必止畢或曰噣因星形以名之網小而柄長弋以射雁以繩繫矢而射鳥曰繳射此游田逐禽而不修治民之事詩人言有徳之君順時田獵與百姓共樂同𫉬百姓聞而說之敝笱刺文姜也齊人惡魯桓公微弱不能防閑文姜使至淫亂為二國患焉虎賁舎則守王閑注王出所止宿梐枑也掌舎㑹同之舎梐枑再重謂行馬也周衞有外内列周衞防守之物名之曰閑載驅齊人刺襄公也無禮義故盛其車服疾驅於通道大都與文姜淫播其惡於萬民焉諸序獨此舉國之名見通國之人皆嫉之也猗嗟刺魯莊公也齊人傷魯莊公有威儀技藝然而不能以禮防閑其母失子之道人以為齊侯之子焉謂莊公形貌之長面目之美善於趨歩長於舞射不能哀痛以思父端莊以正身威刑以肅下而更有他日求昏之志焉是荘公之可耻也葛屨刺褊也魏地陿隘其民機巧趨利其君儉嗇褊急而無徳以將之徳者何中正不偏之謂也汾沮洳刺儉也其君儉以能勤刺不得禮也此詩自言公族之儉詩人謂雖化其君之儉勤而不知本於禮度耳非謂魏君之采莫采藚也園有桃刺時也大夫憂其君國小而迫而儉以嗇不能用其民而無徳教日以侵削故作是詩也大夫憂其國之將亡也陟岵孝子行役思念父母也國迫而數侵削役乎大國父母兄弟離散而作是詩也十畝之間刺時也言其國削小民無所居焉十畝陿隘不足耕墾以居生伐檀刺貪也在位貪鄙無功而受禄君子不得進仕爾言君子不素餐以責小人之貪也碩鼠刺重斂也國人刺其君重斂蠶食於民不修其政貪而畏人若大鼠也民至以碩鼠刺重斂者其國可知矣蟋蟀刺晉僖公也儉不中禮故作是詩以閔之欲其及時以禮自虞樂也此晉也而謂之唐本其風俗憂深思逺儉而用禮乃有堯之遺風焉憂深思逺孔氏曰諸篇皆有深逺之意山有樞刺晉昭公也不能修道以正其國有財不能用有鐘鼓不能以自樂有朝廷不能洒埽政荒民散將以危亡四鄰謀取其國家而不知國人作詩以刺之也四鄰即桓叔謀伐晉也揚之水刺晉昭公也昭公分國以封沃沃盛彊昭公微弱國人將畔而歸沃焉桓叔有徳沃是大都國人叛從桓叔國危矣而昭公不知春秋之前惠二十四年晉始亂封桓叔于曲沃三十年晉潘父謀弑昭公而納桓叔不克君子忠於晉而為此詩樂而不憂從沃者不敢告人愛昭公者椒聊刺晉昭公也君子見沃之盛彊能修其政知其蕃衍盛大子孫將有晉國焉綢繆刺晉亂也國亂則昬姻不得其時焉此男女俱怨不得其時也杕杜刺時也君不能親其宗族骨肉離散獨居而無兄弟將為沃所并爾曲沃盛而晉微宗族必有歸曲沃者君又不能親親而使之離散是可憂也春秋翼九宗五正之子嘉父逆晉侯于隨納諸鄂謂之鄂侯唐叔始封受懐姓九宗職官五正世為晉彊家五正五官之長九宗一姓九族晉非無宗族不能親之也非無彊家不能用之也羔裘刺時也晉人刺其在位不恤其民也刺朝廷卿大夫也鴇羽刺時也昭公之後大亂五世君子下從征役不得養其父母而作是詩也無衣美晉武公也武公始并晉國其大夫為之請命乎天子之使而作是詩也有杕之杜刺晉武公也武公寡特兼其宗族而不能求賢以自輔焉葛生刺晉獻公也好攻戰則國人多喪矣采苓刺晉獻公也獻公好聽讒焉獻公之信讒最著於申生又殺羣公子慘矣車鄰美秦仲也秦仲始大有車馬禮樂侍御之好焉秦仲始大謂國土始大未得封爵也襄公始命者謂襄始命為諸侯也好者君之容好也鄭語史伯對桓公曰秦仲齊侯姜嬴之後也且大其將興乎駟驖美襄公也始命有田狩之事園囿之樂焉小戎美襄公也備其甲兵以討西戎西戎方彊而征伐不休國人則矜其車甲婦人能閔其君子焉襄公備車馬以討西戎亦大義所當然耳然民可使之勇戰不可使之好戰也蒹葭刺襄公也未能用周禮將無以固其國焉襄公新得周地其民被周徳教日久見襄公之所為不能用周禮也君子知其將無以固國焉或曰襄公之國乃至於其子孫有天下安在其不能固乎曰是不然三代之秦緜緜不絶千載矣襄公一為諸侯驟盛而有中衰之兆至始皇有天下而子孫不能聚廬而託處其固安在哉終南戒襄公也能取周地始為諸侯受顯服大夫美之故作是詩以戒勸之地理志扶風武功縣東有太山古文以為終南是周地之名山昭四年左傳荆山中南九州之險一名中南所論周之險阻不當以封秦於此益驗矣黄鳥哀三良也國人刺穆公以人從死而作是詩也晨風刺康公也忘穆公之業始棄其賢臣焉晨風鸇摰鳥也似鷂青黄燕頷勾喙嚮風搖翅乃因風飛急疾擊鳩鴿燕雀食之詩言欽欽者謂穆公也忘我者謂康公也無衣刺用兵也秦人刺其君好攻戰亟用兵而不與民同欲焉渭陽康公念母也康公之母晉獻公之女文公遭麗姬之難未反而秦姬卒穆公納文公康公時為太子贈送文公於渭之陽念母之不見也我見舅氏如母存焉及其即位思而作是詩也晉文公獻公子秦康公之舅也秦穆夫人秦康公之母亦晉獻公之女文公異母姊也文公生於狐姬夫人生於齊姜婦人以姓為字曰齊姜係於本國如曰秦姬則又係於夫之國也文公未反國康公母秦姬已卒穆公納文公康公為太子贈送文公於渭陽見舅思母及其即位晉文公已卒秦康公追舊日渭陽送舅思母之情而為此詩權輿刺康公也忘先君之舊臣與賢者有始而無終也宛丘刺幽公也淫荒昬亂游蕩無度焉東門之枌疾亂也幽公淫荒風化之所行男女棄其舊業亟㑹於道路歌舞於市井爾古者因井為市井田之中亦可交易衡門誘僖公也愿而無立志故作是詩以誘掖其君也東門之池刺時也疾其君之淫昏而思賢女以配君子也經三章皆思得賢女之事東門之楊刺時也昬姻失時男女多違親迎女猶有不至者也墓門刺陳佗無良師傅以至於不義惡加於萬民焉防有鵲巢憂讒賊也宣公多信讒君子憂懼焉月出刺好色也在位不好徳而說美色焉株林刺靈公也淫乎夏姬馳驅而徃朝夕不休息焉君臣淫於其國國人效之躬行之移風俗也如此澤陂刺時也言靈公君臣淫於其國男女相說憂思感傷焉羔裘大夫以道去其君也國小而迫君不用道好潔其衣服逍遥遊燕而不能自彊於政治故作是詩也三諫不從待放於郊賜之玦而後行古之道也去君而猶思君卷卷之忠也檜國鄰於虢而居於濟洛河潁之間鄭將兼弱攻昧取亂侮亡焉故曰國小而迫也君不用道好潔其衣服所謂四鄰謀取其國家而不知也素冠刺不能三年也三年之喪天下之通喪也子生三年然後免於父母之懐將由夫窮無窮極無極與則終身而慕哀未可已雖然禮有節文聖人為之制也其有安於食稻衣錦者幾無人心焉耳是故苴麻之服慘戚之容必稱練祥之祭哭泣之節有殺不飲酒不食肉倚廬而居枕塊而寢端席而坐朝奠夕徹夕奠朝徹事死如事生事亡如事存不疾不薑桂不塟不除服夫是之謂行三年之喪也不然服其服而無其容容其容而無其心猶不能行也隰有萇楚疾恣也國人疾其君之淫恣而思無情慾者也匪風思周道也國小政亂憂及禍難而思周道焉周室入厲而壞至宣而興至幽而大壞檜將并於鄭而其君不能自存其臣思周道之盛時王室尊安諸侯之國小大皆奠其居也蜉蝣刺奢也昭公國小而迫無法以自守好奢而任小人將無所依焉迫脅於大國之間無治國之法以自守好為奢侈而任用小人國家危亡無日君將無所依焉候人刺近小人也共公逺君子而好近小人焉鳲鳩刺不壹也在位無君子用心之不壹也四章皆舉善以駮時之惡鳲鳩秸鞠其養七子也旦從上而下暮從下而上下泉思治也曹人疾共公侵刻下民不得其所憂而思明王賢伯也明王賢伯於諸侯能督察之紀理之勞來之七月陳王業也周公遭變故陳后稷先公風化之所由致王業之難難也周公為七月之詩陳述周家興王之功業也周公相成王成王㓜管叔蔡叔流言周公居東征之其身離乎朝廷其心在乎王室遭此變故恐成王之惑於流言而不知創造守成之不易凡公之所為鞠躬盡瘁者蓋欲扶持王業之已成而昔者未成之初自后稷以來繼世曽孫有公劉居豳地前不窋而後太王接虞施商以肇周祀其風動教化國人之所自來蓋歴千有數百餘年之久漸漬而後成致我周家興王之功業如此其艱難也君㓜矣吾又不以身當之其無壞我室乎故陳其所由與其所以致者皆在農桑之務禮義之績其意深矣逺矣豳者戎狄之地名在雍州岐山之北漢屬古扶風郇邑周公為是詩也太師述之為豳國風焉蓋於祭祀之時亦有吹豳籥而歌豳詩者鄭譜以為公劉太王居邠之風俗蓋太王未遷岐以前猶在邠觀其來邠止旅迺宻及其遷岐從如歸市可見周人之愛君也鴟鴞周公救亂也成王未知周公之志公乃為詩以遺王名之曰鴟鴞焉鴟鴞之詩乃周公救亂所為也成王未知周公之志者以惑於管蔡之流言也公乃為此詩以遺王欲王之察其中心也東山周公東征也周公東征三年而歸勞歸士大夫美之故作是詩也一章言其完也二章言其思也三章言其室家之望女也四章樂男女之得及時也君子之於人序其情而閔其勞所以說也說以使民民忘其死其惟東山乎東山之詩乃大夫述周公東征而歸勞歸士之意也歸士述家人之言周公述歸士之言大夫述周公之言未必有其言而有其意大夫足而成之周公攝政元年有管蔡及武庚淮夷之叛故居東征之歴渉三年而歸凡征行莫不辛苦上知之而能言之則為治世上不知之而下自言之則為亂世破斧美周公也周大夫以惡四國焉伐柯美周公也周大夫刺朝廷之不知也周公攝政東征四國既定仍在東土此詩已遺鴟鴞之後未得雷風之前之詩也周公之美而朝廷之刺周公豈欲其有是哉九罭美周公也周大夫刺朝廷之不知也狼跋美周公也周公攝政逺則四國流言近則王不知周大夫美其不失其聖也美其進退有難而能不失其聖也周公誅伐四國成就周道使天下太平而聖徳著明致政之後欲老而自退成王又留為太師令輔弼左右非不知周公也特惑于其初耳
