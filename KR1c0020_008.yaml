body:
  text: 毛詩講義卷八宋林岊撰大雅二假樂君子顯顯令徳宜民宜人受祿于天保右命之自天申之干祿百福子孫千億稷穆皇皇宜君宜王不愆不忘率田舊章威儀抑抑徳音秩秩無怨無惡率由羣匹受福無疆四方之綱之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸塈言嘉樂此成王有顯顯至明令善之徳宜民宜人受祿于天天保之助之命之申之而成王所以干祿者不于天而于已之百順其子子孫孫千萬及億皆徳積于身而天相之也成王又謹身修行穆穆皇皇然宜君宜王有君之法度無愆過無忘失率由先祖之舊法度威儀則抑抑而美徳音則秩秩而有常無怨于天下無惡于天下率由羣臣之賢匹此則保治之不驕得福而愈謙也成王之受福無窮而持四方之綱垂拱仰成君道尊矣大綱既舉小紀畢張燕安及于朋友羣臣也所謂君得其君臣得其臣者成王之臣百辟之衆卿士之尊皆媚愛于天子王雖不以勢分而燕及之羣臣交相勉飭不怠于位以報其君此民之所由休息也此詩雖美成王其與文王之雅異篇同㫖大雅自文王至嘉樂必皆周公為之周公以成王君徳之成之東郊以治商民付保傅之任于召公召公格心之業書有召誥詩有公劉泂酌卷阿三篇今且說周公假樂一篇之意假樂嘉成王者所謂將順其美也假樂君子之宜民宜人者得乎人也受祿于天保右命之自天申之者得乎天也干祿百福子孫千億者施于孫子也其原皆本顯顯令徳一句徳者仁義禮智信五常之徳而足乎已令者善也顯者明也大學之明明徳而止于至善此之謂也成王訪羣臣以示我顯徳行而日就月將緝熈于光明今嘉其顯顯令徳是學行之效也既曰受祿又曰干禄受者自至于天干者自反于已皆一理也禄言盛福言順也既嘉成王又因勉成其美詩人若曰穆穆皇皇宜君宜王吾君之徳也其思不愆不忘率由舊章乎舊章者成憲也威儀抑抑徳音秩秩吾君之徳也其思無怨無惡率由羣匹乎羣匹者衆善也詩人又若曰受福無疆則吾君受福矣受福無疆是為四方之綱也之綱之紀則是由本及末由大及小由尊及卑皆思同其福祿而謂之燕及朋友之臣夫君不恃乎天而忽乎人不私其福于己而思燕及朋友待羣臣不曰羣臣而曰嘉賔曰朋友愛之之至也如是則百辟卿士始愛乎君各勤職位而民之所安息也此其所以為嘉樂成王之詩篤公劉匪居匪康迺埸迺疆迺積迺倉迺裹餱糧于槖于囊思輯用光弓矢斯張干戈戚揚爰方啓行篤公劉于胥斯原既庻既繁既順迺宣而無永歎陟則在巘復降在原何以舟之維玉及瑤鞞琫容刀篤公劉逝彼百泉瞻彼漙原迺陟南岡乃覯于京京師之野于時處處于時廬旅于時言言于時語語篤公劉于京斯依蹌蹌濟濟俾筵俾几既登乃依乃造其曹執豕于牢酌之用匏食之飲之君之宗之篤公劉既溥既長既景乃岡相其陰陽觀其流泉其軍三單度其隰原徹田為糧度其夕陽豳居允荒篤公劉于豳斯館涉渭為亂取厲取鍛止基迺理爰衆爰有夾其皇澗遡其過澗止旅迺密芮鞫之即按此篇永樂大典缺卷泂酌彼行潦挹彼注兹可以餴饎豈弟君子民之父母泂酌彼行潦挹彼注兹可以濯罍豈弟君子民之攸歸泂酌彼行潦挹彼注兹可以濯溉豈弟君子民之攸塈言逺酌彼行道所聚之雨水澄之大器挹而注之小器以灌沃米餴以為饎餴一蒸米餾飯氣流也如此而可祭者以樂易之君子有父之尊有母之親為民所宜也得民之心則得天之心也滌濯皆洗浣也溉之使清潔四時之祭有罍我姑酌彼金罍燕亦有之如是而可者以民心有所塈息而得所歸往也左氏所引潢汙行潦之水略言之矣有卷者阿飄風自南豈弟君子來游來歌以矢其音伴奐爾游矣優游爾休矣豈弟君子俾爾彌爾性似先公酋矣爾土宇昄章亦孔之厚矣豈弟君子俾爾彌爾性百神爾主矣爾受命長矣茀祿爾康矣豈弟君子俾爾彌爾性純嘏爾常矣有馮有翼有孝有徳以引以翼豈弟君子四方為則顒顒卬卬如圭如璋令聞令望豈弟君子四方為綱鳯凰于飛翽翽其羽亦集爰止藹藹王多吉士維君子使媚于天子鳳凰于飛翽翽其羽亦傅于天藹藹王多吉人維君子命媚于庻人鳳凰鳴矣于彼高岡梧桐生矣于彼朝陽菶菶萋萋雝雝喈喈君子之車既庻且多君子之馬既閑且馳矢詩不多維以遂歌一章有卷曲之阿則飄風自南而至王能屈體以求賢則豈弟之君子來游來歌以矢陳其徳音矣二章言太平之時伴然廣大奐然文章王可優游矣優游閒暇王信休美矣更當求賢以守之得豈弟之君子則使爾成王彌充保全一已之性嗣成先君之功矣酋終也三章言爾土地居宅之民昄大而章明亦孔厚矣得賢則百神爾主羣神受享而佑助之四章言受命之長福祿之康得賢則彌性而純大之福于爾有常矣詩之有嘏字皆祭祀尸嘏予福之義五章言賢人之行有可為憑依輔翼者至孝可以感化大徳可以軌訓如是君子在位可為四方法則矣六章言王之體貌敬順溫和顒顒然志氣高逺充盛卬卬然似玉成器為珪璋善聲譽為人所聞知善威儀為人所觀望如是君子能與天下四方為綱紀七章以鳳喻大賢以翽翽其羽喻羣士言鳳凰于飛羣鳥從之翽翽然羽聲亦從集止藹藹濟濟也濟濟王多吉士惟豈弟君子之所率使媚愛于君也鄭云公卿率大夫士是也盡心力奉職事之謂媚天子八章言鳳凰于飛高飛傅天所傅所止羣鳥皆從大賢之率吉士使媚庻人清淨為政不亂在下安養之使不失職耕墾原隰以種禾黍治其丘麻以為布帛之謂媚庻人九章言鳳鳴高岡必食竹棲梧於梧桐所生朝陽之地梧則菶菶萋萋鳯則雝雝喈喈以喻賢者覽徳輝而下也十章言王所錫君子之車既衆且多矣王所錫君子之馬既閑且馳矣御者有威儀也王既用賢不復須戒為此詩幾于煩多故曰矢詩不多我陳此詩豈不多乎恐王或怠惟以遂工師之歌誦冀王求賢用吉士永為鑒戒不損今之成功也國語公卿至于列士獻詩太師掌九徳六詩之歌工者樂師之總名也民亦勞止汔可小康惠此中國以綏四方無縱詭随以謹無良式遏寇虐憯不畏明柔逺能邇以定我王民亦勞止汔可小休惠此中國以為民逑無縱詭随以謹惽怓式遏寇虐無俾民憂無棄爾勞以為王休民亦勞止汔可小息惠此京師以綏四國無縱詭随以謹罔極式遏寇虐無俾作慝敬慎威儀以近有徳民亦勞止汔可小愒惠此中國俾民憂泄無縱詭随以謹醜厲式遏寇虐無俾正敗戎雖小子而式𢎞大民亦勞止汔可小安惠此中國國無有殘無縱詭随以謹繾綣式遏寇虐無俾正反王欲玉女是用大諫一章言民亦勞矣庻幾可以小康安之乎愛此中畿之國京師之人以安天下四方諸夏之國若欲安此勞民當糾察有罪無得縱其詭戾人之善随從人之惡者以此無阿縱之法勑謹其為無善之人用止其為寇虐之行曾不畏敬明白之刑罰乎柔安逺方之國當先順侞其近以此定我國家為王之功中國謂京師四方謂諸夏若以中國對四夷則諸夏亦為中國釋詁􅠟汔也孫炎云汔近也杜預云期也史記周昌曰臣期知其不可臣期不奉詔意同也京師諸夏之根本王安京師四方諸侯亦效王安之二章言可以小安定止息之愛此中畿之國以為諸夏之民使得合聚無縱詭随以此勅謹其讙譁為大惡惽惽怓怓者止其寇虐之害無使有遭其寇虐之憂爾王無棄始時勤政事之功以為王政之美誘導扶掖之也三章言可以休定止息之四國四方也罔極所行不得中正也慝惡也王當敬謹威儀以近有徳之人也四章言可以愒息之惠此中國以及四方俾民憂皆泄去醜衆厲惡也式遏寇虐無俾先王之政敗壊女王雖小子自遇而女用事于天下者甚廣大也五章言可以小安之王愛此京師之人則天下邦國之君不為殘虐所謂肆徂厥敬勞肆亦見厥君先敬勞上下相視之意繾綣者牢固相著施于善則善于惡則惡人行反覆為惡固執不捨者也玉者君子比徳王乎我欲令女如玉然故為是詩用大諫正女鄭云穆公至忠之言也上帝板板下民卒癉出話不然為猶不遠靡聖管管不實於亶猶之未遠是用大諫天之方難無然憲憲天之方蹶無然泄泄辭之輯矣民之洽矣辭之懌矣民之莫矣我雖異事及爾同僚我即爾謀聽我囂囂我言維服勿以為笑先民有言詢于芻蕘天之方虐無然謔謔老夫灌灌小子蹻蹻匪我言耄爾用憂謔多將熇熇不可救藥天之方懠無為夸毗威儀卒迷善人載尸民之方殿屎則莫我敢葵喪亂蔑資曾莫惠我師天之牖民如壎如篪如璋如圭如取如攜攜無曰益牖民孔易民之多辟無自立辟价人維藩大師維垣大邦維屏大宗維翰懐徳維寧宗子維城無俾城壊無獨斯畏敬天之怒無敢戲豫敬天之渝無敢馳驅昊天曰明及爾出王昊天曰旦及爾游衍諫君而呼上帝疾痛之辭也板板反也反常也下民盡皆困病出話不然出善言而不能行其所為之道惟趨淺近而不知遠圖也鄭云猶圖也王無聖人之法度管管然無所依以心自恣不能用實于誠信謀之未遠是用大諫王也天之方艱無然憲憲而欣欣天之方蹶動無然泄泄而沓沓國之安危在于出令王者若出教令其辭氣之和順矣則下民之心相與合聚矣其辭氣之悅美矣則下民之心皆得安定矣輯和洽合懌悦莫定也我雖異事自此以下明責大臣也我雖與女異其所職之事要乃與女同其官僚我今就女謀慮吿女以善道而女聽我言反囂囂然不肯受用何也我言維可服行女勿以為笑先民有言疑事詢于芻蕘薪采者匹夫匹婦或知及之况于我乎囂囂謷謷傲也取芻取蕘芻飼牛馬之草蕘供燃火之薪天之方酷虐無謔謔而喜其所為我老夫教諫女其意乃欵欵然情至意盡何為女等如未知幼弱之小子反蹻蹻自驕恣而不聽用我之言乎非我之言老耄有所失誤女用可憂之事以為戲謔乎多行慘毒之惡熇熇然不可救正而藥治之天之方懠怒無得為夸毗以體柔人也足恭前却以體從人上下威儀盡迷亂矣善人君子則如尸然不復言語天下之民方愁苦而呻吟則莫有敢揆度知其情者民遭虐政之喪禍重歛之危亂其室空虚無有資財曾莫有惠施我之師衆者夸毗者便僻其足前却為恭以形體順從于人厲王虐而彌謗故善人載尸天之牖民自此以下又言政惡民困可以反之使善君之導民即天之導民也如壎如篪然民必應君命如壎篪之相和如璋如圭然民必同君心如圭璋之相合又如往取物手攜物言其必從君化如攜取之随人也攜非自外益也上為善政民必為善是甚易也牖與誘古字通用壎篪俱是樂器半圭為璋合二璋則成圭取謂物在他處攜謂物在地上易為難易之易上有六如攜最處末故乘而反之以比攜民之東西易一音亦今民之多邪辟君無自立辟以誘之价人維藩以下又言親賢王當用善人為百官維以為藩鄣又用大師之三公大臣維以為垣牆又用大邦諸侯維以為屏蔽鄭云大師三公之大臣大邦成國之諸侯大宗同姓之宗適維為楨幹皆近而任之令為王用無得疏遠之藩者園圃之籬可以屏蔽行者垣牆亦屏蔽之義周官太師太傅太保兹惟三公侯伯以上為成國大者衆多之辭宗者與王同族王當用公卿諸侯宗室之貴者為藩屏垣幹為輔弼無疏逺之懐之為訓思也來也止也亦和之義懐徳維寧价人大師大邦大宗皆當懐之以徳使之安寧所謂上下得其歡心者王當親輔弼之臣使不乖離固宗子之城使不傾壊則令已無獨畏之憂也其在于懐徳乎周語彘之亂宣王在召公之宫國人圍之召公以其子代宣王是禍及宗子也左傳厲王戾虐萬民弗忍居王于彘是獨居而畏也敬天之怒以下又言畏天人君之天即天之天天之天即己之天君臣可不敬乎敬天之威怒而無敢戲謔以逸豫敬天之渝變而無敢馳驅以自恣昊天在上人仰之皆謂之眀明王往也及爾出往入來是出入往來相從也旦明也㳺行衍溢相従視女所行善惡可不慎乎詩人言上天之道或有此變怒之時常須敬戒非謂獨當此變怒之時乃思禁其逸豫自恣也文王在帝左右敬之日鑒在兹凡伯之言本乎此也出話不然一曰如史記所謂唯唯否否不然及爾同僚托與公卿言而風諫曾莫恵我師多瘠罔詔也孔易音難易之易又音不易之易盖通音歟不懐以徳則城壊城壊則藩垣屏翰皆壊而獨居蕩蕩上帝下民之辟疾威上帝其命多辟天生烝民其命匪諶靡不有初鮮克有終文王曰咨咨女殷商曾是彊禦曾是掊克曾是在位曾是在服天降慆徳女興是力文王曰咨咨女殷商而秉義𩔖彊禦多懟流言以對寇攘式内侯作侯祝靡屆靡究文王曰咨咨女殷商女炰烋于中國斂怨以為徳不明爾徳時無背無側爾徳不明以無陪無卿文王曰咨咨女殷商天不湎爾以酒不義從式既愆爾止靡明靡晦式號式呼俾晝作夜文王曰咨咨女殷商如蜩如螗如沸如羮小大近喪人尚乎由行内奰于中國覃及鬼方文王曰咨咨女殷商匪上帝不時殷不用舊雖無老成人尚有典刑曾是莫聽大命以傾文王曰咨咨女殷商人亦有言顛沛之揭枝葉未有害本實先撥殷鑒不遠在夏后之世呼上帝者痛其君之辭也蕩蕩乎無綱紀文章上天乎其何以為下民之辟疾病人矣威罪人矣賦斂之重刑法之峻上天乎其命令何多邪辟也天生衆民其命匪在于誠信乎天命之謂性固純誠也今也靡不有初鮮克有終豈非君命之多辟乎文王曰咨以下托于文王之諫商辭婉而意切矣召虎知厲王之必亡而憂傷深思焉文王曰嗟嗟殷商曾是彊梁禦善之人曾是掊克自伐而好勝人者使之在位服政事也天乎方降是慆慢之徳以孽斯世女又興而力任之乎文王嗟女殷商女之所執宜以義善也今也乃彊梁禦善而多怨懟流言以對是誣善之言也寇盜攘竊為姦宄者而信用于内維為呪咀靡有窮極何哉文王嗟女殷商如彭亨自矜氣健于國中多為可怨之事而自以為徳不明爾徳以前後左右無賢人之故爾徳不明以無陪貳卿士非無具官也無賢人也文王嗟女殷商天之意豈沈湎爾以酒惟天降命肇我民惟元祀豈欲其大小邦用喪乎爾乃惟不義之從以為式法既愆爾之所當止如臣忠子敬之𩔖又靡明靡晦式號式呼使晝為夜無有止息乎文王嗟女殷商飲酒號呼之聲如蜩如螗之鳴笑語沓沓如湯之沸羹之方熟小大近于喪亡如此人尚由行此道不知其非乎内見怒奰于中國且延及遠方蠻夷矣文王嗟女殷商今之喪亂匪上帝為此不善之時乃殷不用舊典雖無舊人與圖先王舊政尚有常事故法可用曾是莫聴大命以傾覆矣文王嗟女殷商人亦有言木之顛沛將揭蹶也枝葉未有傷害其根本實先撥絶殷鑒不逺在夏后之世興亡之理王其不察之乎文王之服事商且愛其君者如此十世之後詩人發明之不惟諫厲王之婉而抑見文王之咨嗟者亦未嘗不欲商之久存而不亡矣抑抑威儀維徳之隅人亦有言靡哲不愚庻人之愚亦職維疾哲人之愚亦維斯戾無競維人四方其訓之有覺徳行四國順之訏謨定命逺猶辰吿敬慎威儀維民之則其在于今興迷亂于政顛覆厥徳荒湛于酒女雖湛樂從弗念厥紹罔敷求先王克共明刑肆皇天弗尚如彼泉流無淪胥以亡夙興夜寐洒埽廷内維民之章脩爾車馬弓矢戎兵用戒戎作用逷蠻方質爾人民謹爾侯度用戒不虞慎爾出話敬爾威儀無不柔嘉白圭之玷尚可磨也斯言之玷不可為也無易由言無曰茍矣莫捫朕舌言不可逝矣無言不讎無徳不報惠于朋友庻民小子子孫繩繩萬民靡不承視爾友君子輯柔爾顔不遐有愆相在爾室尚不愧于屋漏無曰不顯莫予云覯神之格思不可度思矧可射思辟爾為徳俾臧俾嘉淑慎爾止不愆于儀不僭不賊鮮不為則投我以桃報之以李彼童而角實虹小子荏染柔木言緡之絲溫溫恭人維徳之基其維哲人告之話言順徳之行其維愚人覆謂我僭民各有心於乎小子未知臧否匪手㩦之言示之事匪面命之言提其耳借曰未知亦既抱子民之靡盈誰夙知而莫成昊天孔昭我生靡樂視爾夢夢我心慘慘誨爾諄諄聽我藐藐匪用為教覆用為虐借曰未知亦聿既耄於乎小子吿爾舊止聽用我謀庻無大悔天方艱難曰喪厥國取譬不遠昊天不忒回遹其徳俾民大棘抑抑威儀審密也有諸中必形諸外威儀為徳之隅者如宫室之制内有繩直則外有廉隅威儀抑抑徳必嚴正也人亦有言靡哲不愚聖而罔念則狂之謂也庻人之愚亦主維疾謂下愚之不移民有三疾哲人之愚亦維斯罪其不念而狂乎故前哲而後愚也承上章威儀而言謂人斯須之不謹則暴慢入之而遂為邪僻之人矣莫彊于用人四方其訓效于我矣徳行覺民之大有直其徳行則四國其順從之于我矣訏大其謀謨審定其命令悠遠其猶圖以時吿民尤在于敬慎其威儀乃維民之準則也其在于今厲王所興尚者迷亂于政事顛覆其徳行荒耽于酒不自燕喪威儀乎女雖湛樂之從弗念其為人子孫紹繼其祖考者乎罔敷求古先哲王能共敬明明之法度者故皇天厭棄弗從尚如彼泉流無淪率胥相以喪亡也夙興夜寐洒埽廷内堂上不治則野外曠芸正宜早夜潔除修飭朝廷以為民之章表修爾車馬弓矢與戎兵之器也用戒兵事或興用攘逷蠻方之不服者質爾人民則使之純一無偽所謂民之質矣謹爾侯度則所謂一遊一豫為諸侯度用戒不虞不億度而至之事不可不先戒也慎爾出話話之不可輕也敬爾威儀威儀當以敬為先也無不柔嘉話言威儀柔嘉維則柔者遜順也所以有物有則君以敬為則民以君為則白圭之玷缺猶可磨鑢而平斯言之玷不可為也無易乎言之所由發無曰茍矣莫捫朕舌言不可輕逝矣無言不讎無徳不報與人善言暖于布帛傷人以言甚于矛㦸出其言善則千里之外從之出其言不善則千里之外違之王之教令當思惠順朋友暨于庻民小子也夫如是則子孫繩繩萬民靡不承君之徳言矣此謂慎爾出話也視爾友君子謂諸侯卿大夫皆知輯和柔順其顔不逺有愆然謹于外者未必能謹于内勤于明者未必能勤于幽故戒之以相在爾室尚不愧于屋漏謂幽隱隅奥之處也無曰不顯莫予云見戒慎其所不睹神之格思洋洋如在其上如在其左右不可億度以為有矧可厭射以為無惟揆之在我誠心之有無而已矣此敬爾威儀也則又申之曰辟爾為徳君哉為徳俾善俾嘉無為凶慝淑慎爾止不愆于威不僭差不賊害鮮不為民之則矣理之必然勢之必至如投我以桃報之以李也王為不善而求民應之不悖彼童羊之無角而求其角實虹潰小子之聽矣荏染柔靱之木言被之絲弦以為弓溫溫恭敬之人是為徳之基也弓以柔木為質徳以溫恭為基也明哲之人吿之話言順徳之行愚闇之人反謂我僭差矣民其各有心乎言其資有可吿語者有不可吿語者而下章拳拳又不能已也於乎小子戒厲王亦自儆也未知臧否不知善否也匪但手攜挈之言示以事之是非矣匪但面語之親提撕其耳所謂誨爾諄諄者借曰未知亦既抱子長大矣民不自盈滿而遜志于求善誰有夙知而莫成乎惟其滿盈而自縱故聖而狂哲而愚夙知而莫成昊天孔昭我生斯辰可謂靡樂視爾夢夢而亂我心慘慘而憂誨爾諄諄而勤聽我藐藐而忽畧匪以我言為教反以我為讎虐借曰未知亦耄將及矣於乎小子吿爾舊矣聽用我謀庻無大悔天方艱難曰喪我邦取譬不逺如商如夏福善禍淫昊天不差忒矣今乃邪僻其行俾民大至棘急何哉以厲王之不君而召穆公毛伯芮伯衞武公更相諫正雖王之監謗不顧也然則古大臣之忠于君者豈以其君之惡諫而不之諫也哉正君者先正其身正其身者則武公之自警者是矣國語武公年九十五而為懿以自儆韋昭云懿即抑也菀彼桑柔其下侯旬捋采其劉瘼此下民不殄心憂倉兄塡兮倬彼昊天寧不我矜四牡騤騤旟旐有翩亂生不夷靡國不泯民靡有黎具禍以燼於乎有哀國歩斯頻國歩蔑資天不我將靡所止疑云徂何往君子實維秉心無競誰生厲階至今為梗憂心慇慇念我土宇我生不辰逢天僤怒自西徂東靡所定處多我覯痻孔棘我圉為謀為毖亂况斯削吿爾憂恤誨爾序爵誰能執熱逝不以濯其何能淑載胥及溺如彼遡風亦孔之僾民有肅心荓云不逮好是稼穡力民代食稼穡維寳代食維好天降喪亂滅我立王降此蟊賊稼穡卒痒哀恫中國具贅卒荒靡有旅力以念穹蒼維此惠君民人所瞻秉心宣猶考慎其相維彼不順自獨俾臧自有肺腸俾民卒狂瞻彼中林甡甡其鹿朋友已譖不胥以穀人亦有言進退維谷維此聖人瞻言百里維彼愚人覆狂以喜匪言不能胡斯畏忌維此良人弗求弗迪維彼忍心是顧是復民之貪亂寧為荼毒大風有隧有空大谷維此良人作為式穀維彼不順征以中垢大風有隧貪人敗𩔖聽言則對誦言如醉匪用其良覆俾我悖嗟爾朋友予豈不知而作如彼飛蟲時亦弋𫉬既之隂女反予來赫民之罔極職涼善背為民不利如云不克民之回遹職競用力民之未戾職盜為寇涼曰不可覆背善詈雖曰匪予既作爾歌言菀彼茂盛之桑其葉稚而柔濡然而下陰均也捋採之多則葉爆爍而疎病此下民而不得其所䕃矣不絶心憂倉喪兄滋塡久兮明大哉是天寧不我矜哀乎四牡騤騤而不息鳥隼之旟龜蛇之旐翩翩在路征伐不息適長寇虐亂生不平無國不見殘滅下國見殘則枝葉疏而王室之本根亦不得其䕃矣民靡有黎謂周餘黎民靡有孑遺之意且禍亂以災燼於乎有哀國家之運斯頻促矣國步如此無所資倚天不我將乎靡所止定又疑所之云徂何往乎亂至之無日也君子之人實維秉持其心莫强在此所謂操則存者今奈何喪失其良心而從于禍亂誰生此厲惡之階至今為病乎謂小人也憂心慇慇念我天下土宇之不安我生不辰逢天厚怒自西徂東靡所定處我多遇乎困病孔急哉我之垂圉也為謀甚謹亂滋斯削去矣而不謹于謀何以止亂吿以憂恤之方誨爾以次序爵位之宜尊賢使能親善去邪是序爵也誰能執熱逝不以濯奈何見亂而不思所以削去之乎其何能善則相與陷溺于禍難而已矣視王之亂政使人如遡鄉疾風亦孔之僾唈而不能喘息矣民本有肅敬之心王乃使之不及其初心是上暴而下慢也好是稼穡謂王政以務農為先有力田之民有代食之民力田之人耕而食也代食之人其禄足以代其耕也稼穡則維寳矣代食則維好矣寶稼穡重民天也好其代食禄有徳也知重民之食然後不輕于以禄禄人矣天降䘮亂將滅我王所恃而立者又下蟊賊食根曰蟊食節曰賊耕種曰稼收斂曰穡蟊賊既多使我稼穡盡瘁病矣哀痛乎中國之人具贅屬而阽危卒荒亂而空虚困無膂力以共念穹蒼者維此惠順之君民所共瞻仰能秉其心以正心率事也宣徧猶謀謀于衆也考誠其輔相之行然後用之擇賢之審也維彼不順之君自以為善自有肺腸行其心中之所欲俾民卒狂而不知所向也瞻彼中林甡甡其鹿衆多矣相軰偶行獸猶有友也今朝廷之臣朋友胥譖而不相善鹿之不如人亦有言進退維窮此時之謂也維此聖人瞻言百里之外逺慮也維彼愚人淺謀近慮者以狂迷為可喜王疏遠慮之人而用狂愚之士爾臣當諫匪言不能胡斯畏忌謂臣下畏王之威而不敢諫也芮伯勉羣臣以正諫而無懐畏忌之私也維此良人弗求弗進之維彼忍心為惡之人所謂無不忍人之心者是顧念而復之忽賢而愛小人也民之貪亂曰時日曷喪安為荼毒以速之乎大風之來有所從之隧其在于大空谷之中矣維此良人興為用善維彼不順征以中垢謂行闇㝠也大風有隧貪人敗善道聽之言對答如響先王詩書之言恍然如醉矣匪用其良反俾我相從為悖逆乃稱其心矣嗟爾朋友親而切磋之也我豈不知而為此妄𤼵之言乎如彼飛蟲時亦弋中既已密吿女矣女反予來赫乎口距人謂之赫也民之不中主于王政之涼薄善背反覆也為民不利如云不克者所謂凶人為惡惟日不足民之邪遹主于在上之用力以相競不徳競而力爭民安得不邪僻乎民之未定主于上有盜賊之臣寇虐傷民也所謂盜寇非必禦人于國門之外賊乎民之生者皆寇也賊乎君之心者與賊乎已之心者亦皆寇也薄曰不可反背我而詈我之善矣雖曰匪予自諱其過既作爾歌宜思而悔也倬彼雲漢昭回于天王曰於乎何辜今之人天降喪亂饑饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聽旱既大甚蘊隆蟲蟲不殄禋祀自郊徂宫上下奠瘞靡神不宗后稷不克上帝不臨耗斁下土寧丁我躬旱既大甚則不可推兢兢業業如霆如雷周餘黎民靡有孑遺昊天土帝則不我遺胡不相畏先祖于摧旱既大甚則不可沮赫赫炎炎云我無所大命近止靡瞻靡顧羣公先正則不我助父母先祖胡寧忍予旱既大甚滌滌山川旱魃為虐如惔如焚我心憚暑憂心如熏羣公先正則不我聞昊天上帝寧俾我遯旱既大甚黽勉畏去胡寧瘨我以旱憯不知其故祈年孔夙方社不莫昊天上帝則不我虞敬恭明神宜無悔怒旱既大甚散無友紀鞫哉庻正疚哉冡宰趣馬師氏膳夫左右靡人不周無不能止瞻卬昊天云如何里瞻卬昊天有嘒其星大夫君子昭假無贏大命近止無棄爾成何求為我以戾庻正瞻卬昊天曷惠其寧倬彼雲漢謂天河之水氣精光運轉于天也旱而渴雨宣王夜仰視天河望其候焉曰於乎何辜哉今之人也天之降災于我當喪亂之餘又饑饉薦至我則靡神不舉其祭靡愛斯牲圭璧既盡用之而神豈不我聽乎此則述宣王恐懼脩省之意也旱既大甚蘊蘊而暑隆隆而雷蟲蟲而熱不絶精禋以祀自郊丘徂宗廟上天下地奠其禮瘞其物靡神不齊肅而尊敬之后稷不克饗乎上帝不我臨乎與其耗斁下土寧當我之身也旱既大甚則幾于不可推移矣甚欲移去之也兢兢業業如有雷霆近𤼵于上周餘黎民今其死亡靡有孑遺甚憂之之辭也昊天上帝則獨不遺留我民乎胡不相與畏懼哉先祖之業將于是而摧矣旱既大甚則幾不可沮止矣赫赫炎炎人皆不堪云我無所庇處大命近止死亡之將至也靡瞻靡顧天地鬼神曾靡瞻顧之乎羣公先正謂昔者社稷之臣其祀典所及者曾不我助乎父母先祖胡寧忍予之至此乎旱既大甚山無木川無水如滌滌然旱神為虐如惔如燎我心畏暑憂心如灼羣公先正則聞我之憂乎昊天上帝寧使我遯位而去也旱既大甚黽勉禱請憂畏而思去之胡寧病我以旱乎曾不知其故也祈年之祭甚早四方社稷之祠又不為莫而何為若此也昊天上帝則不我憂虞乎于明神無不敬恭宜無悔怒以致害災而何為若此也旱既大甚父子離散兄弟妻子不相保所謂散無友紀鞫窮乎庻官之正疚病乎冢宰趣馬司王之供御者師氏教王之子弟者膳夫左右皆王之左右侍從無非正臣者靡人不周其消旱救災之念慮無有不能之人止語辭也而旱之不消災之不救其何為如此也瞻卬昊天云如何其里乎瞻卬昊天望雨而星嘒嘒而衆大夫君子凡我之臣所謂昭明假至于天者盡其誠而無餘矣大命近止喪亡雖近亦無怠廢而喪其成也何方求所以為我者以定庻正乎瞻卬昊天其何能順我心之求安者乎崧高維嶽駿極于天維嶽降神生甫及申維申及甫維周之翰四國于蕃四方于宣亹亹申伯王纘之事于邑于謝南國是式王命召伯定申伯之宅登是南邦世執其功王命申伯式是南邦因是謝人以作爾庸王命召伯徹申伯土田王命傅御遷其私人申伯之功召伯是營有俶其城寢廟既成既成藐藐王錫申伯四牡蹻蹻鉤膺濯濯王遣申伯路車乘馬我圖爾居莫如南土錫爾介圭以作爾寶往近王舅南土是保申伯信邁王餞于郿申伯還南謝于誠歸王命召伯徹申伯土疆以峙其粻式遄其行申伯番番既入于謝徒御嘽嘽周邦咸喜戎有良翰不顯申伯王之元舅文武是憲申伯之徳柔惠且直揉此萬邦聞于四國吉甫作誦其詩孔碩其風肆好以贈申伯崧高貌大而高曰崧岳東岱南衡西華北恒堯之時姜氏為四伯掌四岳之祀述諸侯之職周有甫有申有齊有許皆姜氏之苗裔也鄭云徳當岳神之意而福興其子孫歴虞夏商世有國土言崧高者其惟四岳乎其駿大極至于天惟岳降其神靈和氣以生甫侯申伯為周之臣甫侯見于穆王之時其子孫之賢或與申伯並立于宣王之朝不得而考詩人因申伯而言甫侯耳維申伯及甫侯維周之楨翰四國有難則往蕃屏之四方恩澤不至則往宣暢之勉勉哉申伯為卿士以佐宣王王又欲纘繼命之以侯伯之事為邑于謝謝在周之南南方之國欲其皆于申伯是法式也宣王所以親之之意改大其邑爰命召公往定其宅登升也升是南邦世執其功期之以長久也王命申伯式是南邦因是謝邑之人而為國都以起女之功王命召公治其井牧定其賦稅又命傅御治事之官遷其家臣所以相助之者無不用其至蓋忠臣不欲離王室也申伯居謝之功事皆召公為營之有始其城郭及成其寢與其廟安神人之所處也既成藐藐而美王錫申伯四牡蹻蹻而壯鉤膺樊膺也濯濯光明也又以禮遣之國有車馬之賜路大也乘四也吿之曰我圖爾之所居莫如南土之最善圭長尺二寸謂之介非諸侯之圭諸侯之圭自九寸以下故錫介圭以為寶瑞往已哉爾申伯王舅也南土是保式南邦保南土皆付以侯伯之任也申伯以王告語之復重乃信往矣王又出餞于郿郿在岐周或者宣王省岐周歟申伯還南自岐周受王命而還誠歸于謝矣曰信邁曰誠歸其味深長也王命召公治其田矣又命召公治其土界之所至以峙其糧令廬市有止宿之委積用是速申伯之行申伯番番而勇武諸侯有大功賜虎賁徒行者御車者嘽嘽安舒也徧邦之人皆喜而相告曰汝乎有善君也相慶之言云爾不顯乎申伯哉王之大舅也有文有武人皆於是表式也申伯之徳柔惠且直敬以直内義以方外矣豈特式南邦保南上哉可以柔順萬邦聞于四方之國矣吉甫為工師之誦其詩之意甚美其風切申伯肆長好美以此贈申伯乃所以美宣王也天生烝民有物有則民之秉彝好是懿徳天監有周昭假于下保兹天子生仲山甫仲山甫之徳柔嘉維則令儀令色小心翼翼古訓是式威儀是力天子是若明命使賦王命仲山甫式是百辟纘戎祖考王躬是保出納王命王之喉舌賦政于外四方爰𤼵肅肅王命仲山甫將之邦國若否仲山甫明之既明且哲以保其身夙夜匪解以事一人人亦有言柔則茹之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮矜寡不畏彊禦人亦有言徳輶如毛民鮮克舉之我儀圖之維仲山甫舉之愛莫助之衮職有闕維仲山甫補之仲山甫出祖四牡業業征夫捷捷每懐靡及四牡彭彭八鸞鏘鏘王命仲山甫城彼東方四牡騤騤八鸞喈喈仲山甫徂齊式遄其歸吉甫作誦穆如清風仲山甫永懷以慰其心按此篇永樂大典缺卷奕奕梁山維禹甸之有倬其道韓侯受命王親命之纘戎祖考無廢朕命夙夜匪解虔共爾位朕命不易幹不庭方以佐戎辟四牡奕奕孔脩且張韓侯入覲以其介圭入覲于王王錫韓侯淑旂綏章簟茀錯衡𤣥衮赤舄鉤膺鏤錫鞹鞃淺幭鞗革金厄韓侯出祖出宿于屠顯父餞之清酒百壺其殽維何炰鼈鮮魚其蔌維何維筍及蒲其贈維何乘馬路車籩豆有且侯氏燕胥韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門蹶父孔武靡國不到為韓姞相攸莫如韓樂孔樂韓土川澤訏訏魴鱮甫甫麀鹿噳噳有熊有羆有貓有虎慶既令居韓姞燕譽溥彼韓城燕師所完以先祖受命因時百蠻王錫韓侯其追其貊奄受北國因以其伯實墉實壑實畝實籍獻其貔皮赤豹黄羆奕然梁山之大昔者維禹之所甸治除水災成土田以定貢賦今韓侯之國以梁山為鎮故詩人表而言之曰有倬然著明之道者其惟韓侯受天子之命乎夫春秋諸侯皆不知朝而王遣人錫命之以是而觀韓侯之朝而宣王之錫可謂有倬其道矣王親命之繼汝祖考是韓侯之祖父昔者曾為北方之伯乃州伯之伯也無廢我命夙夜匪怠敬共爾位則朕命不易矣汝其于不庭直之方國則為我楨幹而正之以佐汝君君即宣王自謂也此一章乃詩人先述韓侯來朝受王之命以為宣王能錫命諸侯之美亦所以美韓侯也然後敘其來朝與其將歸及其娶妻凡國中之盛大與奄受北國者而併言之也韓侯之來朝如何哉所乘四馬奕奕然而大孔長且壯韓侯之入覲也蓋以秋見又以其介圭為國之瑞而入覲于王所以獻也晉文公之于王出入三覲又禮有廟中將幣三享之文非一次也黑水西河其貢璆琳琅玕孔以為玉之大者為介圭貢國之寶杜甫所謂琳琅識介珪本于此與王之所錫予韓侯則淑善之旂畫交龍者而又揭旄于竿以為綏章車之備飾則有織簟以為蔽錯畫文章以為衡𤣥衮之服赤鳥之屨馬之膺施大帶曰繁纓而謂之鉤膺馬之眉上鏤金為飾曰當盧而謂之鏤錫以淺毛虎皮幭覆其軾而又于軾之鞃中施以鞹革而轡首用皮曰鞗革以金為小環往往纒搤之如小蟲之形韓侯之既受命而歸如何哉其出而為祖道之祭也出宿于屠之地王朝之名公巨卿餞之則有清酒百壺之盛禮殽有炰鼈鮮鱠蔌有蒲筍之菹而王之贈韓侯也又有路大之車一乘之馬諸侯之凡在京師者亦來相與韓侯燕飲而曰籩曰豆有且其多矣韓侯之娶妻何如哉其娶妻也乃汾水之王之甥蹶父之子蹶父王之卿士姞其姓后稷之後也百兩之車彭彭然每車八鸞鏘鏘然豈不顯其光明乎諸侯一娶九女二國媵之諸娣衆妾也祁祁如雲之盛韓侯顧之粲然鮮明盈門矣毛云曲顧禮義也蹶父則甚武矣為天子使靡國不到而為其女相所配莫如韓樂也韓國之盛大如何哉甚有樂之韓土川澤訏訏而大魴鱮甫甫而大麀鹿噳噳而衆又有猛獸見高山深林貓似虎而淺毛者善既令居韓姞安而有譽處也大彼韓城乎乃昔者晏安平治之時師衆所完築者今韓侯以先祖之功而受命因時百蠻而撫綏之王賜韓侯以侯伯之命是其一方北國如追如貊之夷皆奄受之而綂以方伯連率之職也未城者墉城之有斯城有斯池矣未畝者畝治之有斯畝有斯籍矣嵗時貢獻率其方物以享于王則獻其猛獸之皮若貔若豹若羆是也大享之儀無所不有虎豹之皮示服猛詩人舉一以見百抑亦因其方之所有也江漢浮浮武夫滔滔匪安匪遊淮夷來求既出我車既設我旟匪安匪舒淮夷來鋪江漢湯湯武夫洸洸經營四方吿成于王四方既平王國庻定時靡有爭王心載寧江漢之滸王命召虎式辟四方徹我疆土匪疚匪棘王國來極于疆于理至于南海王命召虎來旬來宣文武受命召公維翰無曰予小子召公是似肇敏戎公用錫爾祉釐爾圭瓚秬鬯一卣吿于文人錫山土田于周受命自召祖命虎拜稽首天子萬年虎拜稽首對揚王休作召公考天子萬壽明明天子令聞不已矢其文徳洽此四國江漢之水合而東流浮浮然武夫滔滔然順王命而行非敢安逸遊止也淮夷之故來求平定之耳既出我軍戎矣既設我鳥隼之旟矣匪安逸匪舒肆淮夷之故來鋪敷王之徳意耳江漢之水合流而湯湯然武夫洸洸而武經營四方謂即其所而東西南北皆經理營緝之以其成功入吿于王四方既平則王國無南顧之憂其庻安定乎時靡有爭海内同風而胥服王心則得安寧矣江漢之滸王命召虎于此平淮夷之難非王親至其間命之也式辟四方使皆清夷因徹治其疆土使通田賦匪病之也匪棘之也以王國之中來示之中耳于疆界于分理之至于南海甚言其逺也王命召虎來旬徧來宣布其徳意昔者文王武王受天命之時有召康公維楨幹之臣今爾召虎無曰予小子不足以繼文武爾其是似爾之前人乎肇始敏疾爾之公事是用錫爾祉福賜爾以圭柄之瓚秬黍鬱鬯之酒一卣吿于爾之先祖文人也毛以為九命賜圭瓉秬鬯則又錫之山川名山大澤不以封有大功者賜之宣王之命之也不于其他而于岐周之廟重之也蓋昔召康公受王命于此地故于周授之而于周受之此所以表其祖孫之濟美也虎拜稽首天子萬年祝宣王之夀也虎拜稽首對揚王休對答也揚厲也起召康公之成業而為其不朽則又祝宣土以萬年之夀也召虎之對揚王休而所以復于王其心安在哉其辭若曰明明天子令聞不已興衰撥亂可謂令聞矣而亹亹不巳必若昔者文王之不已欲其不已不在武功而又在文徳蓋文武一也文以徳為本而武特文之發用一端如征苗誓師而曰舞干羽于兩階而曰文武本于文而文該乎武也自今以往其欲吾君矢陳設張文徳以浹洽此四方之國乎自王命召虎以下如古者册命之文而間見于今之所傳彞樽鍾鼎者此蓋詩人因其錫命受命君予臣和之言而播其精微于雅耳召康公専告成王以敬徳而召穆公又吿宣王以矢其文徳尹吉甫述而美之亦因以戒宣王如常武之意也赫赫明明王命卿士南仲大祖大師皇父整我六師以脩我戎既敬既戒惠此南國王謂尹氏命程伯休父左右陳行戒我師旅率彼淮浦省此徐土不留不處三事就緒赫赫業業有嚴天子王舒保作匪紹匪遊徐方繹騷震驚徐方如雷如霆徐方震驚王奮厥武如震如怒進厥虎臣闞如虓虎鋪敦淮濆仍執醜虜截彼淮浦王師之所王旅嘽嘽如飛如翰如江如漢如山之苞如川之流緜緜翼翼不測不克濯征徐國王猶允塞徐方既來徐方既同天子之功四方既平徐方來庭徐方不回王曰還歸赫赫乎盛也明明乎察也宣王之命卿士也蓋南仲為之太祖在文王時嘗為將者而今為太師其人則皇父也又兼執政而為王卿士故曰王命卿士皇父在厲王時見刺于詩人此或其氏與王命皇父整我六軍以修我戎兵既敬既戒惠此南國修戎器而先之以敬戒不曰征討四國而曰惠此南國是所謂常徳而立武也王謂大夫尹氏䇿命程國伯爵為大司馬左右陳列而戒飭師旅循彼淮浦視此徐方之土不留處不敢寧居三事成其功緒赫赫乎盛業業乎動有嚴天子謂立武也王舒保作者謂王之立武欲其舒而不迫也保而不擾也起而不怠也凡將臣之受王命匪敢紹繼以好兵匪敢遊樂以縱欲念徐方繹騷動之故耳王者之師不戰而勝震驚徐方如雷如霆徐方震驚先聲所服也王奮厥武如震如怒所謂震電憑怒者進厥虎臣不特皇父休父凡將士也其臣如虎虓然而怒敦厚其兵陳于淮水之涯瀕仍執其衆虜之後服者截然淮浦乃王師之所也之子于征有聞無聲截彼淮浦王師之所皆見古人行師安靜之義也王將則如虎矣王之師旅又嘽嘽然如鳥之疾飛如翰之特摯如江漢之廣大如山之苞靜而固也如川之流動而不可禦也緜緜靚也翼翼敬也不可測不可勝以是大征徐國凡此皆常徳之武而非苛暴之武也王之所命而將士師旅之所稟雖有其勇不敢以妄施雖本于仁不敢以自弛觀其用兵行師而見于此篇者大略可想矣王之謀猷允信塞實此所謂常徳也允塞者舜之事也此二字見于書復見于雅學者不可不細求而深體之召穆之吿其君以矢其文徳又吿之以王猶允塞允則誠信塞則篤實誠信可動天地感豚魚况于人乎篤實而有輝光可以光被四表格于上下而况于用兵乎王猶允塞徐方既來服矣徐方既同天子之功而非獨將帥之力也四方既平聞風而悅徐方來庭不特來服而又來朝徐方不回不違王命也王曰還歸者叛則伐之服則舎之宣王之言若曰如此止戈為武又何黷之有乎瞻卬昊天則不我惠孔填不寧降此大厲邦靡有定士民其瘵蟊賊蟊疾靡有夷届罪罟不收靡有夷瘳人有土田女反有之人有民人女覆奪之此宜無罪女反收之彼宜有罪女覆說之哲夫成城哲婦傾城懿厥哲婦為梟為鴟婦有長舌維厲之階亂匪降自天生自婦人匪教匪誨時維婦寺鞫人忮忒譖始竟背豈曰不極伊胡為慝如賈三倍君子是識婦無公事休其𧖟織天何以刺何神不富舎爾介狄維予胥忌不弔不祥威儀不𩔖人之云亡邦國殄瘁天之降罔維其優矣人之云亡心之憂矣天之降罔維其幾矣人之云亡心之悲矣觱沸檻泉維其深矣心之憂矣寧自今矣不自我先不自我後藐藐昊天無不克鞏無忝皇祖式救爾後言瞻卬昊天則不我惠愛乎孔久不寧降此大惡邦靡有定士民其病食根曰蟊食節曰賊蟊賊害禾稼之蟲蟊疾害禾稼之狀無有夷平止息之時小人為之蟊賊刑罰為之網罟曾不收斂亦無夷平瘳愈之日也王之黜削諸侯及卿大夫無罪者收之而有罪者赦之有其不宜有奪其不宜奪怨之府也哲夫多才智則能興人之國婦人之多智適足以傾人之國而已懿痛傷之聲又如字謂以哲婦為美謂褒姒也梟鴟惡聲之鳥長舌多言也婦有長舌是為禍亂之階匪降自天生自婦人不用教誨之言惟婦人寺人是聽所謂日用宦官女子之言耳婦人之為譖也以言窮人且忮害而忒變轉化無常始譖終背其為害豈曰不至乎何為惡而未巳也如賈三倍非君子所宜深識婦人而休止其蠶織以與朝廷之事豈所宜乎天何用刺責王神何為不富王哉王今舍夷狄犬患之可憂而維予羣臣之胥忌遇災而不弔不謹其威儀善人奔亡邦國將盡困病矣天乎降此罰惡之罔多且近矣人之云亡我心憂且悲矣檻泉從下而上涌觱沸其貌泉之深矣喻已之憂從來久矣不自先不自後適當其時天雖高逺仁愛人君無不能鞏固其命王其無忝爾祖式救子孫乎上不念祖宗下不念子孫自為敗壊不可扶持凡伯猶言有可鞏固之理然天即君也非欲幽王之外求也旻天疾威天篤降喪瘨我饑饉民卒流亡我居圉卒荒天降罪罟蟊賊内訌昬椓靡共潰潰回遹實靖夷我邦臯臯訿訿曾不知其玷兢兢業業孔填不寧我位孔貶如彼歲旱草不潰茂如彼棲苴我相此邦無不潰止維昔之富不如時維今之疚不如兹彼疏斯粺胡不自替職兄斯引池之竭矣不云自頻泉之竭矣不云自中溥斯害矣職兄斯𢎞不烖我躬昔先王受命有如召公日辟國百里今也日蹙國百里於乎哀哉維今之人不尚有舊按此篇永樂大典缺卷
