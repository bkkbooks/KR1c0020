body:
  text: 毛詩講義卷一宋林岊撰周南關關雎鳩在河之洲窈窕淑女君子好逑參差荇菜左右流之窈窕淑女寤寐求之求之不得寤寐思服悠哉悠哉輾轉反側參差荇菜左右采之窈窕淑女琴瑟友之參差荇菜左右芼之窈窕淑女鐘鼓樂之關關和聲也窈窕貞静幽閒也雎鳩鵰鶚之𩔖摯而有别之禽也其在河水中洲關關然和鳴以比貞静幽閒之淑女有别而且和樂也如此淑女信可為王者之好逑匹也參差荇菜左右流之者謂和而率下也祭亦多品荇其最微舉小見大后妃率三夫人九嬪共菹參差之荇左右助求之可見備物備官人皆愛助之詩人蓋思如此之人居如此之職也故曰窈窕淑女寤寐求之寐寢也寤覺也求之不得則寤寐而思服服亦思也悠哉悠哉輾轉反側言寢覺而不安意有所向也所謂哀窈窕思賢才也參差荇菜左右采之者亦思有如此之人居如此之職也故曰窈窕淑女琴瑟友之謂后妃之賢宜以琴瑟之和聲親友之也采取也芼擇而調和之也后妃之賢又宜以鐘鼓之盛樂而樂之也所謂樂得淑女以配君子也此篇毛氏小序𫝊用數則字𤼵明風人之義極分曉不以為文王太姒最有意至鄭氏則所箋差矣大抵此篇所言后妃之徳惟窈窕淑女四字夫貞静幽閒者内心也窈窕者徳容也所謂邪僻怠情不接於耳目不設於身體婦徳婦言婦容婦功古者后妃以此隂教教其六宫而助天子之陽徳非徳盛感深其何以當此職位也此所以為風之始而風天下正夫婦也别而和婦人之大徳古𫝊設樂待賢得之矣葛之覃兮施于中谷維葉萋萋黄鳥于飛集于灌木其鳴喈喈葛之覃兮施于中谷維葉莫莫是刈是濩為絺為綌服之無斁言告師氏言告言歸薄汚我私薄澣我衣害澣害否歸寧父母葛之覃兮至服之無斁者此篇皆賦亦興也桑之所織為絲而錦綺生焉麻之所緝為布而升數不齊焉女功勤矣美矣風人立義不取乎此獨取葛言之葛者古人御暑之服女工之最精細且艱難者意謂富貴之人不知女工如此精細如此艱難服之于身未必貴重而易生厭斁朝更暮改百侈從生皆自厭斁之心始故丁寧之若曰彼葛之麤蔓延中谷葛生之春鳥鳴之朝從其萋萋至于莫莫勤乎女工者候其成熟刈而濩之乃以為絺乃以為綌其細且難不知涉厯幾多工夫然後成此絺綌也為后妃者其當服之無斁矣言告師氏言告言歸薄汚我私薄澣我衣曷澣曷否歸寧父母者謂古者婦人居有圖史行有環珮在家有姆訓之咨既嫁有保傅之習皆師氏也后妃將歸其家不輕舉動拳拳節儉告師氏以將歸取衣裳而澣濯私者濯之深而曰汚衣者濯之略而曰澣又曰何者宜澣乎何者不必濯乎推是心也信可以歸安父母矣父母之心欲其子之富貴知禮長享安榮豈欲其忘本恃末將為亡國敗家之事哉采采卷耳不盈頃筐嗟我懐人寘彼周行陟彼崔嵬我馬虺隤我姑酌彼金罍維以不永懐陟彼髙岡我馬𤣥黄我姑酌彼兕觥維以不永傷陟彼砠矣我馬瘏矣我僕痡矣云何吁矣首篇皆興也卷耳蒼耳也或備祭祀酒漿之用古之賢淑后妃内有進賢之志而無險詖私謁之心因卷耳而有感語其君子其辭若曰采采卷耳不盈傾筐則采之為難得矣嗟我君子懐思賢人寘之列位其亦每每念賢之難得如此乎二章又因罍觥而有感語其君子其辭若曰宫室之美堂皇之安尊俎之陳飲食之豐其亦有念臣下之勤勞奔走王事跋履山川而将何以勞勉之乎陟彼崔嵬我馬虺隤我者體臣下之意爾臣勞矣我姑酌彼金罍之酒庶其因是維以不永懐念其辛勤乎髙岡一章同意末章又言臣下之極其辛勤僕馬俱病而觥罍未足勞之與之同其吁嗟念之深也房中樂歌大抵寫出后妃賢淑美意自後世私謁險詖者言之不求富貴其外家則將引進其纎佞害賢蠧國皆自言辭媚熟之日始淑女不然一飲一食之間恐其忘君之疾與賢之難得與人之勞苦其君子聞之豈尚溺于宴安而不知思體羣臣乎南有樛木葛藟纍之樂只君子福履綏之南有樛木葛藟荒之樂只君子福履將之南有樛木葛藟縈之樂只君子福履成之比也木下曲曰樛南者取陽方木盛之地風人立義謂南有樛曲之木垂故葛藟得以纍而蔓之荒奄而縈施之如后妃以恩禮逮其衆妾而衆妾得盡其附事之意也后妃無嫉妒之心衆妾有和諧之義若是則家齊内理多男之慶御邦之道莫不由此樂只君子福履綏安之矣將大而成就之矣樂只喜悦之深也螽斯羽詵詵兮宜爾子孫振振兮螽斯羽薨薨兮宜爾子孫繩繩兮螽斯羽揖揖兮宜爾子孫蟄蟄兮比也詵詵薨薨衆多也揖揖會聚也振振信厚也繩繩戒謹蟄蟄和集也此依毛注謂其多且賢也一曰振振振動繩繩繼續蟄蟄聚積皆謂其多也桃之夭夭灼灼其華之子于歸宜其室家桃之夭夭有蕡其實之子于歸宜其家室桃之夭夭其葉蓁蓁之子于歸宜其家人比也桃有華之盛者夭夭其少壯也灼灼華之盛也蕡實貌蓁蓁至盛也之子嫁子也于往也家室猶室家也嫁而宜家則一家之人亦盡以為宜也謂婦人之歸無踰時者如桃之盛也孟子曰丈夫生而願為之有室女子生而願為之有家男女淫奔則非正矣夫妻反目則多鰥寡矣肅肅兔罝椓之丁丁赳赳武夫公侯干城肅肅兔罝施于中逵赳赳武夫公侯好仇肅肅兔罝施于中林赳赳武夫公侯腹心賦也兔罝兔罟丁丁椓杙聲椓罟兔罝之人而猶肅肅恭敬可見莫不好徳賢人衆多矣糾糾武貌干扞也鄭云干也城也皆以禦難謂為盾為城扞城其民也赳赳武夫而可為公為侯扞城其民則又可見莫不好徳賢人衆多矣莫賤於兔罝莫暴於武夫不忘恭敬堪共患難其豈無自來乎中逵九達之道中林無人之地其肅肅則一此化之所感也好仇和好仇怨腹心制斷腹心赳赳武夫而又可為公為侯為天子好仇為公為侯為天子腹心之任此皆化之所感毛以為兔罝之人即中林之武夫采采芣苢薄言采之采采芣苢薄言有之采采芣苢薄言掇之采采芣苢薄言捋之采采芣苢薄言袺之采采芣苢薄言襭之興也托芣苢而言也采采非一采也芣苢車前宜懐妊所謂當道宜男草也薄辭也采取也有藏也掇拾也捋取也袺執袵也襭扱袵也觀此采采之辭言之不足而永歌焉樂有子之情可知矣古人為詩之妙因一物起一意而終篇無雜辭則芣苢是也因數物起數意而終篇多凡例則鶴鳴是也又其命意深長措辭簡易為之者無費辭誦之者有遺味韓文公所謂舂容乎大篇寂寥乎短章大篇舂容而未嘗有餘也短章寂寥而未嘗不足也此篇與螽斯桃夭兔罝純言其報也若樛木詩中總具先施後報之意蓋言后妃能如樛木之垂則衆妾有葛藟之纍君子得福禄之安不可不頌也南有喬木不可休息漢有游女不可求思漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其楚之子于歸言秣其馬漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其蔞之子于歸言秣其駒漢之廣矣不可泳思江之永矣不可方思比也南有木可以休息喬而上竦不可休矣亦猶漢上之游女不可求也貴者深宫固門賤者執筐行饁故容有游女漢與江皆可泳可方廣而大永而長則不可泳而潛行方而筏濟矣翹翹然錯雜之薪言刈其楚謂欲采取其尤翹翹者言刈其蔞謂采取其草中之翹翹者以比求女者之情言秣其馬又言欲于游女之歸欣欣然願為之執鞭若曰之子于歸我其為秣馬乎之子于歸我其為秣駒乎六尺以上曰馬五尺以上曰駒既而知女子不可求則曰漢之廣不可泳矣江之永不可方矣遵彼汝墳伐其條枚未見君子惄如調飢遵彼汝墳伐其條肄既見君子不我遐棄魴魚赬尾王室如燬雖則如燬父母孔邇言婦人遵循彼汝水之墳涯水涯若墳故曰汝墳伐其木之條榦與其斬而復生者或躬其事或托之物未見君子惄如朝飢之思食既見君子知其已反不遺棄我而死亡于外其思則愈魴魚赬尾魚勞尾赤言魚尾赤如王室之猛烈而君子之勤于征役矣雖則如火君猶親王室猶民之父母甚近而不可避也君天也父母亦天也天其可違乎此婦人閔其夫而勉之也麟之趾振振公子于嗟麟兮麟之定振振公姓于嗟麟兮麟之角振振公族于嗟麟兮按此篇永樂大典失載召南維鵲有巢維鳩居之之子于歸百兩御之維鵲有巢維鳩方之之子于歸百兩將之維鵲有巢維鳩盈之之子于歸百兩成之鵲之營巢冬架春成而鳩乃居之鳩不自營其巢而因鵲之成巢此比也比夫人之起家而配君子也之子于歸夫人之未嫁也百兩御之謂家人送之良人迎之車皆百乗象有百官之盛也以夫人儀物之盛配國君爵位之尊能如鳲鳩則有夫人之徳矣方有之也將送也盈滿也成成百兩之禮也于以采蘩于沼于沚于以用之公侯之事于以采蘩于澗之中于以用之公侯之宮被之僮僮夙夜在公被之祁祁薄言還歸蘩皤蒿也于沼池沚渚采之助公侯祭祀之事薦之于豆山夾水曰澗宫廟也被首飾也僮僮竦敬也夙早也祁祁舒遲也還歸去事有儀終始如一也祭事畢夫人釋祭服而去髲髢喓喓草蟲趯趯阜螽未見君子憂心忡忡亦既見止亦既覯止我心則降陟彼南山言采其蕨未見君子憂心惙惙亦既見止亦既覯止我心則説陟彼南山言采其薇未見君子我心傷悲亦既見止亦既覯止我心則夷比也喓喓聲也草蟲常羊也趯趯躍也阜螽蠜也蟲鳴螽躍有相從之義言大夫之妻一意以從大夫當如此也未見君子君子行役未歸之時則憂心忡忡惙惙然而傷悲既見既遇我心降下悦服而夷平矣陟南山而採蕨薇未必躬升山林之險也感時物之變因蕨薇之生駕言採取以寓其思也于以采蘋南澗之濵于以采藻于彼行潦于以盛之維筐及筥于以湘之維錡及釜于以奠之宗室牖下誰其尸之有齊季女按此篇永樂大典缺卷蔽芾甘棠勿翦勿伐召伯所茇蔽芾甘棠勿翦勿敗召伯所憩蔽芾甘棠勿翦勿拜召伯所説蔽芾小貌甘棠杜也翦去伐擊也茇草舍也憩息也説舍也拜言拔也召伯聴訟偶憩此木之下愛其人思其木而為此詩也厭浥行露豈不夙夜謂行多露誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足誰謂䑕無牙何以穿我墉誰謂女無家何以速我訟雖速我訟亦不女從厭浥濕也行道也豈不欲早夜行道乎畏其多露故已于行速召也獄者埆也囚證于埆核之處核實道理未定未決係之圜土不女從者終不棄禮而從强暴之男也畏露而不行畏禮而不妄動也誰謂女無家女猶汝也汝謂强暴之男也誰謂汝無求我之意乎汝有求為室家而不以正合之意我于疑似爰有獄訟之爭雖速訟獄而終不强暴之從此婦人女子之斷以正也凡婦人女子之斷以正亦恃乎訟之利見大人也雀角䑕牙疑似之意于其疑似謹微辨正此易之貞固也且夫見金夫不有躬則無攸利矣女子貞不字十年乃字則反常矣無攸利者無往而利也反常者反歸乎常道也行露之女貞而不字以待反常者也非見金夫而不有躬者也羔羊之皮素絲五紽退食自公委蛇委蛇羔羊之革素絲五緎委蛇委蛇自公退食羔羊之縫素絲五總委蛇委蛇退食自公小曰羔大曰羊素白也紽數也古者素絲以英裘大夫羔裘以居公公門也委蛇行可從迹也鄭云委曲自得之貌革猶皮也緎縫也縫殺之大小得其制總數也羔羊素絲不専主乎節儉乃大夫之常服節儉之風寓于此矣退食自公者入公門則惴惴祇栗出則少舒矣然委蛇委蛇此乃心廣體胖無愧無怍石氏家居常如上前齊桓下拜不違咫尺之義也正直之風寓乎此矣殷其靁在南山之陽何斯違斯莫敢或遑振振君子歸哉歸哉殷其靁在南山之側何斯違斯莫敢遑息振振君子歸哉歸哉殷其靁在南山之下何斯違斯莫或遑處振振君子歸哉歸哉聞靁聲之殷殷在彼南山何此君子適居此復違此而莫敢遑暇休息居處乎閔其勞也以君子之信厚從于王事奉乎君命歸哉歸哉為臣之義未得歸此勸以義也摽有梅其實七兮求我庶士迨其吉兮摽有梅其實三兮求我庶士迨其今兮摽有梅頃筐塈之求我庶士迨其謂之按此篇永樂大典缺卷嘒彼小星三五在東肅肅宵征夙夜在公寔命不同嘒彼小星維參與昴肅肅宵征抱衾與裯寔命不猶嘒微貌三心五噣四時更見心在東方三月時噣在東方正月時參伐也昴留也小星隨心噣參昴猶諸妾隨夫人肅肅疾貌宵夜征行也寔是也自知其禮命不得上同也雖進御有時而不敢怨且覬也不敢僭且驕也衾被也裯襌被一曰牀帳也猶若也自知其不若蓋尊卑之異宜也夫衆妾之所以能自服于禮命者皆由夫人惠愛而引進之進之愈謙自服愈謹此所以為古者夫人齊家之盛也江有汜之子歸不我以不我以其後也悔江有渚之子歸不我與不我與其後也處江有沱之子歸不我過不我過其嘯也歌比也亦興也江之有汜有渚有沱大之有小也決而復入為汜水歧為渚小洲也沱江之别者彼江則有汜矣嫡則有媵矣江之為大汜之為小嫡之為尊媵之為卑雖勤勞其敢怨乎之子嫡也嫡之來歸不以我而備數非不備數也無恩睦逮下之心焉猶不備也其後自悔而我以矣自悔而我處矣自悔而與我嘯歌矣野有死麕白茅包之有女懐春吉士誘之林有樸􅈪野有死鹿白茅純束有女如玉舒而脱脱兮無感我帨兮無使尨也吠按此篇永樂大典缺卷何彼襛矣唐棣之華曷不肅雝王姬之車何彼襛矣華如桃李平王之孫齊侯之子其釣維何維絲伊緡齊侯之子平王之孫比也襛戎戎也唐棣栘也肅敬也雝和也言棣華之盛戎戎然猶王姬車服之美近于王后也王姬之在車其可不肅敬雝和乎而觀王姬之車者又可不肅敬雝和乎桃李與唐棣同比平正也齊一也平王之孫下嫁齊侯之子緡綸也釣者以絲為綸比齊一諸侯之子乃可娶此平正之王之孫也孔氏以為武王之女下嫁齊侯姜氏或因此有詩要之為王姬立義也彼茁者葭壹𤼵五豝于嗟乎騶虞彼茁者蓬壹𤼵五豵于嗟乎騶虞茁出也葭蘆也蓬草名也豕牝曰豝虞人翼五豝以待君之一𤼵鄭云戰禽獸之命必戰之者仁心之至豕生一嵗曰豵或云生三為豵于嗟乎乃可比騶虞矣夫人謹徳國君好仁而一國之人莫不興仁也邶汎彼柏舟亦汎其流耿耿不寐如有𨼆憂微我無酒以敖以遊我心匪鑒不可以茹亦有兄弟不可以據薄言往愬逢彼之怒我心匪石不可轉也我心匪席不可卷也威儀棣棣不可選也憂心悄悄愠于羣小覯閔既多受侮不少静言思之寤辟有摽日居月諸胡迭而微心之憂矣如匪澣衣静言思之不能奮飛言汎然而流者是彼柏木之舟不以濟渡而與衆物俱汎流于水中以興仁徳之人宜用輔佐今乃不用亦與小人並列于朝小人之用必亂邦也君子憂之儆儆不寐如有隠痛之疾此憂之深非有酒遨遊所可釋也我心匪鑒不可以茹者鑒可度形而我心匪鑒不能盡度小人之情狀謂有兄弟同姓之親同僚之好可以據依而不知其不可薄言往愬反逢彼之怒耳我心匪石石則可轉我心匪席席則可捲仁人所守心正意堅豈枉道以從時威儀富而閑習不可選擇而簡去也憂心悄悄憂國而已見愠于羣小為讒誣以病我又從而侮我我静言思之寤覺之間拊心摽手國與身俱憂也居諸語助日兮月兮胡侵微弱孟子曰不用賢則亡削何可得與如匪澣衣煩憒無容憒辱無照察也不能奮飛鬱陶無所𤼵也仁人不遇于君猶不忍去厚之至也緑兮衣兮緑衣黄裏心之憂矣曷維其已緑兮衣兮緑衣黄裳心之憂矣曷維其亡緑兮絲兮女所治兮我思古人俾無訧兮絺兮綌兮凄其以風我思古人實獲我心按此篇永樂大典缺卷燕燕于飛差池其羽之子于歸逺送于野瞻望弗及泣涕如雨燕燕于飛頡之頏之之子于歸逺于將之瞻望弗及佇立以泣燕燕于飛下上其音之子于歸逺送于南瞻望弗及實勞我心仲氏任只其心塞淵終温且惠淑慎其身先君之思以勗寡人燕燕􅜈也其羽差池其鳴上下莊姜感所見以興言燕猶羣匹而戴媯將離羣也歸歸宗也婦人送迎不出門今于郊外之野情不能已也此留彼去稍稍更逺瞻望不復能及故念之泣涕飛而上曰頡飛而下曰頏佇立久立將亦送也陳在衛南仲戴媯字也任者如周禮之任恤以恩相親塞實淵深也允塞廣淵聖賢之至徳詩人美衛文公與莊姜送戴媯皆以是言也温和而且惠順始終如一善謹其身此美戴媯之辭也州吁立而戴媯歸可謂能謹其身矣先君之思以勉寡人此稱其美而求教戒之辭也莊姜非不能歸齊也為先君之故義不可也故因戴媯之歸而自勉以是與日居月諸照臨下土乃如之人兮逝不古處胡能有定寧不我顧日居月諸下土是冒乃如之人兮逝不相好胡能有定寧不我報日居月諸出自東方乃如之人兮徳音無良胡能有定俾也可忘日居月諸東方自出父兮母兮畜我不卒胡能有定報我不述毛曰日乎月乎照臨下土鄭曰國君夫人當同徳齊意以治國乃如之人謂莊公也逝𤼵語辭不以古夫婦之道處我亦謂莊公也何能有定寧不我顧二句謂州吁也冒覆也不及我以相好也先君如此州吁胡能有定乎日始月盛皆出東方無良徳音謂莊公也胡能有定俾我可忘其憂傷乎人之憂患疾痛未有不呼天呼父母者報我不述不循道也終風且暴顧我則笑謔浪笑敖中心是悼終風且霾惠然肯來莫往莫來悠悠我思終風且曀不日有曀寤言不寐願言則嚏曀曀其隂虺虺其靁寤言不寐願言則懐暴疾也笑侮之也戲謔不敬使我中心悼傷也霾雨土也惠然肯來時有順心也莫往莫來終不順也悠悠我思母道也可謂温柔敦厚矣隂而雨曰曀不日不旋日而又曀也嚏跲也人體倦則伸志倦則欠欠㰦㰦跲居業反常隂曀曀暴若震雷我所以寤言不寐願言則懐于中也母子之間感通本無間莊姜猶反覆懐思也擊鼓其鏜踊躍用兵土國城漕我獨南行從孫子仲平陳與宋不我以歸憂心有忡爰居爰處爰喪其馬于以求之于林之下死生契濶與子成説執子之手與子偕老于嗟濶兮不我活兮于嗟洵兮不我信兮鏜擊鼓聲也踴躍用兵喜兵也或役土功于國或理城郭于漕我獨從軍南行欲為土國城漕不可得怨辭也孫子仲謂公孫文仲告宋曰君為主敝邑以賦與陳蔡從兵凶事也不與我歸期憂心忡忡然有不還者有亡其馬者于何居處于何喪馬乎必于山林之下也契濶勤苦也鄭云從軍之士與其伍約死也生也相與處勤苦之中我與子成相説愛之恩志在相存救也執手與之約誓庶幾俱免于難于嗟濶兮不我活兮言始欲死生勤苦共之今乃不得相依以生也洵逺也信伸也言逺去而不得伸其志也凱風自南吹彼棘心棘心夭夭母氏劬勞凱風自南吹彼棘薪母氏聖善我無令人爰有寒泉在浚之下有子七人母氏勞苦睍睆黄鳥載好其音有子七人莫慰母心凱風自南者言風自南方而來樂于長養而物亦樂其長養也吹彼難長之棘夭夭而盛以喻母氏之勞苦也吹棘而成薪則愈勞苦矣然亦非良材也喻母氏之聖善而我七子曾無一人令善足以安母心者曰有寒泉在于浚邑之下浸潤之澤有益于浚有子七人均被母育猶斯泉也母氏可謂勞苦矣睍睆然黄鳥之色又好其聲音有子七人曾莫能説其顔色順其辭令以慰我母之心而使之猶不能安其室乎雄雉于飛泄泄其羽我之懐矣自詒伊阻雄雉于飛下上其音展矣君子實勞我心瞻彼日月悠悠我思道之云逺曷云能來百爾君子不知徳行不忮不求何用不臧因雉而有感言男女之怨思我之懐矣自遺伊阻是欲棄置其所思也伊語辭下上其音鳴聲相應也誠矣君子思之實勞我心君子謂其夫家也瞻彼日月悠悠我思道路云逺何時能來乎望之也百爾君子不知徳行者猶言豈不知徳行不忮害不多求何用不善乎泛告衆人意在宣公也匏有苦葉濟有深涉深則厲淺則揭有瀰濟盈有鷕雉鳴濟盈不濡軌雉鳴求其牡雝雝鳴雁旭日始旦士如歸妻迨冰未泮招招舟子人涉卬否人涉卬否卬須我友腰匏可以濟水匏尚有葉是未有霜而成實之時濟渡之處又有深涉未可以渡遭時制宜如遇水深則厲淺則揭矣而冒焉者或不顧也瀰深也濟盈無不濡之理而涉者志于必進曰不濡軓𫝊意音犯鷕雌雉聲也雉鳴求其牡喻夷姜也軌車轍從車從九龜美反軓車軾前從車從凢音犯由輈以上為軓由膝以上為涉以衣涉水為厲謂帶以上韓詩至心曰厲説文厲字亦為砅履石渡水力智反又音例揭褰衣也雝雝鳴鴈鴈隨陽昏禮納采生用之六禮惟納徵用幣餘皆鴈旭日始出大昕之時自納采至請期用昕親迎用昏歸妻使之來歸于己謂請期也氷未泮正月中以前也古者秋冬成昏九月霜降逆女正月氷泮殺止霜降婦功成而嫁娶行氷泮農業起昏禮殺于此周禮中春夏小正二月皆為期盡蕃育之法謂男自二十至三十女自十五至二十皆得嫁娶男三十女二十為期盡蕃育仲春猶可行此章言有禮也招招舟子將有濟也人涉卬否卬須我友猶有所待此章言有義也習習谷風以隂以雨黽勉同心不宜有怒采葑采菲無以下體徳音莫違及爾同死行道遲遲中心有違不逺伊邇薄送我畿誰謂荼苦其甘如薺宴爾新昏如兄如弟涇以渭濁湜湜其沚宴爾新昏不我屑以毋逝我梁毋𤼵我笱我躬不閲遑恤我後就其深兮方之舟之就其淺矣泳之游之何有何亡黽勉求之凡民有喪匍匐救之不我能慉反以我為讐既阻我徳賈用不售昔育恐育鞠及爾顛覆既生既育比予于毒我有㫖蓄亦以御冬宴爾新昏以我御窮有洸有潰既詒我肄不念昔者伊余來塈習習焉和舒之東風以隂以雨隂陽和而雨其感也隂其成也雨黽勉與君子同心不宜有怒葑須也菲芴也采葑采菲無以根莖或不可食而棄之徳音莫違將及爾以偕老奈何中棄我行道遲遲者中心念其有違不逺伊邇薄送我于門内無恩之甚誰謂荼菜之苦其甘如薺安爾新昏如兄如弟君子之毒已也有甚于荼涇濁渭清涇以渭濁渭未嘗濁也渭之清自湜湜見底安爾新昏乃不以舊室為潔而與之也梁以障水笱承其空而取魚毋逝我梁毋𤼵我笱我躬不閲遑恤我後此小弁古詩也而婦人誦之就其深矣方泭而舟船之就其淺矣或泳而或游之游浮水也泳潛行也何富何貧黽勉求之凡民冇喪匍匐救之則又不獨助君子以恤其家之有無也匍手行匐伏地不我能養反我為讐既阻絶我之徳心猶賈物之不售昔長育于恐懼之時鞠窮之際及爾顛覆盡力不問衆事難易既生既育家之成矣乃視我于毒螫我有美菜亦聚以禦冬月乏無之時昔者以我御窮今安新昏我不㫖蓄若矣洸洸而武潰潰而怒既遺我勞苦之事于初矣今若此曾不念我之來息時也思其始見禮接之厚此詩逶迤委曲真能道其國俗𤼵乎情止乎禮義者也式微式微胡不歸微君之故胡為乎中露式微式微胡不歸微君之躬胡為乎泥中毛以為中露泥中衛邑也式用微無也用此以處吾君而不為之驅除狄難是不有吾君也胡不歸乎胡為乎中露乎胡不歸乎胡為乎泥中乎旄丘之葛兮何誕之節兮叔兮伯兮何多日也何其處也必有與也何其久也必有以也狐裘蒙戎匪車不東叔兮伯兮靡所與同瑣兮尾兮流離之子叔兮伯兮褎如充耳旄丘之葛兮何誕之節兮言濶逺而不相親以興厯時之久物自微而大也前髙後下曰旄丘呼衛之羣臣曰叔兮伯兮怪其何多日而不我救也何其處也必有與也何其久也必有以也蓋黎侯久寓于衛黎之臣子望衛之與之且以之歸也狐裘蒙戎言衣裘敝而毛不理匪車不東叔伯不與同也瑣兮尾兮之子流離如彼梟鶹之醜叔兮伯兮如盛服塞耳無所聞知也秦穆公送晉文以三千紀綱之僕古之與人者如此其周也邢遷如歸衛國忘亡齊桓可謂能救患難識者猶譏之而况于衛乎簡兮簡兮方將萬舞日之方中在前上處碩人俁俁公庭萬舞有力如虎執轡如組左手執籥右手秉翟赫如渥赭公言錫爵山有榛隰有苓云誰之思西方美人彼美人兮西方之人兮按此篇永樂大典缺卷毖彼泉水亦流于淇有懐于衛靡日不思孌彼諸姬聊與之謀出宿于泲飲餞于禰女子有行逺父母兄弟問我諸姑遂及伯姊出宿于干飲餞于言載脂載舝還車言邁遄臻于衛不瑕有害我思肥泉兹之永歎思須與漕我心悠悠駕言出遊以寫我憂毖然泉水亦流于淇淇水出相州林慮縣姬衛姓也泲禰地名祖而舍軷飲酒于其側曰餞父之姊妹稱姑先生曰姊思嫁時也嫁已逺家况父母終哉問姑姊託言與之謀也干言地名脂脂車之舝也舝設車之舝也車不駕則脱其軸頭金回車言往疾至于衛不大有害也何為不可歸哉歸異出同流曰肥泉湏漕衛邑也知其不可是以駕言出遊以舒我憂然亦未必出遊皆寓言也出自北門憂心殷殷終窶且貧莫知我艱已焉哉天實為之謂之何哉王事適我政事一埤益我我入自外室人交徧讁我已焉哉天實為之謂之何哉王事敦我政事一埤遺我我入自外室人交徧摧我已焉哉天實為之謂之何哉出自北門憂心殷殷然終窶且貧貧無以為禮莫有知我之艱苦者已焉哉天實為之謂之何哉安其無可奈何而歸之命也國有王命役使之事不以之彼必來之我其他政事一切埤益于我我入自外室人交徧讁我讁責也亦責我以獨勞而貧困之意敦厚也鄭云猶投擲也埤厚也遺加也摧者刺譏之言也北風其涼雨雪其雱惠而好我攜手同行其虚其邪既亟只且北風其喈雨雪其霏惠而好我攜手同歸其虚其邪既亟只且莫赤匪狐莫黑匪烏惠而好我攜手同車其虚其邪既亟只且寒涼之風雨雪雱盛喻虐也有惠而好我者將攜手同行以歸之耳其虚其邪爾雅為徐字言可虚徐也事急而可去矣喈疾貌霏甚貌赤狐黑烏𩔖聚之義也静女其姝俟我於城隅愛而不見搔首踟蹰静女其孌貽我彤管彤管有煒説懌女美自牧歸荑洵姜且異匪女之為美美人之貽自其邪者而觀之則此詩皆相悦慕之辭也自其正者而觀之則此詩乃禮法之意也新臺有泚河水瀰瀰燕婉之求籧篨不鮮新臺有洒河水浼浼燕婉之求籧篨不殄魚網之設鴻則離之燕婉之求得此戚施泚鮮明瀰瀰盛貌燕安婉順之求乃得不能俯者洒髙峻浼浼平地不鮮不善也不殄不絶嫉之之辭也魚網鴻離所得非所求也戚施不能仰者二子乗舟汎汎其景願言思子中心養養二子乗舟汎汎其逝願言思子不瑕有害養養憂不知所定也不瑕有害言二子之不逺害也
