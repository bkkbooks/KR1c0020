body:
  text: 毛詩講義卷二宋林岊撰鄘泛彼柏舟在彼中河髧彼兩髦實維我儀之死矢靡它母也天只不諒人只泛彼柏舟在彼河側髧彼兩髦實維我特之死矢靡慝母也天只不諒人只舟在河中猶婦人之在夫家是其常處髧兩髦之貌髦髮至眉子事父母之飾內則子事父母總拂髦禮世子昧爽而朝亦櫛纚笄總拂髦冠緌纓櫛者櫛髦纚韜髮笄以簪約之又著總又拂髦振去塵而著之加冠又著緌纓又有端韠紳搢笏者𤣥端士服庶人以深衣端謂命士以上命士以上父子異宫崇敬也士冠禮皮辨笄爵辨笄注有笄者屈組為紘無笄者纓而結其絛然則此冠言緌纓無笄矣或纚而笄加冠也髧亦為紞髦亦為髳子生三月翦髮為鬌兩以夾囟男角女羈否則男左女右長大用髮為髦以象之順父母幼小之心既殯脫之玉藻親沒不髦纚色蟹反又色綺反儀匹矢誓靡無之至也特匹也韓詩曰直相當值也慝邪也諒信也牆有茨不可掃也中冓之言不可道也所可道也言之醜也牆有茨不可襄也中冓之言不可詳也所可詳也言之長也牆有茨不可束也中冓之言不可讀也所可讀也言之辱也牆所以防非常茨蒺藜也鄭曰中冓宫中所冓成未必是漢梁王共傳應劭注材冓在堂之中顔云舍之交積材木處也襄除也詳審也韓詩作揚字長惡長也讀抽也去茨傷牆使人不欲掃也誦言醜國使人不欲道也取義在于不可君子偕老副笄六珈委委他他如山如河象服是宜子之不淑云如之何玼兮玼兮其之翟也鬒髮如雲不屑髢也玉之瑱也象之揥也揚且之晳也胡然而天也胡然而帝也瑳兮瑳兮其之展也䝉彼皺絺是紲袢也子之清揚揚且之顔也展如之人兮邦之媛也能與君子偕老乃宜居尊位服盛服副后夫人首飾編髮為之笄衡笄珈以玉加笄飾之最盛者鄭曰如今步搖之上飾飾之所施有六不可知委委行可委曲蹤跡他他德平易山無不容河無不潤韓詩云德之美貌鄭云行步有儀長大而美舉動之貌如山如河然非徒佳麗美艷之謂內有其德外形于貌也委於危反他待何反鄭說象服揄翟闕翟象鳥羽而畫之三翟皆刻繒為翟雉之形揄音遇又為褕翟又為狄王后第二服曰褕狄侯伯夫人之服自䄖狄而下如王后焉毛云象服尊者所以為飾又于其翟注云羽飾衣也豈亦謂此與追師掌王后首服一曰副覆首也若漢步搖從王祭祀二曰編編列他髮為之若假紒以告桑三曰次次第髮長短鬄他髮與己髮相合為紒所謂髲鬄以見王也追師追衡笄為副之飾注王后衡笄皆以玉為之唯祭服有衡笄垂于副之兩傍當耳其下以紞縣瑱編次為之副及衡笄與珈飾惟后夫人有之所以别尊卑玼鮮盛貌翟雉也孫育云羽施于旌旗蓋則可施于衣裳附人身動則卷舒恐非可以羽飾髮長而美且黑如雲不用髲而自潔美髢徒帝反髲皮寄反編蒲典反紒音計追丁回反紞丁敢反髢一名髲衛莊公見已氏之妻髮美使髠之以為吕姜髢是也玉瑱塞耳充耳琇瑩是也象骨搔首所以摘髮因以為飾佩其象揥是也瑱吐殿反揥敕帝反孔云瑱實如天審諦如帝祭服則德當神明展衣則德配君子揚目上廣也晳面色白晳也且語辭展衣以丹縠為衣絺之靡者為皺精曰絺粗曰綌皺蹙蹙細靡者絺以葛為之是當暑紲去袢延蒸熱之服展衣以覆彼皺絺之上此毛說也孫育云褘衣赤褕翟青闕翟黑鞠衣黃展衣赤褖衣黑右行以為次褘衣象翬鳥褕翟象搖鳥鄭司農云展白鞠黃褖黑康成云色如麴塵象桑葉始生月令三月薦鞠衣于先帝告桑事也闕赤䄖青褘𤣥展衣之裏夏則裏之以絺此以禮見于君及賔客之盛服也說文以瑳為玉色之鮮白展衣玉藻為袒字清者視清明也揚者眉上之美名因名眉目曰揚詩之美目揚兮𫝊曰好目揚眉眉之上眉之下皆曰揚目之上目之下皆曰清目上又為名毛云揚而顔角豐滿淑善也媛君子之援助也展誠也爰采唐矣沫之鄉矣云誰之思美孟姜矣期我乎桑中要我乎上宫送我乎淇之上矣爰采麥矣沫之北矣云誰之思美孟弋矣期我乎桑中要我乎上宫送我乎淇之上矣爰采葑矣沫之東矣云誰之思美孟庸矣期我乎桑中要我乎上宫送我乎淇之上矣唐蒙菜葑蔓菁沫衛邑紂都朝歌之地淇水名姜弋庸皆世族著姓也鶉之奔奔鵲之彊彊人之無良我以為兄鵲之彊彊鶉之奔奔人之無良我以為君公子頑惠公之兄宣姜夫人也曰小君鄭云奔奔彊彊言其居有常匹飛則相隨之貌定之方中作于楚宫揆之以日作于楚室樹之榛栗椅桐梓漆爰伐琴瑟升彼虛矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終焉允臧靈雨既零命彼倌人星言夙駕說于桑田匪直也人秉心塞淵騋牝三千古者南面而治驗中星以正時角亢氐房心尾箕東方星也舉七宿之中星而言指心謂之星火舉東方之次而言則夀星析木大火是也而大火為中次夏則中於南方十二次從可推矣井鬼栁星張翼軫南方之星也舉南宫朱鳥而言謂之星鳥而春則中於南方東蒼龍西白虎北𤣥武可推矣奎婁胃昴畢觜參西方星也舉七宿之中指其星昴而冬則中於南方斗牛女虛危室壁北方星也舉七宿之中指其星虛而秋則中於南方然觀星之法有昏中而兼言它方之旁宿者蓋有一時之中有一月之中一時之中日短星昴以正仲冬是也一月之中十月半而定星中十一月初而壁星中是也月令曰仲冬之月昏東壁中此二中者皆於昏而中而奎婁胃昴畢觜參之中則或以昏或以夜或以夜半天氣之運則然當參乎甲乙丙之夜通乎孟仲季之月以觀之也定者營室也營室者水也左𫝊曰水昏正而栽北方之宿皆為水星十月夜之初昏水星有正中者爾非北方七宿皆正中蓋指乎定也詩曰定之方中周語營室之中土功其始古人以此占土功之候也定星昏中而正於是可以營制宫室天下為宫室者皆以營室中為正謂十月小雪時小雪者十月之中氣也定之體與東壁相連而北方又近乎西方故秋宵之中者冬猶可以觀其昏正也月令有昏中又有旦中昏旦之中不但指七宿或指他星或指旁宿惟堯典簡明四時但各以七宿之中驗之其精詳則付之人以旦占星亦有二說月令旦中謂南方也左氏所謂龍見而雩乃是角亢氐房心尾箕蒼龍之體夏之四月晨見東方夫蒼龍之體仲夏之昏則中於南方而孟夏之晨又見於東方左氏又曰火見而致用是蒼龍之體心為大火夏之九月又次角亢而晨見於東方而占者觀之以致幹翰之用古人於中夜候星亦於晨旦候星於南方候星亦於東方候星不可不知也定之方中猶云十月始中也毛以為昏正四方鄭云與東壁連正四方是以四方解方字也舉中星則有可正四方之理孔又云正四方而中取則視之以正其南因準極以正其北蓋本毛公南視定北準極以正南北度日出日入以正東西之說也所謂揆之以日者孔之正義曰此度日出日入謂度其影也故公劉𫝊曰考於日影是也其術則匠人云水地以縣置𣙗以縣視以影為規識日出之影與日入之影晝參諸日中之影夜考之極星以正朝夕注云於四角立植而縣以水望其髙下髙下既定乃為位而平也賈曰四角四柱繩以正柱柱正去逺以水平之法望而知地髙下平髙就下乃於所平之地中央樹八尺之臬於此柱之四角四中以八繩縣正之繩皆附柱為正視之以其影將以正四方也日出日入之影其端則東西正也賈曰以繩測景之兩端又為規以識之者為其難審也自日出而畫其影端以至日入既則為規測影兩端之內規之規之交乃其審也賈曰以繩取景之兩端一匝則逺近定東西審度兩交之間中屈之以指臬則南北正也日中之影最短者也極星謂北辰也是揆日瞻星以正東西南北之事也如匠人注度日出日入之影不假於視定視極而東西南北皆知之此𫝊度日出入以知東西視定極以正南北者考工之文止言以正朝夕無正南北之語故規影之下别言考之極星是視極乃南北正矣但鄭因屈橫度之繩即可以知南北故細言之與此不為乖也朱氏曰植八尺之臬而度其日出入之景以正東西又參日中之景以正南北也賈疏周禮天官又云水平之法在地曰𣙗以繩縣於𣙗上然後從旁以水望縣即知地之髙下而平之又云置𣙗以縣者既平得地欲正其東西南北之時先於中正一𣙗恐𣙗下不正先以縣正之乃視以景謂於𣙗端向日出畫之以至日入即得景為規識之規之交處東西正兩交之間中屈之以指𣙗知南北又晝參日中之景夜考北極之星乃審其說尤明又疏匠人曰天文志夏日至立八尺之表大司徒日至之景尺有五寸在上臨下最短本鄭注日中之景最短者也然則匠人之臬所以平地正四方求一城一國之中而大司徒之土圭求天下地中之法歟賈疏尤詳曰周公攝政四年欲求土中而營王城以土圭尺有五寸者度日景夏日至晝漏半表北得尺五寸景正與土圭等即地中其度日景之時置五表潁川陽城置一表為中中表南千里又一晝漏半得尺四寸為短中表北千里又一晝漏半得尺六寸為長中表東千里又一晝漏半中表景得正之時東表日已昳矣故云景夕多風中表西千里又一晝漏半中表景得正之時西表日未中仍得朝時之景故云景朝多隂不堪置都冬至夏至皆可度日馮相冬夏致日考工土圭尺有五寸以致日凡景一寸則地千里日景於地而差一寸潁川陽城地中而定洛者通在畿千里之內也武王遷九鼎於洛欲取河洛之間形勝之所周岐鎬在五嶽之外欲均其政東行洛邑謀天子之居宫室通言也若别言之則宫為廟室為居室君子將營宫室宗廟為先廏庫為次居室為後諸侯蓋為衛城其城文公於中營宫室也榛栗椅桐梓漆六木大栗小榛籩實餘四木其長大可伐以為琴瑟言豫備也郭璞曰椅即楸也疏理白色而生子椅梓實而桐皮桐梧桐漆木有液黏黑可飾器物皆琴瑟之材也種用者於十年之後升彼漕虛地有故墟髙可登望左氏晉侯登有莘之墟望楚丘與堂邑測日景於山與京如既景乃岡是也丘者自然之髙京或人力成其大阜楚丘西有河東有濟降觀于桑察其地勢宜蠶可以居民又加卜焉終焉信善僖三十一年又遷于帝丘詩蓋言徙居之初人謀臧龜筮從也毛氏曰建國必卜之故建邦能命龜田能施命作器能銘使能造命升髙能賦師旅能誓山川能說鄭音說又音述述讀如遂喪紀能誄祭祀能語君子能此九者可謂有德音可以為大夫靈善也靈雨既落命彼主駕之官候明星而速駕舍于桑田勞勸農桑春務也匪直也人其操心誠實而淵深無所為而不成以馬言之騋七尺以上者與其牝者有三千之富矣三千成數也左氏曰文公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乘晚年乃三百乘蝃蝀在東莫之敢指女子有行逺父母兄弟朝隮于西崇朝其雨女子有行逺兄弟父母乃如之人也懷昏姻也大無信也不知命也隂陽氣之交映日而見日在東則虹見西方日在西則虹見東方隮者升也鄭注視祲十輝云隮虹也輝總謂日光氣也隮日光氣之一蝃蝀亦日光氣故鄭云然嘗論云日西而東虹隂居陽位其可醜乎日東而虹西陽正隂從其所謂和乎女子不常在家有適人之時不能待時而自防以禮不醜于人不畏于天也國人之能誦此語其畏義而從化也可知矣相鼠有皮人而無儀人而無儀不死何為相鼠有齒人而無止人而無止不死何俟相鼠有體人而無禮人而無禮胡不遄死疾惡不深則遷善不力此警戒之辭也鼠卑汚可惡之物猶有皮齒體以全其形孑孑干旄在浚之郊素絲紕之良馬四之彼姝者子何以卑之孑孑干旟在浚之都素絲組之良馬五之彼姝者子何以豫之孑孑干旌在浚之城素絲祝之良馬六之彼姝者子何以告之孑孑特出之貌干之首有旄有羽旄牛尾也羽者夏翟之羽也有虞氏以為綏後世或染鳥羽曰夏采旄注于干九旗皆然言旄舉其所注也言旟舉其鳥隼曰旟見其龜蛇曰旐之類言旌則亦舉其所注也九旗各建之車後言衛之臣子來就見賢者于浚之邑外又于其下邑又于其都城其好賢愈篤也素絲束帛也紕者織之疏組者織之密祝者織之成而斷之良馬四之五之六之者言其以是好賢禮之益加也賢者則曰彼姝美之臣子我將何以卑豫何以告語之乎其亦復之以善道或曰不必厚幣良駟以為交卿大夫士之旄旌與其轡乘逺就郊坰而𨼆約之賢固已心樂之矣載馳載驅歸唁衛侯驅馬悠悠言至於漕大夫跋涉我心則憂既不我嘉不能旋反視爾不臧我思不逺既不我嘉不能旋濟視爾不臧我思不閟陟彼阿丘言采其虻女子善懷亦各有行許人尤之衆稚且狂我行其野芃芃其麥控于大邦誰因誰極大夫君子無我有尤百爾所思不如我所之言則馳則驅歸弔衛侯驅馬悠悠曰至于漕乎此所欲也今徒有大夫之跋涉我心則憂矣許人不以我歸為善則我終不能旋反旋濟于衛矣視爾用心未善我思不能逺絶閟閉也夫人之所謂善許人之所謂未善也許人之所謂未善禮義之所謂善也其言雖不滿于許人其心則從于義矣升彼偏髙之丘采虻以療鬱結之疾女子善懷亦各有行言我之思歸為宗國也許人尤之以為未善其幼稚乎其狂惑乎不滿之言辭也我行其野涉芃芃之麥而控告于大邦以為宗國援抑所願也今許小國而不能救他有大邦而我無由躬控之誰所始而因誰所終而極乎大夫君子無我厲尤百爾所思不如我所之是夫人決欲一往弔其宗國而謀之大邦也然寧畏義而不歸當是時大邦莫如齊齊方圖伯聞斯言也率諸侯以城衛其有感于載馳之義乎衛瞻彼淇奧緑竹猗猗有匪君子如切如磋如琢如磨瑟兮僩兮赫兮咺兮有匪君子終不可諼兮瞻彼淇奧緑竹青青有匪君子充耳琇瑩會辨如星瑟兮僩兮赫兮咺兮有匪君子終不可諼兮瞻彼淇奧緑竹如簀有匪君子如金如錫如圭如璧寬兮綽兮猗重較兮善戲謔兮不為虐兮毛以淇水奧隈之地有緑有竹皆草也漢書淇園之竹則為美竹矣猗猗美盛青青茂盛如簀盛密匪文章貌考工記曰且其匪色必似鳴矣舉竹以興武公之文章也治骨曰切象曰磋玉曰琢石曰磨比其善學而自治也大學曰瑟僩恂栗赫喧威儀皆自修之實也終始言有匪君子此所以為文章之成也故曰道盛德至善民之不能忘也充耳天子以玉諸侯以石謂之瑱琇瑩美石也皮辨玉合縫其中謂之綦天子五采玉十二諸侯玉用三采而璂飾七礫礫而處狀如星也言服飾以見威儀亦自修之意也三章言如金錫之煉而精如圭璧之性有質成德之事也寬洪裕綽開豁較車之兩輢上出軾者毛氏曰重較卿士之車言稱其服且稱其車卿士者諸侯入為天子執政之稱也善戲謔兮不為虐兮言雖戲謔而不為虐是能以禮自防矣虐者過甚之謂也考槃在澗碩人之寬獨寐寤言永矢弗諼考槃在阿碩人之薖獨寐寤歌永矢弗過考槃在陸碩人之軸獨寐寤宿永矢弗告言賢者成其槃樂于夾水之澗此碩人之寬綽而寐覺之間永陳不忘君也曲陵曰阿薖寬大也弗過念不得入君之朝也髙平曰陸軸槃桓不行從容自廣之謂也弗告者直言其不得以善道告君也人有不得于君則怨懟其君者小人也其君之不用而念念不忘君者君子也孟子曰子雖然豈舍王哉王猶足用為善莊公聞此庶其幡然于心乎碩人其頎衣錦褧衣齊侯之子衛侯之妻東宫之妹邢侯之姨談公維私手如柔荑膚如凝脂領如蝤蠐齒如瓠犀螓首蛾眉巧笑倩兮美目盼兮碩人敖敖說于農郊四牡有驕朱幩鑣鑣翟茀以朝大夫夙退無使君勞河水洋洋北流活活施罛濊濊鱣鮪發發葭菼揭揭庶姜孽孽庶士有朅言莊姜儀表長麗俊好頎頎然碩大也毛曰衣錦尚褧襜為其文之著鄭曰尚褧尚之以襌衣襌音丹褧字說文為檾枲屬也夫人翟衣此言衣錦取其文也齊子衛妻得臣之妹邢侯之妻莊姜之姊妹也談公與衛莊相謂為姊妹之夫也然則齊三女一適衛一適邢一適談矣言其族姻之盛也手如荑之新生膚如脂之凝領如蠐螬之白齒如瓠瓣螓首廣顙而方蛾眉眉之自然也巧笑倩兮口輔之好也美目盼兮白黑分也容貌所宜親也敖敖猶頎頎也舍于近郊四牡有壯朱幩者以朱纒馬鑣鑣銜外鐵也一曰扇汗一曰排沫朱以為飾鑣鑣而盛又以翟羽飾車且為茀蔽以朝國人樂莊姜之賢凡衛之大夫朝者皆早退無使君之勞倦以君夫人新為配耦也河水洋洋而盛大北流活活然所施魚罟豁然大魚網目大也鱣鯉也陸曰黃魚長二三丈也鮪鮥也似鱣大曰王鮪小曰叔鮪發發盛貌葭蘆菼薍揭揭而長庶姜盛飾庶士齊大夫送女者有朅武壯也鄭曰此言齊地廣饒士女佼好禮儀之備而君何為不答夫人氓之蚩蚩抱布貿絲匪來貿絲來即我謀送子涉淇至于頓丘匪我愆期子無良媒將子無怒秋以為期乘彼垝垣以望復關不見復關泣涕漣漣既見復關載笑載言爾卜爾筮體無咎言以爾車來以我賄遷桑之未落其葉沃若于嗟鳩兮無食桑椹于嗟女兮無與士耽士之耽兮猶可說也女之耽兮不可說也桑之落矣其黃而隕自我徂爾三嵗食貧淇水湯湯漸車帷裳女也不爽士二其行士也罔極二三其德三嵗為婦靡室勞矣夙興夜寐靡有朝矣言既遂矣至于暴矣兄弟不知嘻其笑矣靜言思之躬自悼矣及爾偕老老使我怨淇則有岸隰則有泮總角之宴言笑晏晏信誓旦旦不思其反反是不思亦已焉哉蚩蚩質厚丘一成為頓丘復關望氓之來也龜卜蓍筮體兆卦之體上二章序奔誘之情下序困而自悔桑落喻色衰棄背不以禮義相求而以顔色相慕豈能久哉自我歸爾以下怨其夫之見棄也帷裳婦人車爽差也靡室勞矣不以室家之事為勞也言既遂矣謂可終久無它乃至于見遇之寖薄兄弟知之其笑我乎我躬自悼傷也及汝偕老初心也老使我怨淇與隰猶有陂岸君子乃放恣其心不可恃乎我為童女未笄結髮之時與女言笑晏晏而和柔信誓旦旦而懇惻奈何不念復其前言已焉哉不可奈何之辭也私奔者可以戒矣籊籊竹竿以釣于淇豈不爾思逺莫致之泉源在左淇水在右女子有行逺父母兄弟淇水在右泉源在左巧笑之瑳佩玉之儺淇水悠悠檜楫松舟駕言出遊以寫我憂按此篇永樂大典缺卷芄蘭之支童子佩觿雖則佩觿能不我知容兮遂兮垂帶悸兮芄蘭之葉童子佩韘雖則佩韘能不我甲容兮遂兮垂帶悸兮芄蘭之支葉言柔弱也觿以解結雖佩觿而君人之能非我所知言不稱也毛謂容儀可觀佩玉遂遂然垂其紳帶悸悸然有節度鄭謂佩容刀與瑞德不稱服韘以彄沓手指能射御則佩之甲長也魯昭公知儀而不知禮識者譏之惠公之佩服近于有儀矣童子猶言有童心也誰謂河廣一葦杭之誰謂宋逺跂豫望之誰謂河廣曾不容刀誰謂宋逺曾不崇朝誰謂河廣一葦可杭小船曰刀言欲渡則雖廣可狹也誰謂宋逺跋足可以望見行不終朝可至然而不渡河者知其不可渡也不往宋者知其不可往也伯兮朅兮邦之桀兮伯也執殳為王前驅自伯之東首如飛蓬豈無膏沐誰適為容其雨其雨杲杲出日願言思伯甘心首疾焉得諼草言樹之背願言思伯使我心痗按此篇永樂大典缺卷有狐綏綏在彼淇梁心之憂矣之子無裳有狐綏綏在彼淇厲心之憂矣之子無帶有狐綏綏在彼淇側心之憂矣之子無服綏綏匹行絶水曰梁深可厲之旁曰厲裳以配衣帶以束衣服也詩人託興于狐之匹行謂國之男女曾無成其室家之禮舉衣服之未備以言之所以刺時之不能行古者殺禮之義是上之人之過也投我以木瓜報之以瓊琚匪報也永以為好也投我以木桃報之以瓊瑶匪報也永以為好也投我以木李報之以瓊玖匪報也永以為好也木瓜楙可食瓊玉之美者一曰赤玉琚佩玉名瓊瑶美玉一曰美石瓊琚玉名孔子曰吾于木瓜見苞苴之禮行木瓜之投而瓊琚之報寓言也匪報永好謙辭也王彼黍離離彼稷之苗行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉彼黍離離彼稷之穗行邁靡靡中心如醉知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉彼黍離離彼稷之實行邁靡靡中心如噎知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉彼宗廟宫室之地也靡靡遲遲也搖搖憂無所訴也不知者謂我何求久留不去悠悠逺意尊之曰皇天元氣廣大曰昊仁覆閔下曰旻自上降鑒曰上據逺視天蒼蒼然曰蒼爾雅春蒼夏昊秋旻穗秀也君子于役不知其期曷至哉雞棲于塒日之夕矣羊牛下來君子于役如之何勿思君子于役不日不月曷其有佸雞棲于桀日之夕矣牛羊下括君子于役茍無飢渴鑿牆而棲曰塒雞栖塒牛羊下牧地皆日夕之期也佸會也雞棲于杙為桀括至也茍無飢渴憂其飢渴也君子陽陽左執簧右招我由房其樂只且君子陶陶左執翿右招我由敖其樂只且陽陽毛曰無所用其心簧笙也房謂房中之樂也君子俱在樂官之任其且樂此而已陶陶和樂貌翿纛也翳也謂羽舞也敖燕舞之位也賢者𨼆于下寮而不察所謂耳目所及尚如此萬里安能制夷狄然世之人君或有用方正以從田獵用君子以備樂官曰吾將以親近之也而不知尊賢師善之道不如此以法家拂士之責自任者亦不當如此二者胥失也揚之水不流束薪彼其之子不與我戍申懷哉懷哉曷月豫還歸哉揚之水不流束楚彼其之子不與我戍甫懷哉懷哉曷月豫還歸哉揚之水不流束蒲彼其之子不與我戍許懷哉懷哉曷月豫還歸哉激揚之水不流束薪言弱也彼其之子不與我戍申是王室之弱不能令諸侯而使周人逺戍也古者畿兵不輕出况東遷之始乎楚木也蒲草也中谷有蓷暵其乾矣有女仳離慨其嘆矣慨其嘆矣遇人之艱難矣中谷有蓷暵其修矣有女仳離條其嘯矣條其嘯矣遇人之不淑矣中谷有蓷暵其濕矣有女仳離啜其泣矣啜其泣矣何嗟及矣中谷之蓷始也乾者而暵矣中也修者而暵矣又終也濕者而暵矣言世道之寖衰也有女見棄于夫而離别慨然而嘆遇人之艱難條然而嘯遇人之不善啜其泣矣何嗟及矣無所致其嘆也咸恆之義豈可以安平而嘻嘻凶難而相棄哉司徒之教于是廢矣周其衰乎有兔爰爰雉離于羅我生之初尚無為我生之後逢此百罹尚寐無吪有兔爰爰雉離于罦我生之初尚無造我生之後逢此百憂尚寐無覺有兔爰爰雉離于罿我生之初尚無庸我生之後逢此百凶尚寐無聰有兔爰爰樂也雉離于羅憂也鄭云有所緩者有所聽縱也有所急者有所躁蹙也譬生之逢時與不逢時者我生之初庶幾無為我生之後逢此百罹庶幾于寐而無吪動不見不聞哉罦覆車也造為也罿施羅車上曰罿庸用也無用見此聰聞也綿綿葛藟在河之滸終逺兄弟謂他人父謂他人父亦莫我顧綿綿葛藟在河之涘終逺兄弟謂他人母謂他人母亦莫我有綿綿葛藟在河之漘終逺兄弟謂他人昆謂他人昆亦莫我聞綿綿長不絶之葛藟在于河水之崖以河之潤而能生也刺王之不能恩施九族耳逺其密親而謂它人以為父終亦莫我顧耳此天下之至情也涘涯也漘水隒也魚檢反彼采葛兮一日不見如三月兮彼采蕭兮一日不見如三秋兮彼采艾兮一日不見如三嵗兮葛為絺綌蕭供祭祀艾療疾采者積少成多君子之懼讒以為一日不見于君如三月三秋三嵗之久也大車檻檻毳衣如菼豈不爾思畏子不敢大車啍啍毳衣如璊豈不爾思畏子不奔穀則異室死則同穴謂豫不信有如皎日天子大夫之車行聲檻檻由子男而入為大夫者毳衣衣繢裳繡皆有五色青者如菼隼又作萑蘆之初生也天子大夫四命其出封五命如子男之服鄭云服毳冕以巡行邦國而聽訟子大夫也啍啍車遲貌璊者木之赤苗玉赬色如之生則異室死則同穴言正位乎內外而偕老以同歸也指日以為誓此古者室家之常理也丘中有麻彼留子嗟彼留子嗟將其來施施丘中有麻彼留子國彼留子國將其來食丘中有李彼留之子彼留之子貽我佩玖留大夫氏子嗟子國其字也丘中之有麻麥李實而賢者隱約乎其間周人之所思也將其來施施舒行之意來食不屑棄我也貽我佩玖石而次玉黑色者好我也
