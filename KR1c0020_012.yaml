body:
  text: 毛詩講義卷十二宋林岊撰詩序二鹿鳴燕羣臣嘉賓也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賓得盡其心矣鹿鳴之詩乃燕羣臣所歌也羣臣而曰嘉賓以徳言也既設饗飲之陳饌食之又實幣帛於筐篚之中以將其厚意而酬侑之然後人人佩荷恩德皆得盡其忠誠之心以事上焉杜甫曰聖人筐篚恩實欲邦國活臣如忽至理君忍棄此物君臣之道非相為賜之求也而下承上施其盡心報上持美效君自有不疾而速者四牡勞使臣之來也有功而見知則說矣使臣之來陳其功苦以歌樂之則說詩言外之意也皇皇者華君遣使臣也送之以禮樂言逺而有光華也君遣使臣歌皇華之雅以送之託言皇華在彼原隰喻其光榮而序者以為逺而有光是也所謂送之以禮樂燕飲而歌詩亦其禮也君之所為寵榮者蓋無所不用其至矣常棣燕兄弟也閔管蔡之失道故作常棣焉常棣之雅乃燕兄弟所歌也本不專為閔管蔡而設序者察其情辭之深切以其有所更厯而為之也僖二十四年傳曰召穆公思周德之不類故糾合宗族於成周而作詩曰常棣之華鄂不韡韡凡今之人莫如兄弟其四章曰兄弟鬩於牆外禦其侮詩乃周公所為而召穆公重歌之所謂作者更詠人之聲而播之樂聲也伐木燕朋友故舊也自天子至於庶人未有不須友以成者親親以睦友賢不棄不遺故舊則民德歸厚矣此皆立義之辭也故有則民歸厚以見將然之義天保下報上也君能下下以成其政臣能歸美以報其上焉古者獻酬之間皆有聲歌此其臣下奉觴為夀之時詩人歌之乎采薇遣戍役也文王之時西有昆夷之患北有玁狁之難以天子之命命將率遣戍役以守衞中國故歌采薇以遣之出車以勞還杕杜以勤歸也此三篇皆成王之時所為之雅出車一篇周文王命南仲故事以榮將帥有功之歸者序者因言某時有某事某人曾如此故今時歌第一篇以遣戍役歌第二篇用某故事者以勞還帥歌第三篇以勤歸士其上下篇直述人情其中篇用文王之時之事各於逐章而借前以喻後學者併以為文王之雅則非也此如真宗之時嘗勞歸將樂府之詩有說李漢超馬仁瑀事者細味古人文章之妙在此昆夷西戎玁狁北狄出車勞還率也杕杜勞還役也魚麗美萬物盛多能備禮也文武以天保以上治内采薇以下治外始於憂勤終於逸樂故美萬物盛多可以告於神明矣此蓋燕饗通用之樂歌又儀禮於笙入間歌之詩皆用此蓋取禮物之盛也雅本為於成王之時序者曰文武嘗以六篇之理治内三篇之理治外憂勤積累數世矣至為魚麗之時乃終於逸樂而萬物盛多可告神明詩人故為此一篇以美其盛也南陔孝子相戒以養也白華孝子之潔白也華黍時和嵗豐宜黍稷也有其義而亡其辭鄉飲酒鼓瑟而歌鹿鳴之三笙入堂下樂南陔白華華黍燕禮鼓瑟歌鹿鳴之三笙入立於縣中奏南陔白華華黍前樂既畢皆一間歌一笙吹凡六篇秦亡其辭毛公為訓詁分衆篇之義各置於篇端其義與衆篇之義舊嘗合編故存當云鹿鳴之什十三篇今曰十篇闕其亡者以見在為數南有嘉魚樂與賢也太平之君子至誠樂與賢者共之也南有嘉魚之詩乃言人君樂與賢者之意也凡賢者之已仕與賢者之未仕仕而在朝或在外服或窮居而野處或聘召而接君皆宜推至誠樂與共治之心以待之所謂樂與者乃中心欣然歡樂如好好色如惡惡臭而非苟且勉强之謂詩垂萬世之法序者以其為於太平之時故曰太平之君子至誠樂與賢者共之也夫太平之治其致之非一日矣及其成也不與賢者共之則持守之道難矣不樂與賢者共之則亦無以得人之歡心矣不至誠樂與賢者共之則亦無以感召天下之氣類矣豈惟治之已成哉治之始治之中治之終皆當至誠樂與賢者共之也南山有臺樂得賢也得賢則能為邦家立太平之基矣南山有臺之詩言人君樂得賢者而用之也得賢則能為邦家立太平之基址太平之治成而易虧有賢者共治而鞏固之如城之有基矣此人君所以當知樂得之義而必有樂得之心也毛氏曰其德堅固廣大如南山之基址培德輔治皆資乎賢也由庚萬物得由其道也崇丘萬物得極其高大也由儀萬物之生各得其宜也有其義而亡其辭蓼蕭澤及四海也蓼蕭來朝天子既燕飲之乃歌此序言澤及四海者舉四夷之逺以見天下諸侯皆被君之澤也本其在國蒙澤及其朝見光寵也湛露天子燕諸侯也湛露之詩天子燕諸侯之樂歌凡諸侯朝覲㑹同天子與之燕所以示慈惠諸侯有同姓有異姓有二王之後古者燕有兩階庭門設燎秉燭之遺則容或卜夜以盡歡然醉而言歸在臣之儀上盡其歡下肅其儀斯言醉酒飽德矣宗人留成厭厭之飲盡情之義也彤弓天子錫有功諸侯也凡諸侯賜弓矢然後專征伐此鄭箋所引左氏之義也菁菁者莪樂育材也君子能長育人材則天下喜樂之矣樂育材者詩人述其君之樂育也喜樂之矣者序者述天下之人喜樂其君子之意也上下交相樂也鄭以為秀士選士俊士造士進士養之以有漸至於官之大抵鄭多言制度之粗而詩所述精微之意皆制度之外也六月宣王北伐也鹿鳴廢則和樂缺矣四牡廢則君臣缺矣皇皇者華廢則忠信缺矣常棣廢則兄弟缺矣伐木廢則朋友缺矣天保廢則福禄缺矣采薇廢則征伐缺矣出車廢則功力缺矣杕杜廢則師衆缺矣魚麗廢則法度缺矣南陔廢則孝友缺矣白華廢則亷恥缺矣華黍廢則蓄積缺矣由庚廢則隂陽失其道理矣南有嘉魚廢則賢者不安下不得其所矣崇丘廢則萬物不遂矣南山有臺廢則為國之基隊矣由儀廢則萬物失其道理矣蓼蕭廢則恩澤乖矣湛露廢則萬國離矣彤弓廢則諸夏衰矣菁菁者莪廢則無禮儀矣小雅盡廢則四夷交侵中國微矣六月北伐宣王豈得已哉撥亂興衰不得不然夫是之為應兵况有良將如吉甫方叔乎况有居中之賢如張仲乎序言小雅之廢厲王所以亂小雅之復宣王所以興采芭宣王南征也古者將寓於卿而兵寓於農平居無事六師之將即六卿之卿也宣王中興復古修明井田之制詩人以采芭歌之車攻宣王復古也宣王能内修政事外攘夷狄復文武之竟土修車馬備器械復㑹諸侯於東都因田獵而選車徒焉此序乃言宣王於復竟土之後又修其車馬備其器械以再㑹諸侯於東都是未修車馬未備器械則不敢以與諸侯行㑹同之禮然而㑹同之時又有射御田獵之事先因田獵又選車徒以往備再田獵也是事皆先具也吉日美宣王田也能慎微接下無不自盡以奉其上焉吉日之雅正與車攻因田獵而選車徒相應宣王將為東都之田先之以選車徒之田也將為選車從之田又必諏其時日擇其車馬然後以與羣臣從事是謹微而接下也凡往田獵皆然二詩相近可以參挹昔人之遺意鴻鴈美宣王也萬民離散不安其居而能勞來還定安集之至於矜寡無不得其所焉鴻鴈之美宣王以其能勞來還定安集萬民於離散之後也宣王非親之也善委之使臣也毛以為侯伯卿士侯伯諸侯之伯卿士王朝之執政者也庭燎美宣王也因以箴之沔水規宣王也鶴鳴誨宣王也鶴鳴之誨非一端也鄭以為求賢人之未仕者祈父刺宣王也刺司馬之不得其人也白駒大夫刺宣王也黄鳥刺宣王也此詩乃天下室家不以其道而相去者我行其野刺宣王也此詩亦言夫厭其妻而妻去其夫之意也斯干宣王考室也斯干者宣王當中興之日再考成其宫室而詩人歌之也無羊宣王考牧也無羊宣王修復牧人之職而考其牛羊之數也鄭云宣王復古之牧法汲汲其數故歌此詩以解之也三百維羣九十其犉言其羊牛之多足如古法此言有味正謂其舉斯心而加諸彼者有未至耳節南山家父刺幽王也此詩譏専任尹氏欲王去之正月大夫刺幽王也十月之交大夫刺幽王也幽王時鄭桓公友亦為司徒此番氏為司徒别一人也雨無正大夫刺幽王也雨自上下者也衆多如雨而非所以為政也小旻大夫刺幽王也此篇刺幽王之惑於衆謀不能從善也旻閔也以時之可閔而呼天其曰小旻或别於大旻也小宛大夫刺幽王也小宛之詩乃當亂世而思謹其身以無負其先人不惟勉其君且以自勉固聖人之所取而孝經之所録也小弁刺幽王也太子之傅作焉幽王取申后生太子宜臼又說襃姒生子伯服立以為后而放宜臼將殺之觀其詩詞孟子所謂小弁親親也盖師傅之言然宜臼未必能如此巧言刺幽王也大夫傷于䜛故作是詩也四詩皆傷於䜛卿士執政而䜛其黨寺人能䜛者而不免於䜛大夫傷䜛直數小人之當誅而責王不悟太子見䜛國危矣何人斯蘇公刺暴公也暴公為卿士而譖蘇公焉故蘇公作是詩而絶之巷伯刺幽王也寺人傷於䜛故作是詩也寺人即巷伯伯者近習之長日見於君猶被䜛焉幽王之時王后太子大夫多以䜛廢而大臣如蘇公小臣如寺人皆不免矣谷風刺幽王也天下俗薄朋友道絶焉君臣父子夫婦兄弟之倫欲其厚也必先於朋友之講明天下俗薄朋友之道絶急則相求緩則相棄此義理不明人倫俱虧馴致於亡國喪身之由也蓼莪刺幽王也民人勞苦孝子不得終養爾大東刺亂也東國困於役而傷於財譚大夫作是詩以告病焉四月大夫刺幽王也在位貪殘下國構禍怨亂並興焉北山大夫刺幽王也役使不均已勞於從事而不得養其父母焉蓼莪父母殁之詩也北山父母存之詩也無將大車大夫悔將小人也君子悔與小人從事之詩也小明大夫悔仕於亂世也大雅有大明題此以别之耳鼓鐘刺幽王也導淮自桐柏東㑹於泗沂東入於海桐柏山在南陽之東幽王鼓鐘淮水之上政疵民怨聞樂而悲故為是詩而思古幽王之樂豈非古與樂是而人非也楚茨刺幽王也政煩賦重田萊多荒饑饉降喪民卒流亡祭祀不饗故君子思古焉信南山刺幽王也不能修成王之業疆理天下以奉禹功故君子思古焉疆者有夫有畛有塗有道有路以經界之理者有遂有溝有澮有川以疏導之也古者夫間之遂距於溝畛下之溝距於洫塗下之洫距於澮道下之澮距於川路下之川距於海周有匠人之文禹盡力溝洫而丘畎澮距川故謂丘甸之法因乎禹也甸方八里居一成之中成方十里出兵車一乘七十五人而少康有田一成有衆一旅者傳說少康盡舉大衆與出賦異周官籍於司徒者兵數甚具賦於司馬者甚少與此𩔖也甫田刺幽王也君子傷今而思古焉此詩乃春省耕而補不足也大田刺幽王也言矜寡不能自存焉此詩乃秋省斂而助不給也瞻彼洛矣刺幽王也思古明王能爵命諸侯賞善罰惡焉洛水東都之所在雍州其浸渭洛雖出於京兆上洛西山其流尚微此詩指東都也成王既成洛邑朝諸侯率以祀文王宣王復㑹諸侯於東都裳裳者華刺幽王也古之仕者世禄小人在位則䜛謟並進棄賢者之類絶功臣之世焉桑扈刺幽王也君臣上下動無禮文焉鴛鴦刺幽王也思古明王交於萬物有道自奉養有節焉頍弁諸公刺幽王也暴戾無親不能宴樂同姓親睦九族孤危將亡故作是詩也車舝大夫刺幽王也褒姒嫉妒無道並進䜛巧敗國德澤不加於民周人思得賢女以配君子故作是詩也此詩乃大夫述周人之意以刺幽王用襃后信䜛召惡興禍致亂思賢女以配幽王也當以闗雎叅看闗雎思得賢女以鐘鼓樂之琴瑟友之其未得則不寐而求之然命意則在王者之宜有賢妃而當時之妃既賢故其音安以樂也車舝思得賢女以燕喜友之以燕譽好之㫖酒嘉殽飲食之歌舞與之其未得則不饑不渴而求之又車舝調轡而迎之然命意在王者之宜有賢妃而當時之妃不賢故其音怨以怒哀以思也青蠅大夫刺幽王也賓之初筵衞武公刺時也幽王荒廢媟近小人飲酒無度天下化之君臣上下沈湎淫泆武公既入而作是詩也前二章言初用古後三章刺醉而忘度魚藻刺幽王也言萬物失其性王居鎬京將不能以自樂故君子思古之武王焉盡已之性以盡人之性盡人之性以盡物之性斯參天地之化育矣此武王之事也采菽刺幽王也侮慢諸侯諸侯來朝不能錫命以禮數徴㑹之而無信義君子見微而思古焉為襃姒之笑而數舉烽燧亦其一端也角弓父兄刺幽王也不親九族而好䜛佞骨肉相怨故作是詩也菀栁刺幽王也暴虐無親而刑罰不中諸侯皆不欲朝言王者之不可朝事也先王盛時諸侯以既近天子之光為喜及其衰也王政無常諸侯恐懼而不朝施於春秋乃有桀傲而不朝者矣都人士周人刺衣服無常也古者長民衣服不貳從容有常以齊其民則民德歸壹傷今不復見古人也采緑刺怨曠也幽王之時多怨曠者也黍苗刺幽王也不能膏潤天下卿士不能行召伯之職焉隰桑刺幽王也小人在位君子在野思見君子盡心以事之此易之否也白華周人刺幽后也幽王取申女以為后又得襃姒而黜申后故下國化之以妾為妻以孽代宗而王弗能治周人為之作是詩也綿蠻微臣刺亂也大臣不用仁心遺忘微賤不肯飲食教載之故作是詩也瓠葉大夫刺幽王也上棄禮而不能行雖有牲牢􅛰餼不肯用也故思古之人不以微薄廢禮焉漸漸之石下國刺幽王也戎狄叛之荆舒不至乃命將率東征役久病於外故作是詩也苕之華大夫閔時也幽王之時西戎東夷交侵中國師旅並起因之以饑饉君子閔周室之將亡傷已逢之故作是詩也何草不黄下國刺幽王也四夷交侵中國背叛用兵不息視民如禽獸君子憂之故作是詩也文王視民如傷幽王視民如禽獸此興亡之判也文王文王受命作周也文王之雅言文王受天之命興造周邦也大明文王有明德故天復命武王也大明之雅言文王有明德而天復命武王也詩曰明明赫赫本言天也序曰文王有明德因天言文王也緜文王之興本由大王也棫樸文王能官人也旱麓受祖也周之先祖世修后稷公劉之業大王王季申以百福干禄焉旱麓之雅言周家受先祖之福禄而先祖之福禄又皆自求之已也周之先祖為后稷之子孫者修后稷之業為公劉之子孫者修后稷公劉之業至於大王王季申以百順而干禄焉所謂禄在其中異乎子張之問矣孔子曰言寡尤行寡悔易曰庸言之信庸行之謹此即法天行健之事業大王王季之申以百福者亦出於此而豈不百禄是何乎思齊文王所以聖也思齊之雅言文王所以聖也鄭謂非但天性德有由成要之此篇成已成物之工夫與中庸大學無異非但德有由成而自成者至也皇矣美周也天監代殷莫若周周世世修德莫若文王皇矣之雅美周而主乎文王也主乎文王而厯言大王太伯王季之事皆天也文王之動靜語黙又皆天也天監代殷莫若周蓋自后稷以來則立烝民之極矣周世世修德莫若文王三分天下有其二以服事殷焉孔子曰周之徳其可謂至德也已靈臺民始附也文王受命而民樂其有靈德以及鳥獸昆蟲焉靈臺之雅言周民之附文王也平居暇日未之見而有土功之役人競趨焉乃於此乎見民心之樂從故曰民始附也文王受命而民樂其靈德及鳥獸昆蟲故謂其臺曰靈臺謂其沼曰靈沼非文王之自名以靈臺也臺亦可以觀天文非徒登覽之謂靈臺之基至漢猶存下武繼文也武王有聖德復受天命能昭先人之功焉下武之雅言武王之繼文王也武王有聖德復受天命能昭先人之功業也此一篇大㫖成王之孚在於孝思維則世德作求在於繩其祖武文王有聲繼伐也武王能廣文王之聲卒其伐功也繼伐非武王之得已也廣聲即文王之聲也文王又廣前人之聲也名詩與序詩俱妙矣生民尊祖也后稷生於姜嫄文武之功起於后稷故推以配天焉行葦忠厚也周家忠厚仁及草木故能内睦九族外尊事黄耉養老乞言以成其福禄焉行葦之雅大抵言忠厚也忠厚則睦族養老是也其詩辭興詠以為草木之茂牧者不使羊牛踐之宗族當親我其益親之序之者則曰周人之為此詩也其積累於世家發揮於言意忠而且厚其仁及於草木是宜其能内睦族而外養老以成福禄也仁民愛物輕重之倫固有之而此詩之序不謂此也或曰能愛物則必能睦族養老以此解能字亦非序者之意也序者之意贊論行葦之詩也旣醉太平也醉酒飽德人有士君子之行焉酒者人之所共樂也閭閻之賤有欲飲而不可得富貴之家或濡首而不知止故記孔子者惟酒無量不及亂而酒誥曰惟祀德將無醉詩序乃毛公所為而鄭氏箋之曰成王祭宗廟旅酬下徧羣臣至於無筭爵故云醉焉乃見十倫之義志意充滿謂之飽德其說亦謂祀而飲也鳧鷖守成也太平之君子能持盈守成神祇祖考安樂之也古者祭必有尸毛以為此祭宗廟之尸而縁鄭之義孔氏疏之以為天地社稷山川四方百物七祀皆有尸焉然毛氏之說為長也所謂神祇祖考詩以公尸主言祖考而序者廣及神祇皆安樂之意不必泥也又毛氏以為公尸來燕謂明日繹祭而燕尸乃為此雅亦未必然也所謂來燕者燕即樂也况祭祀亦有與尸獻酬之事故曰來燕又曰燕飲今日之祭明日之繹皆可誦此鳧鷖之序以為祭而神安尸樂非無故而致此也言太平之君子持執王業之盈滿守護王業之成就中心無為以守至正籩豆之事各有司存故祭而祖考安樂之祖考之心即天地神祗之心亦無不有安樂也假樂嘉成王也此乃大雅詩人為此篇以美成王治功之成也德積於身福受於天法度愈修綱紀不紊燕樂及於羣臣不懈見於有位是至治之君臣勑命時幾省成謹憲之事也公劉召康公戒成王也成王將涖政戒以民事美公劉之厚於民而獻是詩也公劉以下三詩皆召康公所以戒成王也周公復辟往釐成周成王將即政而獨召公為保之日召公所以為格心之業者惟以三詩其一則戒以民事而美公劉之厚於民蓋祖宗皆有詩而公劉之心獨未甚著明也其二則言皇天之親有德享有道蓋太平極盛非備物之難而誠質自尚也其三則言保治在於求賢而有大賢君子乃可以集衆多之吉士也方管蔡之亂而周公之東征五六年間成王之幼而召公諸公未嘗不斯須成王之側以金縢而推其言猶待風雷而發則古人正諌有道而仁義禮樂之言祖功宗德天命人心之所係想動容周旋皆熟於成王之心耳矣及周公之歸制禮樂定洛邑召公之獻誥純以德諌其書乃顯周公之所定大雅自文王至假樂亦可畧備矣而召公又為之三篇焉其書乃成古大臣之用詩書以事其君者若此也泂酌召康公戒成王也言皇天親有德饗有道也泂酌三章言皇天之親愛人君饗其祭祀茍有道德雖薄陋可薦也道德者豈弟君子為民父母之謂也道德之文散則通對則分此豈弟君子謂人君也卷阿豈弟君子為人臣亦上下通言之也卷阿召康公戒成王也言求賢用吉士也卷阿十章言求賢而吉士以類從也民勞召穆公刺厲王也板凡伯刺厲王也蕩召穆公傷周室大壞也厲王無道天下蕩蕩無綱紀文章故作是詩也抑衞武公刺厲王亦以自警也武公相厲王也史記誤以為相平王所謂四十二年犬戎殺周幽王武公將兵往佐周平戎甚有功周平王命武公為公皆非也平王之所命乃鄭武公耳桑柔芮伯刺厲王也當成康之時毛公芮侯皆在王朝為六卿其後世子孫能守家法陳古義以諌其君如此皆周人國子之教行而家多良子弟本末源流可考也雲漢仍叔美宣王也宣王承厲王之烈内有撥亂之志遇烖而懼側身修行欲銷去之天下喜於王化復行百姓見憂故作是詩也宣王大雅凡六篇雲漢則仍叔周之大夫美宣王也皆變中之正而亦謂之變也何者成王之時未嘗有此美也周公之意豈願有此詩也宣王承厲王之餘烈立志剛修身謹遇災知懼天下為之喜百姓見其憂於是有此美之之意而仍叔乃述之為雅耳崧高尹吉甫美宣王也天下復平能建國親諸侯褒賞申伯焉天下復平建國親諸侯之權在上所以可美也烝民尹吉甫美宣王也任賢使能周室中興焉韓奕尹吉甫美宣王也能錫命諸侯江漢尹吉甫美宣王也能興衰撥亂命召公平淮夷淮浦之夷蓋散處毛以為在淮浦而夷行者徐戎亦其一也緜亘泗楚雜在中國自伯禽嘗征之入春秋之深淮夷亦嘗與諸侯衣冠之集種𩔖多矣小雅廢而四夷侵宣王中興興衰撥亂命召穆公上下江漢之間平定尹吉甫所以美也常武召穆公美宣王也有常德以立武事因以為戒然詩無其字而創為之名者極少此二字乃召公之至意尹吉甫嘗畧述於江漢而召穆公又自為一詩所說乃美皇父休父之為將而美宣王之命將然穆公平淮夷而二將平徐土則王之武功亦可以為有常德而立武事矣猶慮其黷也詩本以美而序言其戒察其辭知其意乎瞻卬凡伯刺幽王大壞也幽王變大雅二篇召旻凡伯刺幽王大壞也旻閔也閔天下無如召公之臣也凡伯國爵刺厲王與幽王者非一人也蓋世以國爵稱清廟祀文王也周公既成洛邑朝諸侯率以祀文王焉周公既成洛邑成王之洛朝諸侯率以祀文王而歌此清廟之頌寂寥簡短有遺音焉一人唱之三人嘆之洛誥曰王在新邑烝祭嵗文王騂牛一武王騂牛一在十有二月惟周公誕保文武受命惟七年周公蓋相成王而率諸侯也維天之命太平告文王也亦清廟之所歌也當其時豈敢以太平告而序者推言之耳維清奏象舞也孔氏曰奏象舞之樂歌也象則文王之樂内則十三學舞勺勺告成大武之舞也十五學舞象象則左傳所謂象箾南籥也箾字與捎同舞之所執籥笛𩔖也亦舞之所執南二南之音也祭統曰下而管象孔氏疏詩以為文王有擊刺之法武王象而為舞蓋疑其為武舞矣孔疏春秋本於杜註又以為南籥既是文舞象箾當是武舞此說愈為支離其實武王象文王之功而為此舞主於文德而基武功烈文成王即政諸侯助祭也成王即位之後周公攝行其政事七年至是周公復辟成王即政諸侯之來助祭而於廟中歌此也天作祀先王先公也先王大王以下也先公不窋以下也此共祀之樂歌也昊天有成命郊祀天地也周禮冬至祭昊天於圜丘夏至祭地祇於方澤而歌此乎蓋以后稷配天而詩中推文武之受命耳后稷其肇祀而文武其基命也我將祀文王於明堂也古者郊以報本反始而尚質故祀天以祖配郊祀后稷以配天是也明堂以備物告成而尚文故祀上帝以禰配崇祀文王於明堂以配上帝是也時邁巡守告祭柴望也此巡狩之禮乃武王舉行而周公頌之也非武王之自為頌也武王既定天下巡行其守土諸侯各朝於方岳之下乃為告至之祭柴望之禮柴祭昊天望祭山川左傳曰武王克商作頌曰載戢干戈國語曰周文公之頌大抵武王克商之後而有此頌豈武王自為之為之者周公其人抑亦在成王之時蓋將以為後代巡守之法祭必歌之執競祀武王也思文后稷配天也國語曰周文公之為頌曰思文后稷然則頌非周公誰能為之也臣工諸侯助祭遣於廟也臣工者諸侯來朝因助成王之祭將歸遣之於廟而歌此也振鷺二王之後來助祭也武王伐紂下車封夏后氏之後東樓公於杞封殷之後於宋蓋以武庚君於畿内微國本亦在紂之畿内故徙之别封宋國其後成王乃命微子為商後二王之後以天子禮祭其始祖行其正朔服色豐年秋冬報也豐年之頌秋冬報上帝也秋有明堂之享冬有圜丘之祠秋享告成冬祠反始其諸併歌是以報所祈與有瞽始作樂而合乎祖也潛季冬薦魚春獻鮪也雝禘大祖也載見諸侯始見乎武王廟也載見者其來而歌也烈文助祭也臣工祭畢而遣也有客微子來見祖廟也武奏大武也武奏大武者周公相成王象武王伐紂之事而為此舞也閔予小子嗣王朝於廟也閔予小子嗣王朝於廟則成王朝武王之廟而思所以繼祖考也訪落則述成王之心謀所以繼祖考者於羣臣訪落嗣王謀於廟也敬之羣臣進戒嗣王也敬之釋文曰一本無之字然則以敬一字名篇乎小毖嗣王求助也小毖天下之事當謹於其小也孔鄭皆以為管蔡既平周公歸政之後成王因祭在廟而求羣臣之助已為此頌古之頌者皆頌前王之美當其時成王亦或在廟而有頌若敬之小毖閔予訪落之類皆歌詠勞苦而推迹本原以求賢聽諌而未嘗自述以為誇也載芟春藉田而祈社稷也載芟春藉田而祈社稷者甸師掌王載耒耜之田千畝天子三推以勸耕借民力而共成之曰藉月令孟春躬耕常藉仲春元日命民社分為兩月此乃躬耕而王自祭於社稷與良耜秋報社稷也良耜秋報所祈也絲衣繹賓尸也高子曰靈星之尸也絲衣繹賓尸之樂歌也天子諸侯曰繹以祭之明日也卿大夫曰賓尸與祭同日也周繹商彤又祭以求神也以賓事所祭之尸曰賓尸高子之言非是酌告成大武也言能酌先祖之道以養天下也文王之舞曰象詩有維清武王之舞曰武詩有大武而勺者周公相成王所為告成之詩歌也大武本於維清而勺本於大武猶虞書之述堯而夏書之述虞也王者功成然後制樂其初用前王之樂以教化又其次述前王之功德以為樂又其次乃自為樂而其實不敢自為惟推明前王之功德以寓諸形容而見諸歌舞焉則成王之樂其名曰勺是也酌先祖之道以養天下謂成王也先祖之道則遵養時晦與夫時純熙矣之謂也桓講武𩔖禡也桓武志也講武而歌此𩔖禡皆師祭述武王之志也賚大封於廟也賚予也言所以錫予善人也賚者武王既有天下之後列爵惟五分土惟三崇德報功之詩也古者大封必於廟示不敢專也周有大賚善人是富易曰開國承家小人勿用必亂邦也周雖大賚以錫功然所錫予皆善人也有不善者則不得於武王之朝而封於武王之世矣周公本其意為此詩以歌於廟乎般巡守而祀四嶽河海也武王有時邁而成王有般般非樂也所以持其安而保其成也一遊一豫為諸侯度古先王之般樂豈後世之謂又六年王乃時巡此其祀之歌詩乎駉頌僖公也僖公能遵伯禽之法儉以足用寛以愛民務農重穀牧於坰野魯人遵之於是季孫行父請命於周而史克作是頌魯頌之辭夸僖當惠王襄王之世又屬齊桓求伯應接不暇行不純善凡詩所誦者春秋不㮣見然四篇之義猶有一變至道之遺意使既其文而又既其實魯其可量乎史克言之乃詩人之性情而僖公未必盡能充之季文子所請諸儒以為在僖公既沒之後蓋以文子於文公之世乃見歟駉者頌僖公能遵守伯禽之法周公自武王時封魯而身在周家至其復辟成王命伯禽大啟土宇而周公亦之洛不之魯也伯禽之法即周公之法儉以足用寛以愛民又能務農重穀即牧馬言之亦可見坰逺之野避民居與農田也魯人遵之以下義通三篇行父季友之子史臣名克其在文十八年行父又使之對宣公是直諒多聞者也有駜頌僖公君臣之有道也泮水頌僖公能修泮宫也天子辟廱諸侯泮宫辟廱水旋丘其外築土為堤壅水之外如璧令觀者均其義則辟明雍和而泮者所以頒政教也東西門以南通水泮宫學名能修其官又修其化言民樂往泮水樂見僖公至於克服淮夷惡人感化也魯禮得立四代之樂米廩虞庠也序夏序也瞽宗殷學也頖宫周學也行禮之飲酒養老兵事之定謀獻馘受成告克皆在泮宫閟宫頌僖公能復周公之宇也宇土地居處也詩言常許故序以為主耳那祀成湯也微子至於戴公其問禮樂廢壞有正考甫者得商頌十二篇於周之大師以那為首微子得行商之禮樂而周用六代之樂太師有商頌微子至戴公當宣王之時宋大夫正考甫得十二篇正考甫者孔子七世祖也至孔子録詩時已亡其七篇矣史記以為正考甫佐戴武宣乃接幽平之世又以為襄公時恐誤烈祖祀中宗也𤣥鳥祀高宗也𤣥鳥祀高宗樂歌也武丁有鳴雉之異懼而修德殷道復興所謂武丁孫子亦猶所謂湯孫蓋殷人之立言其法度如此耳長發大禘也禘宗廟之大祭也鄭以為郊非矣夏商四時祭亦有禘周無之春祠夏禴秋嘗冬烝惟五年一禘禮不王不禘王者禘其祖之所自出而以其祖配之周人禘嚳於其廟以稷配商人禘嚳於其廟其以契配歟殷武祀高宗也
