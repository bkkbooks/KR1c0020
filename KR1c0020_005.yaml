body:
  text: 毛詩講義卷五宋林岊撰小雅一呦呦鹿鳴食野之蘋我有嘉賔鼓瑟吹笙吹笙鼓簧承筐是將人之好我示我周行呦呦鹿鳴食野之蒿我有嘉賔德音孔昭視民不恌君子是則是效我有旨酒嘉賔式燕以敖呦呦鹿鳴食野之芩我有嘉賔鼓瑟鼓琴鼓瑟鼓琴和樂且湛我有旨酒以燕樂嘉賔之心呦呦然鳴鹿相呼食野之蘋草猶君有酒食召其臣下行燕享之禮致其羣臣而曰我有嘉賔親且敬之也鼓其瑟而吹其笙以樂之吹笙之時鼓其笙中之簧又奉筐篚承幣帛以將之蓋以羣臣之愛我故我以此恩義示之列位也蒿可啖德音孔昭旅酬之時所語先王道德之音甚明以此示民民皆象之不偷薄於禮義而君子亦於是法則倣效之嘉賔之賢如是故我有美酒用之與燕飲以遨遊也視古示字同芩牛馬喜食之鼓瑟鼓琴和樂而且湛久以燕樂嘉賔之心樂其心則人斯盡其心焉詩中初無求報之意而序者推理之必然鹿鳴天子燕羣臣之詩儀禮諸侯燕禮卿大夫鄉飲酒禮皆得笙歌小雅故魯穆叔拜晉君工歌鹿鳴之三則曰鹿鳴君所以嘉寡君也文王天子朝廷諷誦之雅而穆叔不拜晉君之歌是矣乃亦曰文王兩君相見之樂也不知太師許諸國得歌此耶抑諸侯之自僣耶當考四牡騑騑周道倭遲豈不懷歸王事靡盬我心傷悲四牡騑騑嘽嘽駱馬豈不懷歸王事靡盬不遑啓處翩翩者隼載飛載下集于苞栩王事靡盬不遑將父翩翩者隼載飛載止集于苞杞王事靡盬不遑將母駕彼四駱載驟駸駸豈不懷歸是用作歌將母來諗言四牡之騑騑然行不止在周道而歷遠普天之下皆周道非必岐周也豈不懷歸王事無不當堅固者其心則傷悲矣懷歸私靡盬公傷悲情思也駱馬勞而喘息遑暇也啓跪處居也古者臣受君命舍幣于禰乃行隼夫不鳥也夫字一為鳺不方浮反又如字又為鴀同一名浮鳩翩翩飛下集于栩木枸檵之間王事無不當堅固也爾臣則不遑將母矣駸駸驟也爾臣豈不懷歸乎終日思歸而此日歸矣我用是為此歌以勞之將母之情其來諗告於君也毛氏曰父兼尊親之道鄭氏曰人之思常思親者再言將母亦其情也皇皇者華于彼原隰侁侁征夫每懷靡及我馬維駒六轡如濡載馳載驅周爰咨諏我馬維騏六轡如絲載馳載驅周爰咨謀我馬維駱六轡沃若載馳載驅周爰咨度我馬維駰六轡既均載馳載驅周爰咨詢常棣之華鄂不韡韡凡今之人莫如兄弟死喪之威兄弟孔懷原隰裒矣兄弟求矣脊令在原兄弟急難每有良朋况也永歎兄弟鬩于牆外禦其務每有良朋蒸也無戎喪亂既平既安且寧雖有兄弟不如友生儐爾籩豆飲酒之飫兄弟既具和樂且孺妻子好合如鼓瑟琴兄弟既翕和樂且湛宜爾室家樂爾妻帑是究是圖亶其然乎按以上二萹永樂大典缺卷伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲相彼鳥矣猶求友聲矧伊人矣不求友生神之聽之終和且平伐木許許釃酒有藇既有肥羜以速諸父寧適不來微我弗顧於粲灑掃陳饋八簋既有肥牡以速諸舅寧適不來微我有咎伐木于阪釃酒有衍籩豆有踐兄弟無遠民之失德乾餱以愆有酒湑我無酒酤我坎坎鼓我蹲蹲舞我逮我暇矣飲此湑矣丁丁然伐木之聲鳥鳴嚶嚶而驚懼出深遷髙求其友聲而從之可以人而不如乎心誠求之神若聽之終得如志而和平矣許許聲也伐木義見上章二章三章引下文耳以筐曰釃以藪曰湑謂以筐􅜷酒也藇美貌有酒有羜醴饌之豐可不睦族乎天子尊同姓諸侯諸侯尊同姓大夫皆曰父異姓則曰舅國君友其親賢大夫友其宗族朋舊通曰舅父寧適召之而彼自不來無使謂我不顧念之也於美也粲鮮明天子八簋粲然已灑􅠜矣陳其黍稷矣謂為食禮咎過也衍美貌籩豆陳列兄弟父母之黨亦朋友同儕者民尚以乾餱之食獲愆過于人况天子之饌反可以致恨于兄弟乎不當遠之也湑莤之也莤所六反縮酒也以茅泲之去其糟也酤一宿酒舉此以見朋舊相求之恩義也有酒則泲莤之無酒則一宿而成之不計其有無也為我擊鼓坎坎然為我興舞蹲蹲然及我今之間暇共飲此湑相樂矣天保定爾亦孔之固俾爾單厚何福不除俾爾多益以莫不庶天保定爾俾爾戩榖罄無不冝受天百祿降爾遐福維日不足天保定爾以莫不興如山如阜如岡如陵如川之方至以莫不增吉蠲為饎是用孝享禴祠蒸嘗于公先王君曰卜爾萬壽無疆神之弔矣詒爾多福民之質矣日用飲食羣黎百姓遍為爾德如月之恆如日之升如南山之壽不騫不崩如松柏之茂無不爾或承臣之祝其君曰天保定爾亦孔之堅俾爾信厚何福不開俾爾多益以無不庶又曰天保定爾俾爾福祿盡無不宜受天百祿降爾遠福汲汲然日且不足也則又曰天保定爾以莫不興如山如大陸如岡如大阜委積髙大也如水縱長莫不多也則又曰君之祭也吉善蠲潔以為酒食是用享獻表其孝心春祠夏禴秋嘗冬蒸于先公后稷至諸盩于先王自大王至文王以下尸嘏主人傳神之辭謂先君曰卜爾萬壽無有疆界矣此蓋言福祿壽三者之備而天相之祖宗亦相之也則又曰神之至矣遺爾多福民之質矣質實無僞日用飲食而已羣黎民也百姓百官族姓也遍為吾君之德則而象之此則民從之也則又祝之曰如月之上弦而就盈也如日之始出而就明也如南山之壽不虧也如松柏之枝葉常茂盛青青相承無衰落也采薇采薇薇亦作止曰歸曰歸嵗亦莫止靡室靡家玁狁之故不遑啓居玁狁之故采薇采薇薇亦柔止曰歸曰歸心亦憂止憂心烈烈載飢載渴我戍未定靡使歸聘采薇采薇薇亦剛止曰歸曰歸歲亦陽止王事靡盬不遑啓處憂心孔疚我行不來彼爾維何維常之華彼路斯何君子之車戎車既駕四牡業業豈敢定居一月三捷駕彼四牡四牡騤騤君子所依小人所腓四牡翼翼象弭魚服豈不日戒玁狁孔棘昔我往矣楊栁依依今我來思雨雪霏霏行道遲遲載渴載飢我心傷悲莫知我哀按此萹永樂大典缺卷我出我車于彼牧矣自天子所謂我來矣召彼僕夫謂之載矣王事多難維其棘矣我出我車于彼郊矣設此旐矣建彼旄矣彼旟旐斯胡不斾斾憂心悄悄僕夫况瘁王命南仲往城于方出車彭彭旗旐央央天子命我城彼朔方赫赫南仲玁狁于襄昔我往矣黍稷方華今我來思雨雪載塗王事多難不遑啓居豈不懷歸畏此簡書喓喓草蟲躍躍阜螽未見君子憂心忡忡既見君子我心則降赫赫南仲薄伐西戎春日遲遲卉木萋萋倉庚喈喈采蘩祁祁執訊獲醜薄言還歸赫赫南仲玁狁于夷此勞歸將而一章二章述始行之言若曰我出我車就馬於牧地自天子所命我來矣召彼僕御之夫使之裝載而往矣王事多難維其急矣我出我車于彼逺郊之牧地設旐者屬之于干旐而建之彼鳥隼之旟與龜蛇之旐胡不斾斾乎斾斾旒垂貌將帥既受命而憂僕夫兹益憔悴憂其馬之不正詩人述其言而美其勞三章則又斷之曰昔日文王之命南仲往城朔方出車彭彭其四馬交龍之旗央央而鮮明南仲承西伯之命以西伯承商天子之命我城彼朔方也赫赫乎南仲哉玁狁之難於此而除今吾將率之勞亦如此也四章述既歸之言曰昔我往矣黍稷方華今我來思雨雪凍釋王事多難不遑啓處豈不懷歸畏此簡書簡書戒命也國有急則簡書相告奔命救之五章述既歸之情曰草蟲鳴阜螽躍而從之天性也未見君子則心憂既見君子則心降此則國人屬目室家望歸之喻也則又斷之曰赫赫南仲薄伐西戎如此也六章述既歸之功曰春日遲遲卉木萋萋倉庚喈喈采繁祁祁之時而將士之歸執其當訊問者獲其醜衆者薄言還歸則又斷之曰赫赫南仲玁狁于夷夷平也有杕之杜有睆其實王事靡盬繼嗣我日日月陽止女心傷止征夫遑止有杕之杜其葉萋萋王事靡盬我心傷悲卉木萋止女心悲止征夫歸止陟彼北山言采其杞王事靡盬憂我父母檀車幝幝四牡痯痯征夫不遠匪載匪來憂心孔疚期逝不至而多為恤卜筮偕止㑹言近止征夫邇止杕杜猶得蕃滋役夫勞苦不得盡其天性王事無不堅固我之行役繼嗣其日十月為陽歲將改矣婦人思念其君子則憂傷矣征夫庶其遑暇而歸止我心傷悲謂戍役之悲也女心悲止室家之悲也升北山而采杞托有事以望君子君子之勤於王事憂我父母役車幝幝而敝四牡痯痯而罷征夫之歸其不遠乎匪見其裝載匪見其來歸室家之心憂而甚病以期望之往而不至多為憂也卜之筮之㑹人占之合言於繇為近征夫之來當甚邇矣此序其男女之情也魚麗于羀鱨鯊君子有酒旨且多魚麗于羀魴鱧君子有酒多且旨魚麗于羀鰋鯉君子有酒旨且有物其多矣維其嘉矣物其旨矣維其偕矣物其有矣維其時矣麗歷也羀曲梁也寡婦之笱也鱨揚也鯋鮀也鱧鮦也鰋鮎也君子有酒旨絶句酒旨而魚且多也物則不止魚酒之謂多又嘉善旨又偕齊美又得其時可樂也南陔白華華黍按逸詩三萹永樂大典無林氏說南有嘉魚蒸然罩罩君子有酒嘉賔式燕以樂南有嘉魚蒸然汕汕君子有酒嘉賓式燕以衎南有樛木甘瓠纍之君子有酒嘉賓式燕綏之翩翩者隼蒸然來思君子有酒嘉賓式燕又思南有嘉魚江漢之間魚大而衆蒸久也久如而以篧罩罩之喻人君之思遲賢者也君之有酒得賢者以為嘉賔式燕以樂未得而遲其來既得而同其樂此樂與之誠也久如而以薄汕汕之亦喻也衎樂也南方有樛然下垂之木甘瓠之草得上而纍蔓之喻君子之下下賢者得往而歸就之君之有酒其於嘉賓式燕而安之燕禮司正洗觶南面奠于中庭升東楹之東受命西階上北面命卿大夫君曰以我安卿大夫皆對曰諾敢不安夫不之鳥慤謹一意於其所宿之木久如欲來翩翩飛集喻賢者之翔而後集也君之有酒其於嘉賔用燕而又燕親之也思語辭大抵君臣之間惟有一誠以相感天下之賢所以樂為朝廷邦國用者以上之人有至誠親待之意其所謂賢者美政美俗正身正君若詩書所載諸臣之言德不離口道不離身非此等人孰與共治乎南山有臺北山有萊樂只君子邦家之基樂只君子萬壽無期南山有桑北山有楊樂只君子邦家之光樂只君子萬壽無疆南山有把北山有李樂只君子民之父母樂只君子德音不巳南山有栲北山有杻樂只君子遐不眉壽樂只君子德音是茂南山有枸北山有楰樂只君子遐不黃耇樂只君子保艾爾後臺夫須萊草也山本髙矣以草木之盛而愈積其髙喻賢者之有益於邦家也故詩人發明王者樂得賢人之意一章曰樂只君子邦家之基言其功也樂只君子萬壽無期欲其久存于斯世也桑楊把李栲杻枸楰皆言草木可以增山之髙大也栲山樗也杻檍也枸枳枸楰鼠梓也眉壽黃耇德音保艾皆欲其壽而安安而久久而昌也賢之生世如周太公衛武公耆龎壽考如伊尹周公皆至耄老成其功業而尼父七十有三天卑斯文皆參天地之數此詩人所以寫樂賢之意而以久存者申言之不足爾由庚崇丘由儀按逸詩三萹永樂大典無林氏說蓼彼蕭斯零露湑兮既見君子我心寫兮燕笑語兮是以有譽處兮蓼彼蕭斯零露瀼瀼既見君子為龍為光其德不爽壽考不忘蓼彼蕭斯零露泥泥既見君子孔燕豈弟冝兄冝弟令德壽豈蓼彼蕭斯零露濃濃既見君子鞗革沖沖和鸞雍雍萬福攸同蕭蒿也湑湑然蕭上露貌蓼然長大者蕭斯蕭香物之微者天不以其微而不潤也天之零露潤蕭而蓼亦猶諸侯之既見吾君我心輸寫天子與之燕飲而載笑載語是以稱揚德美使聲譽常處天子瀼瀼蕃貌為寵為光言恩澤被及已也不爽不差也壽考不忘祝其君之好德壽考也泥泥沾濡也孔甚燕安豈弟樂易也冝兄冝弟如書兄弟方來之意令德壽豈亦祝其君之好德壽豈也濃濃厚貌既見君子當有車馬之賜轡首以皮革為之沖沖垂飾在軾曰和在鑣曰鸞取其聲也乘其賜車言反于國萬福攸同之頌歸之君而不敢専之已也湛湛露斯匪陽不晞厭厭夜飲不醉無歸湛湛露斯在彼豐草厭厭夜飲在宗載考湛湛露斯在彼把棘顯允君子莫不令德其桐其椅其實離離豈弟君子莫不令儀湛湛在物上者露也物得露柯葉低垂非見日之陽不得乾而舒放露以潤陽以晞皆物所資匪陽未遽晞欲陽也匪醉未遽歸欲醉也王親諸侯同姓異姓皆欲夜飲至醉湛湛露斯在彼豐草則亦匪日不晞矣言澤草也厭厭之飲在宗人則考而成異姓遜之則止也在彼把棘則亦匪日不晞矣又言澤木也顯明允信之諸侯醉酒飽德莫不令善是承君之歡不失其德也其桐其椅其實離離而垂則又喻乎樂易諸侯醉酒飽德莫不令善其威儀協陔夏之節如此二木之榮實是謂上盡其觀下肅其儀也彤弓弨兮受言藏之我有嘉賓中心貺之鐘鼓既設一朝饗之彤弓弨兮受言載之我有嘉賓中心喜之鐘鼓既設一朝右之彤弓弨兮受言櫜之我有嘉賓中心好之鐘鼓既設一朝酬之朱弓以講德習射者弨弛貌爾雅以言為我天子之嘉賞諸侯以弨弛之朱弓錫之俾之受而藏之不惟錫之以弓而又饗之以禮我於諸侯待以嘉賓中心誠欲貺與之鐘鼓既設一朝而大飲之載載以歸也喜樂之右勸之櫜韜也好說之酬報之左氏所載晉侯朝王王饗醴命之宥然後有彤弓之錫詩所述先言貺以彤弓然後言一朝饗酬之樂鄭以為既錫而饗孔以為未必設醴要之錫必有饗詩以彤弓命篇故先言錫後言饗也菁菁者莪在彼中阿既見君子樂且有儀菁菁者莪在彼中沚既見君子我心則喜菁菁者莪在彼中陵既見君子錫我百朋泛泛楊舟載沉載浮既見君子我心則休菁菁然蘿蒿之盛在彼大陵之中君子能長育人材如阿之長莪菁菁然既見君子樂而且有威儀也中沚沚中也我心則喜喜亦樂也中陵陵中也古者貨貝五貝為朋錫我百朋言得祿之多也楊木為舟泛泛于水載則也言舟者以沉浮言車者以軒輊舟之在水則沉則浮容與之意也既見君子我心則休休然也皆天下喜樂其君之詞也所謂君子之樂育何以見之喻之陵沚有阿之盛喻之楊舟容與之意述其百朋與其接見無非君之樂育也大抵詩人寓深長之思序者推感召之自古者人君周旋于學之時甚多此其學中之歌乎六月棲棲戎車既飭四牡騤騤載是常服玁狁孔熾我是用急王于出征以匡王國比物四驪間之維則維此六月既成我服我服既成于三十里王于出征以佐天子四牡修廣其大有顒薄伐玁狁以奏膚公有嚴有翼共武之服共武之服以定王國玁狁匪茹整居焦穫侵鎬及方至于涇陽織文鳥章白斾央央元戎十乘以先啓行戎車既安如輊如軒四牡既佶既佶且間薄伐玁狁至于大原文武吉甫萬邦為憲吉甫燕喜既多受祉來歸自鎬我行永久飲御諸友炮鱉膾鯉侯誰在矣張仲孝友六月棲棲而簡閲戎車既飭正矣四牡騤騤然載是戎事之常服韋辨服也玁狁孔盛我是用急盛夏出兵耳王曰出征者以正王國之封畿使不為夷狄所侵耳比物者毛物之齊也舉四驪而言一乘皆驪無雜色則其它之盛可知又且間習之而中于法則用兵之法將與士間習士與兵刃車馬皆冝間習然後擊刺射御無不冝矣維此六月之時既成我戎服又戒之曰師行當三十里可以舍息王曰出征以佐天子此宣王之意而吉甫誦之詩人又從而詠之也四牡修長而廣大大而有顒顒顒之謂也薄伐玁狁以奏大功有威嚴有翼敬共武之事以安王國玁狁可謂不自茹度乃自整齊來歸焦穫接于周地鎬也方也皆北方地名至于涇水之北徽幟有文鳥隼以為衣章將帥以下衣皆著焉毛云錯革鳥為章也白斾繼旐者央央鮮明元戎大車先前啓突敵陳之前行毛云夏鉤車先正殷寅車先疾周元戎先良鄭云鉤鞶行曲直有正也寅進也戎車既安從後視之如輊從前視之如軒然後調適四牡壯健且間矣薄伐玁狁至于大原逐出之而已有文有武尹吉甫時為大將其文武之德萬邦于是為法所以薄伐而玁狁遁也吉甫之歸則宴安而喜樂矣天子勞之既多受其福祉謂飲食賞賜之類來歸自鎬我行永久此勞歸之辭也王命之飲且進其諸友恩舊者侍之又加其珍美之饌如炮鱉膾鯉所以極勸之也善父母為孝善兄弟為友毛云侯維也張仲賢臣也使文武之臣征伐與孝友之臣處內嗚呼宣王所以中興也薄言采芑于彼新田于此菑畝方叔涖止其車三千師干之試方叔率止乘其四騏四騏翼翼路車有奭簟茀魚服鉤膺鞗革薄言采芭于彼新田于此中鄉方叔涖止其車三千旗旐央央方叔率止約軧錯衡八鸞瑲瑲服其命服朱芾斯皇有瑲葱珩鴥彼飛隼其飛戾天亦集爰止方叔涖止其車三千師干之試方叔率止鉦人伐鼓陳師鞠旅顯允方叔伐鼓淵淵振旅闐闐蠢爾蠻荆大邦為讎方叔元老克壯其猶方叔率止執訊獲醜戎車嘽嘽嘽嘽焞焞如霆如雷顯允方叔征伐玁狁蠻荆來威一章言薄言采芭于彼新田于此菑畝方叔涖止者謂民之趨農而刈穫皆方叔涖之也其車三千師干之試方叔率止者謂民之備其車賦與其甲兵干楯亦方叔率之方叔之閒居暇日乘其四騏駕其赤車簟為車蔽魚為矢服鞗革者轡首之垂鉤膺者繁纓之大車馬雍容稱其德矣二章言新田中鄉方叔所涖也車旗之盛方叔所率也長轂朱約錯衡以文四馬八鸞服三命葱珩服而芾色黃朱此皆為卿之車服也三章則變文以言教戰之事矣民於農隙閲習武事如隼之飛如隼之集亦我方叔涖之率之鉦以靜鼓以動五百人之旅鞠而告之五旅之師陳而列之顯允哉方叔乎出曰治兵則陳師而鞠旅也入曰振旅則又伐鼓而淵淵也進止動靜出入惟其所馴可謂間于教矣四章言荆州之蠻敢讎大邦方叔元老克壯其猶率其既教之兵執虜以問訊大獲其醜衆其民則前日之民故率之而功成其車則前日之車故驅之而威振顯允哉方叔乎嘗與吉甫伐玁狁而亦用此矣不待戰而蠻荆自來服我威光也詩主咏征伐乃先言平時寓兵于農寓將于卿農隙教戰兵習于將之意古人用兵不茍如此故有不戰我戰則克伐玁狁是也有不必戰動之斯來則威蠻荆是也制度存于聲歌之表妙矣芭白苖田二歲曰新一歲曰菑師衆干扞試習路大鄉所也交龍為旗龜蛇為旐五官之長出於諸侯曰天子之老我車既攻我馬既同四牡龐龐駕言徂東田車既好四牡孔阜東有甫草駕言行狩之子于苖選徒囂囂建旐設旄搏獸于敖駕彼四牡四牡奕奕赤芾金舄㑹同有繹決拾既佽弓矢既調射夫既同助我舉柴四黃既駕兩驂不猗不失其馳舍矢如破蕭蕭馬鳴悠悠斾旌徒御不驚大庖不盈之子于征有聞無聲允矣君子展也大成一章言我車既攻堅矣我馬既齊同矣宗廟齊豪尚純也戎事齊力尚強也田獵齊足尚疾也四牡龐龐而充實乃駕言徂往洛邑以㑹諸侯焉總名洛邑有王城有成周二章言田獵之車則既好矣四牡又阜大矣是先因田獵而見其車之選也東都有大草之地駕言將行田狩之禮乎春搜夏苖秋獮冬狩總而名之曰狩云鄭有圃田三章言之子有司也夏獵曰苖有司于苖選其徒御厥聲囂囂惟選車徒有聲則其它靜可知是先因田獵而見其徒之選也建我龜蛇之旐又設旄于竿首其將為搏獸于敖之備乎敖鄭地近滎陽夫必選其車徒建其旗物駕言行狩搏獸于敖是先具也孔以為駕言搏獸皆致意之辭未實行也所說田車既好選徒囂囂皆先時田獵選擇之事四章乃言㑹同矣其㑹諸侯于東都也諸侯之來駕彼四牡奕奕然壯盛赤色蔽膝之芾黃朱色之達屨或時見曰㑹或殷見曰同繹繹而陳也五章乃言射矣鉤弦之決遂弦之拾既已佽利而相比弓之强弱又與矢之輕重相得射夫既同而射又同而復位雖不中者必助中者舉積禽也六章則言御之良而射之習矣射而兼御是田獵之射也四黃齊色既駕矣兩驂從服不偏倚御者得舒疾之中不失其驅馳之範射者舍矢則中如破物也七章言射獵之餘整暇之意矣蕭蕭馬鳴悠悠斾旌毛云不歡譁也不驚驚也不盈盈也反其言美之也徒御以警肅為尚大庖以射獲為功乾豆賔客充君庖焉八章則總言此行其征往㑹同田獵也有善聞而無喧譁之聲信矣君子誠哉復古之大功也毛云田者大艾草以為防或舍其中褐纒旃以為門裘纒質以為槸間容握驅而入轚則不得入左者之左右者之右然後焚而射焉天子發然後諸侯發諸侯發然後大夫士發天子發抗大綏諸侯發抗小綏獻禽于其下故戰不出頃田不出防不逐奔走古之道也毛云一曰乾豆二曰賔客三曰充君之庖故自左膘射之達于右腢為上殺射右耳本次之射左髀達于右䯚為下殺面傷不獻踐毛不獻不成禽不獻禽雖多擇取三十焉其餘以與大夫士以習射于澤宫田雖得禽射不中不得取禽田雖不得禽射中則得取禽古者以辭遜取不以勇力取鄭云射右耳本射當為達三十者每禽三十也車一乘甲士三人之外步卒七十二人及其它皆徒也徒御不驚毛所謂徒輦者蓋取釋訓云徒御不驚輦者也爾雅特釋此文故依而為說地官鄉師云大軍旅㑹同治其輦注云輦人挽行所以載任器也止以為蕃營司馬法輦有一斧一斤一鑿一梩周輦加二板二築夏后氏二十人而輦殷十八人而輦周十五人而輦是㑹田獵人挽輦以徒行也徒既為輦者故御為御馬者吉日維戊既伯既禱田車既好四牡孔阜升彼大阜從其羣醜吉日庚午既差我馬獸之所同麀鹿麌麌漆沮之從天子之所瞻彼中原其祁孔有􅟡儦俟俟或羣或友悉率左右以燕天子既張我弓既挾我矢發彼小豝殪此大兕以御賔客且以酌醴戊剛日乘牡以順其類重物謹微將用馬力先禱馬祖且禱求馬之强健而有獲也田車則好矣四牡孔盛大矣車牢馬健升彼大阜歷險而從禽獸之羣衆庚午亦剛日外事以之辰午為馬又差我馬謹也獸之所聚鹿牝曰麀牡曰麚麕牡曰麌牝曰麋麌麌衆多也從􅃮水沮水驅禽而致天子之所瞻彼中原之野獸則其大孔有矣鄭云祁作麎麎麋牝也牡曰麔趨則儦儦行則俟俟三而曰羣二而曰友田者以驅逆之車驅而至于彼防虞人乃重驅之順其左右之冝以安待天子之射禽必左右射之使見羣臣之奉上也自此以下乃言獲獸供王賔燕之事張弓挾矢發彼小豝殪此大兕言中微而制大俱難能也豕牝曰豝殪一發而死也以御賔客給御諸侯給與充用之謂也酌而醴羣臣以為爼實若乾為脯漬為醢則在籩豆是奉上之實也毛云饗醴天子之飲酒醴不可専飲天子於羣臣不徒設醴左氏天子饗諸侯每云饗醴命之宥毛𫝊云校人春祭馬祖夏先牧秋馬社冬馬步注馬祖天駟先牧始養馬者馬社始乘馬者馬步神為灾害馬者四時常祭此其特祭伯長也天駟房也龍為天馬房四星謂之天駟房亦為龍馬鴻鴈于飛肅肅其羽之子于征劬勞于野爰及矜人哀此鰥寡鴻鴈于飛集于中澤之子于垣百堵皆作雖則劬勞其究安宅鴻鴈于飛哀鳴嗷嗷維此哲人謂我劬勞維彼愚人謂我宣驕鴻鴈于飛肅肅其羽大鴻小鴈肅肅羽聲喻民也之子于征勞來之劬勞于野者蓋及可矜憐之人而哀此鰥寡也鴻鴈于飛集于中澤喻民有安定之意之子于垣者勸民築室家為垣墻百堵皆興一丈為板五板為堵雖則劬勞其究安宅此勸勞之辭也鴻鴈于飛哀鳴嗸嗸喻民之言達于上也其言若曰維此哲人所謂我者皆劬勞田宅一勤永逸之事維彼愚人所謂我者皆宣示驕奢之事耳夜如何其夜未央庭燎之光君子至止鸞聲將將夜如何其夜未艾庭燎晣晣君子至止鸞聲噦噦夜如何其夜鄉晨庭燎有輝君子至止言觀其旗宣王問夜之早晚夜未央未渠央也庭燎大燭有光矣諸侯之早來朝則聞其鸞鑣之聲將將然未艾未久也晣晣明也噦噦徐行有節也上章聞鸞聲爾今向明我見其旗朝禮别色始入沔彼流水朝宗于海鴥彼飛隼載飛載止嗟我凡弟邦人諸友莫肯念亂誰無父母沔彼流水其流湯湯鴥彼飛隼載飛載揚念彼不蹟載起載行心之憂矣不可弭忘鴥彼飛隼率彼中陵民之訛言寧莫之懲我友敬矣讒言其興沔彼流水則朝宗于海矣諸侯春見天子曰朝夏見曰宗鴥彼飛隼則且飛而且止矣為人臣止于敬豈無敬止之心也嗟我兄弟同姓之臣邦人諸侯莫肯念亂亡而至京師者諸侯之父母其誰無父母之心乎沔彼流水其流湯湯無所入矣載飛載揚莫知止矣念彼不循蹟道或起或行幾於驕恣非盡諸侯之過也此詩人所以憂之于心不可弭忘也弭止也鴥彼飛隼則有時乎率彼中陵是其常也喻諸侯之守職順法度者亦是其常也民之訛言寧莫之懲乎人或怨汝詈汝譸張為幻則皇自敬德周公之訓也我諸侯知敬王矣讒言其猶興乎信讒而疏諸侯蓋非治世之事也其與韓奕嵩髙異矣詩人安得不規之鶴鳴于九臯聲聞于野魚潜在淵或在于渚樂彼之園爰有樹檀其下維蘀他山之石可以為錯鶴鳴于九臯聲聞于天魚在于渚或潛在淵樂彼之園爰有樹檀其下維穀他山之石可以攻玉鶴鳴于九臯聲聞于野則身隱而名著矣魚潛在淵小魚在渚也何樂于彼園之觀乎以其上有植檀而下其蘀也它山之石可為錯以琢玉聞于天髙遠也魚寒則去渚而逃淵榖惡木喻尚賢者而下小人也祈父豫王之爪牙胡轉豫于恤靡所止居祈父豫王之爪士胡轉豫于恤靡所底止祈父亶不聰胡轉豫于恤有母之尸饔書曰祈父薄違蓋職掌封祈之甲兵我乃王之爪牙也胡轉豫于憂恤而使靡所止居乎宣王之時王師嘗與姜戎戰于千畝而敗六軍之士出自六鄉法不取于王之爪牙爪牙之士為王守衛者底至也亶誠也胡轉豫于恤而不得助母之陳饌以養其父熟食曰饔君命不當辭勞而怨祈父必用其所不當用也皎皎自駒食我場苖縶之維之以永今朝所謂伊人於焉逍遙皎皎白駒食我場藿縶之維之以永今夕所謂伊人于焉嘉客皎皎白駒賁然來思爾公爾侯逸豫無期愼爾優游勉爾遁思皎皎白駒在彼空谷生芻一束其人如玉母金玉爾音而有遐心愛賢而思縶維其駒縶絆也維縶也思其食我場苖而不可得也所謂伊人庶幾于此逍遙乎藿猶苖也賁飾也爾公爾侯邪何為逸樂無期以反也戒爾優游無徇其志也强爾遁而來不可終遁也既在空谷則馬不可縶而維矣生芻一束願致之也非愛馬也愛其人之如玉也王雖不能親賢爾賢者其可愛爾聲音而有遠我之心乎黃鳥黃鳥無集于榖無啄我粟此邦之人不我肯榖言旋言歸復我邦族黃鳥黃鳥無集于桑無啄我粱此邦之人不可與明言旋言歸復我諸兄黃鳥黃鳥無集于栩無啄我黍此邦之人不可與處言旋言歸復我諸父集木啄粟冝也母者拒之之辭也夫拒其婦有反目之義矣其妃思去之乃曰此邦之人不我肯善矣言旋言歸其反我邦族乎不可與明者不可與明夫婦之道歸其父兄歸宗也我行其野蔽芾其樗昏姻之故言就爾居爾不我畜復我邦家我行其野言采其蓫昏姻之故言就爾宿爾不我畜言歸斯復我行其野言采其葍不思舊姻求爾新特成不以富亦秪以異我行其野惡木蔽芾猶可以息婚姻之故言就爾居所以求息也爾不我畜我其復我邦家乎蓫之與葍惡菜猶可采也爾之不思舊姻之命壻父曰姻而求新特外婚乎成不足以得富亦祗以異于人道之常也秩秩斯干幽幽南山如竹苞矣如松茂矣兄及弟矣式相好矣無相猶矣似續妣祖築室百堵西南其户爰居爰處爰笑爰語約之閣閣椓之橐橐風雨攸除鳥鼠攸去君子攸芋如跂斯翼如矢斯棘如鳥斯革如翬斯飛君子攸躋殖殖其庭有覺其楹噲噲其正噦噦其冥君子攸寧下莞上簟乃安斯寢乃寢乃興乃占我夢吉夢維何維熊維羆維虺維蛇大人占之維熊維羆男子之祥維虺維蛇女子之祥乃生男子載寢之牀載衣之裳載弄之璋其泣喤喤朱芾斯皇室家君王乃生女子載寢之地載衣之裼載弄之瓦無非無儀唯酒食是議無父母貽罹按此萹永樂大典缺卷誰謂爾無羊三百維羣誰謂爾無牛九十其犉爾羊來思其角濈濈爾牛來思其耳濕濕或降于阿或飲于池或寢或訛爾牧來思何蓑何笠或負其餱三十維物爾牲則具爾牧來思以薪以蒸以雌以雄爾羊來思矜矜兢兢不騫不崩麾之以肱畢來既升牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱三百維羣一羣三百不知其幾羣也九十其犉黃牛黑脣曰犉其他毛色又不知其幾也爾羊之來聚其角而息濈濈然爾牛之來呞而動其耳濕濕然牛病則耳燥得其養則耳濕濕矣降阿飲池或寢或動牧之來思揭蓑所以備雨荷笠所以禦暑或負其乾餱以為飲食之黑毛色者三十維物則牸特其一也牧人之來又以閒暇而採薪蒸蓋聽牛羊之雌雄求類羊最難畜又申言之矜矜兢兢堅强也不騫不崩不羣疾也畢來既升擾馴從人意也牧人乃夢以下此則詩人之諷諫也言王之牛羊如此人民之蕃庶年穀之豐熟未必如是在王加之意而已矣夫人情不足則思思則夢牧人之獻夢而大人之獻占欲其覺悟也隂陽和則魚衆多豐年之象也旐旟所以聚衆故象子孫衆多也節彼南山維石巖巖赫赫師尹民具爾瞻憂心如惔不敢戲談國既卒斬何用不監節彼南山有實其猗赫赫師尹不平謂何天方薦瘥喪亂𢎞多民言無嘉憯莫懲嗟尹氏大師維周之氐秉國之均四方是維天子是毗俾民不迷不弔昊天不冝空我師弗躬弗親庶民弗信弗問弗仕勿罔君子式夷式已無小人殆瑣瑣姻亞則無膴仕昊天不傭降此鞠訩昊天不惠降此大戾君子如届俾民心闋君子如夷惡怒是違不弔昊天亂靡有定式月斯生俾民不寧憂心如酲誰秉國成不自為政卒勞百姓駕彼四牡四牡項領我瞻四方蹙蹙靡所騁方茂爾惡相爾矛矣既夷既懌如相酬矣昊天不平我王不寧不懲其心覆怨其正家父作誦以究王訩式訛爾心以畜萬邦節髙峻貌巖巖積石貌四方皆遠望而見之以興赫赫然顯盛大師之尹氏位處尊貴下民俱仰汝而瞻之今天下見汝所為皆憂心如被火之燔灼然畏汝之威不敢相戲而談語是失於具瞻矣又天下諸侯之國日相侵伐已盡絶滅汝何用為職而不監察之鄭云三公之位人所尊嚴大師大𫝊大保茲惟三公尹氏為大師兼冢宰以統羣職惔字說文為炙小熟也灼炙燒爛火􅍄尹氏又為王官之伯分主東西有實其猗實滿猗長也有實之使均平者草木之長茂也云何師尹不均平乎天方重降瘥病喪亡禍亂甚大多也下民之言無一嘉慶者曾無懲艾而嗟閔之無念亂之心也尹氏大師維是周根本之臣秉持國之正平居權衡之任四方之事是汝所維持天子之身是汝所毗輔汝職能維持四方尊崇天子尊重如此施行教化當使下民無迷惑之憂何為専行虐政以脅下奈何天不弔愍乎訴之于天不冝使此人居位以困我天下之衆民也鄭云大師之官為周之桎轄桎之實反又丁履反礙也轄字又為轄胡瞎反孝經緯孝道萬世之桎轄桎車轄也轄能制車大臣能制國氐讀音從邸尹氏不可任欲令王親為政言王為政不躬為之不親行之庶民所以不信弗察問之弗仕用之勿罔君子以為無益于人之國也為政當用平正之人無以小人而危殆我邦家也瑣瑣然婚姻親亞之小人當無得厚任以事置之大位重其祿食親而不賢不可任也疾時親黨亂政故戒之人君虛已而用賢親親而尊賢茍君子也何必一一躬親之况眀德親族烏可後也惟其所任所親皆小人也是以家父刺之矣鄭云勿罔末罔也末罔欺略漢人語也瑣瑣計謀褊淺之貌兩壻相謂為亞女子之夫為壻壻之父為􅊚多女寵必多私謁非必后黨南山之婚􅊚諂佞者進用故戒之角弓之昏􅊚賢者疏遠故刺之詩者志也各有以發昊天乎尹氏不均降此多訩訟尹氏不順降此大乖爭君子如示民以至極之道則鞠訩必息矣君子如平心去尹氏則下民惡怒之情違去矣不弔哉昊天乎亂靡有定與日俱長與月俱生俾民不安憂心如醉酒之人既覺而以酒為病誰秉國之平乎政不由王出終勞苦我百姓也駕彼四牡四牡項領之大而瞻視四方曾無馳騁之地蹙蹙然覺其狹削方茂爾惡則各自視其戈矛以相賊矣和悅懌服則又如飲酒者之相酬酢矣小人無常如此哉昊天乎尹氏不平我王不寧不懲其不平之心反怨其言正言行正道者家父為詩為王誦之以窮王政所以鞠訩之本式化爾心以畜萬邦詩人之情或微加諷諭或指斥愆咎家父盡忠竭誠不憚誅罰故自載字焉正月繁霜我心憂傷民之訛言亦孔之將念我獨兮憂心京京哀我小心癙憂以癢父母生我胡俾我愈不自我先不自我後好言自口莠言自口憂心愈愈是以有侮憂心惸惸念我無祿民之無辜并其臣僕哀我人斯于何從祿瞻烏爰止于誰之屋瞻彼中林侯薪侯蒸民今方殆視天夢夢既克有定靡人弗勝有皇上帝伊誰云憎謂山蓋卑為岡為陵民之訛言寧莫之懲召彼故老訊之占夢具曰豫聖誰知烏之雌雄謂天蓋髙不敢不局謂地蓋厚不敢不蹐維號斯言有倫有脊哀今之人胡為虺蜴瞻彼阪田有菀其特天之扤我如不我克彼求我則如不我得執我仇仇亦不我力心之憂矣如或結之今兹之正胡然厲矣燎之方揚寧或滅之赫赫宗周褒姒滅之終其永懷又窘隂雨其車既載乃棄爾輔載輸爾載將伯助豫無棄爾輔員于爾輻屢顧爾僕不輸爾載終踰絶險曾是不意魚在于沼亦匪克樂潛雖伏矣亦孔之照憂心慘慘念國之為虐彼有旨酒又有嘉殽洽比其鄰昏姻孔云念我獨兮憂心殷殷佌佌彼有屋蓛蓛方有穀民今之無祿天夭是椓哿矣富人哀此惸獨正陽之月而有繁多之霜是由王急酷之異以致傷害萬物故我心為之憂傷民之訛言亦甚大矣念我獨憂此政兮憂在于心京京然不能去哀憐我生之所遇痛憂此事以至于身病也周之六月夏之四月建已之月也以乾用事正純陽之月也急恆寒若洪範咎徴癙癢皆病也孔云小人以訛言相陷王不能察其真僞而行酷暴之刑盛夏為霜所由致也父母生我窮則呼天疾痛則呼父母人之情也胡俾我病不先不後訛言之人好醜之言皆從口出大夫憂心愈愈然反有所見侵侮也憂心惸惸然念我無祿祿者居官食廩福慶之事故謂福祜為祿人之無罪并其臣僕而戮之王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺凡十等也哀我人斯于何從而得天祿乎瞻烏爰止于誰之屋烏猶知集富人之屋以求食民心向背可不懼哉瞻彼中林侯薪侯蒸當有大木而維薪蒸小人在朝之喻也民今方危視天夢夢然而昏亂人之為惡若足勝天然福善禍淫其應如響天之定未有不勝人者有皇上帝其果憎善耶其果憎惡耶謂山蓋卑者而為岡為陵以小人而為君子也民之訛言必有所起寧莫之懲乎王之不尚道德侮慢長老召彼元老宿舊有德者但問之占夢之事君臣俱曰我聖矣賢愚無别如烏誰能知其雌雄者天髙矣雷霆之威不敢不曲其脊以敬之地厚矣陷溺殺人不敢不纍其足以畏之言上下可畏如天地然雖民號呼而發此言實有道理哀哉今人何故為此虺蝪之毒也瞻彼阪田墝埆之地有菀然其茂特之苖如挺然秀異之賢也天以風雨迅疾動搖我苗如將不我特苖之能勝則苖烏能生乎王之求賢其初如恐不我得及其既得徒執留我謷謷然亦不我在位功力之求用賢之不誠害賢之日至大夫所憂也心之憂矣如物之纒結今兹之政胡然厲惡之方張燎田之火方盛寧或滅之滅之者水也赫赫宗周褒姒滅之滅之者以有彼褒國之女幽王惑焉而以為后大夫知其必滅周也滅呼悅反自終其永懷以下皆以商人之載大車展轉為喻終其長懷思之國𫝑如商行之遇雨而窘困其車既載乃棄爾之車輔則隳敗汝之車載矣然後請長者助我不亦晚乎大車牛車也輔可解脫之物如人縳杖于輻以防輔車也無棄爾之車輔益于爾之輪輻又數顧念爾將車之僕能若是則輔益車輻僕能勤御得不隳敗爾之車載矣商人留輔顧僕之故終用是踰度陷絶之險曾不以是輔僕為意乎言王當親賢用相相能幹職則得不顛覆爾之王業也魚在于沼為人所驚駭不得逸遊潛處雖伏深淵之下亦甚照照易見不足以避網罟之害喻賢者之進退不得其所也憂心慘慘念國家之為暴虐彼有旨酒又有嘉殽唯知以此協和親比其鄰近之左右與妻黨之昏姻共相周旋而已王既不能親親以及遠國家將有危亡故念我獨憂王此政兮憂心殷殷然痛佌佌小人方有室屋之富矣蔌蓛然窶陋者方有爵祿之貴矣民今之無天祿而又夭殺椓破之哿彼富人富人猶可也哀哉惸獨其何以聊生乎十月之交朔日辛卯日有食之亦孔之醜彼月而微此日而微今此下民亦孔之哀日月告凶不用其行四國無政不用其良彼月而食則維其常此日而食于何不臧􅏎􅏎震電不寧不令百川沸騰山冡崒崩髙岸為谷深谷為陵哀今之人胡憯莫懲皇父卿士番維司徒家伯維宰仲允膳夫棸子內史蹶維趣馬楀維師氏豔妻煽方處抑此皇父豈曰不時胡為我作不即我謀徹我牆屋田卒汙萊曰豫不戕禮則然矣皇父孔聖作都于向擇三有事亶侯多藏不憖遺一老俾守我王擇有車馬以居徂向黽勉從事不敢告勞無罪無辜讒口囂囂下民之孽匪降自天噂沓背憎職競由人悠悠我里亦孔之痗四方有羡我獨居憂民莫不逸我獨不敢休天命不徹我不敢效我友自逸日月之食皆異也月本有虧盈又或為日光所掩而食雖異也猶可言也至若日之食則為月所掩矣隂勝陽之象也孰有不臧于此乎正陽之月君子忌之謂其四月純陽隂慝未興乃用幣伐鼓而昭十七年季平子以為止也此其無君之心發見于言者彼豈誠不知正陽之為四月而大史姑婉其言以救正之而又不從昭子明譏其異志且夫二至則長短極若相過二分則晝夜等類同道故交㑹而食亦安在其不為災乎日君象也而若有食之謂之不為災可乎而左氏所傳昭二十七年梓慎之語又有二至二分不為災之說皆雷同邪說也况周之十月夏之八月以其時亦秋分也詩人謂之不臧眀乎此則忠邪之說判矣十月之交日月之交㑹有交㑹而不食者陽盛也交㑹而食者陽微也交㑹而頻食者尤微弱之徴而災異之非常也今此十月之朔其日辛卯而日有食之陽微隂盛亦甚惡矣彼月有時而虧則微固其所此日而微則非其常天災既甚國之將亡民其不可哀乎日月之示變不用其行度遲速亡常由四國之無政不用善人也月食則常矣春秋不書月食一何不善乎春秋凡書三十六其災異不止此又有曄曄之雷電其聲過常不安不善百川沸出而騰湧山頂崔嵬者皆崩壞矣髙大之岸退為深谷深下之谷進出為陵哀今之人何曾莫懲艾此也國語幽王二年三川震皇父卿士而下歷數不用其良之事皇父家伯仲允皆字也家或氏也番棸蹶楀皆氏也卿士總六官之事者疏云卿之有事者司徒掌邦教冡宰百官總焉謂之冡列職于王則稱大膳夫掌飲食內史掌爵祿廢置殺生豫奪之法趣馬掌馬政師氏掌司朝得失之事七子之用由褒姒以色寵于內而女謁行抑此皇父以下則專指皇父而刺之謂小人在朝皇父尸之也皇父自以所為為是向者東都畿內之邑皇父欲為都邑于此而咈人心者多矣何為欲興動我役而不就我謀徹我牆屋汙萊我田疇示其必往也乃曰豫不戕汝下供上役禮則然矣皇父愚而自以為聖其為都于向也畿內諸侯二卿而擅立三卿又擇三有事信維多藏好貨之人不强留一老以守我王自矜形𫝑一時盡將至向以為誇不忠不敬之甚而擇民之富有車馬者皆率居向以實其邑其恣愈甚矣大夫以為我之自勉以從王事不敢告勞無罪無辜而見讒口衆多下民之孽匪降自天言皆由小人噂噂而聚談沓沓而猥并背相憎逐皆小人相親相昵相疑相惡之情狀主力能為此禍亂者非天也里㾖字病也悠悠我㾖亦甚痗矣久且大之詞也四方有羡我獨居憂民莫不逸我獨不敢休甚言巳之憂困勞苦而凡民之不如非幽王之時人皆羡逸也天命不徹則窮而不通矣士有潔身而去者大夫或王朝之親屬心不能巳故勉而不逸曰我不敢效我友之自逸也浩浩昊天不駿其德降喪饑饉斬伐四國旻天疾威弗慮弗圖舍彼有罪既伏其辜若此無罪淪胥以鋪周宗既滅靡所止戾正大夫離居莫知我勩三事大夫莫肯夙夜邦君諸侯莫肯朝夕庶曰式臧覆出為惡如何昊天辟言不信如彼行邁則靡所臻凡百君子各敬爾身胡不相畏不畏于天戎成不退饑成不遂曽我􅉏御憯憯日瘁凡百君子莫肯用訊聽言則答譖言則退哀哉不能言匪舌是出維躬是瘁哿矣能言巧言如流俾躬處休維曰于仕孔棘且殆云不可使得罪于天子亦云可使怨及朋友謂爾遷于王都曰豫未有室家鼠思泣血無言不疾昔爾出居誰從作爾室浩浩然廣大之上天曷不長其生我下民之德乎而降此喪亂饑饉以斬伐我四國榖不熟曰饑蔬不熟曰饉昊天乎其威孔疾曽弗之慮曽弗之圖呼天即呼君也舍彼有罪既伏其辜者若此無罪之人乃淪相以鋪遍俱入于刑辟韓詩云薰胥以痡周宗者姬姓之宗滅亡之形既見靡所止定六官之長曰正大夫則相率而去位矣其下大夫勞于從事三事大夫三公暨大夫也莫肯夙夜無在公之節邦君諸侯莫肯朝夕無尊王之禮庶幾王之用善乎及出而為惡曾莫之懲也如何昊天法度之言曽莫肯信如彼行道而恣往則靡所至極凡百君子各敬爾身胡不相畏不畏于天世雖昏亂君子不可以為惡自敬故也東方朔曰烏可以不修身乎哉戎兵之已成不能禦而退之饑困之巳成不能遂而安之曾我侍御之狎習者憯憯日以憂瘁凡百君子乃莫肯用誠于訊告言王之昵小人而逺君子也君子既見疏于王王有問而欲聽之言則答之而巳一有譖言及巳則皆退而離居矣哀哉亦非君子之不能言也匪出于舌之難而出于舌則得禍于其躬而躬瘁矣可矣世之所謂能言者巧言從俗如水之流使其身處于休美之地小人佞而獲福孔子之所謂鮮矣仁者維曰于仕乎甚急且危不可仕也云不可使者乃直道得罪于天子亦云可使乃枉道怨譏于朋友君子直而不枉所以孔棘且殆也君子閔周之將亡有去者有居者如鄭武公之寄孥與賄于虢鄶之屬故大夫招之入居王都以係天下之心其辭曰謂爾遷于王都爾則曰豫末有室家我用鼠思而憂思無聲而泣血無言不疾痛則又告之曰昔爾出居誰從作爾室茍有意遷居王都豈患無家室乎旻天疾威敷于下土謀猶回遹何日斯沮謀臧不從不臧覆用我視謀猶亦孔之卭翕潝䚹訿亦孔之哀謀之其臧則具是違謀之不臧則具是依我視謀猶伊于胡底我龜既厭不我告猶謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道哀哉為猶匪先民是程匪大猶是經維邇言是聽維邇言是爭如彼築室于道謀是用不潰于成國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾如彼泉流無淪胥以敗不敢暴虎不敢馮河人知其一莫知其他戰戰兢兢如臨深淵如履薄冰按此萹永樂大典缺卷
