body:
  text: 毛詩講義卷九宋林岊􅁧周頌於穆清廟肅雝顯相濟濟多士秉文之德對越在天駿奔走在廟不顯不承無射於人斯於乎美哉有清明聖德文王之廟其祀之也助祭之諸侯肅敬雝和顯明相助多士威儀又濟濟焉凡助祭者實皆秉持文王之德對於文王在天之精神洋洋乎如在其上其左右而無愧駿疾奔走在此清廟以執豆籩文王之德豈不顯於後乎豈不承於人乎信矣文王之可思慕者無有厭射於人也思齊之雅曰古之人無斁譽髦斯士又曰無射亦保蓋至誠無射之理行之於身而四方所則萬世所仰文王無射於身而天下無射於文王感化之機皆自清明純一中來維天之命於穆不已於乎不顯文王之德之純假以溢我我其收之駿惠我文王曾孫篤之維上天之命於乎美哉命我周家無有窮已者蓋以於乎美哉我甚顯文王之德純亦不已即天所爲故得天之命假大而洋溢於我後人我後人其思所以受之又當疾順我文王之德惟爾子孫世益厚之維清緝熈文王之典肇禋迄用有成維周之禎維此清明緝續熈廣者文王之典則肇始禋祀至用有成其成雖當武王之世禎祥已見於文王矣王天下者得禋祀昊天上帝故舉肇禋以言之烈文辟公錫兹祉福惠我無疆子孫保之無封靡于爾邦維王其崇之念兹戎功繼序其皇之無競維人四方其訓之不顯維德百辟其刑之於乎前王不忘成王之意若曰我功烈文章之諸侯以辟公稱自公而下皆君人者也文王武王錫汝祉福使我爲天子而汝爲諸侯其思惠順無疆而子孫共保之無封以專利無靡以傷財於爾之邦國維思王室是尊崇之所謂國不以利為利而以義為利孟子曰未有仁而遺其親者也未有義而後其君者也念此前人之大功為人子孫繼承其序當思所以益大之無競彊乎得人得人則四方其訓之矣莫顯明乎修德修德則百辟其法之矣於乎凡我告戒之言皆前王所念而不釋者汝諸侯不可忘之茍不忘前王之意則前王亦不忘汝諸侯矣辭簡意備可深味之天作髙山大王荒之彼作矣文王康之彼徂矣岐有夷之行子孫保之言天生此高大之岐山大王自豳遷焉大王荒大而奄有之亦既配天而作興之矣文王從而安之文王既逝矣此周人之世載夷易之行凡我子孫其保之勿替也昊天有成命二后受之成王不敢康夙夜基命宥宻於緝熈單厥心肆其靖之言昊天有成命文王武王受之於天將成其王業不敢康寧夙夜基天之命宥深而靜宻於乎又緝而續之熈而廣之盡其心焉是其所以定天命也書曰及天基命定命我將我享維羊維牛維天其右之儀式刑文王之典日靖四方伊嘏文王既右享之我其夙夜畏天之威于時保之按此篇永樂大典缺卷時邁其邦昊天其子之實右序有周薄言震之莫不震疊懷柔百神及河喬嶽允王維后明昭有周式序在位載戢干戈載櫜弓矢我求懿德肆于時夏允王保之言武王之時邁其邦國以巡守也昊天實以武王爲子而右序我有周故武王薄言震動之而諸侯莫不震疊不惟人心畏服又爲山川百神之主其懷柔百神及河喬嶽各得其所信武王能盡爲君之道也天以武王爲子而又明昭我有周故武王式序諸侯之在位者當其分爵建官已序在位矣而巡守之時又以慶罰黜陟之典序之示之以偃武修文始戢干戈始包弓矢我求懿德使廣陳于中國信乎王之能保天下也或曰夏大也歌之大者曰夏故周禮有九夏而注者云肆夏時邁繁遏執競渠思文其拘於時邁所謂肆于時夏思文所謂陳常于時夏乎恐未必然也執競武王無競維烈不顯成康上帝是皇自彼成康奄有四方斤斤其明鐘鼓喤喤磬筦將將降福穰穰降福簡簡威儀反反既醉既飽福祿來反言持其自强不息之心者武王也所以有莫强之功烈豈不甚顯乎其成王業安天下者上帝所以是皇美之自其成王業安天下覆有四方斤斤明察無所不至所謂光天之下今我祭祀盛禮而備樂鐘鼔喤喤而和磬筦將將而集神降之福穰穰而衆簡簡而大樂之制本於武王之功成也故以樂祀武王而𫉬福耳威儀反反謹重之意也亦不一也神既醉飽獻酬胙燕幽明俱協禮無違者神降之福與祿來反來復其至未艾禮之制本於武王之治定故以禮祀武王而𫉬福祿耳思文后稷克配彼天立我烝民莫匪爾極貽我來牟帝命率育無此疆爾界陳常于時夏思語辭也言有文德之后稷能配上天存立我天下衆民之命民有穀食復其常性是莫非於爾后稷得其中正也人莫不有極聖人非能與人以極而富庶教之所以使之全其極故曰錫汝保極也后稷貽我民以來牟之種此乃承天之命率育斯民無有此疆彼界之殊而陳布常道於中國也所謂常即極也牟麥也麥為百穀之長備四時之氣思文臣工兩言之凡嘉種皆天錫之而稷能知之以教民耳非獨一種為嘉而他種非嘉非獨麥為天降而他非天降也嗟嗟臣工敬爾在公王􅁵爾成來咨來茹嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥明明昭上帝迄用康年命我衆人庤乃錢鎛奄觀銍艾嗟嗟我臣工嗟嗟我保介不直指諸侯之身而以其卿大夫與其車之副右言之所以警切之也凡爾諸侯在公之事所當肅敬王既錫爾成法矣爾有所疑來咨謀來茹度今兹祭畢暮春之時諸侯歸國所求亦又何者為急乎二歲之田曰新三歲之田曰畬當問其如何而新如何而畬以究人力所當施也於乎皇美哉昔我周家開國天命后稷教民稼穡有來牟之嘉種以為百穀之先熟所以大受天之明命者在是而后稷能明昭上帝之命迄至於今用成康年也康樂歲也爾諸侯其思此而勤此命我衆人各具錢銚鎛鎒以治田奄忽之間則已觀穫艾矣噫嘻成王既昭假爾率時農夫播厥百穀駿發爾私終三十里亦服爾耕十千維耦按此篇永樂大典缺卷振鷺于飛于彼西雝我客戾止亦有斯容在彼無惡在此無斁庶㡬夙夜以永終譽言二王之後其來助祭有潔白之德威儀之善如振振羣飛之鷺于彼西澤也在彼無惡者謂居其國無怨惡之者能自賢也夏商之季民共嫉之矣而其後能自賢焉民亦無惡之矣在此無斁者能崇德象賢也商之當代既與天下共亡之矣而視其子孫之賢者使之統承先王修禮為賔厚之至也豈有厭乎故其來朝周人愛之所謂在此無斁又曰庶㡬夙夜以永終譽所謂與國咸休永世無窮愛之至也豐年多黍多稌亦有高廩萬億及秭為酒為醴烝􅂌祖妣以洽百禮降福孔皆言豐年之多黍多稌或高或下無有不熟黍冝高燥稌宜下濕無所不利也廩所以藏穗兼藏米穀數萬至萬曰億數億至億曰秭為酒為醴進與祖妣以和洽百禮者上帝之力也有瞽有瞽在周之庭設業設虡崇牙樹羽應田縣鼔鞉磬柷圉既備乃奏簫管備舉喤喤厥聲肅雝和鳴先祖是聽我客戾止永觀厥成按此篇永樂大典存原注云林氏講義缺猗與漆沮濳有多魚有鱣有鮪鰷鱨鰋鯉以享以祀以介景福猗與歎美之辭也漆沮岐周之二水鮪如鱣春始浮陽而西入河上龍門而入漆沮按河南鞏縣東北崖上山腹有穴自春始出古者積柴養魚曰槮亦曰糝濳有多魚取之深也鱣大鯉也鮪鮥也鰷白鰷鰋鮎也以享以祀以介景福介助景大也牲之大者牛羊味之多且㫖者莫如魚祭祀所重有來雝雝至止肅肅相維辟公天子穆穆於薦廣牡相予肆祀假哉皇考綏予孝子宣哲維人文武維后燕及皇天克昌厥後綏我眉壽介以繁祉既右烈考亦右文母言有來雝雝而和至止肅肅而敬者諸侯之助祭也天子主祭而穆穆可見王中心無為守至正之意於乎美哉薦此大牡以相予之陳祀大牡碩大肥腯之謂相祀而薦此所謂得四海之歡心也大哉皇考武王乎綏我孝子之心其人明哲其君文武燕安格於皇天克昌其後綏我以眉壽助我以繁祉昌字陸音倡處亮反故我得享王業居王位而行禘禮然推其所自來既得右助於烈考文王亦得右助於文母太姒也禮不王不禘成王於禘之時推其所自於武王以武王實得天下故詳於歸功而本之文王太姒焉載見辟王曰求厥章龍旂陽陽和鈴央央鞗革有鶬休有烈光率見昭考以孝以享以介眉壽永言保之思皇多祐烈文辟公綏以多福俾緝熈于純嘏言諸侯始見乎君王曰求法度文章以歸治其國家其交龍為旂陽陽然有文和在軾前鈴在旂上懸於竿央央有聲鞗革轡首以金飾之有鶬法度休美而有烈大光明也成王率之見於昭考太祖居中左昭右穆文王當穆武王當昭康誥曰穆考文王此昭考武王也以致孝子之事以獻祭祀之禮以助眉壽永言保之思美多福是因諸侯之助祭而𫉬此福也則又曰烈文辟公乎我則綏安爾多福俾爾緝續熈廣於純大之福嘏是均福於諸侯之辭也皇極之主且錫福於庻民而况諸侯乎祜言其祐也福言其順也嘏言其祝也有客有客亦白其馬有萋有且敦琢其旅有客宿宿有客信信言授之縶以縶其馬薄言追之左右綏之既有淫威降福孔夷殷尚白㣲子為周之客乘商之服色威儀萋萋且且盡心力於其事又選擇衆臣卿大夫之賢者與之朝王言敦琢者以賢美之故以玉言之一宿曰宿再宿曰信宿宿信信思授之縶以縶其馬愛之也追之恐其已去也綏之安之無已也末章又述興亡之大者而言曰天之亡商而興周既有大威命矣以周之子孫而王以商之子孫而為賔其降福孔甚夷易而不可不思所以共享天休也於皇武王無競維烈允文文王克開厥後嗣武受之勝殷遏劉耆定爾功於乎美哉武王無競之功信有文德哉文王能開其後也文王既開之矣武王嗣而受之勝商止殺以致定其大功耆音指致也樂記所謂賔牟賈問武之曲折爲詳學者可以參考大抵武王之武本於文王之文而其不得已用兵者所以止殺一戎衣而天下定矣閔予小子遭家不造嬛嬛在疚於乎皇考永世克孝念兹皇祖陟降庭止維予小子夙夜敬止於乎皇王繼序思不忘閔悼傷之言閔予小子遭家道未成嬛嬛然在憂病之中於乎我皇考長世在孝維念我皇祖文王一陟一降直而無私曰予小子夙夜敬止於乎皇王嘆文王武王也予既繼承其序其思前人之所行而不敢忘於心歟匡衡曰成王喪畢思慕意氣未能平也所以就文武之業崇大化之本訪予落止率時昭考於乎悠哉朕未有艾將予就之繼猶判渙維予小子未堪家多難紹庭上下陟降厥家休矣皇考以保明其身言訪謀我之落始率循是昭考武王之道於乎悠哉昭考之道逺矣朕未有所艾厯也將予勉强從之思以繼紹而猶覺判渙未合曰予小子未堪家之多難其維繼紹昭考庭直之道以上下陟降於厥家乎家而國國而天下同此也休矣皇考之道其以是保明其身乎鄭以為訪予落止成王之謀羣臣也率時昭考羣臣之為成王謀也於乎悠哉成王答羣臣之以謙也所謂陟降庭止武王念文王之庭直也紹庭上下成王紹武王之庭直也鄭以為紹文王之庭於理一於詞未通敬之敬之天維顯思命不易哉無曰高高在上陟降厥士日監在兹維予小子不聰敬止日就月將學有緝熈於光明佛時仔肩示我顯德行羣臣之進戒嗣王而頌者述其意耳言羣臣之言若曰敬之哉敬之哉天惟顯明其命甚難忱哉無曰高高在上去人甚逺而怠於敬也王之一陟一降於其事天實日監臨在此也成王之答羣臣若曰惟我小子本不聰察其所以為敬之之道日就月將庶㡬勉强緝續熈廣於此一性之光明以聰其敬茍聰其敬則知之至行之力其不待勉强而樂於循理者在是亦維爾羣臣輔弼於我大克示我以顯顯之徳行而使我聰達所謂顯顯德行非他也即前所言天之顯思王之陟降者皆是也成王欲聰其敬而知羣臣之進戒合天人於一致者所以為顯顯德行故賛美之毛以仔肩為大克者亦是賛美之意成王論成王務學之君也論成王之學者在緝熙于光明夫有天下之聰明有一已之聰明天下之聰明公也一已之聰明性也孔子序書以堯為聰明文思謂舜為堯聞之聰明而舜典曰明四目逹四聰臯陶謨曰天聰明自我民聰明商書曰視逺惟明聴徳惟聰此公天下之聰明也然聰明非外至也至於成王講學之精因羣臣之進戒言天理之顯思乃復之以惟予小子不聰敬止日就月將學有緝熙於光明夫緝熙不於他而於我之光明是性一已之聰明也人君之性禀之天者本清資之人則益粹然不知所以自求諸我則學無用力之地吾性天也吾性有光明而不緝熈其光明焉則耳之聴者或非德矣目之視者或非逺矣是自蔽其天也故緝云續也熈云廣也文王之緝熈敬止成王之緝熈單厥心皆緝熈也而惟緝熈于光明于講學性分之功為深切成王之聰見于信周公而去管蔡荓蜂之戒凛乎自懼憑几之言朗然不亂使其進進不已是堯之光被四表格于上下文王之光于四方顯于西土者也或曰聰明與光明異乎曰自天下言之以視聽為公自一性言之惟其光明則明目達聰皆在是焉而已矣此成王所以緝熈而先之曰不聰敬止乎予其懲而毖後患莫予荓蜂自求辛螫肇允彼桃蟲拚飛維鳥未堪家多難予又集于蓼予其懲創前日㓜冲之時信管蔡而疑周公自今以始其謹後患乎莫予前日之為是使蜂自毒其身也始信桃蟲之鳥始小終大不敢不毖也以予之未堪家多難而予又集於辛苦之地其敢不求助而羣臣可不助我哉成王之所懲者不獨管蔡也凡事之過舉皆懲而事之小者皆謹也載芟載柞其耕澤澤千耦其耘徂隰徂畛侯主侯伯侯亞侯旅侯彊侯以有嗿其饁思媚其婦有依其士有畧其耜俶載南畝播厥百穀實函斯活驛驛其達有厭其傑厭厭其苗緜緜其麃載穫濟濟有實其積萬億及秭爲酒爲醴烝􅂌祖妣以洽百禮有飶其香邦家之光有椒其馨胡考之寧匪且有且匪今斯今振古如兹載始也除草曰芟除木曰柞土氣烝逹而和耕之則澤澤然千耦趨時耘去其草木之根株或往之下濕之隰或往之徑路之畛畔侯維也主家長也伯長子也亞仲叔也旅子弟也彊有餘力者也以閒民賃力相助者也有衆饋饟飲食之聲其夫思愛其婦其婦有依其夫相勞苦之情也既耘矣乃以有利其耜始載于南畝以測土而又深耕之以播其百榖其所播之種實函生氣而活也所謂秧針也於是其苗則驛驛其逹矣出地曰達有厭然而傑出者厭厭其苗則是皆秀也既苗而耘緜緜然所謂是麃是蓘也奄觀銍艾苗皆實矣穫之濟濟穂衆難進必有條理有實之多萬億及秭為酒醴以與祖妣洽百禮祭祀賔客皆洽矣有飶芬香邦家之光有椒芬芳夀考之寧謂以饗祀燕賔養老也匪特此日有此今日如今乃自古而如此所由來者逺矣其成民而後致力于神不敢徒必於祭祀細味此詩可見畟畟良耜俶載南畝播厥百穀實函斯活或來瞻女載筐及筥其饟伊黍其笠伊糾其鎛斯趙以薅荼蓼荼蓼朽止黍稷茂止穫之挃挃積之栗栗其崇如墉其比如櫛以開百室百室盈止婦子寧止殺時犉牡有捄其角以似以續續古之人測測然善利之耜始載南畝播厥百穀實函斯活矣或來瞻視女農夫於田則載筐及筥盛黍以饟饁見其笠之糾然輕舉其刺田之器曰鎛可以趙刺以是薅拔荼蓼水陸繁穢苦辛害穀之草言閔其勞苦也荼蓼既去耕耘之功盡黍稷乃茂挃挃穫之聲栗栗積之象髙如城雉廹如櫛齒開百室而納之盈止終歲勤動婦子於今寧止於是殺牲報祭社稷黄牛黑唇曰犉社稷之牛角尺角之貌捄然無害也以似以續興來繼往也續古之人庶㡬不替其先也絲衣其紑載弁俅俅自堂徂基自羊徂牛鼐鼎及鼒兕觥其觩㫖酒思柔不吳不敖胡考之休按此篇永樂大典缺卷於鑠王師遵養時晦時純熈矣是用大介我龍受之蹻蹻王之造載用有嗣實維爾公允師言於乎鑠美哉周王之師方其在文王也遵循自養因時之晦及夫武王之時天命去商人心歸周乃其天時之純於熈明廣大矣是用人心大介助之我武王乃龍興受之應天順人蹻蹻其功造而有天下也始用有傳以俾有嗣實維爾公允信乎師衆以周伐商非大公至正信乎天下何以使人悅服哉此文武之意也綏萬邦屢豐年天命匪解桓桓武王保有厥士于以四方克定厥家於昭于天皇以間之武王之以征伐代商也勝殘去殺所以召天地之和故曰綏萬邦屢豐年其與軍旅之後必有凶年者不同矣威哉武王保有其熊羆之士用之四方克定我周家之王業於乎昭明於天矣乃大以間商也文王既勤止我應受之敷時繹思我徂維求定時周之命於繹思大抵周之詩人與其君一出言不敢忘其先武王之意若曰文王既勤其德以造周邦我應受其成命敷時繹思止與思皆語辭徧是陳繹之我今以往惟求安定天下是周家得天之命在是於乎不可不陳繹之也武王蓋以是自勉而勉羣臣爾文武之基命同乎緝熈緝續也熈廣也武王之受文命兩言繹思繹陳也紬繹而繼其勤也維勤乃能繼王業而安天下此心一或少怠則無所不至善人天地之紀其不與我共繹之乎於皇時周陟其高山嶞山喬嶽允猶翕河敷天之下裒時之對時周之命言於乎大哉是我周家之巡狩也陟其高山謂至一方嶽也至於嶞小之山喬高之嶽徧四嶽也允猶翕河謂祀河海也允信其謀猶而思合翕河海之神以祀之是山川之神皆寧也徧天之下裒聚百神而對答之是我周家得天之命故行此禮也諸侯則祭與望皆不出於其境矣
