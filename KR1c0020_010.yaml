body:
  text: 毛詩講義卷十宋林岊撰魯頌駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黃以車彭彭思無疆思馬斯臧駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾思無期思馬斯才駉駉牡馬在坰之野薄言駉者有驒有駱有駵有雒以車繹繹思無斁思馬斯作駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車祛祛思無邪思馬斯徂駉駉然腹幹肥張者所牧養之良馬也在坰之野邑外曰郊郊外曰牧牧外曰野野外曰林林外曰坰一章薄言駉者驪馬白跨曰驈黃白曰皇純黑曰驪黃而微騂曰黃出車彭彭有力有容由僖公之思無疆竟故馬斯善也二章蒼白雜毛曰騅黃白雜毛曰駓赤而微黃曰騂青而微黑曰騏出車伾伾有力由思無期故思馬斯才也三章青驪驎曰驒白馬黑鬛曰駱赤身黑鬛曰駵黑身白鬛曰雒出車繹繹善走由思無斁厭思馬斯可用也一曰始也俶也四章隂白雜毛曰駰彤白雜毛曰騢一目白曰瞷兩目白曰魚豪毛在骭而白長曰驔出車袪袪強健由思無邪思故思馬斯往也孔云一章良馬朝祀所乘二戎馬齊力三田馬齊足四駑馬給雜使貴肥壯思無邪三字乃聖人取以斷三百篇然則史克古之立言者與有駜有駜駜彼乘黃夙夜在公在公明明振振鷺鷺于下鼓咽咽醉言舞于胥樂兮有駜有駜駜彼乘牡夙夜在公在公飲酒振振鷺鷺于飛鼓咽咽醉言歸于胥樂兮有駜有駜駜彼乘駽夙夜在公在公載燕自今以始歲其有君子有穀詒孫子于胥樂兮四馬曰乘有駜然肥強乘黃之馬升髙致逺得為人用猶僖公之羣臣有賢能也早夜在于公所明德明義所以為賢臣也振振然羣飛潔白之鷺下而集止猶僖公之羣臣集止君朝相與間暇燕飲也以鼓節樂其聲咽咽至于無算爵而醉為君起舞以盡其歡君臣皆喜樂兮二章既下而飛喻醉而欲退也醉而言歸則不失德矣三章青驪曰駽君臣有道可致隂陽和順從今以為初始歲其當有豐年僖公之善道可以遺其子孫故于是君臣皆喜樂兮詩言在公載燕因即據燕為今思樂泮水薄采其芹魯侯戾止言觀其旗其旗茷茷鸞聲噦噦無小無大從公于邁思樂泮水薄采其藻魯侯戾止其馬蹻蹻其馬蹻蹻其音昭昭載色載笑匪怒伊教思樂泮水薄采其茆魯侯戾止在泮飲酒既飲旨酒永錫難老順彼長道屈此羣醜穆穆魯侯敬明其德敬慎威儀惟民之則允文允武昭假烈祖靡有不孝自求伊祜明明魯侯克明其德既作泮宫淮夷攸服矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚濟濟多士克廣德心桓桓于征狄彼東南蒸蒸皇皇不吳不揚不告于訩在泮獻功角弓其觩束矢其搜戎車孔博徒御無斁既克淮夷孔淑不逆式固爾猶淮夷卒獲翩彼飛梟集于泮林食我桑黮懷我好音憬彼淮夷來獻其琛元龜象齒大賂南金泮宫之外水中有芹人言已思樂往泮宫之水薄采其芹公之來此泮宫也我觀其旗文章法度茷茷然鸞則噦噦有聲車服得宜行趨中節魯之臣民無小無大皆從公往行而至泮宫言公之賢人樂見之也藻茆亦水菜也或曰茆蓴也或曰鳧葵也人樂觀化非止采菜既采其菜又觀其化甚言樂之也馬蹻蹻而強壯德音昭昭而明毛云色溫潤鄭云和顔色而笑語非有所怒於是教化魯侯至泮召先生君子與之行飲酒之禮天與以難老之福而順彼仁義之長道以收此羣衆人民頌之之辭也先生卿大夫致仕者君子有德不仕者鄉飲鄉射之禮皆以明日息司正而行小飲徵唯所欲告於先生君子古者天子將出征受命於祖受成於學定兵謀也諸侯之禮亦然鄭箋以羣醜為淮夷因飲酒而謀事序謀行伐克之由穆穆然美哉魯侯敬明其德又敬謹其舉動威儀內外皆善維為下民之所法則信有文矣信有武矣昭假于功烈之祖備美而格先蓋靡有不孝不恭而能自求伊祜也明明然有明德之魯侯能明其德既為泮宫以行德化謀伐淮夷淮夷順服其有功而歸也矯矯然威武如虎之臣在宫之內獻其截耳之馘善問獄如臯陶者又獻其所執之囚服罪之人生執而係虜之則執訊者也察獄之吏受其辭而斷其罪濟濟多士謂羣臣也克廣其德心以上廣其君之德心威武其征伐之容逺服彼東南淮夷之國多士之德蒸蒸然而厚皇皇然而美不為過誤不有捐傷于軍旅之間更無忿競其歸也不有告于有司爭訟之事惟獻其戰功而已角弓以下言淮夷望而即服角弓其觩然弛而不張束矢其搜然衆而不用其兵車甚博大徒行御車之人皆敬其事無厭倦者既能克服淮夷甚化於善而不復為逆亂由僖公用能謹固其所謀之道故淮夷盡獲其心服也翩彼飛梟惡聲之鳥亦知集于我泮水之林食我桑實就我好音喻不善之人感恩惠而從化憬然而逺行者是彼淮夷來獻其國大龜尺二寸象齒南金特舉貴者而言非唯此等也南金出於荆揚其金三品則王肅以為金銀銅鄭玄以為青白赤而爾雅黃金之美曰鏐白金曰銀大賂者賂君及卿大夫襄二十五年齊人賂晉侯自六正五吏三十帥及處守者皆有賂閟宫有侐實實枚枚赫赫薑嫄其德不回上帝是依無災無害彌月不遲是生后稷降之百福黍稷重穋稙稚菽麥奄有下國俾民稼穡有稷有黍有稻有秬奄有下土纘禹之緒后稷之孫實維大王居岐之陽實始翦商至于文武纘大王之緒致天之屆于牧之野無二無虞上帝臨女敦商之旅克咸厥功王曰叔父建爾元子俾侯于魯大啓爾宇為周室輔乃命魯公俾侯于東錫之山川土田附庸周公之孫莊公之子龍旗承祀六轡耳耳春秋匪解享祀不忒皇皇后帝皇祖后稷享以騂犧是饗是宜降福既多周公皇祖亦其福女秋而載嘗夏而楅衡白牡騂剛犧尊將將毛炮胾羮籩豆大房萬舞洋洋孝孫有慶俾爾熾而昌俾爾壽而臧保彼東方魯邦是常不虧不崩不震不騰三壽作朋如岡如陵公車千乘朱英緑縢二矛重弓公徒三萬貝胄朱綅蒸徒增增戎狄是膺荆舒是懲則莫我敢承俾爾昌而熾俾爾壽而富黃髮台背壽胥與試俾爾昌而大俾爾耆而艾萬有千歲眉壽無有害泰山巖巖魯邦所詹奄有龜蒙遂荒大東至于海邦淮夷來同莫不率從魯侯之功保有鳧繹遂荒徐宅至于海邦淮夷蠻貊及彼南夷莫不率從莫敢不諾魯侯是若天錫公純嘏眉壽保魯居常與許復周公之宇魯侯燕喜令妻壽母宜大夫庶士邦國是有既多受祉黃髮兒齒徂來之松新甫之柏是斷是度是尋是尺松桷有舄路寢孔碩新廟奕奕奚斯所作孔曼且碩萬民是若薑嫄之廟在周所閟之宫侐然清靜實實廣大枚枚礱密月朔四時祭所不及或因大祭而别祭之其在魯也禖宫歟赫赫顯著者薑姓之女名嫄其德貞正不回邪天用依其所生之子在母之時無災殃患害終人道十月而生之不遲晚乃是后稷降以百福使有明哲之性曉稼穡之事與之黍與之稷先種後熟之重後種先熟之穋先種之稙後種之稚及菽之與麥天與衆穀令稷種之同有天下諸國使民知稼穯之道言其所有又有稻有黑黍同有天下之土以繼大禹之業大王自豳居岐山之陽實始有翦齊商家之兆文武繼大王之業於時商家暴虐天欲誅之武王乃致天之誅於牧野之地無二無虞上帝臨汝通天人為一也治商之臣民同成其功則周公相之也王曰叔父立爾元子伯禽使侯于魯大開爾居為周室輔侯於東方賜之境內山川土田并小國之附庸名山大澤不以封又公無附庸皆特賜之也周公之孫莊公之子僖公也交龍之旗承奉宗廟祭祀所乘四馬其六轡耳耳至盛春秋四時非有懈怠所饗所祀不有忒變皇皇后帝天也與皇祖后稷魯得祭者以成王命魯得郊耳明堂旗十二旒祀帝此之龍旗宗廟祭也饗以赤牛純色是饗是宜多與之福周公與皇祖伯禽亦其福汝秋而嘗祭夏而楅衡其牛設木于角以楅之使不抵觸又衡設於鼻白色之牡赤色之特白周公牲騂魯公牲也犧尊則將將然盛美大和中魯郡得齊大夫子尾犧尊乃尊為犧牛形王許宜反鄭素何反其饌則有去毛而炮之豚又有切肉之胾與登之大羮不和鉶羮菜和其食器有竹籩木豆大房之俎大房鄭以為玉飾俎足間有橫下有跗似乎堂後有房執干戚而萬舞者洋洋衆多頌者設詞慶之曰使汝得福熾盛而昌大使汝年命長壽而臧善安彼東方之國魯邦是其常有其堅固如山不可虧捐不可崩落其安靜如川不震動不騰涌國之三壽考之卿與為朋友又如岡如陵也上既美其祭祀鬼神此又美其用兵征伐公之兵車有千乘矣車上皆有三人右持朱色之英左持緑色之繩二矛載於車上皆朱為英飾重弓共在鬯中以緑繩束之又公之徒衆有三萬人以貝飾胄其甲以朱綅繩綴之蒸進之徒增增衆多西戎北狄以此膺之荆楚羣舒叛逆者以此懲創之軍之所征往無不克則無有敢禦止我者喜其討罪設辭慶之使汝昌大而熾盛使汝長壽而富足黃色之髮台文之背如此之人壽而相講試勇力竒其老而不衰也又重慶之使爾得福則昌而且大使汝年壽則耆而又艾使得萬有千歲為秀眉之壽無有患害也地雖廣大坊記云制國不過千乘兵車一乘甲士三人步卒七十二人千乘七萬五千人是六軍矣天子六軍出六鄉萬二千五百家為鄉萬二千五百人為軍諸侯三軍此云千乘計地出兵鄉之出軍是正故家一人計地則非常故成出一車春秋襄十一年經書三軍明已前無三軍鄭意以周公伯禽七百里合有三軍其實二軍誇言之耳又公徒三萬箋以三萬為三軍略其七千五百舉成數其實盛言之也僖四年齊伐楚十年齊伐北戎其從伯主之令歟泰山巖巖以下又言復宇之功泰山巖巖魯國所共瞻又有龜山蒙山包有極東之地至于近海之國淮夷來與之同服莫不相率而從中國魯侯之功也龜隂東蒙魯地泰山齊魯界海岱淮魯三望大東之國如邾莒滕杞歟安有其鳧山繹山嶧嶧陽也遂有是徐方之國至于近海之國淮夷為蠻貊之行者及彼南方之夷謂荆楚之國莫不相率而從于中國莫敢不應諾順從中國之命惟魯侯是順也天與之大福使有秀眉之壽而保有魯國居常邑與許邑皆鄙邑也許田魯朝宿之邑鄭伯常假之毛以常許為魯南鄙西鄙孔曰尸致福於主人皆謂之嘏復周公之宇復周公之故居也僖公燕飲而喜其燕于內寢則善其妻夀其母謂為之祝慶使妻善而母壽其燕于外寢則宜其大夫與衆士亦謂為之祝慶使與之相宜也邦國常保有之既多受福又有黃髮兒齒享有永年兒齒壽證也徂徠山之松新甫山之柏斬斷之量度之八尺之尋十寸之尺用松為桷舄然而大修其正寢甚寬大矣又新為閔公之廟奕奕廣大寢成則人安廟成則人悅言其興廢補敝也廟乃奚斯所為甚長而且大國人順之不憚劬勞也鄭以新廟為薑嫄其餘寢廟亦皆修之桷與榱椽之别名奚斯公子魚也商頌猗與那與置我鞉鼓奏鼓簡簡衎我烈祖湯孫奏假綏我思成鞉鼓淵淵嘒嘒管聲既和且平依我磬聲於赫湯孫穆穆厥聲庸鼓有斁萬舞有奕我有嘉客亦不夷懌自古在昔先民有作溫恭朝夕執事有恪顧豫蒸嘗湯孫之將樂器有鞉鼓有鐘有鼓有管有磬蓋湯伐桀興南之後功成所制樂其器雖因于虞夏而大濩之音則自成一代之樂矣鞉者樂之成也後世祀湯而頌其成功以樂舞言之其曰湯孫者成湯也言湯之為人子孫也其曰烈祖者謂湯之祖契冥相土之屬也其曰嘉客者虞夏之後及諸侯來助祭也猗與那與美湯之功多也湯之濩樂蓋命伊尹為之歌晨露九招六列以見其善植置同音鞉鼓如鼓而小以木貫而持其柄搖之旁耳自擊明堂曰楹鼓為楹貫而樹之也鼓聲簡簡和大奏以樂我有功烈之祖湯之奏樂以感格鬼神蓋欲綏我心之思成也鞉鼓則淵淵其聲深而逺聞矣管籥之聲則嘒嘒而清烈矣鐘鼓磬管俱為樂懸在下琴瑟在上而鳴球玉磬亦在堂上以為歌節玉聲清越以長樂本于聲而聲歌依于玉故虞書曰戛擊鳴球搏拊琴瑟以詠而商頌曰既和且平依我磬聲也於赫乎湯孫哉穆穆而美者其樂之聲也樂則有大鐘矣又有鼓矣斁然而盛執其干戈為萬舞者綴兆又奕然而間習我商家之嘉客其來助祭豈不怡悅而懌樂乎虞書曰虞賔在位羣后德遜即此之謂凡樂聲和平人心肅敬皆由溫恭于朝夕無事之時而恪祗于臨事之際此古曰在昔昔曰先民之所共守也其所興造見于禮樂皆由是也顧豫蒸嘗此一句變我為豫乃繼湯而頌乎湯者之言其意若曰豫今日之獲奉蒸嘗湯尚豫顧其將且大本之湯乎春祠夏礿秋嘗冬蒸詩人或取協韻而言耳嗟嗟烈祖有秩斯祜申錫無疆及爾斯所既載清酟賚我思成亦有和羮既戒既平鬷假無言時靡有爭綏我眉壽黃耉無疆約軧錯衡八鸞鶬鶬以假以享我受命溥將自天降康豐年穰穰來假來饗降福無疆顧豫蒸嘗湯孫之將按此篇永樂大典缺卷天命玄鳥降而生商宅殷土芒芒古帝命武湯正域彼四方方命厥后奄有九有商之先后受命不殆在武丁孫子武丁孫子武王靡不勝龍旗十乘大糦是承邦畿千里維民所止肇域彼四海四海來假來假祈祈景員維河殷受命咸宜百祿是何簡狄吞玄鳥卵此乃緯書不待辨矣毛曰春分燕降髙辛氏率有娀氏女祈于郊禖而生契故本其為天所命以玄鳥至而生焉孔曰春分玄鳥至氣候之常記其祈福之時故云天命玄鳥蓋嘗思之玄王桓撥契謂之玄也商人禘嚳而郊冥冥即玄冥亦謂之玄也鄭注冥契六世孫其官玄冥水官也春秋傳少昊以鳥名官有玄鳥氏豈其苗裔與不敢質也國語玄王勤商十四世而興鄭又信緯書云商水帝本黑帝汁光紀之精曰玄朱氏曰本玄鳥至之時祈福而生故曰玄天之命商自玄鳥至而有娀為帝嚳次妃祈福於髙禖之時矣契之生也佐禹治水而敷教堯封之商而賜姓曰子其宅居殷土芒芒而廣大商而曰商丘者商丘别地名閼伯居商丘相土代之自契至湯八遷而國號不改其實商者商人之國號湯以商受命猶周人以周受命耳商而曰殷者盤庚遷殷改號曰殷兼取二號而言之曰殷商不全改也商而曰亳者湯在亳地居郊特牲有亳社不舉代號舉湯所居見紂滅亡之紂滅之時則在朝歌書序契至湯八遷湯始居亳又曰盤庚五遷將治亳殷殷是亳地之小别名孔曰梁國有二亳南亳在穀熟之地即湯都北亳在蒙地即景亳湯受命地偃師為西亳即盤庚治亳殷所徙然則殷有三亳二在梁一河洛之間也漢地理志河南郡偃師縣有尸鄉湯所都總言之耳立政曰三亳阪尹鄭以為湯舊都之民分為三邑其長居險東成臯南轘轅西降谷分亳民為三處非三處有亳地杜預以景亳為周河南鞏縣西南有湯亭即偃師臣瓉云湯居亳濟隂亳縣有湯冢已氏有伊尹冢其説各異存之商而曰宋者地理志周封微子於宋今之雎陽本陶唐氏火正閼伯之墟高辛之伯子遷於商丘主辰其封域在禹貢徐州泗濵西及豫州盟豬之野微本采地名微子歸周武王克商先封於宋未得為殷後而武王即將畿內千里之地分國為三以其京師封紂子武庚為殷後置三監使管叔蔡叔霍叔尹而教之自紂城而北曰邶南曰鄘東曰衛成王時三監導武庚畔既殺武庚伐三監更於此建三國以殷餘民封康叔於衛為長又有邶有鄘二國後世子孫并而有之頃公之前然矣地理志又曰遷邶鄘之民於洛邑所謂餘民不遷者乎成王既黜武庚之殷命微子為殷後以奉承先王而為微子之命商之禮樂祭祀盡在宋矣河內本殷時畿內舊都封域在禹貢冀州大行之東北踰衡漳東及兖州桑土之野此鄭所譜也凡此皆學者所當考也自然謂之天主宰謂之帝帝即天也古帝命我聖武之湯湯本寬仁而以武稱者人君當有威斷耳帝之命湯也表正疆域彼四方方遍命乎羣后奄覆總有乎九有而商之先君后君也通天子諸侯而言其先君受天之命不至解怠者在武丁中興耳武丁為商孫子以威武之德王天下靡所不勝任實克負荷也以言其祭祀則有諸侯之助祭其車十乘而建龍旗以承其黍稷之粢盛古者諸侯舍車於館乘墨車以朝而龍旗不改以言其京邑則王畿千里之內民安其居商衰復興始推而正疆域於四海以言其天下則四海諸侯與其臣民來至者祈祈而衆多景大也員均也維何鄭本為河改云河之言何也其大且均維何哉信矣殷家受天之命慶無不宜而百祿是任在於契與湯為之祖而武丁為之孫子也濬哲維商長發其祥洪水芒芒禹敷下土方外大國是疆幅隕既長有娀方將帝立子生商玄王桓撥受小國是達受大國是達率履不越遂視既發相土烈烈海外有截帝命不違至于湯齊湯降不遲聖敬日躋昭假遲遲上帝是祗帝命式于九圍受小球大球為下國綴旒何天之休不競不絿不剛不柔敷政優優百祿是遒受小共大共為下國駿厖何天之龍敷奏其勇不震不動不戁不竦百祿是總武王載斾有虔秉鉞如火烈烈則莫我敢曷苞有三蘖莫遂莫達九有有截韋顧既伐昆吾夏桀昔在中葉有震且業允也天子降于卿士實維阿衡實左右商王濬哲者古聖人之明明德舜之所以為舜湯之所以為湯莫不在是堯之聰明文思舜之濬哲文明皆淵深而明知詩人述商之大禘蓋自嚳至契自契至相土自相土至湯總以濬哲維商言之商德大矣濬深也哲智也長發其祥其來久矣自堯之時洪水芒芒而大禹敷廣下土去水之患正四方京師之外大國畫其疆境幅廣隕周且長逺矣是時也有契佐禹治水而敷教原契之生乃其母有娀方將將者大也玄王即契也桓撥武而能治也所受小大之國皆能達其政教由其循行天理無所踰越遂視其民則既發以應之矣相土者契之孫昭明之子也為王官之伯出長諸侯任征伐之事蓋居夏后之世者也其威武之盛烈烈然四海之外聞風整齊有截其所商之積功著矣天命未嘗去商故曰不違至于湯而動合天意與天心齊也所謂克配上帝其聖明恭敬之德日躋升而進進降已則不遲所謂惟學遜志昭假則遲遲所謂上達而悠久純一而不已上帝是祗敬天也帝命式于九圍帝命之為君為法於天下也圍九州各有規圍也小球鎮圭尺有二寸王所執大球珽長三尺王所搢為天子乃用此故曰受小球大球球者玉也禹貢曰球琳琅玕湯之執圭搢珽為下國綴屬如旒之綴於旗縿蓋德為人之所歸則下國有所係下國如旒湯如旒之所綴者所以荷天之福否則春秋所謂君若贅旒是上反繫屬於下也湯之不爭競不絿急不太剛不過柔敷政優優而和百祿是聚受小國之貢受大國之貢非以厲民也乃所為下國之駿大厖厚者也諸侯有以貢乎天子大夫有以承乎諸侯士庶人有以承乎大夫是厚下之道也否則無以相生相長而相安矣抑古聖人所謂四方惟正之供所以荷天之寵湯之不可震不可動不戁恐不竦懼陳進其勇所征無敵后來其蘇故百祿是總總亦遒也書曰惟我商王布昭聖武詩曰古帝命武湯聖人之德乃武乃文湯以伐暴為事故本其聖武而言之湯以武功王天下也載其旌旗以出征伐執其鈇鉞以恭行天罰其威𫝑如火之烈烈莫敢禦我苞本也本則夏桀有旁生三蘖若韋若顧若昆吾三國同惡韋豕韋彭姓顧昆吾已姓湯征不義使之莫獲遂達其長蛇封豕之心而九有諸侯截然齊一以歸湯其兵所加先韋顧而後昆吾夏桀也昔在中葉可謂有討伐之威又有興王之功業自契而言相土至湯皆中葉信也商之為天所子而又生我家之卿士是惟伊尹為之阿衡伊氏也尹正也摯名也阿衡倚而取平也太甲尊伊尹曰保衡是天民之先覺者左右商王一德格天矣撻彼殷武奮伐荆楚罙入其阻裒荆之旅有截其所湯孫之緒維女荆楚居國南鄉昔有成湯自彼氐羌莫敢不來享莫敢不來王曰商是常天命多辟設都于禹之績歲事來辟勿豫禍適稼穡匪解天命降監下民有嚴不僭不濫不敢怠遑命于下國封建厥福商邑翼翼四方之極赫赫厥聲濯濯厥靈壽考且寧以保我後生陟彼景山松柏丸丸是斷是遷方斫是虔松桷有梴旅楹有間寢成孔安撻疾意撻然而疾者彼殷王武丁之威武奮伐荆楚之不朝荆州也楚國也楚始封于周曰熊繹自商以上未聞深入其險阻裒聚其旅衆使之安平帖服有截其所美武丁之功繼湯孫之緒業也惟女荆楚以下一章述告責之辭見古人用兵修文告之意責之若曰惟女荆楚雖遠居國南鄉昔在我成湯之時自彼西戎氐羌莫敢不修饗獻世見之禮汝比氐羌為近曷為不來哉天命多辟以下一章言天命衆君諸侯各設都于禹績自髙宗伐荆楚之後莫不修其歲事來見于王以祈王之不譴曰豫維稼穡不怠庶可免矣天命降監以下一章頌高宗也言天之視聽自民民有嚴矣不僭濫于刑賞不敢怠惰而遑安則天命之于下國封殖其福惟高宗之能然所以興也商邑翼翼以下一章又頌髙宗也京師禮俗翼翼可則四方取中赫赫然顯盛之美聲濯濯然光明之威靈髙宗之饗國五十年可謂壽考康寧而保我子孫矣陟彼景山一章蓋廟成而祭也陟彼景大之山一曰景亳之山取其松柏之丸丸滑易而調直者是斷是徙又方正斫之而有敬其斷截以為桷則長以為楹則衆而大寢廟中之寢也孔安者所以安髙宗之神也
