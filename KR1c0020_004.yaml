body:
  text: 毛詩講義卷四宋林岊撰陳子之湯兮宛丘之上兮洵有情兮而無望兮坎其擊鼓宛丘之下無冬無夏值其鷺羽坎其擊缶宛丘之道無冬無夏值其鷺翿子者謂國君也公羊𫝊百姓安子諸侯說子謂魯隱公山有樞子有衣裳謂晉昭公子之遊蕩兮在宛丘之上兮信有淫情兮威儀無法兮無可觀望兮毛謂宛丘四方髙中央下宛宛然郭璞中央隆峻狀如一丘矣洵信也坎坎擊鼓之聲在於宛丘之下無間冬夏常持鷺鳥羽翳身而舞值持也鷺舂鉏頭翅背有毛可為睫攡頭上毛十數枚長尺餘毿毿然楚威王時朱鷺合沓飛翔來舞舊有鼓吹朱鷺曲缶瓦器盎盆也離不鼓缶注艮爻位近丑丑上有辨星似缶又秦王鼓缶樂器也坎樽酒簋二用缶注云爻辰在丑丑上值斗可斟斗上建星似簋建星上有辨星似缶王人出㑹主國尊於簋副設𤣥酒以缶又為酒器也比有孚盈缶注爻辰在未上值東井汲井用缶襄九年具綆缶又為汲水器也孔氏曰缶可節樂若今擊甌又可盛水盛酒今瓦盆也翿亦為纛舞者所以自蔽翳鼓舞戲樂當有時節無復節度所以刺也東門之枌宛丘之栩子仲之子婆娑其下榖旦于差南方之原不績其麻市也婆娑榖旦于逝越以鬷邁視爾如荍貽我握椒榆白曰枌栩杼也子仲陳大夫氏禮以王父字為氏此人上祖必有字子仲者婆娑盤辟舞於枌栩之下男子棄其事業候良辰美景歌舞淫佚見朝日善眀無隂雲風雨可以相擇而行樂耳彼南方之原氏有女國中之最上處可以從之也莊二十七年季友如陳葬原仲于逝者曰可以往之所㑹之處矣或有績其麻或假云有績者以麻總而行鬷數績麻之縷麻縷每數一升用繩紀之我則視汝顔色之美如荍之華汝則遺我以一握之椒皆相恱之詞也鄭以鬷為總集蓋取商頌鬷假為總集之意荍芘芣一名蚍衃􅍮葵也椒實芳物芬香衡門之下可以棲遲泌之洋洋可以樂飢豈其食魚必河之魴豈其取妻必齊之姜豈其食魚必河之鯉豈其取妻必宋之子淺陋衡門之下猶可棲遲逰息喻人君不以國小則不興治致政也泌者泉水涓流不已乃至廣大洋洋觀者可以忘飢亦取義於可以也孰謂國小不可以為政乎衡古橫假借字門之深者有何孰堂宇此惟橫木棲遲行步之息泌亦為毖邶風毖彼泉水孫育曰感激立志慷慨之喻齊伯夷之後主四嶽周語作四嶽賜姓曰姜宋契之後商之苖裔舜封契於商賜姓曰子東門之池可以漚麻彼美淑姬可與晤歌東門之池可以漚紵彼美淑姬可與晤語東門之池可以漚菅彼美淑姬可與晤言池水可以漚柔麻可緝績為衣服彼美善之賢姬實可與君對偶而歌以君淫昏思得賢女配之考工記㡛氏以涗水漚其絲楚人曰漚齊人曰涹烏禾反歌者歌詩陳善惡之事以感化人君君與之偶歌相感切相風化以為善也黃帝姓姬炎帝姓姜二姓之後子孫昌盛其家之女美者尢多成九年左氏引逸詩雖有姬姜無棄憔悴紵亦麻科生數十莖宿根在地中至春自生不歲種荆揚歲三收唐官園歲再刈刈便生剝以鐵若竹挾之表厚皮自脫得其裏韌如筋者曰徽紵南越紵布用此未漚為茅已漚為菅陸璣菅似茅柔韌宜為索漚乃善東門之楊其葉牂牂昏以為期明星煌煌東門之楊其葉肺肺昏以為期明星晢晢邶風士如歸妻逮氷未泮荀卿書云霜降逆女氷泮殺止霜降九月氷泮二月也荀之意自九月至正月皆可為昏毛公親事荀卿家語羣生閉藏乎陰為化育之始聖人以合男女窮天數霜降婦功成嫁娶者行氷泮農業起昏禮殺於此媒氏仲春之㑹毛謂男未三十女未二十者皆用秋冬昏三十之男二十之女許以仲春㑹耳鄭不見家語不信荀卿以仲春為昏月氷泮為請期董仲舒曰聖人以男女陰陽其道同類天道向秋冬而陰氣來向春夏而陰氣去故古人霜降始逆女氷泮而殺止與陰俱近而陽逺也士昏禮執燭前馬親迎以昏取陽往陰來之義女留他色不肯行乃至大星煌煌然之時猶不至也牂牂肺肺盛貌墓門有棘斧以斯之夫也不良國人知之知而不已誰昔然矣墓門有梅有梟萃止夫也不良歌以訊之訊豫不顧顛倒思豫墓道之間幽閒希覩行人之迹故有此棘斧可以開析而去之墓塜塋之地孝子所思慕之處塋域謂之墓斯離也師傅輔相人君故云傅相昔久逺也梅未謂惡木梟集來鳴其聲惡矣他之體性自善由有惡師梟亦名鵩與梟一名鴟非土梟也如鳩而緑入人家凶肉可羮臛及炙漢供御物各隨其時唯梟冬夏常施之以其美故也以有口告之嫌使工歌之防有鵲巢卭有㫖苕誰侜豫美心焉忉忉中唐有甓卭有㫖鷊誰侜豫美心焉惕惕防邑之中有鵲鳥之巢卭丘之上有美苕之草木多故鵲巢焉地美故苕生焉宣公信讒故讒人集焉陵苕生於下濕此生髙丘一曰翹饒旄丘之葛阿丘之虻美草多生髙丘侜張幻惑欺誑人者唐是門內之路廟中路亦曰堂堂途堂下至門之徑亦謂之陳堂之與陳廟庭之異名耳甓㼾甎也一曰瓴甋鷊小草有雜色似綬文月出皎兮佼人僚兮舒窈糾兮勞心悄兮月出皓兮佼人懰兮舒懮受兮勞心慅兮月出照兮佼人燎兮舒夭紹兮勞心慘兮月之初出其光皎焉而白兮佼好之人如月之色其形貌又僚然而好兮行止舒遲姿容又窈糾而美兮思之不見勤勞我心悄然而憂悶兮皆好色之詞也餘章同義悄悄慍也胡為乎株林從夏南匪適株林從夏南駕我乘馬說于株野乘我乘駒朝食于株株林夏氏之邑在國外從夏南者從夏氏子南之母也夏南者以氏配字夏氏者子南因其祖字子夏為夏氏既曰胡為乎株林又曰匪適株林反復言之疾之也駕一乘之馬向夕而說舍於株林之野乘我一乘之駒早朝而食於株林之邑朝夕往來可惡之甚也或曰并儀行父而疾之也彼澤之陂有蒲與荷有美一人傷如之何寤寐無為涕泗滂沱彼澤之陂有蒲與蕑有美一人碩大且卷寤寐無為中心悁悁彼澤之陂有蒲菡萏有美一人碩大且儼寤寐無為輾轉伏枕陂障也澤畔有障水之陂岸內有蒲荷荷指芙蕖之莖菡蓞指芙蕖之華女體柔弱如蒲顔色之美如荷傷如之何思之切也目涕鼻泗一時俱下滂沱然也芙蕖之莖亦曰茄其葉曰蕸其本曰藌白蒻在泥中者其華曰菡蓞其實曰蓮其根曰藕其中曰的青皮裹白子於蓮房中者也的中有青曰薏薏味苦的蓮實薏中心也郭璞曰江東人呼荷華為芙蓉里語苦如薏樊光注爾雅引有蒲與茄蘭是芬香之草悁悁猶悒悒也檜羔裘逍遙狐裘以朝豈不爾思勞心忉忉羔裘翺翔狐裘在堂豈不爾思我心憂傷羔裘如膏日出有曜豈不爾思中心是悼諸侯朝於路門外之朝曰內朝其服緇衣羔裘退適路寢聽大夫之政不易服是在朝在堂同服羔裘若依法設燕羣臣則亦朝服於寢羔裘𤣥冠用緇布衣以裼之裼衣之上其正服明亦緇色今檜君乃以為逰燕之服非宜矣逰燕之服不過用𤣥端深衣也狐裘者玉藻曰君衣狐白裘錦衣以裼之論語有黃衣狐裘鄭以既蠟息民而臘祭先祖五祀黃衣黃冠必用狐裘疑狐裘之當用於此而禮又有君子狐青裘豹褎司裘注以狐青為人功微粗者則黃者狐之本色而白裘青裘色之異要之狐裘之美而非可以朝者歟鄭曰狐裘以朝是以祭服朝未必然也又解經者曰狐白裘唯在天子之朝亦未必然也檜君取其美潔而不顧禮文之常也大夫誦此以去之舉微而知著矣豈不吾君之思乎心勞而憂憂而傷忉忉然勞之甚知國之將亡也如膏潤澤如脂膏也膏古報反日出有曜其光映日也悼者心神震動哀傷之至也檜者髙辛氏之火正祝融之後妘姓之國左𫝊少皥氏有子曰重顓頊氏有子曰黎楚世家乃以重黎為一人非也又重為南正黎為北正實兼祝融故亦曰火正也又本出於髙陽氏顓頊命之厯髙辛氏也鄭語祝融之後八姓已姓昆吾蘇顧溫莒也董姓鬷夷豢龍也彭姓彭祖豕韋諸稽也秃姓舟人也妘姓鄢檜路逼陽也曹姓鄒莒也斟姓無後通楚為芊姓也唯妘姓檜者處祝融之墟其封域在古豫州外方之北滎波之南居溱洧之間武王封檜子爵詩譜疑其起於夷厲二王之時鄭語史伯於幽王之世為桓公謀滅虢檜平王之初武公乃滅之也虢在滎陽檜在密縣北此風當附之新鄭如魏附之晉邶鄘附之衛乃為是乎庶見素冠兮棘人欒欒兮勞心慱慱兮庶見素衣兮我心傷悲兮聊與子同歸兮庶見素韠兮我心蘊結兮聊與子如一兮喪必冠衣以布素者絹素也練而後素冠素衣韠者祥祭朝服素韠時人恩薄禮廢不能終三年之喪故詩人思見其練祥之衣冠裳韠而猶不忘哀者夫人急於哀則其貌欒欒而瘦瘠慱慱者詩人之憂勞也傷悲蘊結皆願見之切也同歸如一者愛慕之之深也隰有萇楚猗儺其枝夭之沃沃樂子之無知隰有萇楚猗儺其華夭之沃沃樂子之無家隰有萇楚猗儺其實夭之沃沃樂子之無室銚弋之生猗儺柔順夭少也沃沃壯佼也舉草之柔見君之不能自立人孰不樂其君之有知識有室家而疾其淫恣不如其無之可樂也匪風發兮匪車偈兮顧瞻周道中心怛兮匪風飄兮匪車嘌兮顧瞻周道中心弔兮誰能亨魚溉之釜鬵誰將西歸懷之好音風非中律之風發發者回飄者車非安行之車偈偈者嘌嘌者顧瞻周道之盛夫豈其然中心所以怛兮弔兮而傷也誰能烹魚我則為溉灌釜鬵助之也一曰大釜也一曰鼎大上小下若甑疏曰甑也舉類而言也烹魚煩則碎治民煩則散知烹魚則知治民矣誰將西歸乎檜在周東思周西也我則懷之以好音愛之也懷歸也鄭云好音周之舊政令也曹蜉蝣之羽衣裳楚楚心之憂矣於我歸處蜉蝣之翼采采衣服心之憂矣於我歸息蜉蝣掘閲麻衣如雪心之憂矣於我歸說蜉蝣小蟲朝生夕死一曰渠略糞中蝎蟲楚楚整飾采采衆多掘閲者初生掘地而出形容鮮閲又生羽翼白布衣如雪甚鮮潔也衣裳皆布而色白如雪惟深衣為然諸侯夕服深衣國將亡滅於我君之身當何所歸處乎彼候人兮何戈與祋彼其之子三百赤芾維鵜在梁不濡其翼彼其之子不稱其服維鵜在梁不濡其咮彼其之子不遂其媾薈兮蔚兮南山朝隮婉兮孌兮季女斯飢君子為候迎賓客之人或荷揭戈與祋在道路之上諸侯之制大夫五人今有三百赤芾是愛小人過度也夏官候人上士六人下士十二人史六人徒百有二十人諸侯候人之徒必少於天子曹之君子非為候人之官長為其徒中之員耳環人掌執節導引使門關無禁掌訝以禮送迎詔贊進止候人荷戈兵防衛姦寇職異異官也廬人戈祕六尺六寸殳尋四尺說文祋殳也桓二年衮冕黻珽芾是配冕之服易困卦九五困于赤芾祭祀所用也皮辨素韠韠之制下廣二尺上一尺長三尺其頸五寸肩革帶博二寸芾之形制同尊祭服則異其名祭服曰芾他服曰韠一命緼芾黝珩再命赤芾黝珩三命赤芾葱珩玉藻注此曰𤣥冕爵辨服之韠故曰芾韠也其芾字亦為韍韍蔽也亦為黻則左𫝊所載是也縕赤黃之間色所謂韎韋珩佩玉之珩黑謂之黝青謂之葱大夫以上皆服赤芾於法又得乘軒僖二十八年晉文公入曹數之以其不用僖負羈而乘軒者三百人也且曰獻狀鵜鶘也俗曰淘河羣飛入水食魚喙長尺餘直而廣口中赤頷下胡大如數升囊小澤有魚羣共杼水滿其胡而棄之令水竭盡魚陸地共食之南山能興雲者也薈蔚雲升喻小人乘時之得志也季女未從人者也婉孌而好季女之斯飢喻君子潔齊者之困窮也鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮鳲鳩在桑其子在梅淑人君子其帶伊絲其帶伊絲其辨伊騏鳲鳩在桑其子在棘淑人君子其儀不忒其儀不忒正是四國鳲鳩在桑其子在榛淑人君子正是國人正是國人胡不萬年母常在桑子自飛去言不移也七者其數梅棘所在之處均一養之得長大而處他木也如結者堅牢不散如物之裹結舉其帶辨德稱其服韋辨即戎冦辨從禽辨絰弔凶皮辨視朝及入朝色如騏馬之文鄭曰皮辨㑹五采玉璂注璂結也書四人騏辨執戈注青黑曰騏兩存之帶則維是絲為之天子素帶朱裏終辟諸侯素帶終辟大夫素帶辟垂士練帶率下辟大夫以上大帶用素絲又有雜帶君朱緑大夫𤣥華士緇辟是雜色飾之也正是四國非為州牧不得為四國之長僖元年𫝊凡侯伯救患分災討罪諸侯之長侯伯也冽彼下泉浸彼苞稂愾我寤嘆念彼周京冽彼下泉浸彼苞蕭愾我寤嘆念彼京周冽彼下泉浸彼苞蓍愾我寤嘆念彼京師芃芃黍苖陰雨膏之四國有王郇伯勞之冽然而寒者下流之泉從上溜下出曰沃泉一曰縣出也苞本也稂者莠也禾秀為穗不成崱嶷然謂之童梁一曰宿田翁獨舉浸稂舉稂以見禾也蕭蓍佳草也愾然我寤寐之中覺彼周室京師之明王周京周室所居之京師師衆京大天子居也苖芃然而盛以陰雨膏澤之故四方之國有從王之事所以得治者郇國之侯為伯有恩德勞來之也僖二十四年𫝊富辰曰畢原酆郇文之昭也定四年祝鮀說文王子唯曹為伯爵是郇伯非爵也凡諸侯有事二伯述職謂東西大伯分主一方各自述省其所職之諸侯也昭五年𫝊小有述職大有巡功服䖍云諸侯適天子曰述職謂六年一㑹王官之伯命事考績述職也莊二十三年𫝊諸侯有王有王者謂朝聘天子也上有眀王下有賢伯諸侯以時朝聘善惡則有黜陟之義武王成王之時東西大伯有周公召公太公畢公則黍苖所謂召伯勞之是也豳七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒歲三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜七月流火九月授衣春日載陽有鳴倉庚女執懿筐遵彼微行爰求柔桑春日遲遲采蘩祁祁女心傷悲殆及公子同歸七月流火八月􅍉葦𧖟月條桑取彼斧斨以伐逺揚猗彼女桑七月鳴鶪八月載績載𤣥載黃我朱孔陽為公子裳四月秀葽五月鳴蜩八月其穫十月隕蘀一之日于貉取彼狐狸為公子裘二之日其同載纘武功言私其豵獻豜于公五月斯螽動股六月莎雞振羽七月在野八月在宇九月在户十月蟋蟀入我牀下穹窒熏鼠塞向墐戶嗟我婦子曰為改歲入此室處六月食鬱及薁七月亨葵及菽八月剝棗十月穫稻為此春酒以介眉夀七月食瓜八月斷壺九月叔苴采荼薪樗食我農夫九月築場圃十月納禾稼黍稷重穆禾麻菽麥嗟我農夫我稼既同上入執宫功晝爾于茅宵爾索綯亟其乘屋其始播百榖二之日鑿冰沖沖三之日納于凌陰四之日其蚤獻羔祭韭九月肅霜十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥萬夀無疆首章衣食之本也言七月火星流矣火心星也以夀星析木大火之次而言則大火中次也以角亢氐房心尾箕而言則心中星也六月之時火星昏中而人知暑極將退矣七月之時火流而西人知寒將至矣故思九月之霜降而授衣以禦寒也尊者授卑貴者授賤幼者授老皆授也其於九月而授者自五陰之月以後至於六陰皆授衣時也一之日則一陽之日十一月也陽方復而陰未剝觱栗而風寒二之日則二陽之日十二月也陽旅升而陰澤腹栗發而氣寒無麻絲之衣無狐貉之褐何以卒此歲乎此豳人之勤於女功而不待教令也耜耒端之所施也畟畟良耜之利可以測土趾足也農之趨田力穡三陽之日正月也于往而事耒耜四陽之日二月也舉足而無不耕播矣同我婦子有嗿其饁思媚其婦有依其士田畯大夫之官出入阡陌者也甫田曰曾孫來止以其婦子饁彼南畞田畯至喜攘其左右嘗其㫖否以曾孫之綦貴猶有省耕設饋之勤田畯其敢不勤於勸相乎見饁而喜風雅凡三言之耕者亦曰吾大夫之喜非私喜也此豳人之勤於田事不待上之教令是風俗之成也二章再言流火授衣以下皆衣也當春日之始陽倉庚鳴矣女執深懿之筐遵循小徑求稚桑以食始生之蠶及夫春日之遲遲舒緩采蘩蒿以燠蠶祁祁衆多女心感物之化躬事之勞因時而嘆且與豳之貴介公子躬率其民者同時而出同時而歸也國之公子自君至於卿大夫之子也一曰將歸公子有逺父母之悲風俗之厚也八月􅍉葦則言隔歲之時覩流火而思授衣且於四陰之月預求􅍉葦以為曲薄及至次年𧖟月而取桑以食蠶遲日以陽言蠶月以陰言此謂三之日夏之三月也兼日月而言見陰陽之將更代也條桑者先條理而後采之或取斧斨以伐逺揚者落其枝而采之也或猗束荑桑不待枝落束而采之也鶪伯勞也伯趙司至夏至來冬至去三陽之月七月聞其鳴而知其將寒之候與流火授衣同意鶪感陰而鳴於仲夏其聲至秋而變必有辨者四陰之月絲事畢而麻事起古者女有同功共績鄰燭分光之事𤣥黑而有赤也朱深纁也祭服𤣥衣纁裳易黃裳元吉染春暴練夏纁𤣥秋染夏為公子裳鄭云厚於其所貴者愛君之情也六陽之日為四月不以日言陽極陰至也葽草感陰而先秀蜩螳蟬蛻而飛鳴積而至於四陰之月為八月田禾可穫陰氣浸盛山林隕蘀鳥獸氄毛又積而至一陽之日為十一月乃思取皮毛為絲麻之助衣褐之用往搏彼貉自為裘也取狐貍為公子裘獻良裘也所謂狐白裘之類愛君之情也因取裘而言田獵二陽之日為十二月君臣民庶習兵而俱出田農隙而講武事纘繼功事也一歲曰豵則私之三歲曰豜則獻之愛君之情也公事畢治其私事以三蟲而推之物之於寒由外漸居於內五月而斯螽搖動其股六月而莎雞振迅其羽七月而蟋蟀在壁中者出居田野八月在堂宇之下九月在室戶之內十月入我之牀下蟲既近人大寒將至穹窒其室之孔穴熏鼠令其出窟塞北出之向墐塗荆竹所織之户豳人曰我之婦與子當此歲行將改之時且入此室以安以處而少休一歲女功之勞乎仲冬陽始萌古人以為改歲之漸六月食鬱及薁至萬夀無疆此皆言食也鬱薁果類可生食葵菽待烹煮而食棗飴蜜以甘之與夫凍醪㫖酒皆所以助養老也老者安之孔子之言也老者衣帛食肉黎民不飢不寒孟子之言也孔孟之言即風化之本也疆場有瓜丘中有麻幡幡瓠葉俱落其實誰謂荼苦其甘如薺瓜荼以為食樗木以為薪食我農夫老壯異食也九月則築菜之圃以為蹂踐禾稼之場十月則納於倉庾矣黍也稷也先熟之穋後熟之重麻也菽也麥也一歲所收也豳人曰嗟乎我農夫稼之同登矣宜上入都邑而執其宫室之功役乎或助公田或治私室晝則取茅夜則絞繩亟其治屋或於五畞之宅或於中田之廬其於來年初播百榖耕耘之事又新老幼分居野廬不可無所舍也二陽之日季冬固陰沍寒深山窮谷皆氷也陽雖漸進氷則凝之古人鑿山谷澤腹之氷而不取春池易銷之氷所以徹陰而導陽既鑿之後其氣上逹沖沖以和三陽之日孟春未用此氷也氷安在乎時蓋納藏於氷室也四陽之日在易九四剛而不中古人蚤為調燮之計出氷之陰以節時之陽獻以羔祭以韭則又皆取陽氣之類而示其尊陽不徒尚陰所以密寓抑揚之意蓋仲春先用氷於寢廟至夏頒氷則畢賦矣先尊而後卑也九月霜降之初履則知堅氷先有肅縮之義霜能成物亦能敗物故場之禾稼畢入於倉而剗滌洗淨無使有遺稼登場滌之餘置朋酒以為饗殺羔羊以為饌躋於學校行鄉飲酒與夫黨正正齒位之禮飲酒既樂舉其觥之大者以夀豳之國君卿大夫祝其萬夀無疆也篤公劉之詩曰既登乃依乃造于曹執豕于牢酌之用匏或君燕其臣民或臣民獻於君歡然有恩粲然有文皆可想見風化之成也耕耘播穫之事二雅為常七月所舉農家養老食壯納禾乘屋納氷勞饗之事其辭簡而事備此所謂知稼穡之艱難聞小人之勞苦與無逸相表裏皆為戒成王也周秦之所以異者其民俱務農桑而有知義不義之别也周人於一飲一食必進其耉老一衣一裘必獻其君上且夫為此春酒以介眉夀羔羊朋酒躋彼公堂豈徒勤事於饁彼南畞乎我朱孔揚為公子裳獻豜于公言私其豵豈徒勤念於無衣無褐乎以至采荼而甘賤者之食納稼而亟公宫之役皆此義也若夫秦人父取耰鋤而有德色母取箕帚而有誶語抱哺其子而婦姑勃磎出贅出分而孝養不顧此何等風俗乎周之所以興王而久長秦之所以驟興而忽亡者此也觀其勸課農桑秦人未嘗不加之意也誘三晉之民以耕而務本業者得爵賞逐末利者無紛華開通阡陌之道崇尚富積之家釃渠灌溉沃野富強可謂盛矣而無補於亡秦也若夫周人勸課農桑既有義以為本又因時而施宜自稷封邰至於公劉居豳千餘年之風俗積纍常如一日而周公能言之故七月一詩言衣兼衣食也先儒謂首章陳衣食之本自七月流火至入此室處皆言衣自六月食鬱及薁至萬夀無疆皆言食最為條理明白注疏諸家詳且盡可以類推不待贅說矣惟以義為利而不以利為利大異於秦此榖腹絲身者之不可不先明乎此也鴟梟鴟梟既取我子無毁我室恩斯勤斯鬻子之閔斯逮天之未陰雨徹彼桑土綢繆牖户今女下民或敢侮豫豫手拮据豫所捋荼豫所蓄租豫口卒瘏曰豫未有室家豫羽譙譙豫尾翛翛豫室翹翹風雨所漂搖豫維音嘵嘵周公以管蔡武庚及淮夷叛我周家其心愛護王室自託如護巢之禽託喻彼叛亂之人如鴟梟之取子毁巢也今夫護巢之禽指鴟梟而語之曰既取我子無毁我巢我之誠恩愛斯也我之誠勤勞斯也我之於稚子誠閔念斯也昔者及天尚晴剝徹桑根纒綿牖户以有此室汝其可毁之乎周公意謂周家創造之難亦猶此耳今女下民如三監淮夷乃敢侵侮王室乎則又託為護巢之鳥其言若曰豫手撠挶豫所捋取􅍉苕豫所蓄積豫口盡病謂豫未有室家之故豫羽譙譙而殺豫尾翛翛而敝豫室翹翹而危風雨且漂搖之豫維鳴音嘵嘵而懼矣此皆危苦之辭也我徂東山慆慆不歸我來自東零雨其𪷟我東曰歸我心西悲制我裳衣勿士行枚蜎蜎者蠋蒸在桑野敦彼獨宿亦在車下我徂東山慆慆不歸我來自東零雨其𪷟果裸之實亦施于宇伊威在室蠨蛸在戶町畽鹿場熠耀宵行亦可畏也伊可懷也我徂東山慆慆不歸我來自東零雨其𪷟鸛鳴于垤婦嘆于室灑掃穹窒我征聿至有敦瓜苦蒸在栗薪自我不見于今三年我徂東山慆慆不歸我來自東零雨其𪷟倉庚于飛熠耀其羽之子于歸皇駁其馬親結其縭九十其儀其新孔嘉其舊如之何我徂歸士自言也其後有曰我征聿至者婦人呼其夫之言也我徂東山久而不歸我來自東又值零雨之𪷟𪷟我自東山而曰歸我心常悲念在西之家室制彼裳衣庶其不為戎服而無事於行陳之銜枚乎蜎蜎桑蟲衆在桑野敦敦然征行之士獨宿則亦在於車下而如彼野中之蠋矣果裸栝樓伊威委黍蟲也蠨蛸長踦蟲也鹿場之迹町畽然熠耀螢火也鄭云五物者家無人則然令人懷感雖非所畏使人懷思居者行者皆有懷也垤蟻塜將陰雨出穴處鸛好水長鳴而喜行者於陰雨尤苦婦念之則嘆于室灑掃穹窮窒塞之所我征夫今且至矣倉庚飛而毛羽鮮明亦如歸士之還有婦人始嫁之者備黃白曰皇駵白曰駁之馬其車服盛也九十其儀言多儀也縭婦人之褘也郭璞曰香纓也褘邪交絡帶係於體因名為緌係也母送女重結其所係著以申戒之示係屬於人其新孔嘉其舊如之何言夫婦之情也既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將既破我斧又缺我錡周公東征四國是吪哀我人斯亦孔之嘉既破我斧又缺我銶周公東征四國是遒哀我人斯亦孔之休隋銎曰斧斨方鉞斧也破斧缺斨煩我兵革之意也周公東征止誅其君之罪而正四國之民蓋哀我民人之被誘其德可謂大矣錡鑿屬吪化也嘉善也木屬曰銶遒固也休美也伐柯如何匪斧不克取妻如何匪媒不得伐柯伐柯其則不逺我遘之子籩豆有踐伐柯須斧取妻須媒執柯伐柯其則不逺我欲見周公乎當以禮迎之而籩豆之器必行列陳之也籩豆之盛王所自用而不戒司存以迎周公是睨而視之猶以為逺也九罭之魚鱒魴我覯之子衮衣繡裳鴻飛遵渚公歸無所於女信處鴻飛遵陸公歸不復於女信宿是以有衮衣兮無以我公歸兮無使我心悲兮鱒魴大魚處九罭之小網言周公處非其地我見周公衮衣繡裳上公在外當迎之也鴻大鳥也飛而遵渚非其宜矣周公宜歸而未得其所於女東山亦暫且宿耳遵陸亦言非其所也周公宜歸而朝廷不亟復之於女東山亦暫宿耳卒章東山之人曰是以有衮衣兮應上衮衣繡裳之言也無以我公歸兮無使我心悲兮應上公歸不復於女信宿之言也所謂西人欲其歸東人欲其留也託言與東山之人酬應而美刺之意𨼆然矣狼跋其胡載疐其尾公孫碩膚赤舄几几狼疐其尾載跋其胡公孫碩膚德音不瑕狼之老者頷下垂胡進前則躐其胡退則跲其尾此如周公進退之難也古之遜字借孫字為之春秋昭二十五年言公孫于齊周公處進退之難而遜避之謙碩大膚美之德常如一日王舄有三赤舄為上冕服之舄其下有白黑著服各有屨復下曰舄單下曰屨上公九命得服衮冕故屨赤舄所謂服稱其德瑕玉之有疵終始皆善如玉之無可瑕疵也
