body:
  text: 毛詩講義卷六宋林岊撰小雅二宛彼鳴鳩翰飛戾天我心憂傷念昔先人明發不寐有懷二人人之齊聖飲酒溫克彼昏不知一醉日富各敬爾儀天命不又中原有菽庶民采之螟蛉有子蜾螺負之教誨爾子式榖似之題彼脊令載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生交交桑扈率場啄粟哀我填寡冝岸冝獄握粟出卜自何能榖溫溫恭人如集于木惴惴小心如臨于谷戰戰兢兢如履薄冰宛彼鳴鳩其羽之飛未必戾至于天而有髙飛及天之志人當自勉也我心憂傷念昔創業之先人其在文武故明發不寐而懷思之也人之齊正聖哲者飲酒則溫恭自持以勝其偏愚者不知此一醉則日增其甚天之將亡我國家也各敬爾儀天命不再至矣中原有菽庶民采之力采者則得之也螟蛉有子蜾螺負之煦嫗養之以成其子教誨爾民用善道則似之矣視彼脊令則飛則鳴不有止息我日斯邁而月斯征不可失時所宜夙夜汲汲勉勵無辱于先王也交交恭雜也交交桑扈宜竊脂也而率場啄粟失其性矣哀我人斯填盡窮寡乃安于岸獄之爭訟鄉亭之繫曰犴朝廷曰獄握粟以卜自何能善乎溫溫和柔之恭人如集于木恐墜也惴惴小心如臨于谷恐隕也戰戰兢兢如履薄冰恐陷也皆憂危自警之辭也辨彼鸒斯歸飛提提民莫不穀我獨于罹何辜于天我罪伊何心之憂矣云如之何踧踧周道鞠為茂草我心憂傷惄焉如搗假寐永歎維憂用老心之憂矣疢如疾首維桑與梓必恭敬止靡瞻匪父靡依匪母不屬于毛不離于裏天之生我我辰安在菀彼桞斯鳴蜩嘒嘒有漼者淵萑葦淠淠譬彼舟流不知所届心之憂矣不遑假寐鹿斯之奔維足伎伎雉之朝雊尚求其雌譬彼壞木疾用無枝心之憂矣寧莫之知相彼投尚或先之行有死人尚或墐之君子秉心維其忍之心之憂矣涕既隕之君子信讒如或酬之君子不惠不舒究之伐木掎矣析薪扡矣舍彼有罪豫之他矣莫髙匪山莫浚匪泉君子無易由言耳屬于垣無逝我梁無發我笱我躬不閲遑恤我後辨樂也樂彼鸒之為鳥出食在野其羣飛而歸提提然鸒一名卑居雅烏也郭璞曰江東呼鵯烏又曰鵯鶋物則自得然爾民亦莫不皆善我獨罹此乎何辜于天我罪伊何自責也心之憂矣云如之何乎踧踧平易之周道鞠窮為茂盛之草我心憂傷國之荒敗而將亡思焉如物之搗心假寐之間亦復永嘆惟憂用老憂之深也疢如疾首則又憂之甚矣桑梓以遺子孫給蠶食具器用者也父母之所植不敢不敬况于父母無不瞻依我之不見愛豈我獨無所離屬乎離麗也毛皮毛裏心腹也嵗時日月星辰為六物又曰豈我生之辰不善哉我辰安所值也盛彼栁斯鳴蜩嘒嘒其聲漼然深淵旁生萑葦太子為王所不容曾不若是而若彼舟流無制之者不知所至不遑假寐其禍亟矣鹿之奔宜疾而伎伎然舒留其羣也雉之鳴尚求其雌而父子之恩曷為不然哉譬彼壞瘣之木疾用無枝曷庇本根乎心之憂矣寧莫我知也爾雅注苻蔞尫傴內疾瘣磊視彼之見迫逐而投人尚或先之使得避者行有死人尚或埋藏之者君子秉心亦忍矣是以心憂而涕隕君子信讒如賓主之旅酬君子之不愛其子則亦不安舒而究察之故也伐木則掎其巔不欲妄踣之析薪則隨其理不欲妄挫之王之以讒逐子曾伐木析薪之不如乎舍彼有罪謂讒者也余之他矣謂見逐也莫髙非山莫深非泉君子無輕由言耳屬于垣者左右觀望而益生讒譖耳無逝我梁無發我笱言太子之顧其家猶漁者之護其笱我為人子而其躬不見察于父豈遑恤我後哉不察子之躬必不恤子之後太子之傅所以憂也悠悠昊天曰父母且無罪無辜亂如此憮昊天巳威豫慎無罪昊天泰憮豫慎無辜亂之初生僭始既涵亂之又生君子信讒君子如怒亂庶遄沮君子如祉亂庶遄巳君子屢盟亂是用長君子信盜亂是用暴盜言孔甘亂是用餤匪其止共維王之卭奕奕寢廟君子作之秩秩大猷聖人莫之他人有心豫忖度之躍躍毚兔遇犬獲之荏染柔木君子樹之往來行言心焉數之蛇䖴碩言出自口矣巧言如簧顔之厚矣彼何人斯居河之麋無拳無勇職為亂階既微且腫爾勇伊何為猶將多爾居徒幾何逺逺大哉昊天為我父母無罪無辜而亂如此大乎天乎已甚威怒矣余實謹畏而無辜亂之初生不信之言王實容之亂之又生則係乎君子信之矣君子如怒讒人乎庶亂之疾止君子如福善人乎庶亂之疾己君子屢盟亂是用長邦國有疑周官許其殺牲㰱血告神以相要束王無故與諸侯盟諸侯自與列國盟皆非也而又屢盟焉滋以長亂也君子信盜亂是用暴盜者伺隙抵巇以罔善良即穿窬之類盜言甚甘使人不厭亂之所以進也之人也匪其能共王之職祗為王病而已奕奕寢廟君子之所興秩秩大猷聖人之所定而讒人之言獨覆宗社變經常故詩人疾之曰他人有心我則忖度矣彼不欲治而欲亂也我知其心如彼躍躍毚遇犬則獲之無所逃矣荏染柔木君子之所植不可傷也往來行路之言心安足數之乎護善當如護木拒讒當如不記行路之言也蛇蛇然舒遲安間之大言出口而無忌憚巧而可聼如笙簧之音其心無耻其顔則厚矣則又斥讒人而惡之曰彼何人斯居河之麋水草交謂之麋無拳力無徑勇主為亂階既腳骭有微疾而足跗有腫之疾其勇何能哉為謀將大而衆多以陷君子爾居之徒亦幾何哉言其易制而王不知去之也子産去惡疾者曰無助天為虐子産數而戮之小人之得疾非不幸也正當因天意而剗伐之耳彼何人斯其心孔艱胡逝我梁不入我門伊誰云從維暴之云二人從行誰為此禍胡逝我梁不入唁我始者不如今云不我可彼何人斯胡逝我陳我聞其聲不見其身不愧于人不畏于天彼何人斯其為飄風胡不自北胡不自南胡逝我梁祗攪我心爾之安行亦不遑舍爾之亟行遑脂爾車一者之來云何其盱爾還而入我心易也還而不入否難知也一者之來俾我祗也伯氏吹塤仲氏吹篪及爾如貫諒不我知出此三物以詛爾斯為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側刺暴公之譖已而先言其從暴公者疾其黨也暴公為卿士而譖蘇公懷反側不自安于其心而不見蘇公焉故蘇公極言其情狀以刺之也彼何人斯其心孔艱胡逝我梁梁魚梁或曰梁橋也在蘇國之門外不入我門伊誰云從維暴之云二人從行誰為此禍乎胡逝我梁不入唁我始者之相好不如今云不我可乎疑之也彼何人斯胡逝我陳堂下至門之徑也聞其聲不見其身有所歉也不愧于人大無信也不畏于天不知命也彼何人斯其讒言如暴起之風不南不北而適使我值胡逝我梁祗亂我心逝梁有發笱之疑蓋託辭也爾之不我見安行乎則未嘗遑舍急行乎則何暇于脂車一者之來亦何病乎爾還而入我心平易而無疑也還而不入其譖不譖難知也一者之來當使我安也伯仲相親塤篪相應昔日之情也及爾如物之在貫俱為王臣𫝑相次比諒不知我之心而譖我爾知則不譖也出此三物犬豕雞以詛于神庶其無疑乎為鬼魅為射影之狐則不可得見有靦靣目視人無窮而欲不見我何所逃於天地間乎為此好歌以極反側者忠厚之情也萋兮斐兮成是貝錦彼譖人者亦已大甚哆兮侈兮成是南箕彼譖人者誰適與謀緝緝翩翩謀欲譖人慎爾言也謂爾不信捷捷幡幡謀欲譖言豈不爾受既其女遷驕人好好勞人草草蒼天蒼天視彼驕人矜此勞人彼譖人者誰適與謀取彼譖人投卑豺虎豺虎不食投卑有北有北不受投卑有昊楊園之道猗于畝丘寺人孟子作為此詩凡百君子敬而聽之萋斐文章相錯也貝錦之文有如餘泉者如餘蚳者文采黃白甚衆讒人集人之過以成人之罪猶集采色而成文錦也彼譖人者亦已大甚矣哆侈而張箕非箕也以張大其口而名星曰箕云我無其實彼則萋斐張大以成之誰適與謀怪其巧也緝緝口舌聲翩翩往來貌爾謀欲譖人也謹爾言矣人將有時而不信爾矣捷捷猶緝緝幡幡猶翩翩王始而聽汝之譖人又將譖汝則其禍人者遷而禍已矣驕人譖行而得意勞人遇讒而失度天乎察彼而憫此乎彼譖人者誰適與謀再言深嫉之也取之卑豺虎與夫寒凉不毛之地不食不受言人物所惡天地所不容也投卑有昊欲天制其罪也楊園之道猗于畝丘或即讒人之所居而疾指之也孟子者寺人之字自言其字直已以刺之也凡百君子敬而聽之無信讒人之言乎習習谷風維風及雨將恐將懼維豫與女將安將樂女轉棄豫習習谷風維風及頽將恐將懼置豫于懷將安將樂棄豫如遺習習谷風維山崔嵬無草不死無木不萎忘我大德思我小怨習習然和調之東風風雨相感猶朋友之相須也奈何恐懼之時維豫與女將安將樂女轉棄豫乎頽風之焚輪者焚輪謂之頽扶搖謂之焱頽廽風從上而下焱廽風從下而上東風廽風相遇相扶猶朋友也奈何恐懼則置我于懷安樂則棄我如遺乎東風之在山巔所被者廣草木茂矣然草亦有時而死木亦有時而萎物於天地豈可以忘其生生之德而思其摧落以為怨乎李白詩曰草不謝榮于春風木不怨落于秋風余為更之曰草當謝榮木不怨落蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁瓶之罄矣維罍之恥鮮民之生不如死之久矣無父何怙無母何恃出則銜恤入則靡至父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之德昊天罔極南山烈烈飄風發發民莫不榖我獨何害南山律律飄風弗弗民莫不榖我獨不卒蓼蓼而長大非莪則蒿天地生育草木茂盛如此父母生我劬勞猶天地也蓼蓼而長大非莪則蔚天地生育草木茂盛如此哀哀父母生我勞瘁亦猶是也瓶之盡則罍之耻民之窮則君之羞窮獨而生困于行役不得終養而父母亡沒我之猶言猶食不如死之久矣無父我何所依怙無母我何所倚恃出則銜無窮之憂入則無所歸投也父兮生我母兮養我養我而拊循我畜我而覆育我去之而旋視我又反覆而顧不能捨我出入腹厚懷抱乎我欲報之德而父母之恩如天之無窮不知所以報也南山烈烈而可畏飄風發發而中人政之暴也民莫不善我獨何害而如此他人未必俱得終養怨者之詞也律律崒嵂也弗弗猶發發也我獨不得終養父母重自哀傷也有饛簋飱有救棘七周道如砥其直如矢君子所履小人所視眷言顧之潸焉出涕小東大東杼柚其空糾糾葛屨可以履霜佻佻公子行彼周行既往既來使我心疚有冽氿泉無浸穫薪契契寤歎哀我憚人薪是穫薪尚可載也哀我憚人亦可息也東人之子職勞不來西人之子粲粲衣服舟人之子熊羆是裘私人之子百僚是試或以其酒不以其漿鞙鞙佩璲不以其長維天有漢監亦有光跂彼織女終日七襄雖則七襄不成報章睆彼牽牛不以服箱東有啓明西有長庚有救天畢載施之行維南有箕不可以簸揚維北有斗不可以挹酒漿維南有箕載翕其舌維北有斗西柄之揭簠盛稻梁簋盛黍稷飱言􅍄食也有滿其簋有長其匕匕所以載鼎實赤心之木為之其長三尺凶桑吉棘祭祀享食體解其肉之胖既大載之以匕出于鼎升于爼也砥礪石之平也矢言其直也周之盛時政令平直而賦役均凡在上君子所履在下小人所瞻故天下富足而諸侯無怨今則不然我所以眷言顧之潸焉出涕也小東大東自周視諸侯皆東也以一人之欲而天下不足于供億故有杼柚其空之嘆杼盛緯器柚卷織者糾糾夏屨以之履霜見其窮乏矣佻佻輕薄貴驕之貌公子不冝服役而行彼道路見其勞苦矣奔走往來使我心病冽然而寒者側出之氿泉無浸我已穫之薪恐其腐也契契然憂傷而寤歎哀我勞人已穫之薪可載而之他無使浸也哀我勞人可息而安無使病也侯國之人主于勞役而不見其勞來謂之勤西周之人方鮮盛衣服以相誇撡舟之賤或衣熊羆之裘皂𨽻之屬或充百僚之用賦役不均羣小得志也供饋不均或以其酒或不以其漿或致鞙鞙瑞玉之佩或不以其長璲一曰係璲采組連結者維天有漢則亦光監我乎跂頍也去智切頭不正也視彼織女自卯至酉一辰一移其能助我乎雖則七襄不能反報以成章使我杼柚安所出也睆彼牽牛之星徒有其名不能駕大車之箱使我轉輸何所從也雖有長庚啓明不能助日為晝俾我營功雖有天畢不能為我掩捕鳥獸使我供億何所仰也啓明金星長庚水星或曰皆金星也啓明也長庚也天畢也載施之行列而已維南有箕則不可以簸揚糠粃徒翕其舌四星二為踵二為舌踵狹而舌濶維北有斗不可以挹酒漿七星四為斗三為柄但垂而下揭耳西揭指秋斂而言也四月維夏六月徂暑先祖匪人胡寧忍豫秋日淒淒百卉具腓亂離瘼矣爰其適歸冬日烈烈飄風發發民莫不榖我獨何害山有嘉卉侯栗侯梅廢為殘賊莫知其尤相彼泉水載清載濁我日構禍曷云能榖滔滔江漢南國之紀盡瘁以仕寧莫我有匪鶉匪鳶翰飛戾天匪鱣匪鮪潛逃于淵山有蕨薇隰有祀桋君子作歌維以告哀自夏時而言之四月夏之始六月火星中而暑退則為徂暑矣我之遭禍亂而困征役曾不得息先祖豈非人乎何忍使我若此也秋日淒淒百卉皆病我遭亂離之病於何所適歸乎冬日栗烈飄風發發而疾民莫不善我獨何害夏則暑秋則腓冬則烈更歷天時皆嘆禍亂之慘不言春見春者天之所為而王不能承天以從事也山有嘉卉維栗維梅山猶有所嘉植也今王暴而剝下使民多廢為殘賊莫知其尤過王其忍之乎視彼泉水則清則濁我日遇禍無有或清之時曷云能善乎滔滔江漢南國之大水是綱紀也王者如江漢之紀衆水今也盡瘁以仕王其不我有哉禍無所逃使為鵰鳶乎則髙能至天矣鱣鮪乎則潛逃于淵矣山有蕨薇隰有把桋草木得其所也人之不如君子為詩所以訴其哀苦也陟彼北山言采其把偕偕士子朝夕從事王事靡盬憂我父母溥天之下莫非王土率土之濵莫非王臣大夫不均我從事獨賢四牡彭彭王事傍傍嘉我未老鮮我方將旅力方剛經營四方或燕燕居息或盡瘁事國或息偃在牀或不巳于行或不知叫號或慘慘劬勞或棲遲偃仰或王事鞅掌或湛樂飲酒或慘慘畏咎或出入風議或靡事不為大夫行役陟彼北山采把而食登髙望逺感物傷時也偕偕士子俱從王事朝夕之間欲其無不堅固故勞而不得休息久而不歸憂勞我父母之懷也大天之下莫非王土率土之濵莫非王臣大夫之役使不均使我從事獨賢勞也四牡彭彭然不得息王事傍傍然不得已嘉鮮皆善也蓋國家之意善我之未老而方壯以我之力方且剛强可以經營四方而使之或燕燕居息以下言不均也燕燕安息盡力勞瘁以從國事不知外之叫號深居安逸也鞅掌煩勞之狀出入風議以言語勝者也孔子曰不患寡而患不均無將大車祗自塵兮無思百憂祗自疷兮無將大車維塵冥冥無思百憂不出于熲無將大車維塵雍兮無思百憂祗自重兮大車平地載任之車牛車也將之則塵汚人比小人也我其無思此百憂乎思之祗自病也悔所比之非人而憂之將及也冥冥昏晦也熲與耿同光明也在憂中耿耿然不能出也雍蔽也重猶纍也明明上天照臨下土我征徂西至于艽野二月初吉載離寒暑心之憂矣其毒大苦念彼共人涕零如雨豈不懷歸畏此罪罟昔我往矣日月方除曷云其還嵗聿云莫念我獨兮我事孔庶心之憂矣憚我不暇念彼共人眷眷懷顧豈不懷歸畏此譴怒昔我往矣日月方奧曷云其還政事愈蹙嵗聿云莫采蕭穫菽心之憂矣自詒伊戚念彼共人興言出宿豈不懷歸畏此反覆嗟爾君子無恆安處靖共爾位正直是與神之聽之式穀以女嗟爾君子無恆安息靖共爾位好是正直神之聽之介爾景福明明乎上天照臨我下土我征徂西至于逺荒之野建卯之朔西征至于嵗暮載歷寒暑而未歸心之憂矣其毒大苦念彼溫恭之人則臣當盡力于王事故但涕零而如雨豈不懷歸畏罹罪網也昔我之往日月方除陳而生新何時言還乎而嵗巳暮矣念我身獨而事衆我心之憂勞而不得暇念彼共人眷眷然情懷反顧豈不懷歸畏此譴怒耳日月方奧奧暖也今未知還期而政事益以促急是以至此嵗暮采蕭為祭穫菽為備之時而不得歸心之憂矣自詒伊戚所謂悔仕于亂世也念彼共人興言出宿不能安寢于內也畏此反覆王政之險側不可知嗟爾君子以下則不敢怨而反以正之辭也勞苦之餘更相勉曰嗟爾君子無恆安處而安息靖共爾位所謂共人也靜共於位惟正直之道是與則神祐之矣何必去哉式用穀祿也介景皆大也鼓鐘將將淮水湯湯憂心且傷淑人君子懷允不忘鼓鐘喈喈淮水湝湝憂心且悲淑人君子其德不回鼓鐘伐鼛淮有三洲憂心且妯淑人君子其德不猶鼓鐘欽欽鼓瑟鼓琴笙磬同音以雅以南以籥不僭鼓鐘將將聲之大也淮水湯湯流連之所也聞樂而憂則王之感人心者異於靈臺於樂辟雍於論鼓鐘矣善人君子之與民同樂者我懷思之信不能忘也鼓鐘猶鼓瑟也喈喈猶將將也湝湝水流也其德不回不回邪也鼛鼓大鼓長丈二尺鼓人文臯鼓尋有四尺韗人丈臯與鼛同以鼓役事水中可居曰洲妯動也不猶者其德不若此也欽欽鐘聲也先擊金以奏諸樂左傳謂之金奏琴瑟在堂鼓鐘在下東方生位故謂其磬為笙磬大射樂人宿縣阼階東笙磬西面其南笙鐘其南鑮東為陽中萬物以生是東方為笙磬舉磬則鐘鑮可知或曰笙以匏為之列十三管匏中笙管有簧磬以石為之雅二雅之可歌南二南之可歌也籥者文舞所執如笛季札見舞象簫南籥是其類也毛曰舞四夷之樂東夷曰昧南夷曰南亦曰任西夷曰株離北夷曰禁以為籥舞鄭曰雅萬舞也周樂尚武謂萬舞為雅爾雅疏雅瑟長八尺一寸廣一尺八寸二十三弦常用十九弦頌瑟長七尺二寸廣尺八寸二十五弦盡用之廣雅琴長三尺六寸六分五弦後加文武二弦同音言其四縣皆和不僭言其不僭亂也楚楚者茨言抽其棘自昔何為我藝黍稷我黍與與我稷翼翼我倉既盈我庾維億以為酒食以享以祀以妥以侑以介景福濟濟蹌蹌潔爾牛羊以往蒸嘗或剝或亨或肆或將祝祭于祊祀事孔明先袓是皇神保是饗孝孫有慶報以介福萬壽無疆執爨踖踖為爼孔碩或燔或炙君婦莫莫為豆孔庶為賔為客獻酬交錯禮儀卒度笑語卒獲神保是格報以介福萬壽攸酢我孔熯矣式禮莫愆工祝致告徂賚孝孫必芬孝祀神嗜飲食卜爾百福如幾如式既齊既稷既匡既敕永錫爾極時萬時億禮儀既備鐘鼓既戒孝孫徂位工祝致告神具醉止皇尸載起鼓鐘送尸神保聿歸諸宰君婦廢徹不遲諸父兄弟備言燕私樂具入奏以綏後祿爾殽既將莫怨具慶既醉既飽小大稽首神嗜飲食使君壽考孔惠孔時維其盡之子子孫孫勿替引之茨蒺藜楚楚茨棘抽條而發自昔此地何為哉乃我藝黍稷之地也自此以下皆言黍稷成而祭祀饗之事我黍與與我稷翼翼皆蕃廡也倉之盈不可數計露積之庾以億計甚言其多以為酒食以享祀其先祖以妥以侑安尸也初尸入祝延之入廟奧而行灌禮至朝踐祭統注天子諸侯之祭廷尸于户外薦熟乃廷主于室之奧尸來升席自北方升郊特牲曰舉斝角詔妥尸祝則詔主人拜安尸使之坐也少牢饋食之節又迎尸使處神坐而食之尸升筵祝主人皆拜安尸尸答拜遂坐尸告飽祝侑曰皇尸未實侑尸又食主人不言而拜侑尸又三飯以介景福福者百順之名也濟濟蹌蹌言有容也潔爾牛羊在滌而芻之也冬祭曰蒸秋祭曰嘗或剝解其皮或烹飪之或剔其骨體而陳之牙升之爼或奉持而進孝子不知神之所在使祝博求平生門內之旁待賔客之處此正祭時求之隂也若繹祭于明日則索祭于祊乃廟門外之祊與此不同祀事孔明祀禮甚明也先祖是皇大之也神保是饗歆之也孝孫有慶謂天子也報以介福萬壽無疆皆祭而獲佑之辭也執饗爨以煮肉廩爨以煮米者踖踖有容載牲體于爼甚大謂之薦熟也或燔肉或炙肝朝事之時取膟膋燎于爐炭薦熟以炙肉從獻以炙肝歟君婦之后莫莫然清靜而敬謹為豆薦則甚多非直以之薦神又備為繹而賔敬其尸及為賔客所用其賔客于祭日獻酬旅而交錯蓋與尸為酢禮儀盡依法度笑語率獲其時神保是來報以介大之福萬年之壽也酢報也正祭先薦豆然後獻繹祭先獻後薦豆豆實菹醢先祭預備有百日而成者天子之庶羞百有二十品大夫賔尸禮有司徹云宰夫羞房中之羞于尸侑主人主婦皆右之司士羞庶羞于尸侑主人主婦皆左之三羞所以盡歡心房中之羞其籩則糗餌粉餈其豆則酏食糝食庶羞羊臐豕膮皆有胾醢內羞右隂也庶羞左陽也獻酬者孔疏舉鄭云凡主人酌賔為獻賓既酢主人主人又飲酌賔曰酬至旅而爵交錯以遍鄭箋行葦云進酒于客曰獻客答之曰酢主人又洗爵酬客客受而奠之不舉也我孔熯矣式禮莫愆禮行既久筋力竭矣而式禮莫愆敬之至也祭將畢祝致神意以嘏主人曰爾飲食芬潔故報爾以福祿使其來如期其多如法爾奉其祭祀整齊極疾誠正謹固故錫爾中和之福至于時萬時億之多也少牢嘏辭云皇尸命工祝承致多福無疆于汝孝孫來汝孝孫使汝受祿于天宜稼于田眉壽萬年勿替引之是其類也禮儀既備鐘鼓既戒祭祀畢矣孝孫往位堂下西面位也工祝致告告利成也神具醉止如見之也皇尸則起鳴鼓鐘以送尸謂奏肆夏鄭氏曰神醉而尸謖送尸而神歸謖起也尸出而可徹諸宰徹去諸饌膳夫諸宰之屬君婦徹籩豆而已不遲以疾為敬祭祀畢歸賔客之爼同姓則留與之燕所以尊賔客親骨肉少牢禮祝執其爼以出賔爼也特牲曰祝命徹爼豆籩設于東序留燕同姓也信彼南山維禹甸之畇畇原隰曾孫田之我疆我理南東其畝上天同雲雨雪氛氛益之以霡霂既優既渥既霑既足生我百穀疆埸翼翼黍稷彧彧曾孫之穡以為酒食卑我尸賔壽考萬年中田有廬疆埸有瓜是剝是菹獻之皇祖曾孫夀考受天之祜祭以清酒從以騂牡享于祖考執其鸞刀以啓其毛取其血膋是蒸是享苾苾芬芬祀事孔明先祖是皇報以介福萬壽無疆一章信彼南山之野周京于鎬南距于山其田廣也維禹治水水土之平九州皆有丘甸之法而周人獨指所據而言之畇畇然髙原下隰之墾辟乃周家后稷之子孫所以廣五服為九服踐禹之功物土之宜而布田疇之利也或南或東其畝順地及水之所趨也乘敶甸音同二章言上天將雪而同雲一色氛氛之雪益之以小雨之霡霂冬春之交潤澤饒洽優說文作瀀生我百榖詩人之于田事或舉天時或舉地利或舉人事此言時和之義也三章言黍稷之祭疆埸翼翼而閒整埸畔也黍稷彧彧而茂盛曽孫之穡斂穫之者以為酒食卑豫我尸賓謂獻熟食并酌齊獻尸尸因酌以酢助祭之賓并祭畢燕同姓于燕寢亦謂之賓也壽考萬年祭而獲福之義也四章言備物之祭田中有廬以便田事畔上種瓜剝削淹漬為菹瓜之新熟獻于天子乃為菹以供祭祀貴四時之異物以順孝子之心皇祖宜之則所謂受天之祜也五六章言牲牡之祭祭則惟鬱鬯并五齊是用𤣥酒不忘古三酒諸臣之所酢鬱草煮以和所釀之秬曰鬯五齊一泛二醴三盎四緹五沈三酒一事二昔三清此清酒謂清潔之酒也周牲尚赤郊廟用騂享于祖考執其刀有鸞者割以中節鬱以降神乃迎牲納亨充人贊碩助牽入麗于碑王執刀以啓耳之毛告純也豆薦其血告殺也膋以升臭合之于黍稷實之于蕭合馨香也郊特牲取膟膋燔燎升首報陽也鬱合鬯臭隂逹于淵泉灌以圭璋用玉氣也迎牲而蕭合黍稷臭陽逹于牆屋既奠焫蕭合羶薌求于陰陽之義也膋腸間脂也是蒸進是享祀苾苾芬芬香氣之盛祀事于是甚明先祖以是美之報以大福而萬壽無疆也倬彼甫田歲取十千我取其陳食我農人自古有年今適南畝或耘或耔黍稷薿薿攸介攸止蒸我髦士以我齊明與我犧羊以社以方我田既臧農夫之慶琴瑟擊鼓以御田祖以祈甘雨以介我稷黍以穀我士女曾孫來止以其婦子饁彼南畝田畯至喜攘其左右嘗其㫖否禾易長畝終善且有曾孫不怒農夫克敏曾孫之稼如茨如梁曾孫之庾如坻如京乃求千斯倉乃求萬斯箱黍稷稻粱農夫之慶報以介福萬壽無疆言倬乎明哉周人治田之法甫大之田歲于一成九萬畝中取萬畝百夫之地公田十千之入所謂十一也我又取其國用之餘陳陳相因者以食我農人此自古有年之法也今周王適往南畝以勞農見其耘草雍本黍稷之禾薿薿而盛乃介助而休息之又于其間蒸進其髦俊者以勞勉之管仲曰野處而不昵其秀民之能為士者必足賴也以我齊明以下謂將省耕而為來方祈年之祭也齊與粢同器實曰齊在器曰盛曲禮稷曰明粢肆師粢六穀也以我明粢與我純色之羊大牢在焉祭社則五土之神以后土配后土官也勾龍名也共工之子也所謂冡土大社也方則迎四方氣于郊也曲禮天子祭四方嵗遍謂五官之神勾芒東祝融后土南蓐收西𤣥冥北此其春夏之方與迎氣以五帝五官配木帝大皥火炎帝土黃帝后土金少皥水顓頊我田既臧農夫之慶祝之之辭也琴瑟擊鼓以迎田祖若神農謂之先嗇前漢志田祖稷神烈山氏之子曰柱為稷夏以上祀之周棄亦為稷商以來祀之又籥章曰祈年于田祖吹豳籥擊土鼓以樂田畯生而為田畯死而為田祖亦其義也以祈甘雨以介我稷黍以穀我士女皆祝之之辭也曾孫之來省耕見耕者以其婦子饁彼南畝田大夫往來勸相其間喜甚攘取其左右之餉而嘗之喜之甚而取之疾也見其禾之易治竟畝如一知其終善且有曾孫不怒以其力耕若惰則怒矣農夫克敏于田事此王之所以不怒也曾孫之稼以下皆預言豐年可必之事曾孫之稼如茨之覆屋如橋之髙廣曾孫之庾如水中之坻又如髙丘乃求千倉以處萬箱以載黍稷稻粱無所不有民曰曾孫之庾君曰農夫之慶其情可知矣報以介福萬壽無疆此民頌君之辭也大田多稼既種既戒既備乃事以我覃耜俶載南畝播厥百穀既庭且碩曾孫是若既方既皂既堅既好不稂不莠去其螟螣及其蟊賊無害我田稚田祖有神秉卑炎火有淹萋萋興雨祁祁雨我公田遂及我私彼有不穫稚此有不斂穧彼有遺秉此有滯穗伊寡婦之利曾孫來止以其婦子饁彼南畝田畯至喜來方禋祀以其騂黑與其黍稷以享以祀以介景福言大田則可以多稼矣方其始既擇其種而出童粱既戒飭其田具既備乃事矣至孟春土長冒橛陳根可拔而事之冬土定㧻橛于地與地平至孟春土氣升長而冒覆于橛則舊陳之根可拔以我覃利之耜俶載南畝播厥百榖其生也既直且大以順王之所欲方謂甲始生未合時實未堅者曰皂盡堅熟齊好矣擇種取細粒鋤禾除非類則無童節之稂似苖之莠矣食心曰螟葉曰螣根曰蟊節曰賊皆蝗類也去者鬼神自去之言皆無也去其害苖之物則可養再生之稻此皆田祖有神焉我秉畀炎火也炎火猶言陽消隂也有淹萋萋雲興之貌淹浸也興雨祁祁而不暴疾孟子曰方里而井井九百畝其中為公田八家皆私百畝同養公田雨公及私此民愛君之言萋凄同淹黤同穧積筥同禾之秉一把米之秉十六斛禾之筥四把米之筥五斗百榖齊熟收刈力有不足聽鰥寡取之稚晚而刈所不及穧鋪而未束秉謂禾把載之不盡滯漏之禾穗成而亂折者曾孫來止謂秋省斂之時其婦子饁彼南畝田畯至喜來方禋祀或南則騂或北則黑精意以享曰禋以其牲牡與其黍稷以享以祀以介景福報祀而獲福也王者所出山川原隰之有神護民之稼穡者靡不祭之所謂大報祭也四篇皆成民致力于神命意不同各舉祀典之凡亦可互見也瞻彼洛矣維水泱泱君子至止福祿如茨韎韐有奭以作六師瞻彼洛矣維水泱泱君子至止鞞琫有珌君子萬年保其家室瞻彼洛矣維水泱泱君子至止福祿既同君子萬年保其家邦言視彼洛水泱泱深廣諸侯至止先王錫之福祿如茨者如蓋屋之多衣其韎草所染赤色之韐韋蓋戎事韋辨服而以韐代韠左𫝊所謂韎韋之跗注者天子六軍或有征伐因諸侯之來朝命起師旅以助伐有罪也韠者刀之鞘也上以琫飾下以珌飾所謂容刀也既爵命之又賜豫之天子玉琫珧珌諸侯璗琫璆珌大夫鐐琫鏐珌士珕琫珕珌萬年保其家室延子孫而安封土之意也福祿攸同天子所推而與同也家邦猶家室也裳裳者華其葉湑兮我覯之子我心寫兮我心寫兮是以有譽處兮裳裳者華藝其黃矣我覯之子維其有章矣維其有章矣是以有慶矣裳裳者華或黃或白我覯之子乘其四駱乘其四駱六轡沃若左之左之君子冝之右之右之君子有之維其有之是以似之按此萹永樂大典闕卷交交桑扈有鶯其羽君子樂胥受天之祜交交桑扈有鶯其領君子樂胥萬邦之屏之屏之翰百辟為憲不戢不難受福不那兕觥其觩㫖酒思柔彼交匪敖萬福來求交交往來貌桑扈竊脂鳥也或以為竊肉或以為竊其色故桑曰竊脂棘曰竊丹又有竊毛謂色淺白也其羽鶯然有文章以喻古之君子以禮儀文章升降于朝廷而樂循乎是故足以受天之福桑扈將動其羽先奮其翼文采四張鶯然可愛君子樂于禮文之交際故足為萬邦之屏蔽也之屏之翰翰幹也築牆立兩木曰楨當牆兩邉而障土者曰幹四方諸侯視以為法不戢戢也不難難也不多多也戢則不肆難則不易動而以禮故受福多也禮者人之所憚而君子樂其粲然有文以相接小人樂於易其事而肆其心曾桑扈文章之不如也鴛鴦于飛畢之羅之君子萬年福祿宜之鴛鴦在梁戢其左翼君子萬年宜其遐福乘馬在廏摧之秣之君子萬年福祿艾之乘馬在廏秣之摧之君子萬年福祿綏之舉一物以興其餘欲明取于萬物有道且以鴛鴦言之水禽匹鳥之有文者不雛不卵不射其宿俟其生者既就能飛者然後張羅以待執畢以掩之罔小而柄長曰畢鳥罟曰羅獺祭魚而後漁豺祭獸而後田古者取于物視天之時與物之時也明王如此仁民恤物宜其萬年受天福祿也梁橋梁魚梁石絶水亦曰梁鴛鴦休息而戢翼人不駭之自若而無恐懼人無害禽之心禽無疑人之意此古者鳥鵲之巢可俯而窺之類也欲明奉養有節且以乘馬言之無事則委以所之芻有事則豫之以穀摧字也秣榖馬也明王如此其愛國用宜萬年而福祿久之且安之也有頍者辨實維伊何爾酒既旨爾殽既嘉豈伊異人兄弟匪他蔦與女蘿施于松柏未見君子憂心奕奕既見君子庶幾說懌有頍者辨實維何期爾酒既旨爾殽既時豈伊異人兄弟具來蔦與女蘿施于松上未見君子憂心怲怲既見君子庶幾有臧有頍者辨實維在首爾酒既旨爾殽既阜豈伊異人兄弟甥舅如彼雨雪先集維霰死喪無日無幾相見樂酒今夕君子維宴頍舉頭貌有頍然者皮辨之冠實維伊何乎當服之以燕辨者冠總名爵辨士祭服韋辨即戎冠辨從禽皮辨上下通服陪臣卿大夫皆得服之天子皮辨日視朝燕亦皮辨天子燕服有二燕羣臣用𤣥冠王制周人冕而祭𤣥衣而養老𤣥衣素裳其冠委貌爾王之酒旨美矣王之殽嘉善矣足能具禮何以不用與族人燕乎豈伊更有異人皆王宗族兄弟非有他人蔦與女蘿施于松柏之上依松柏也九族托王之尊王政明而榮王政衰而微亦猶是也蔦寄生草松蘿蔓生松上枝正青與絲異奕奕憂心無所薄也君子幽王也思見王而悅懌不可得也何期者猶伊何也時善也具皆也怲怲憂之多也臧善也阜多也謂吾舅者吾謂之甥如彼雨雪先集維霰天將大雨雪始必微溫雪自上而下遇溫氣而消釋集聚而摶謂之霰積久而雪之寒氣勝則大雪散下大戴禮曽子曰陽之專氣為霰隂之專氣為雹間關車之舝兮思孌季女逝兮匪飢匪渴德音來括雖無好友式燕且喜依彼平林有集維鷮辰彼碩女令德來教式燕且譽好爾無射雖無旨酒式飲庶幾雖無嘉殽式食庶幾雖無德與女式歌且舞陟彼髙岡析其柞薪析其柞薪其葉湑兮鮮我覯爾我心寫兮髙山仰止景行行止四牡騑騑六轡如琴覯爾新昏以慰我心間關然設我車之舝兮思我孌然有齊莊之季女而往迎之矣我飢不以為飢兮我渴不以為渴兮欲望此女令德善音來括㑹于王兮雖無以好樂之友親之式用燕飲且為之喜悅兮依彼林木之在平地兮有集者惟鷮雉之鳥耿介矣我思碩女之來亦如此雉之集矣庶其以令德來教我王兮式燕式安且以美譽譽之好爾賢女而無射兮雖無旨酒庶與爾飲兮雖無嘉殽庶與爾食兮雖無德以與此賢女式歌舞以樂之兮陟彼髙岡析其柞木之薪以其葉之湑盛析薪以興昏姻兮善我所見我心輸寫而無憂兮柞湑岡髙誠可仰而欲有所庶及兮德音來括令德來教誠可則而行之不已兮我舝我車又以騑騑四牡如琴六轡可以駕言御之兮見爾新昏庶幾以慰我心矣景行猶言大道也表記曰小雅曰髙山仰止景行行止子曰詩之好仁如此鄉道而行中道而廢忘身之老也不知年數之不足也俯焉日有孳孳斃而後已聖人之觀詩觸類而長如此舝無事則脫行乃設之依茂木貌平林林木之在平地者鷮雉也四足之美有麃兩足之美有鷮鷮走且鳴乘輿尾為防釳著馬頭上陸璣云鷮小于鸐也以飲以食而以譽之無非德也所謂醉酒飽德詩人之所謂無德與女謙而甚愛之也詩人之言大抵欲幽王去不賢之后妃而來后妃之賢者也營營青蠅止子樊豈弟君子無信讒言營營青蠅止于棘讒人罔極交亂四國營營青蠅止于榛讒人罔極構我二人往來青蠅止於樊圃之藩汙白使黑汙黑使白蛆變無已驅去復還如讒人之不直逹而營營也樂易王者其無信此讒言乎營為謍樊為樊古字也止于樊行且至于几席盤杅之間止于棘止于為藩之棘罔極無已也四國四方也榛亦所以為藩也構合而交亂也二人即見讒而言也賔之初筵左右秩秩籩豆有楚殽核維旅酒既和旨飲酒孔偕鐘鼓既設舉酬逸逸大侯既抗弓矢斯張射夫既同獻爾發功發彼有的以祈爾爵籥舞笙鼓樂既和奏蒸衎烈袓以洽百禮百禮既至有壬有林錫爾純嘏子孫其湛其湛曰樂各奏爾能賔載手仇室人入又酌彼康爵以奏爾時賔之初筵溫溫其恭其未醉止威儀反反曰既醉止威儀幡幡舍其坐遷屢舞仙仙其未醉止威儀抑抑曰既醉止威儀怭怭是曰既醉不知其秩賔既醉止載號載呶亂我籩豆屢舞僛僛是曰既醉不知其郵側辨之俄屢舞傞傞既醉而出竝受其福醉而不出是謂伐德飲酒孔嘉維其令儀凡此飲酒或醉或否既立之監或佐之史彼醉不臧不醉反恥式勿從謂無俾大怠匪言勿言匪由勿語由醉之言俾出童羖三爵不識矧敢多又一章賔之初筵其初鋪陳曰筵藉之曰席賔初即席筵上左右秩秩肅敬而有序籩實殽核豆實葅醢楚列而旅陳酒既調美飲者甚齊一也鐘鼓既設者天子宮縣階間妨射位故改縣以避射諸侯三靣有二建鼓無鐘磬大射不改縣主人酌賓曰獻賓酢主人主人又自飲而酌賓曰酬賓受之奠于席前而不舉至旅而遂舉所奠之爵交錯以遍也逸逸往來有序也天子諸侯之射皆張三侯大侯君侯也司裘射人王三侯虎熊豹飾其側也巾車諸侯大射亦三侯前期三日而張矣將射司馬乃命弟子脫束繫左下綱抗舉也大侯張而弓矢張節也天子大射賔射皆六耦射夫既同比其耦也各奏其發矢中的之功大射之侯各因其皮方制為質謂之鵠賔射之侯采畫為正正大如鵠中三之一燕射侯中畫為獸皆二尺爵謂射之不中者飲豐上之觶也一曰射者心競云以求爵女也一曰求中以辭爵也先王將祭必大射以擇士將射必先行燕禮既安賔然後改縣以避射既旅然後張侯及弓比其射夫而耦之然後拾發求勝以爵其不勝者拾更也更代以發四矢大射禮曰上射既發挾矢而後下射射始發以將乘矢二章秉籥而舞與笙鼓相應言文舞以見干舞言笙鼓以見八音樂既和奏進樂我有功烈之祖以合事神之衆禮有壬其大有林其衆也鄭云卿大夫為壬諸侯為林神錫大福嘏謂尸與主人以福子孫其湛其湛曰樂各奏爾能則又既祭而燕燕而射矣先王用酒也常以祭祀其飲也常以射賓賓射則手敵主黨入射則又手敵酌彼安體養病之爵以飲不中者也以奏爾時所謂時措之宜也三章言幽王燕賔失禮之事賔初升筵尚溫溫和柔而恭敬未醉之時威儀猶能反反然謹重能自敕戒以禮至于既醉幡幡失其威儀蓋旅酬而小人之態出君臣賓主各有定位以象天地日月舍其本坐遷向他處數數起舞仙仙然未醉則謹禮而密靜既醉則怭怭而媟嫚犯貴于朝廷犯齒于袵席是曰既醉不知其常禮昏亂無次矣第四章言既醉則號呼嚾呶雜亂籩豆亦無次序羣舞傾側不知其過傾側其辨俄然而頽矣數舞傞傞又不能止矣夫古者燕禮賓醉北面而坐取其薦脯以降奏陔賓所執脯以賜鍾人于門內霤遂出故武公曰既醉而出則並受其福矣醉而不出是謂自誅伐其德也夫飲酒之甚嘉者維其令儀乎五章言凡人之飲酒或醉或否無量不及亂可也古者立之監佐之史所以正其威儀而書其過若司正之類今幽王之飲所謂監史反用以强人之醉彼醉已非善也而爾可以不醉為恥乎式勿從其謂告無俾泰怠此武公自警之辭也匪言其勿言也匪用其勿語也由醉之言無所不至俾出童首無角之羖羊不其誕乎夫爵有三曰獻曰酢曰酬蓋行三爵之禮而非賓主皆飲三爵也三爵則昏然矣况又敢多飲乎此丁寧戒之之辭也大抵觀人于平居無事之時不若觀之于應事接物之際至于飲酒初治終亂猶可見君子小人之態君子者始終如一能安其常小人則不可掩矣是故賢者當勉以思其中也酒誥曰爾乃飲食醉飽爾尚克稽中德魚在在藻有頒其首王在在鎬豈樂飲酒魚在在藻有莘其尾王在在鎬飲酒樂豈魚在在藻依于其蒲王在在鎬有那其居魚以依蒲藻為得其性頒大首貌莘長尾貌仰而頒其首見俯而長其尾見自得也武王之在鎬京豈樂飲酒豈亦樂也有那其居那者安也以魚而言物之樂也飲酒豈樂與人樂也有安其居王之樂也文王之靈臺武王之鎬京大抵皆此意采菽采菽筐之筥之君子來朝何錫豫之雖無豫之路車乘馬又何豫之𤣥衮及黼觱沸檻泉言采其芹君子來朝言觀其旗其旗淠淠鸞聲嘒嘒載驂載駟君子所届赤芾在股邪幅在下彼交匪紓天子所豫樂只君子天子命之樂只君子福祿申之維柞之枝其葉蓬蓬樂只君子殿天子之邦樂只君子萬福攸同平平左右亦是率從泛泛楊舟紼纚維之樂只君子天子葵之樂只君子福祿膍之優哉游哉亦是戾矣菽大豆也所以芼大牢而待君子牛則菽羊則苦豕則薇以葉為饗賓牛爼鉶羮之藿舉其一端而言耳采菽而筐筥之敬之至也諸侯來朝何錫豫之雖無豫之亦以車馬同姓金路異姓象路乘馬駟也又何豫之亦以衣裳𤣥衮卷龍之衣及黼裳也衮上公之服舉尊者言黼下通絺冕舉備者言亦取筥馬為韻𤣥衣畫以卷龍龍首卷然謂之衮司服九章龍山華蟲火宗彝畫以繢在衣藻粉米黼黻絺以繡在裳侯伯鷩冕而下畫雉即華蟲衣三裳四子男毳而下畫虎雖即宗彝衣三裳二絺衣粉米無畫衣一裳二𤣥冕衣無丈裳刺黻而已終南曰黻衣繡裳𤣥冕也言黻衣者總名也言繡者刺之義也黼黻皆絺刺之衮則畫之錦衣狐裘皮辨服也白與黑謂之黼觱沸檻泉正出之泉觱沸而深言采其芹可以為菹亦采菽之義也君子來朝王國迎之觀其車服旌旗旗則淠渒然動得宜車馬鸞鈴之聲又嘒嘒然鳴中節馬既兩服三之為驂四之為駟者君子所至也明王於諸侯其所尊敬法制之極也赤芾在股者芾蔽膝古以韋後以布帛上廣一尺下二尺長三尺頸五寸肩革帶博二寸冕服曰芾他曰韠芾字亦為韍玉藻君朱大夫素士爵韋明堂位有虞氏服韍注舜始作之以尊祭服士爵辨韎韐皮辨素韠元端爵韠邪幅在下幅逼也左氏帶裳幅舄如漢行縢逼束其脛自足至膝彼其交接自逼束如此非有解怠紓緩之心天子之所豫也樂只君子天子命之樂只君子福祿申之命之者或錫豫之命或命之為五等有命爵命車命服焉申之謂人謀鬼謀也明君爵有德祿有功必賜爵祿于太廟而今不然也維柞木之枝其葉蓬蓬枝葉之盛足庇本根也幹之與枝亦猶祖之與子孫也於賢者而命賜之如葉之新將生舊乃落于地其枝常有葉以葉相承無衰落如繼世以德相承也樂只君子鎮撫天子之邦國亦猶是也萬福攸同天子之所與共也平平辨治也諸侯治其連屬之國莫不修順從服古之盛也魏絳曰便蕃左右韓詩曰便便左右或以為諸侯之臣也泛泛楊舟以紼繂纚緌而維制之喻天子以禮法維持諸侯之意也葵者揆度其功德也福祿膍之者謂饒厚之也優哉游哉亦冝其是至于王所矣一詩之中言樂只君子者六樂之者詩人樂君子有可樂之德而王亦樂于禮遇錫命之凡我諸侯無不優游而樂也騂騂角弓翩其反矣兄弟昏姻無胥遠矣爾之遠矣民胥然矣爾之教矣民胥效矣此令兄弟綽綽有裕不令兄弟交相為愈民之無良相怨一方受爵不讓至于已斯亡老馬反為駒不顧其後如食冝飫如酌孔取毋教猱升木如塗塗附君子有徽猷小人與屬雨雪瀌瀌見睍曰消莫肯下遺式居婁驕雨雪浮浮見睍曰流如蠻如髦我是用憂調和角弓其色赤弓備角幹筋膠絲漆而角之中恆當弓之隈張之則內向弛之則外反而去兄弟昏姻宜親而不宜相踈遠也爾遠則民怨爾教則民效不可不謹也令善兄弟綽有餘裕不善兄弟交相為病矣天下善人少惡人多王謹所以率之也民之無良者躬自薄而厚責于人蔽于利害相怨一方受爵而不讓專利而不顧貪而至于亡也老馬反為駒言明不知長少之義也不顧其後無以率子孫也如食以飽如酌以多取其宜于一時耳猱之升塗之塗不待教而能不待附而著王無助小人之為惡也先王有至德要道上下無怨民用和睦此之謂徽猷則小人與屬而不可解矣雨雪瀌瀌而盛見晛而消矣王不肯降心以相從式居于上而屢驕慢浮浮猶瀌瀌流者流而去王之于骨肉如夷狄然無禮義仁恩我是用益憂也有菀者桞不尚息焉上帝甚蹈無自昵焉俾豫靖之後豫極焉有菀者栁不尚愒焉上帝甚蹈無自瘵焉俾豫靖之後豫邁焉有鳥髙飛亦傅于天彼人之心于何其臻曷豫靖之居以凶矜按此萹永樂大典缺卷彼都人士狐裘黃黃其容不改出言有章行歸于周萬民所望彼都人士臺笠緇撮彼君子女綢直如髮我不見兮我心不說彼都人士充耳琇實彼君子女謂之尹吉我不見兮我心苑結彼都人士垂帶而厲彼君子女卷髮如蠆我不見兮言從之邁匪伊垂之帶則有餘匪伊卷之髮則有旟我不見兮云何盱矣此詩一章言長民者二章三章四章五章言士女之化其上者都邑之士近政化者也彼都人士狐裘其色黃黃其容貌既有常言語又有法度所行之行又歸忠信表裏如一故為下民所仰望而取法也彼都人士謂士君子其在野者以臺草為笠緇布之冠以撮其髻舉笠緇以見其服彼君子女其髮綢密正直如也舉髮以見其飾我不見兮我心不說傷今思古也充耳琇實以美石為瑱塞其耳盛服之用也謂之尹吉尹氏姞氏貴族有禮法不見而屈結其心也垂帶而厲厲垂帶貌大帶垂三尺其鬢傍短髮曲上卷然如蠆蟲也長尾為蠆短尾為蠍得見而從之邁思之甚也帶由其有餘而垂之髮由其自揚而卷之從自然而非强之也不見而盱病云何乎哉終朝采緑不盈一掬豫髮曲局薄言歸沐終朝采藍不盈一襜五日為朝六日不詹之子于狩言韔其弓之子于釣言綸之繩其釣維何維魴及鱮維魴及鱮薄言觀者自旦及食時為終朝録王芻也爾雅菉王芻郭璞云鴟腳莎楚詞薋菉葹以盈室終朝采之不滿乎掬怨曠之深憂思不專于事婦人夫不在則不容飾薄言待君子之歸沐乎藍染草也衣蔽前謂之襜五日為期六日不詹未久也而人已望而憂矣君子往狩我則為納弓于韔中君子往釣我則為緡繩于竿今遠行從役而不至故思其如此也繳生絲縷釣與弋射繩皆生絲為之弋繫繩于矢謂之􅌳射繫繩于釣竿謂之釣􅌳下章因上章又言其釣維何得魚之多使觀者樂今久而不歸使我思也芃芃黍苖隂雨膏之悠悠南行召伯勞之我任我輦我車我牛我行既集蓋云歸哉我徒我御我師我旅我行既集蓋云歸處肅肅謝功召伯營之烈烈征師召伯成之原隰既平泉流既清召伯有成王心則寧芃芃長大之黍苖以隂雨之澤膏潤之悠悠衆多而南行者是營謝邑之人召伯則又能勞來勸說以先之嵩髙言王命召伯定申伯之宅又曰因是謝人是也其轉運有負任者有挽輦者有將車者有牽傍牛者營謝既畢召伯則勞之云可歸哉言宣王之時工役有期臣司其職也蓋者示不敢専器物人所負持任在前負在背生民以任為抱此謂提荷皆任也輦車人挽以行大車駕牛將者車中有牛而將之牽傍牛在轅之外别牽傍之牛人云凡軍旅行役共其兵車之役與其牽傍罪𨽻云凡封國若家牛助為牽傍營謝封國之類也士卒有徒行者御車者五百人為旅五旅為師君行師從卿行旅從蓋云歸處勞其將歸之辭也肅肅嚴整之謝功召伯營之烈烈威武征行之師定中國平淮夷皆召伯董其成也十土之利原隰利民田土治曰平水治曰清相其原隰之宜通其泉水之利此功既成宣王之心則安也隰桑有阿其葉有難既見君子其樂如何隰桑有阿其葉有沃既見君子云何不樂隰桑有阿其葉有幽既見君子德音孔膠心乎愛矣遐不謂矣中心藏之何日忘之隰中之桑枝條阿然而長葉則難然而盛有此䕃凉以利人喻君子在野有覆養之德以澤利斯民也沃謂長茂光潤如膏之沃幽柔而軟純黑之色思君子而見之一章言其樂如何二章言云何不樂三章言其德音甚膠固于人四章言心乎愛矣雖遠而不謂之遠矣中心藏之何日忘之雖久易忘而不能忘也白華菅兮白茅束兮之子之遠俾我獨兮英英白雲露彼菅茅天步艱難之子不猶滮池北流浸彼稻田嘯歌傷懷念彼碩人樵彼桑薪卬烘于煁維彼碩人實勞我心鼓鐘于宮聲聞于外念子懆懆視我邁邁有鶖在梁有鶴在林維彼碩人實勞我心鴛鴦在梁戢其左翼之子無良二三其德有扁斯石履之卑兮之子之遠俾我疧兮按此萹永樂大典缺卷綿蠻黃鳥止于丘阿道之云遠我勞如何飲之食之教之誨之命彼後車謂之載之綿蠻黃鳥止于丘隅豈敢憚行畏不能趨飲之食之教之誨之命彼後車謂之載之綿蠻黃鳥止于丘側豈敢憚行畏不能極飲之食之教之誨之命彼後車謂之載之綿蠻然小鳥之聲止于丘之曲阿靜安之處而託息焉喻有所依也今不得其依則道之云遠我之行役其勞如何乎飲之食之教之誨之命彼後車謂之載之此思古者大臣不棄微賤之處也丘隅丘角也豈敢憚行恐其疲勞不能疾趨耳丘側丘傍也極至也幡幡瓠葉采之亨之君子有酒酌言嘗之有斯首炮之燔之君子有酒酌言獻之有斯首燔之炙之君子有酒酌言酢之有斯首燔之炮之君子有酒酌言酬之熟瓠葉之新生者以為飲酒之葅也瓠葉首猶與賔客享之幽王有牲牢饔餼而不肯用也一之微尚并毛而炮之加火而燔之曰燔以物貫之而炕于火上曰炙以為飲酒之羞嘗嘗其旨否也獻酌賔也酢賔卒爵洗而酌主人也漸漸之石維其髙矣山川悠遠維其勞矣武人東征不皇朝矣漸漸之石維其卒矣山川悠逺曷其沒矣武人東征不皇出矣有豕白蹢蒸涉波矣月離于畢俾滂沱矣武人東征不皇他矣漸漸之髙石悠逺之山川病其髙而亷利怨其勞而不息武人東征久處于外不皇朝見天子矣卒崔嵬也沒盡也深入險阻不得出也有豬白蹄曵泥其性也久雨則進涉水波月離于畢好雨之星則雨滂沱矣風土也木妃雨木也金妃東宫箕好風西宮畢好雨南宮好𤾉北宮好燠中宮四季好寒履險遇雨征行尤苦蒸以山嵐困以雨水憂不及他也苕之華藝其黃矣心之憂矣維其傷矣苕之華其葉青青知我如此不如無生牂羊墳首三星在羀人可以食鮮可以飽何草不黃何日不行何人不將經營四方何草不𤣥何人不矜哀我征夫獨為匪民匪兕匪虎率彼曠野哀我征夫朝夕不暇有芃者狐率彼幽草有棧之車行彼周道按二萹永樂大典缺卷
