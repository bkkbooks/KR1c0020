body:
  text: 毛詩講義卷七宋林岊撰大雅一文王在上於昭于天周雖舊邦其命維新有周不顯帝命不時文王陟降在帝左右亹亹文王令聞不已陳錫哉周侯文王孫子文王孫子本支百世凡周之士不顯亦世世之不顯厥猶翼翼思皇多士生此王國王國克生維周之楨濟濟多士文王以寧穆穆文王於緝熙敬止假哉天命有商孫子商之孫子其麗不億上帝既命侯于周服侯服于周天命靡常殷士膚敏祼將于京厥作祼將常服黼冔王之藎臣無念爾祖無念爾祖聿修厥德永言配命自求多福殷之未喪師克配上帝宜鑒于殷駿命不易命之不易無遏爾躬宣昭義問有虞殷自天上天之載無聲無臭儀刑文王萬邦作孚文王之雅言文王受天之命興造周邦也文王在上毛氏以為在民上此固一説也然詩人追述文王恐不止此嘗試論之文王之雅曰文王在上大明之雅曰明明在下赫赫在上下武之雅曰三后在天赫赫在上天之赫赫在上也文王在上文王之精神與天同其在也三后在天太王王季文王皆同在天也夫天者氣之清而理之自然者也易曰一隂一陽之謂道繼之者善也成之者性也天之昭昭其至善者渾然而已矣命于人之謂性堯舜文王得之不為有餘惟能全其善以同乎天也及其氣形既盡性則天性堯舜文王不得認為私有法式垂世精神在天堯舜萬世如見文豈不在兹乎是堯舜文王之生天其人也堯舜文王之沒天其天也此詩人所以有文王在上於昭于天之詠也於美辭也言天之昭昭而文王亦昭昭也天不巳文王亦不已天昭昭文王亦昭昭由其不巳之純所以昭昭之著文王昭昭既與天同故周自太王胥宇雖舊日積纍之邦帝之眷命于今者至武王而得天下其新造邦自文始也有周豈不顯乎顯也帝命豈不時乎時也天自然也帝主宰也文王陟降在帝左右者此言文王平日仰承天心俯盡人事動靜升降皆在上帝之左右即所謂上帝臨汝無二爾心陟降厥士日鑒在兹也亹亹文王令聞不已者此言文王亹亹自勉令善聲聞不已即維天之命純亦不已文王之德之純也有德之純然後有聞之不已也天于是乎久錫我周維其文子文孫及于周之羣臣故子孫百世而周邦之士豈不顯乎亦世其世也世世而顯其謀翼翼恭敬思美多士生我王國維周之幹濟濟多士乎文王所賴以寧也寧其家邦寧其心志也濟濟翼翼秉文之德也棫朴之詩曰濟濟辟王左右趣之濟濟威儀之多臣化其君而成德君賴夫臣以成治如種必生炊必熟效可立見上下相須孰謂正心誠意非治國平天下之本乎穆穆文王於緝熙敬止者穆穆和也此言文王之穆穆而和於乎美哉緝續熙廣其敬也文王之敬即堯舜之欽也帝典述堯第一義曰欽明文思周雅述文王第一篇曰緝熙敬止由是推之典謨之言欽芒寒麗天也此篇言敬以亹亹穆穆緝熙陟降百川同源也能敬而和禮樂在是矣上章言亹亹而承天錫施周之孫子多士此章言穆穆而固天命有商之孫子多士互形容其敬也商之孫子其數不可億計矣上帝既命維于周之九服為周之臣而不于商矣以此見天命之靡常而盛德不可為衆也商士膚美而敏疾助周之祭將行其灌鬯之禮于京師之地自服商之常服其衣則黼白與黑也其冠則冔亦殷冠也非夏收周冕也故有德者保其孫子保其臣下無德者失其孫子失其臣下雖子孫臣下之賢亦不能以自立而聽天命之所之此詩人勸戒之深也王之藎臣無念爾祖者此謂成王當念爾祖也指其所進之臣猶敢告僕夫之義也况夫羣臣即前王之本支多士也念祖在于述修其德永長言我配命之道自求多福而已己不自求而邀之天無是理也昔殷未失師衆之時能配上帝之命以德言則曰昭以命言則曰配故曰堯舜文王之德皆昭天也夏殷周之命皆配帝也天主宰羣物君君師萬民有配合相助之義所謂其助上帝寵綏四方也殷今亡矣宜鑒于殷知天命之甚難命之甚難今天新我周邦自于文王則我文孫當祈天永命無使遏止于爾躬宣遍昭明其義善之問于老成人又虞度殷先哲王稽謀自天此兩句乃書中義理書曰今相有殷天迪格保面稽天若今時既墜厥命今沖子嗣則無遺夀耉曰其稽我古人之德矧曰其有能稽謀自天鄭康成粗能發明之成王下工夫處在敬之訪落是也虞殷自天而天無聲臭天無聲臭而儀刑文王是高一節而妙一節妙一節而近一節也詩人不獨使成王求之商而欲其求之天不徒欲成王求之天而欲其求之文王以天之事無聲無臭而文王之敬亦何聲臭之可求于是而儀式刑我文王之德其萬邦興起孚信矣乎天德純一天命流行人心孚信非異道也文王論天下未嘗無士也文王獨稱多士者養之以敬用之以敬也何謂養之以敬周公為雅以戒成王其辭若曰文王之敬德不特周之子孫茂其本支而周之士亦世守而昌盛商紂之喪德不特商之孫子失其祿位而商之士亦轉移而之他夫古之聖人修身無斁純亦不已皇自敬德人才涵養于斯時也鳶飛魚躍者高深之適性金相玉質者追琢之成文所謂雍雍在宫肅肅在廟成人有德小子有造者是也文王養士之敬當于無聲無臭求之矣何謂用之以敬周公為書以戒成王其辭若曰文王敬事上帝三宅三俊之心灼見而克知之庶言庶獄庶謹罔攸兼而罔敢知之夫古之聖人有天下而不與用人猶已蔑德降于國人人才奮用于斯時也往來兹迪彝教小大咸懷忠良侍御僕從罔非正人夷微廬蒸庶常吉士所謂庸庸祗祗威威顯民用肇造我區夏者是也文王用士之敬又當于不識不知求之矣嗚呼自朝至于日中昃不遑暇食文王則勞于思治矣然堯舜無為而無所不為急親賢也文王罔攸知而無所不知樂與賢也至誠樂與賢者則士生王國如槱之積如魚之蒸如菁莪之喜樂如卷阿之來遊來歌皆氣類之感召耳文王之心在帝左右惟此敬也敬者萬化之原一身之本推而養士者以此推而用士者亦以此養之而以此正已也用之而以此虛已也正已以率之則美化行虛已以任之則庶事備周世世多士詩書稱文王獨盛者豈無故而然歟明明在下赫赫在上天難忱斯不易維王天位殷適使不挾四方摰仲氏任自彼殷商來嫁于周曰嬪于京乃及王季維德之行大任有身生此文王維此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國天監在下有命既集文王初載天作之合在洽之陽在渭之涘文王嘉止大邦有子大邦有子俔天之妹文定厥祥親迎于渭造舟為梁不顯其光有命自天命此文王于周于京纘女維莘長子維行篤生武王保右命爾燮伐大商殷商之旅其會如林矢于牧野維豫侯興上帝臨女無二爾心牧野洋洋檀車煌煌駟騵彭彭維師尚父時維鷹揚涼彼武王肆伐大商會朝清明大明之雅言文王有明德而天復命武王也詩曰明明赫赫本言天也序曰文王有明德因天言文王也明明在下赫赫在上天難忱斯不易維王者言天明明而在下赫赫而在上無私親德是輔命靡常為難信不易哉王者也王者往也天下之所歸往而君受之必有以協乎天之心也天位殷適使不挾四方者言商王居天之位為殷之適而失德敗度故喪其師而使不挾于四方挾逹也摯國也仲大任之行第也婦人亦以孟仲叔季稱氏任者任其氏也言天將興周有開必先大任自彼殷商諸侯之國來嫁王季于周原之地曰嬪婦于我周京京師衆大之稱也乃及王季維德之行王季之德皇矣詠之大任之德思齊詠之興王之初氣象如此大任有身古傳胎教生此文王大王許泰伯之遜而立王季以其有聖子也維此文王小心翼翼心操則存舍則亡雖聖人不勉而中不思而得亦惟小心翼翼而恭敬堯之安安允恭克讓舜之溫恭允塞文王之小心翼翼皆此物也昭事上帝即孟子之所謂存心養性所以事天也厥德不邪以受方國文王之為西伯西方諸侯有相率而來朝孔子以為三分天下有其二以服事殷是受方國也天監在下有命既集文王初載天作之合在洽之陽在渭之涘文王嘉止大邦有子大邦有子俔天之妹文定厥祥親迎于渭造舟為梁不顯其光有命自天命此文王于周于京纘女維莘長子維行篤生武王者此又言文王得大姒以為配而家道愈隆天所相也夫天之監格在下代殷莫若周矣有命既集于文王文王初載天為之合在洽水之陽陽南方也渭水之涘涘水涯也文王嘉此大邦有此賢女譬天之妹定卜之祥行親迎之禮造舟為橋以便往來其光有耀是蓋有命自天命我文王于我周京而纘繼大任得此聖女于莘國莘大姒國也大姒莘之長女行嫁于文王篤生武王其事文王如文王之事王季篤厚也天厚周邦世世生此聖人不偶然也保右命爾燮伐大商者言天保愛右助眷命我武王使之伐商而興周燮和也王曰無畏寧爾也聖人之師所以容民畜衆去不仁以尚仁去不義以崇義也殷商之旅如林之會陳于牧野維我侯興所謂仁不可為衆也上帝臨女無二爾心書所謂恭行天罰天其以豫人民祗承上帝式遏亂略武王在文王之側其為太子蓋八九十年共為子職常如一日蓋上帝臨女而不敢二其心也及夫獨夫受罪惡貫盈天命誅之昔者於鑠王師遵養時晦今者時純熙矣是用大介我龍受之蹻蹻王之造亦上帝臨女而不敢二其心也牧野洋洋而廣大檀車煌煌而鮮明駟騵齊色彭彭而壯盛惟大師尚父如鷹之揚助彼武王肆伐大商之功績會朝清明一曰甲子昧爽而成功一曰四海會同而永清也或曰子謂文王在上三后在天可與天之昭昭赫赫在上者同其詩曰明明在下何也應之曰上下同一明也或曰毛以為明明在下為文王而子謂之天何也曰文王與天同一明也第詩人方言天難忱斯上兩句只是説天若説文王辭意未穩或又曰序言文王有明德而詩乃明之曰大明子以明明為天何也序者之言因天論文王亦是同明之意吾固言之矣綿綿瓜瓞民之初生自土沮漆古公亶父陶復陶穴未有家室古公亶父來朝走馬率西水滸至于岐下爰及薑女聿來胥宇周原膴膴堇荼如飴爰始爰謀爰契我龜曰止曰時築室于兹乃慰乃止乃左乃右乃疆乃理乃宣乃畝自西徂東周爰執事乃召司空乃召司徒俾立室家其繩則直縮版以載作廟翼翼救之陾陾度之薨薨築之登登削屢馮馮百堵皆興鼛鼓弗勝乃立臯門臯門有伉乃立應門應門將將乃立冢土戎醜攸行肆不殄厥慍亦不隕厥問柞棫拔矣行道兌矣混夷駾矣維其喙矣虞芮質厥成文王蹶厥生豫曰有疏附豫曰有先後豫曰有奔奏豫曰有禦侮綿之雅言文王之興本由大王也論其傳王季則皇矣見之論其宇周原則綿見之皆興之所本也綿綿然不絶之瓜紹瓝相繼譬之周民其初生理也自邰而豳自豳而岐周之義昔者公劉居豳蓋涉渭而即芮鞠矣土居蓋邇乎沮水漆水之側毛以周原沮漆之間似乎以自土沮漆説大王鄭以為公劉遷于豳居沮漆之地古公亶父豳公也大王名或字也大王避狄人之侵去之踰梁山邑于岐山之下豳人從之如歸市亦以豳民之多陶復陶穴而居未能盡有安其家室之居者故宇周原焉毛曰陶其土而復之陶其壤而穴之鄭曰復者復于土上鑿地曰穴皆如陶然其在豳時也大王則來朝走馬早且疾不遑安之意循西水崖至于岐山之下于是與其妃太薑自來相可居者著太薑之賢知也周之原地廣平在岐山之南膴膴肥美藋荼之菜性苦者皆甘如飴于是始于是謀謀從而又于是開灼其龜卜之卜又從矣曰止曰時築室家于此以定民心乃安我民乃止我民乃左乃右以下三句度地左之右之疆理其經界時耕其田畝迭耕以遍也豳與周原不能為西東此言自西水滸而來之人皆于執事競出力也乃召司空司徒大國有卿司空掌營國邑司徒掌徒役之事召之使立家室之位處不失繩直以繩乘版築土曰縮君子將營宫室宗廟為先廏庫為次居室為後先營其廣輪方制之正以索縮版上下相乘而起廟成嚴顯翼翼然其築牆以虆盛桴聚之土投之版中陾陾然衆且有聲度居其土薨薨然築之登登而用力削牆鍛屢之聲馮馮然皆言聲也百姓之勸勉也五版為堵同時而起鼛鼓長一丈二尺或鼛或鼓不能止之使休凡大鼓側有小鼓謂之應鼙朔鼙王之郭門曰臯伉高貌王之正門曰應將將嚴正也美大王為郭門以致臯門為正門以致應門焉當時未有臯應之號也鄭曰天子五門臯應路庫雉諸侯三宫外門曰臯朝門曰應內有路門當考乃立大社凡起大事動大衆必先有事乎社而後行謂之宜美大王之社遂為大社也大王之立國如此故于狄人不殄絶厥慍怒之心亦不隕其聘問之禮逮夫櫟與白桵之木拔然而生柯葉則物盛矣行道往來之人皆兌悅則民安矣混夷夷狄之國自駾突而喙困矣至于文王繼以聖化虞芮之君爭田質成感而相遜是有以蹶其良心之生而不特使民安其生生之性也毛曰虞芮之君相與爭田久而不平乃相謂曰西伯仁人也盍往質焉乃相與朝周入其境耕者讓畔行者讓路入其邑男女異路班白不提挈入其朝士讓為大夫大夫讓為卿二國之君感而相謂曰我等小人不可以履君子之庭乃相讓以其所爭田為間田而退天下聞之而歸者四十餘國詩人詠之曰豫曰有疏附矣豫曰有先後矣豫曰有奔奏矣豫曰有禦侮矣蓋言四國歸之者衆也率下親上曰疏附相導前後曰先後諭德宣譽曰奔奏武臣折衝曰禦侮大王論孔子曰泰伯其可謂至德也已矣三以天下讓民無得而稱焉夫泰伯太王之子也太王仁人也不與狄人爭地以戰恐殘民于鋒鏑去豳踰梁山邑于岐山之下居焉豳土在𡵨山之北周原在𡵨山之南周原膴膴于豳孔邇民生繁衍未有家室因獯鬻之無厭擇高平以自治闢其疆埸夷其道路茂其山林理其田畝植其墉社高其閈閎制其宫室率其卿大夫以撫其歸市之民德讓之風狄人不待兵交而駾喙矣然太王不獨知𡵨周之帝省抑深知子孫之帝度帝謂也伯與季均吾子也伯長宜立顧吾季而有聖子也泰伯孝乎父率仲雍以之吳季歷友乎兄施文王而纘緒伯非無故而讓伯之讓以天下而讓也何則商之衰久矣天下有待乎聖人之興也歷為父昌為子旦發為孫天之生大聖也不數今其聚于吾季之門安得不以天下之故而讓吾國焉我周之命于是乎受于天者既固矣故曰居岐之陽實始翦商然嘗思之綿之卒章既言混夷駾喙又曰虞芮質成何也夫混夷之喙是太王之不爭善勝也虞芮之讓是文王之至德感人也文王三分天下有其二以服事商孔子曰周之德其可謂至德也巳是孔子俱許泰伯文王以至德泰伯之讓于弟文王之臣乎君化乎諸侯皆自古公亶父雍容心法中來也大抵善政不如善教之得民仁言不如仁聲之入人深也彼虞芮之君忿然朝周思質其所爭之田及入其境耕者讓畔行者讓路入其邑男女異路班白不提挈入其朝士讓為大夫大夫讓為卿譬猶居者窘其室廬而洞然八荒忽在我闥行道之人捨塗炭適康莊去荆棘履堂皇霽雷霆雨雹之威覩景星慶雲之瑞油然動其良心風休冰釋天良自還不敢以小人之迹履君子之庭相謂而相遜以其所爭為間田而退也當是時天下聞之歸者四十餘國詩人曰虞芮質厥成文王蹶厥生豫曰有疏附矣豫曰有先後矣豫曰有奔奏矣豫曰有禦侮矣蓋言四方歸者之衆也序詩者曰文王之興本由太王噫謂一家仁一國興仁一家讓一國興讓其機若此者乎芃芃棫朴薪之槱之濟濟辟王左右趣之濟濟辟王左右奉璋奉璋峩峩髦士攸宜渒彼涇舟蒸徒楫之周王于邁六師及之倬彼雲漢為章于天周王夀考遐不作人追琢其章金玉其相勉勉我王綱紀四方棫朴之雅言文王能官人也芃芃然盛哉白桵之木朴枹屬而生者或薪之或積之山木茂盛或可以薪或可以積喻賢人衆多國家得用蕃興也濟濟君王文王也濟濟然而敬左右諸臣促疾趨事祭祀之禮王祼以圭瓉諸臣助之亞祼以璋瓚其儀峩峩盛壯俊士所宜渒彼涇舟之行乃衆徒楫棹之故興衆臣之賢行君政令周王往行出兵征伐則六師及之二千五百人為師周禮五師為軍軍萬二千五百人天子六軍此蓋侈言之也大彼天河在天為文章猶文王為法度于天下文王九十餘矣故言夀考逺不作人乎金雕玉琢治衡笄之玉亦曰追其文章則追琢之其質則金玉之相質成器此喻人材之粹美也鄭曰文王為政先以心研精合于禮義然後施之萬民言亦有味而詩人未必如此勉勉哉我文王蓋以官人之道而綱紀四方也譬之網罟張之為綱理之為紀書曰知人則哲能官人安民則惠黎民懷之蓋謂此也瞻彼旱麓榛楛濟濟豈弟君子干祿豈弟瑟彼玉瓚黃流在中豈弟君子福祿攸降鳶飛戾天魚躍于淵豈弟君子遐不作人清酒既載騂牡既備以享以祀以介景福瑟彼柞棫民所燎矣豈弟君子神所勞矣莫莫葛藟施于條枚豈弟君子求福不回旱麓之雅言周家受先祖之福祿而先祖之福祿又皆自求之已也周之先祖為后稷之子孫者修后稷之業為公劉之子孫者修公劉之業至于大王王季復申之以百順而干祿焉所謂祿在其中異乎子張之問矣孔子曰言寡尤行寡悔易曰庸言之信庸行之謹此即法天行健之事業大王王季之申以百福者亦出于此而豈不百祿是荷乎瞻彼旱山之足榛楛濟濟而盛山之能生而木之宜多也君子有豈弟之德而天之祿自至其求祿者不求之他而求之樂易和順之德也潔鮮者玉瓚以圭為柄以金為勺青外朱中又有瓚如盤焉以黑秬搗鬱金汁而煮之和釀芬芳調鬯曰秬鬯是黃流也毛謂黃金所以流鬯表裏之義也鄭謂帝乙之時王季為西伯以功德受此賜故詩人取興言瑟彼玉瓚則宜黃流在中矣豈弟君子是福祿之所從降也鳶飛戾天魚躍于淵物性之自得也君子成已成物其樂如此故曰豈弟君子豈不逺于成人材乎古之所謂樂易者非縱弛之謂也在已則尤悔俱無在物則飛潛自得此所以謂之豈弟也清酒載而騂牡備以享祀而助大福者此又言豈弟之君子祭祀而獲福也申之曰衆彼柞棫民所燎矣豈弟君子神所勞矣神之勞之而介以景福豈君子求之乎有木之條枚則莫莫之葛藟從而施之有豈弟之君子則神從而福之非回遹違道而得之也蓋其所以求福者不回而干祿者豈弟也思齊大任文王之母思媚周薑京室之婦大姒嗣徽音則百斯男惠于宗公神罔時怨神罔時恫刑于寡妻至于兄弟以御于家邦雍雍在宫肅肅在廟不顯亦臨無射亦保肆戎疾不殄烈假不瑕不聞亦式不諫亦入肆成人有德小子有造古之人無斁譽髦斯士思齊之雅言文王之所以聖也鄭謂非但天性德有所由成要之此篇成已成物之工夫與中庸大學無異非但德有由成而自成者至也言齊莊之大任王季之妻文王之母媚愛其姑大王之妻大薑行婦道于京周而文王之妻曰大姒者又嗣繼薑任徽美之音音德音也鼓鐘于宫聲聞于外則百斯男鄭云大姒十子衆妾則宜百子言其多也順于宗公毛謂宗神也鄭謂大臣未必然也神無怨恫者所謂質之鬼神而無疑主祭而百神享之是其德行當于神明也刑韓詩云正也毛云法也鄭云以禮法接待也言文王修身齊家而和兄弟逹家邦也御者治也正已而物正也在宫中則和在廟中則敬得禮之宜鄭謂宫為辟雍養老之地未必然不顯亦臨莫見乎隱也無射亦保不倦而能安也是欽明文思安安允恭克讓之工夫也肆人之大惡不殄絶之而自絶我之功烈假太而無瑕也不聞亦式不諫亦入常人待乎見聞聖人急于自勉見聞諫正斯須不可闕至于檢身若不及自知愧恥以格其非者學者更宜思也聖人則非有過行也不聞而式于理不諫而入于善及語其極至也猶且不勉而中不思而得豈復有待乎文王性與天合而加勉勉亹亹之誠人自化之成人者有德小子者有造鄭謂大夫士子弟皆有德有造亦舉其略也古之人無斁譽髦斯士者此二句不可以深求也詩人論文王修身齊家治國之理略備矣斷之曰嗚呼是理也古之人體之為無斁而今之多士感而化之所以皆有名譽而成俊乂之美也蓋天有不已之命堯有安安之德文王有亦臨亦保亦式亦入之誠此道之大原出于天而以是傳也聖得之以為聖賢得之以為賢故曰古之人無斁譽髦斯士也注疏言其端矣皇矣上帝臨下有赫監觀四方求民之莫維此二國其政不獲維彼四國爰究爰度上帝耆之憎其式廓乃眷西顧此維與宅作之屏之其災其翳修之平之其灌其栵啓之辟之其柳其椐攘之剔之其檿其柘帝遷明德串夷載路天立厥配受命既固帝省其山柞棫斯拔松柏斯兌帝作邦作對自大伯王季維此王季因心則友則友其兄則篤其慶載錫之光受祿無喪奄有四方維此王季帝度其心貊其德音其德克明克明克類克長克君王此大邦克順克比比于文王其德靡悔既受帝祉施于孫子帝謂文王無然畔援無然歆羡誕先登于岸密人不恭敢距大邦侵阮徂共王赫斯怒爰整其旅以按徂旅以篤周祐以對于天下依其在京侵自阮疆陟我高岡無矢我陵我陵我阿無飲我泉我泉我池度其鮮原居岐之陽在渭之將萬邦之方下民之王帝謂文王豫懷明德不大聲以色不長夏以革不識不知順帝之則帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉臨衝間間崇墉言言執訊連連攸馘安安是類是禡是致是附四方以無侮臨衝茀茀崇墉仡仡是伐是肆是絶是忽四方以無拂皇大也大矣上帝臨下有赫監觀四方求民之定維此夏之後商之後二國者其政不得乎天人之心矣又于四方之國爰謀爰居之又耆久而須待之惡其不變惡者浸大乃斷然眷西周而顧之此維與宅天命也宅即居也居即度也天之眷周則有開必先自太王之遷岐而盛太王之傳王季而定遷岐之初木之死斃叢生者栭柳椐匱山桑又其繁穢者競施刋除所謂民從歸市所謂太王荒之也太王遷岐即帝遷明德也串習也習其夷易而載始路大即岐有夷之行也有其德有其地是天為之配而受命于此乎堅固帝省其山惡木去而嘉木茂矣柞棫斯拔矣松柏斯兌矣為之邦而為之配周者為之邦而為之對天者又自太王有二賢子而施于文王也太伯王季太王之子太伯兄也王季弟也太伯知王季之聖而有聖子曰昌乃適句吳終身不返焉孔子曰太伯其可謂至德也巳矣三以天下讓民無得而稱焉維此王季因心則友則友其兄則篤其慶故嘗論之古之兄弟遜者如太伯之遜而王季之友者順而愛之之義也周以興焉盛德之事也叔齊之遜而伯夷之辭孤竹君之中子立焉盛名之事也吳諸樊之遜而季札之耕使其國不得賢君之澤焉春秋以為失中之事也宋宣公遜而與夷立使公子馮出居于鄭可謂光昭矣而與夷助除害之師焉反常之事也魯隱公之將遜而桓公入公子翬之謀焉是悖德之事也太伯與天同謀江湖之國以終其身岐周日有興王之氣象焉堯既遜舜為天下得人矣二十八年高拱穆清而海隅蒼生日入出之地皆光被焉此皆古聖人之盛德自然而天主宰而帝不可名言者也漢唐歷代有一家興仁而迭相遜其貨殖者焉是亦可語託六尺之孤寄百里之命也帝以太王太伯王季之德如此載錫之光大所謂則篤其慶善兄弟曰友太伯既能遜慶善也王季友之使傳世稱焉是則篤厚其慶善也篤其慶則宜乎天錫之光大而受祿無喪周之奄有四方于是乎定維此王季帝度其心心能制義曰度是自度也帝度其心是天啓其衷天誘其衷天之度即王季之度也貊靜也德本于身音發乎外施為注措鼓鐘而聲聞焉辭氣容貌不言而意傳焉皆音也小雅曰德音孔昭以為嘉賔之旅酬與語其音孔昭要之語之音有聲之聲也默之音無聲之聲也其德能明而又能勤施無私謂之類能教誨不倦謂之長能賞慶刑威謂之君王此大邦王追稱也克順于上下克比于前後比于文王其德靡悔比及也其德益純而無有悔焉靡悔二字一部周易盡在文王矣文王有靡悔之德天德也故改過不吝可也而以自新之功徒為改過之日月焉其可悔自若也從諫如流可也而于退省之際無不恥不若人之心其可悔自若也靡悔者非止悔前非之悔如韓文公所謂悔不可追悔不可為者是一説也此之靡悔則專如易之悔亡其過不待不二其悔一切消亡是文王之事也文王之德如此既受帝祉于身施于子孫以有天下傳永久理之必然也帝謂文王者非諄諄而命之也帝謂文王即天知文王之如此也帝謂文王無是畔援之思無是歆羡之思畔畔也援取也歆羡貪羡也大哉所以先登于高位孟子曰仁者宜在高位也國有密須氏不恭而距我大邦文王侵阮又往侵共皆諸侯之不義者而密人助之王赫斯怒爰整其旅三百人之師也舉旅以見軍師卒兩以按徂往旅地之不義者以篤周福以對答于天下之民之望也文王依其在周京之固所謂根本也侵自阮疆伐自阮始陟我高岡以觀形勢見其無有陳于我之陵阿者無有飲于我之泉池者小出兵而懾服如此以德勝也所謂仁者無敵也度其鮮原者太王本居岐岐曰周原文王又度民居而廣于岐山之陽渭水之側後竟徙居于豐周書稱文王在程為程寤程典皇甫謐云文王徙宅于程要之太王已在岐山之陽文王所度小山别大山之鮮與其廣平之原亦在岐陽容待四方之歸民其去舊都不逺若豐則去岐東南三百里耳萬邦之向方下民之歸往于此乎盛也帝謂文王豫懷爾之明德不大聲以色無聲無臭也毛曰不大聲見于色也不長夏以革不長諸夏以有所革更不識不知順帝之則而行之鄭曰天道誠實貴性自然文王非不識不知也泯其智慮而順乎自然也當赫斯怒豈不色乎治岐之政王室如燬豈不革乎若夫罔攸知于庶言庶獄惟有司之牧夫所謂不識不知順帝之則也帝謂文王問爾可仇之國而伐之崇侯協紂為惡者伐之先此同爾兄弟之國以爾攻戰之具往伐崇城鉤鉤梯鉤引上城臨車衝車皆攻城者間間動搖茀茀強盛要皆有而不用然師行不可無其備具太公司馬法武王器用甚嚴晉人一車韅靷鞅靽是也言言仡化高大也雖高大而不足恃也文王修壘而崇降矣執訊問者連連所獻左耳馘者安安是類于內是禡于野致其社稷羣神附其先祖為之立後尊其尊而親其親即孟子所論齊人得燕以後當用之規模也毛氏知之四方服文王之德其敢侮乎是惟不伐是惟不疾是惟不絶是惟不滅以此而伐以此而疾以此而絶以此而滅奪伯氏駢邑三百無怨兼弱攻昧取亂侮亡推亡固存邦乃其昌四方其敢拂乎所謂文王一怒而安天下之民也經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王在靈囿麀鹿攸伏麀鹿濯濯白鳥翯翯王在靈沼於牣魚躍虡業維樅賁鼓維鏞於論鼓鐘於樂辟雍於論鼓鐘於樂辟雍鼉鼓逢逢矇瞍奏公言文王之經度始基靈臺也營表其位庶民共攻築之不日而有成文王之經始非欲急也庶民子來各以子成父事而來攻之文王之在靈囿則鹿之牝者攸伏而濯濯娛遊白鳥翯翯而肥澤文王之在靈沼則於乎美哉滿沼之魚皆跳躍而自得文王之樂則有植木之虡橫木之栒又加大板之業刻為崇牙􅚃業樅樅然有賁大鼓焉有鏞大鐘焉於乎美哉論思此鼓鐘之樂人聞其樂而思其音人聞其音而思其政於乎美哉人共樂此辟雍之地水旋丘如璧曰辟雍以節觀者然則古者臺囿之外環之以水則辟雍明堂太學之有辟雍亦皆環水以節觀者而濟以橋故漢曰橋門若夫以學名為辟雍則鄭説以樂名為辟雍則莊子之説未必然也循其訛則漢有明堂有靈臺有太學而又别有辟雍豈河間三雍之對未得其真而致然歟靈臺之詩孟子説之明白矣其論鼓鐘樂辟雍即所謂百姓聞王車馬之聲鼓籥之音見羽旄之美舉欣欣然有喜色而相告者是也武王論古之記禮者以文王世子名篇終始記夫問安視膳之事然言文王之為世子者二教世子者一然後及于武王周公此則周人教太子之書也夫以文王孝于王季武王帥而行之不敢有加焉問安視膳固子職之常抑文王之為世子與其教世子者國有學校學有官師官有法制威儀皆講學之要不可不論夫所謂學校者東序瞽宗上庠之類官師者太傅少傅入保出師之類法制威儀者有書禮之學有樂舞之學有釋奠釋菜之禮有養老乞言之禮有合語論説之禮有大合樂之禮雖其備于太平六官之日要自靈臺辟雍鎬京辟雍中來古者太子入在閨門恭為子職出居學校必親師傅周公之告君奭曰文王修和我有夏亦惟有若虢叔有若閎夭有若散宜生有若泰顛有若南宫適又曰無能往來兹迪彝教武王惟兹四人尚迪有祿惟兹四人昭武王惟冒丕單稱德是師保疑丞在武王之側從容輔翼者日聞正論日見正人武王固有聖德矣八九十年之間不倦于孝亦不倦于學其昭哉嗣服能廣文王之聲有由也記禮者述三王之教世子虞夏商周之設四輔三公則又述夫周公之教成王抗世子法于伯禽世子齒于學而使人知父子君臣長幼之道則又述夫庶子之官公族之恩義與夫天子視學祭先師先聖先老而養三老五更之禮其所語亦皆父子君臣長幼之道嗚呼文武成王父子祖孫之間尊德性而道問學無非此教君子觀成王之求助羣臣之進戒賈誼之策元稹之書周人輔太子者益信教法之原于文王世子也下武維周世有哲王三后在天王配于京王配于京世德作求永言配命成王之孚成王之孚下土之式永言孝思孝思維則媚兹一人應侯順德永言孝思昭哉嗣服昭兹來許繩其祖武於萬斯年受天之祜受天之祜四方來賀於萬斯年不遐有佐言在下而繼迹者維我周家世世有明哲之王太王王季文王既殁登遐精氣在天武王則配行其德于周京之地王配于京亦惟世世之德興而求終之長我配命配祖父之德所以配祖父受天之命在于成前王之孚信而為下土之法式長我孝心之所思亦惟順則三后之所行故天下之人媚愛我一人惟動丕應徯志亦皆順德長我孝心之所思昭明乎繼嗣之事哉昭明兹所由來亦惟繩戒我祖之武迹者是宜於乎美哉有萬斯年受天之祜福而四方來賀逺夷來佐也鄭云輔佐之臣亦蒙餘福兼通文王有聲遹駿有聲遹求厥寧遹觀厥成文王蒸哉文王受命有此武功既伐于崇作邑于豐文王蒸哉築城伊淢作豐伊匹匪棘其欲遹追來孝王后蒸哉王公伊濯維豐之垣四方攸同王后維翰王后蒸哉豐水東注維禹之績四方攸同皇王維辟皇王蒸哉鎬京辟雍自西自東自南自北無思不服皇王蒸哉考卜維王宅是鎬京維龜正之武王成之武王蒸哉豐水有芑武王豈不仕詒厥孫謀以燕翼子武王蒸哉文王有聲遹駿有聲遹求厥寧遹觀厥成者謂文王所以有聲者乃能述大其前人之聲而又述求其所以安寧述觀其所以成終者也蒸君也文王之所以為君哉文王受命有此武功既伐于崇作邑于豐文王蒸哉者言文王受天之命非惟文德抑有武功是聖人相上帝而綏四方當伐而伐當安而安當文而文當武而武當喜而喜當怒而怒伐崇而後徙都于豐以見周室之將興而居民之浸廣文王所以為君哉築城伊淢作豐伊匹匪棘其欲遹追來孝王后蒸哉者言文王之徙豐也築城則溝淢廣深八尺為豐之都邑宫室伊其匹稱匪棘急于成已之欲述追太王王季以來勤孝之行也王后即文王文王所以為君哉王公伊濯維豐之垣四方攸同王后維翰王后蒸哉者言文王之事伊濯大者維在豐之藩牆四方攸歸王后為之翰幹文王以一身為天下之幹而非徒豐邑之垣之謂也文王所以為君哉豐水東注維禹之績四方攸同皇王維辟皇王蒸哉者言豐水之東注維禹之績自有天地以來平水土之功維禹而文王武王之平暴亂一人心其功不在禹下詩人即其所都水之東注思禹之功比周之德四方同心以歸周乃武王繼文王為之君辟武王之所以為君哉豐邑在豐水之西鎬京在豐水之東鎬京辟雍自西自東自南自北無思不服皇王蒸哉者武王又宅邑于鎬京其宫室之制環之以水天下四方皆歸心焉武王之所以為君哉考卜維王宅是鎬京維龜正之武王成之武王蒸哉者言稽考其卜筮而宅鎬京皆龜之從而武王成其占武王所以為君哉豐水有芭武王豈不仕詒厥孫謀以燕翼子武王蒸哉者言豐水有芭地之美者生禾也武王豈不仕于此乎將為遺所順之謀以安其敬事之子故由豐而鎬見天命之既隆而宅都之宜大也武王之所以為君哉序言繼伐詩不言之但言由豐而鎬者舉宅都而言則見周于是興而商亡矣厥初生民時維薑嫄生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時維后稷誕彌厥月先生如達不坼不副無災無害以赫厥靈上帝不寧不康禋祀居然生子誕置之隘巷牛羊腓字之誕置之平林會伐平林誕置之寒冰鳥覆翼之鳥乃去矣后稷呱矣實覃實訏厥聲載路誕實匍匐克岐克嶷以就口食藝之荏菽荏菽斾斾禾役穟穟麻麥幪幪瓜瓞唪唪誕后稷之穡有相之道茀厥豐草種之黃茂實方實苞實種實褎實發實秀實堅實好實穎實栗即有邰家室誕降嘉種維秬維秠維穈維芑恆之秬秠是穫是畝恆之穈芑是任是負以歸肇祀誕我祀如何或舂或揄或簸或蹂釋之叟叟蒸之浮浮載謀載惟取蕭祭脂取羝以軷載燔載烈以興嗣歲卬盛于豆于豆于登其香始升上帝居歆胡臭亶時后稷肇祀庶無罪悔以迄于今按此篇永樂大典缺卷敦彼行葦牛羊勿踐履方苞方體維葉泥泥戚戚兄弟莫逺具爾或肆之筵或授之几肆筵設席授几有緝御或獻或酢洗爵奠斝醓醢以薦或燔或炙嘉殽脾臄或歌或咢敦弓既堅四鍭既鈞舍矢既均序賔以賢敦弓既句既挾四鍭四鍭如樹序賔以不侮曾孫維主酒醴維醹酌以大斗以祈黃耉黃耉台背以引以翼夀考維祺以介景福聚彼行道之葦牧牛羊者勿使躐履折傷之以其草木方苞茂成形葉之初生泥泥然况我戚戚內相親之兄弟莫逺具爾謂進之也王與族人燕兄弟之親無逺無近俱揖而進之年稚者設筵老者加几設席又加重席又有相續代而侍者緝御見踧踖之容進酒曰獻客答曰酢主人洗爵酬客客受而奠之不舉夏盞殷斝周爵用殷爵者尊兄弟以肉曰醓醢臄函也鄭曰韭葅則醓醢燔肉炙肝以脾函為加或比琴瑟而歌或擊鼓曰咢其燕有先射畫弓既堅天子敦弓鏃矢參亭已均中藝舍釋也藝質也周之養老先與羣臣行射禮以擇其可與者以為賔賔客次序皆賢以時中多少為次序天子之弓合九而成規射禮搢三挾一箇已挾四鍭遍釋之如植皆中不侮敬也所謂揖讓而升下而飲也曾孫維主不言成王自成王以下皆可歌也曾孫維主酒醴維厚酌以大斗長三尺者以祈黃耉之福欲其夀而益夀也非遽有求于黃耉也祈毛曰報也鄭曰告也飲酒之禮曰告于先王君子可也黃耉台背黃髮耉老背若鮐魚以禮引之以禮翼之在前曰引在旁曰翼祺吉也養老人而得吉所以助大福也乞言又詩外之意既醉以酒既飽以德君子萬年介爾景福既醉以酒爾殽既將君子萬年介爾昭明昭明有融高朗令終令終有俶公尸嘉告其告維何籩豆靜嘉朋友攸攝攝以威儀威儀孔時君子有孝子孝子不匱永錫爾類其類維何室家之壼君子萬年永錫祚胤其胤維何天被爾祿君子萬年景命有僕其僕維何釐爾女士釐爾女士從以孫子既醉以酒既飽以德君子萬年介爾景福者言君既醉臣以酒又飽臣以德矣人斯祝君有萬年之夀而天介助以景福也景大也既醉以酒爾殽既將君子萬年介爾昭明者言君既醉臣以酒而牲體又為爼實尊卑差次行之人斯祝君以萬年之夀而天介助以光明之道也昭明有融高朗令終令終有俶公尸嘉告者言光明而長有譽又高明而令善其終終而又有始焉惟新惟一循環無窮此則公尸嘉告之辭也公尸嘉告之辭當于祭而不當于燕此則人之祝君又述公尸嘉告之辭也非公尸于此又復言之也天子宗廟以卿為尸射以公為耦公尸謂先王先公之尸也其告維何籩豆靜嘉朋友攸攝攝以威儀者此言公尸之告所以有嘉德而無違心者以其祭祀之時籩豆靜嘉朋友王之羣臣其所相攝佐以威儀之事濟濟有度也威儀孔時君子有孝子孝子不匱永錫爾類者此以下皆述公尸之辭也謂其威儀甚得其宜而吾君有孝子之行不惟行之于身而又推之于其人此謂永錫其類也其類維何室家之壼君子萬年永錫祚胤者謂其錫類凡我公卿大夫與夫本本支支室家之廣吾君有萬年之夀而永錫以福祚胤嗣此成王錫之也其胤維何天被爾祿君子萬年景命有僕者此謂成王既錫胤嗣以祚福而天又被爾以祿吾君有萬年之夀而受天景大之命信僕屬而附著也其僕維何釐爾女士釐爾女士從以孫子者此謂其僕屬而附著則不惟有士君子而又有女士女有士行而從之以賢知之子孫此天相之也而非惟吾君之所錫也此則祭祀之詩鬼神享之尸嘏傳之而羣臣于醉酒飽德之時誦而述之大雅之詩人又從而發揚蹈厲之也欲觀既醉先觀酒誥成王命康叔懲商人之好飲述文王之告教分為三段其一則教邦君諸侯厥誥毖庶邦庶士以下是也其一則教西土之民人文王誥教小子是也其一則教西伯國之羣臣庶士有正越庶伯君子是也故成王又誥曰我西土邦君一也御事二也小子三也皆用文王之教以受殷命大抵文王之誥欲其祀而後飲孝養而後飲諸侯不可醉而况庶民乎一飲一食皆當羞進耉老及其君長推之饋宗族祀鬼神而又不可醉飽以中為度此其大略節次分明惟能如是是以有既醉之福也鳧鷖在涇公尸來燕來寧爾酒既清爾殽既馨公尸燕飲福祿來成鳧鷖在沙公尸來燕來宜爾酒既多爾殽既嘉公尸燕飲福祿來為鳬鷖在渚公尸來燕來處爾酒既湑爾殽伊脯公尸燕飲福祿來下鳧鷖在潨公尸來燕來宗既燕于宗福祿攸降公尸燕飲福祿來崇鳧鷖在亹公尸來止熏熏旨酒欣欣燔炙芬芬公尸燕飲無有後艱按此篇永樂大典缺卷
