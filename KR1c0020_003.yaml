body:
  text: 毛詩講義卷三宋林岊撰鄭緇衣之宜兮敝子又改為兮適子之館兮還予授子之粲兮緇衣之好兮敝予又改造兮適子之館兮還予授子之粲兮緇衣之蓆兮敝予又改作兮適子之館兮還予授子之粲兮按此篇永樂大典缺卷將仲子兮無踰我里無折我樹杞豈敢愛之畏我父母仲可懐也父母之言亦可畏也將仲子兮無踰我牆無折我樹桑豈敢愛之畏我諸兄仲可懐也諸兄之言亦可畏也將仲子兮無踰我園無折我樹檀豈敢愛之畏人之多言仲可懐也人之多言亦可畏也無踰無折拒諫之言也豈敢愛甲兵城邑而不與父母諸兄國人之言皆可畏也亦拒諫之言也祭仲之諫見於左氏𫝊叔于田巷無居人豈無居人不如叔也洵美且仁叔于狩巷無飲酒豈無飲酒不如叔也洵美且好叔適野巷無服馬豈無服馬不如叔也洵美且武夫國君之弟見疑於國君而國人方且説而歸之此必敗之道也叔于田乗乗馬執轡如組兩驂如舞叔在藪火烈具舉襢裼暴虎獻于公所將叔無狃戒其傷女叔于田乗乗黄兩服上襄兩驂鴈行叔在藪火烈具揚叔善射忌又良御忌抑磬控忌抑縱送忌叔于田乗乗鴇兩服齊首兩驂如手叔在藪火烈具阜叔馬慢忌叔𤼵罕忌抑釋掤忌抑鬯弓忌四馬曰乗執轡如執組之為在内曰服在旁曰驂如舞者驂服和諧中節藪澤禽之府火烈而具舉揚光也阜盛也焚而田也肉袒空手以搏虎也將進於君國人愛之曰將叔無狃習戒其傷汝手乎兩服中央夹轅者上駕謂最良也鴈行與中服相次序忌語辭也善射良御騁馬曰磬止馬曰控𤼵矢曰縱從禽曰送驪白雜色曰鴇服齊首也驂如左右手也馬遲𤼵希釋覆矢之掤又弢其弓田事畢而閒暇皆國人樂之之辭也清人在彭駟介旁旁二矛重英河上乎翺翔清人在消駟介麃麃二矛重喬河上乎逍遥清人在軸駟介陶陶左旋右抽中軍作好清人者髙克所帥衆之邑人也彭衛之河上鄭之郊也四馬之甲旁旁而彊二矛酋矛夷矛備闕折重有英飾矛者南椘謂之鉇音蛇又曰鋋音蝉又曰鏦音錯工反柄曰矜又曰㮗巨巾反消河上地喬韓詩作鷮毛曰重喬者累荷謂刻矛頭為荷葉相重累也鄭曰喬矛矜近上及室題所以縣毛羽室矛頭受刄處如劍削亦曰室題頭也削音笑軸亦河上地也麃麃武貎陶陶驅馳之貎左旋以車言右抽以弓矢言中軍為容好皆翫兵之謂也鄭云御者在左習旋車車右抽刄也髙克自居中央為軍之容好而已兵車之法將居鼓下故御在左羔裘如濡洵直且侯彼其之子舎命不渝羔裘豹飾孔武有力彼其之子邦之司直羔裘晏兮三英粲兮彼其之子邦之彦兮如濡潤澤也信正直且得為君之道是子舎命不變謂守死善道舎音赦豹飾縁以豹文孔甚也司主也晏鮮盛三英或如五總毛鄭云三徳彦士之美稱遵大路兮摻執子之袪兮無我惡兮不寁故也遵大路兮摻執子之手兮無我魗兮不寁好也遵循也摻擥袪袂也寁速魗棄也無我惡兮不速故我兮無我魗兮不速好我兮故相親相友之意也女曰雞鳴士曰昧旦子興視夜眀星有爛將翺將翔弋鳧與鴈弋言加之與子宜之宜言飲酒與子偕老琴瑟在御莫不静好知子之来之雜佩以贈之知子之順之雜佩以問之知子之好之雜佩以報之弋鳧與鴈言繳射繳音灼昔之不善射者賢婦以為笑此章警其夫以視夜早起而射弋自言得禽當為加豆共肴也子謂夫也飲酒偕老琴瑟静好皆謂夫婦之平居和且敬也三章又言四方賓客賢者之来婦人相其夫以友賢若曰有知子而来者當取珩璜琚瑀衝牙之𩔖雜佩以贈之有知子而相為和順者有知子而同好者當以問之報之鄭云豫儲雜佩雖無此物猶言之以致其厚意其若有之固將行之又曰士大夫以君命出使主國之臣必以燕禮樂之助君之歡重異國賓客也此亦古人附見者有女同車顔如舜華將翺將翔佩玉瓊琚彼美孟姜洵美且都有女同行顔如舜英將翺將翔佩玉將將彼美孟姜徳音不忘親迎壻御輪三周未必同車也舜木槿也佩有瑀琚所以納間將將鳴玉而後行孟姜齊之長女都閑也徳音不忘甚言其美也山有扶蘇隰有荷華不見子都乃見狂且山有橋松隰有游龍不見子充乃見狡童扶蘇小木荷華扶渠其華菡蓞各得宜也子都世之美好者狂狡也且辭也橋松木也游龍紅草也充徳之充也狡童有貎而無實蘀兮蘀兮風其吹女叔兮伯兮倡予和女蘀兮蘀兮風其漂女叔兮伯兮倡予要女按此篇永樂大典缺卷彼狡童兮不與我言兮維子之故使我不能餐兮彼狡童兮不與我食兮維子之故使我不能息兮我賢人也憂懼不遑餐不能息也子恵思我褰裳渉溱子不我思豈無他人狂童之狂也且子恵思我褰裳渉洧子不我思豈無他士狂童之狂也且子謂大國也溱洧水名褰裳謂大國之来子之丰兮俟我乎巷兮悔予不送兮子之昌兮俟我乎堂兮悔予不將兮衣錦褧衣裳錦褧裳叔兮伯兮駕予與行裳錦褧裳衣錦褧衣叔兮伯兮駕予與歸丰豐滿昌盛壮不能行親迎之禮而俟我於其家之堂巷乃悔予之不送不行乎錦衣錦裳皆以襌縠上加為其文之太著婦人之備飾如此而壻不親迎則不徃故曰叔兮伯兮苟駕車迎已則予行矣予與歸矣東門之墠茹藘在阪其室則邇其人甚逺東門之栗有踐家室豈不爾思子不我即墠除地町町者茹藘茅蒐室邇人逺此相奔之辭也栗人所㗖食而甘踐履也豈不爾思子不我就亦相奔之辭也風雨淒淒雞鳴喈喈既見君子云胡不夷風雨瀟瀟雞鳴膠膠既見君子云胡不瘳風雨如晦雞鳴不已既見君子云胡不喜夷説也瘳愈也愈其憂思也青青子衿悠悠我心縱我不往子寧不嗣音青青子佩悠悠我思縱我不往子寧不来挑兮達兮在城闕兮一日不見如三月兮衿青領也佩玉佩也父母在衣純以青士佩瓀珉而青組綬學者於學校不修之時而猶思麗澤之兊毛曰嗣習也古者教以詩樂誦之歌之絃之舞之挑達徃来遨逰之貎乗城可以見闕一日不見如三月兮思之深也毛云禮樂不可一日而廢揚之水不流束楚終鮮兄弟維予與女無信人之言人實迋女揚之水不流束薪終鮮兄弟維予二人無信人之言人實不信為此詩者同姓之臣故曰維予與女維予二人出其東門有女如雲雖則如雲匪我思存縞衣綦巾聊樂我員出其闉闇有女如荼雖則如荼匪我思且縞衣茹藘聊可與娱野有蔓草零露漙兮有美一人清揚婉兮邂逅相遇適我願兮野有蔓草零露瀼瀼有美一人婉如清揚邂逅相遇與子偕臧按二篇永樂大典存不載林氏講義文溱與洧方渙渙兮士與女方秉蕑兮女曰觀乎士曰既且且徃觀乎洧之外洵訏且樂維士與女伊其相謔贈之以勺藥溱與洧瀏其清矣士與女殷其盈矣女曰觀乎士曰既且且徃觀乎洧之外洵訏且樂維士與女伊其將謔贈之以勺樂渙渙春水盛瀏深貎蕑蘭也訏寛也勺藥香草殷衆也齊雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲東方眀矣朝既昌矣匪東方則眀月出之光蟲飛薨薨甘與子同夢㑹且歸矣無庶予子憎齊古少昊之世爽鳩氏之墟鷹鷙名官為氏司冦也其如𤣥鳥氏為商之祖歟然則毛云燕至而祠鄭云吞燕卵而生以此解天命𤣥鳥四字皆未必然抑燕至而祠亦古春分之禮歟燕以春分而至候春分而名官其人則為商之祖因春分而祀髙禖其禮則為帝王之常歟爽鳩之地後有季蒯逢伯陵薄姑而後太公因之管蔡商奄四國叛周薄姑氏與四國同為亂成王滅之以封齊是齊於成王之世乃得薄姑之地薄姑臨淄非一邑舉其國境所及薄姑者諸侯之號其人居齊地因號其地為薄姑武王封太公於營丘營丘臨淄一也齊之營丘淄水過其南及東其後胡公遷薄姑獻公又遷營丘宣王時有山甫城齊事𫝊曰諸侯廹隘則王者遷其邑而定其居齊禹貢青州岱山之隂濰淄之野太公為王官之伯康王之初丁公吕伋為虎賁氏鄭云嗣位於王官非必為太師謂在王朝耳五世哀公荒淫怠慢史記云紀侯譛之周懿王亨哀公懿王時有變風齊雞鳴其首也自哀至襄公八世著與東方之日東方未眀未知何君之詩賢妃貞女者論其配夫曰賢妃論其行事曰貞女毛曰雞鳴而夫人起朝盈而君起東方眀則夫人纚筓而朝朝已昌盛則君聴朝以蠅聲為雞鳴以月之光為東方之眀皆賢妃貞女夙興警戒之辭也蟲飛薨薨即蒼蠅之鳴於東方且眀之時賢妃之意若曰卧而同夢固所樂也㑹於朝者且思歸矣無庶予與子之憎乎予夫人自謂子夫人謂其君也古者卿大夫朝㑹於君朝聴政退而治其家事春秋之君有酣飲於壑谷而羣臣之朝布路而散者此已事之眀驗君當夙興以視朝然後羣臣動息進止有其常節而聴政治事各不失其時歟書𫝊夫人御於君所之禮云太師奏雞鳴於階下夫人鳴玉佩於房中吿去雞鳴待太師吿御之正法夫人欲相警戒不必待吿方起列女𫝊魯師氏之母齊姜戒其女云平旦纚筓而朝則有君臣之嚴荘二十四年公羊𫝊何休注其言亦同纚縚髪廣充幅長六尺筓簮也特牲饋食士昏禮皆云纚筓綃衣綺屬其繒本名曰綃染以黒鄭意夫人以展衣見君褖衣御君首服次燕居則纚筓總與王后同非有經典明文與毛異也子之還兮遭我乎峱之間兮並驅從兩肩兮揖我謂我儇兮子之茂兮遭我乎峱之道兮並驅從兩牡兮揖我謂我好兮子之昌兮遭我乎峱之陽兮並驅從兩狼兮揖我謂我臧兮子之便㨗還然兮值我峱山之間兮並行驅馬從逐兩肩獸兮又揖耦我謂我甚儇利兮我呼子還子揖我還報荅相譽也茂好昌盛臧善也七月曰獻豜于公肩是大獸三歲曰肩牡貛牝狠其子獥絶有力者名迅膏可煎曰臅膏皮可裘曰君右虎裘左狼裘俟我於著乎而充耳以素乎而尚之以瓊華乎而俟我於庭乎而充耳以青乎而尚之以瓊瑩乎而俟我於堂乎而充耳以黄乎而尚之以瓊英乎而充耳以素絲為之紞其末飾之以瓊華為瑱尊者用金卑者玉雜或用象瑱門屏之間謂之宁人君視朝所宁立處著與宁音義同壻親迎女家主人揖入賓執鴈至廟門三揖三讓主人升西面賓升北面奠鴈再拜女立於房中南面壻於堂上待之拜受即降出婦從降至西階主人不降送是受女於堂也婦至夫家主人揖婦以入及寝門揖入懸瑱之繩用素魯語敬姜親織𤣥紞紞繩也以雜色舉𤣥者舉夫色之尊者言之耳天子諸侯五色卿大夫士三色此言見素取其韻句耳瓊玉之美石華色有光華尚飾也就紞而加飾嫌人臣用玉故𫝊云美石色似瓊東方之日兮彼姝者子在我室兮在我室兮履我即兮東方之月兮彼姝者子在我闥兮在我闥兮履我𤼵兮姝然美好也闥門内也𤼵行也即就也東方未眀顛倒衣裳顛之倒之自公召之東方未晞顛倒裳衣倒之顛之自公令之折栁樊圃狂夫瞿瞿不能辰夜不夙則莫朝之正法羣臣别色始入晞明之始升物見日光而露乾樊藩也栁木柔脆圃菜園兼植果蓏挈壺氏以水火分日夜水為漏夜則火照漏刻冬則爨水而沸之漏刻之箭晝夜共百刻冬夏之間有長短太史立成法四十八箭是分日夜之事乾象諸歴唐貞觀太史冬至晝四十五夜五十五夏至晝六十五夜三十五春秋分晝五十五半夜四十四半増減或九刻半或十刻半毎氣之間加減刻數不可通而為率南山崔崔雄狐綏綏魯道有蕩齊子由歸既曰歸止曷又懐止葛屨五兩冠緌雙止魯道有蕩齊子庸止既曰庸止曷又從止蓺麻如之何衡從其畝取妻如之何必告父母既曰告止曷又鞠止析薪如之何匪斧不克取妻如之何匪媒不得既曰得止曷又極止按此萹永樂大典韻存不載林氏講義無田甫田維莠驕驕無思逺人勞心忉忉無田甫田維莠桀桀無思逺人勞心怛怛婉兮孌兮總角丱兮未㡬見兮突而弁兮甫大也莠草也忉忉憂也準功治田榖乃可𫉬勤身修徳功乃可立童子婉然而少孌然而好總聚其髦以為兩角丱然兮未冠弁者總角衿纓幼稚如此與别未㡬經時而更見之突然已加冠弁為成人兮冠禮始緇布次皮弁次爵弁三加冠喻君能善身修徳未㡬時而可以立功盧令令其人美且仁盧重環其人美且鬈盧重鋂其人美且偲盧犬其環鈴鈴然有聲重環子母環大環貫小者鋂一環貫二犬有田犬守犬戰國䇿韓國盧天下駿犬東郭逡海内狡兎韓盧逐東郭遶山三越岡五兎極犬疲盧田犬也環在犬頷下如人冠纓故注云纓環聲言古之君美好且仁恩且多才且勇壮皆百姓樂之之辭與孟子吿齊王田獵同意敝笱在梁其魚魴鰥齊子歸止其從如雲敝笱在梁其魚魴鱮齊子歸止其從如雨敝笱在梁其魚唯唯齊子歸止其從如水敝敗之笱在於魚梁其魚乃魴鰥之大魚鰥大盈車其餌半豚古鯤鰥通用里革曰魚禁鯤鮞鳥翼鷇卵鄭又以為小魚也夫人之徃獨不可制其從者乎如雲如雨言其多也魴伊洛濟潁有之細鱗魚之美遼東梁水特肥而厚尢美語曰居就糧梁水魴鱮似魴厚而頭大語曰網魚得鱮不如啗茹頭尢大而肥者徐州曰鰱曰鱅幽州曰鴞曰胡鱅唯唯魚行相随出入不制載驅薄薄簟茀朱鞹魯道有蕩齊子𤼵夕四驪濟濟垂轡濔濔魯道有蕩齊子豈弟汶水湯湯行人彭彭魯道有蕩齊子翺翔汶水滔滔行人儦儦魯道有蕩齊子逰敖車聲薄薄用方文竹簟以為車蔽曰茀在車後又有朱色之革為車之飾獸皮治去毛曰革鞹是革之别名皮革為本質其上又以翟羽為之飾文姜𤼵夕至旦来與公㑹而公就之也四驪物色之盛且濟濟而美垂轡濔濔而衆齊子豈弟豈弟固為樂易以語文姜非美徳也鄭曰猶𤼵夕讀愷為闓悌為圛洪範稽疑論卜兆有五曰圛賈氏奏古文圛為悌圛明也𤼵夕侵夜也闓明侵明也汶水之上有都彭彭多貎翺翔彷徉也儦儦衆貎猗嗟昌兮頎而長兮抑若揚兮美目揚兮巧趨蹌兮射則臧兮猗嗟名兮美目清兮儀既成兮終日射侯不出正兮展我甥兮猗嗟孌兮清揚婉兮舞則選兮射則貫兮四矢反兮以禦亂兮猗嗟嘆辭猗心之不平嗟口之喑咀昌佼好也貎甚昌盛形状頎然而長抑然而美色者其額顙上揚廣兮美目揚眉眉毛揚起也巧為趨步舉動蹌然兮射則大善孔子説文王之状黯然而黒頎然而長二章目上之名甚平博兮又有美目及目下之清亦美兮威儀容貎備足兮終日射侯其矢不出正之内兮此誠我齊侯之甥而人以為齊侯之子姊妹之子曰甥大射張皮侯設鵠賓射張布侯畫正正以綵為之大如鵠鵠以皮為之大如正侯長一丈八尺正長六尺長一丈四尺者正四尺六寸大半寸一丈者三尺三寸少半寸故曰論其長短則正居侯中三分之一論其廣狹則正皆廣二尺王六耦三侯樂以騶虞九節五正諸侯四耦二侯樂以貍首七節三正孤卿大夫三耦一侯樂以采蘋五節二正士三耦豻侯樂以采蘩五節二正節者樂為射節也三侯者五正三正二正之侯也五正中朱次白次蒼次黄𤣥三正損𤣥黄二正畫以朱綠大侯九十弓糝七十弓豻五十弓量以貍歩弓下制長六尺弓有二寸以為侯中則九十弓者侯中廣丈八尺也正者正也齊魯名題肩鳥為正捷黠者孌壮好也三章容貎孌然而好清揚眉目之間婉然而美舞則齊於樂節射則中於正鵠毎當重射四矢皆反復其故處中其正鵠足以捍禦四方之亂兮男子初生桑弧蓬矢六射天地四方儀禮大射初使二耦射之未釋獲射訖取矢復君君與卿大夫等射釋獲飲不中者訖君與卿大夫等又射取中於樂節注君子之於事始取茍能中課有功終用成法教化之漸也魏糾糾葛屨可以履霜摻摻女手可以縫裳要之襋之好人服之好人提提宛然左辟佩其𧰼揥維是褊心是以為刺糾糾然稀䟽之葛屨猶繚繚也夏用葛冬用皮皮屨以絲為飾少儀云國家靡幣君子不屨絲屨夏葛屨猶用絺綌當暑也若行禮之服夏猶用皮朝祭屨舄各從其裳之色屨舄之飾有絇繶純夏日所服之屨冬日猶謂可以履霜儉也掺掺女手未三月雖見舅姑未見宗廟亦未成婦裳者男子之下服婦人衣連裳其新来嫁謂可縫裳亦儉迫之意也要是裳䙅襋是衣領言婦人女子服其衣裳容貎安詳審諦提提然至門之時不敢當夫之揖宛然而左辟之又佩其象骨之揥以為飾佩服之華非不美也惟其風俗儉嗇人懐褊心是以刺之耳夫人君者貴於有徳以移風易俗魏地陿隘俗又機巧魏君當知其不可而以政教反之今不能而使民俗益復趨利且將至於亡故國人刺之也彼汾沮洳言采其莫彼其之子美無度美無度殊異乎公路彼汾一方言采其桑彼其之子美如英美如英殊異乎公行彼汾一曲言采其藚彼其之子美如玉美如玉殊異乎公族汾水之漸洳我采其莫以為菜之子之美則不可以尺寸量矣然非公路之所宜也桑可蠶藚音續水蕮也公車主君之軞車庶子為之晉趙盾以庶子為公行主君兵車之行然則公路公行即一官也服䖍云軞車戎車之倅杜預云公行之官是也公族者主君同姓昭穆晉國公族之官適子為之掌君宗族趙盾以趙括為適遜之為公族成十八年晉荀㑹欒黶韓無忌為公族大夫使訓卿之子弟恭儉孝悌是也園有桃其實之殽心之憂矣我歌且謡不知我者謂我士也驕彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思園有棘其實之食心之憂矣聊以行國不知我者謂我士也㒺極彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思園桃之實可以為殽棘棗也園棗之實可以為食大夫指言憂之將不得食也我歌且謡謡聲消摇也不知我者謂我驕逸且責我曰彼人是哉子之歌謡何其為乎我心之憂其誰能知其誰知之我盖欲亦自止勿復思念之也下章大抵同意陟彼岵兮瞻望父兮父曰嗟予子行役夙夜無已上慎旃哉猶来無止陟彼屺兮瞻望母兮母曰嗟予季行役夙夜無寐上慎旃哉猶来無棄陟彼岡兮瞻望兄兮兄曰嗟予弟行役夙夜必偕上慎旃哉猶来無死多草木曰岵無曰屺我行之時父戒曰嗟汝我子也汝從軍行役在道之時當早起夜寐若至軍中在部分行列之時尚謹之哉可来乃来無止軍事而来有誅三章同意十畝之閒兮桑者閑閑兮行與子還兮十畝之外兮桑者泄泄兮行與子逝兮十畝之間家人共采桑於其地男女無别閑閑徃来十畝之外地傍徑路行非一家泄泄多人之貎還者相呼而共歸逝者相呼而共徃古者農田百畝遂人夫一㕓百畝司馬法畝百為夫周禮上地家百畝中地家二百畝下地家三百畝又六遂上地有菜五十畝其廢易相通皆二百畝也孟子曰五畝之宅植牆下以桑漢志田中不得有植恐妨五榖此言大法耳從民所便田或有桑一夫百畝今此十畝未必即然舉其陿隘耳坎坎伐檀兮寘之河之干兮河水清且漣猗不稼不穡胡取禾三百廛兮不狩不獵胡瞻爾庭有縣貆兮彼君子兮不素餐兮坎坎伐輻兮寘之河之側兮河水清且直猗不稼不穡胡取禾三百億兮不狩不獵胡瞻爾庭有縣特兮彼君子兮不素食兮坎坎伐輪兮寘之河之漘兮河水清且淪猗不稼不穡胡取禾三百囷兮不狩不獵胡瞻爾庭有縣鶉兮彼君子兮不素飧兮坎坎伐檀為輪輻置之河涯待河水清澄且有波漣漪然風行吹水成文曰漣猗辭也漣直淪水波之異漣瀾同義大波為瀾小波為淪直波為徑瀾渙瀾淪蘊淪徑徑涏也襄八年左𫝊俟河之清人夀㡬何易緯王者太平嘉瑞之將出則河水先清㕓者民居之名夫一廛曰百畞與市廛之征居宅同名鄭𤣥云廛民居區域里居也要之古者市則任其商賈之廛而不征其物乎宅則悉與民居而不任以市廛之賦乎貈子曰貆雌名􅭗􅭗乃刀反江東通呼貉為􅧯􅤘宵田為獠夜獵載鑪照管子曰獠獵畢弋獠獵别名也冬獵曰狩狩亦通名又火田亦為狩孫炎曰放火燒草守其下風也毛云萬萬曰億三歲曰特三百億禾秉之數也古法十萬為億方者為倉圎者為囷熟食曰飧水澆飯亦曰飧碩鼠碩鼠無食我黍三歲貫女莫我肯顧逝將去女適彼樂土樂土樂土爰得我所碩鼠碩鼠無食我麥三歲貫女莫我肯徳逝將去女適彼樂國樂國樂國爰得我直碩鼠碩鼠無食我苖三歲貫女莫我肯勞逝將去女適彼樂郊樂郊樂郊誰之永號碩大也一曰鼫鼠五技鼠能飛不能上屋能㳺不能渡谷能縁不能窮木能走不能先人能穴不能覆身河東大鼠能人立或曰雀鼠去汝者我徃之他國將去汝國也唐蟋蟀在堂歲聿其莫今我不樂日月其除無已大康職思其居好樂無荒良士瞿瞿蟋蟀在堂歲聿其逝今我不樂日月其邁無已大康職思其外好樂無荒良士蹶蹶蟋蟀在堂役車其休今我不樂日月其慆無已大康職思其憂好樂無荒良士休休瞿瞿休休皆顧禮節之儉也蹶蹶敏也蟋蟀蛬蜻蛚也趨織也王孫也語曰趨織鳴嬾婦驚九月在戸十月在堂入我床下矣聿遂也除去也康樂也職主也荒大也役車方箱可載任器以供役山有樞隰有榆子有衣裳弗曳弗婁子有車馬弗馳弗驅宛其死矣他人是愉山有栲隰有杻子有廷内弗洒弗埽子有鐘鼓弗鼓弗考宛其死矣他人是保山有漆隰有栗子有酒食何不日鼓瑟且以喜樂且以永日宛其死矣他人入室樞刺榆婁亦曵也走馬曰馳䇿馬曰驅愉樂也栲山樗杻檍語曰櫄樗栲漆相似如一陸璣云吴人以山樗葉為茗檍枝葉茂好二月中葉䟽華如練而細蘂正白盖樹官園多植之名曰萬歲取名於億萬材可為弓弩幹也洒以水灑地而埽之考擊也揚之水白石鑿鑿素衣朱襮從子于沃既見君子云何不樂揚之水白石皓皓素衣朱繡從子于鵠既見君子云何其憂揚之水白石粼粼我聞有命不敢以吿人揚激揚之水波流力弱也鑿鑿白石堅眀也以素為衣丹朱為縁綃繡為領魯詩以綃為綺屬上刺繡文諸侯之中衣也國人欲造此以從桓叔爾雅黼領曰襮繡刺黼文以褗領也中衣祭服之裏衣如深衣連衣裳而純之郊特牲曰繡黼丹朱中衣大夫之僭也鵠亦曲沃邑也椒聊之實蕃衍盈升彼其之子碩大無朋椒聊且逺條且椒聊之實蕃衍盈匊彼其之子碩大且篤椒聊且逺條且聊語助也椒之叢生實大者名為檓蜀茶吴茗或皆合煮其葉以為香榝茱萸也實捄也蕃衍盈升盈掬言其多也彼其之子謂桓叔也碩大無朋謂得國也其大無朋𩔖可比也桓叔阻邑不臣以孽傾宗與潘父比將殺昭公而求入焉條枝長也且語辭綢繆束薪三星在天今夕何夕見此良人子兮子兮如此良人何綢繆束芻三星在隅今夕何夕見此邂逅子兮子兮如此邂逅何綢繆束楚三星在戸今夕何夕見此粲者子兮子兮如此粲者何毛以為婚之月自季秋盡於孟春三十之男二十之女乃得以仲春行嫁此三章皆舉正時也參白虎宿三星在天十月始見東方在東南隅十一月十二月正中直戸正月月令孟春之月昬參中纒綿束薪而有所見遽然而歎曰今此何月之夕而得見良人乎子兮子兮當如此良人何妻謂夫為良人言不可奈何矣粲三女亦衆女之美稱周語宻康公㳺於涇三女奔之母曰女三為粲大夫一妻二妾此男謂女舉其衆美之辭也鄭以三星為心心火星也又以仲春為婚之正時皆異義鄭謂二月之昬火星未見之時當嫁娶見則晚矣三月末四月中昬而火星始見東方四月末五月中則在隅五月末六月中則心直戸月令季夏之月昬火中心三星中獨眀天王前後子属有尊卑夫婦父子之𧰼二月日體在戌斗建卯初昬之時心星在於卯上二月之㛰合於卯宿故稱合宿昭十七年左氏火出於夏為三月商為四月周為五月以三月為五月心之始見東方自三月則然矣凡取星辰多取昬旦之見為候此以未出將見為候心為眀堂火為大辰三月昬時心見辰上使出火九月黄昬心伏戌上使納火司爟職哀十二年左氏火伏蟄者畢此取已伏為候也説苑鄂君與越人同舟越人擁楫而歌曰今夕何夕兮得與搴舟水流今日何日兮得與王子同舟邂逅即邂逅相遇之意毛公解説之貌解音蟹説音恱有杕之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉有杕之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉杕然特生之杜其葉湑湑然而盛足庇本根矣君與宗族乃不相比獨行於國踽踽然無所親暱豈無他人異姓之臣乎顧其恩親不如我同父之人耳則又戒異姓之臣曰嗟夫汝君所與共行之人也汝何不輔君為政令焉君無同姓之輔而倚仗於汝胡不推佽而助之焉親已見踈䟽猶兾助也釋詁輔為俌佽古次字相推以次第助之睘睘亦獨行無所依無所親暱之貎杜子有赤白白者甘棠酢滑美赤棠子澀而酢無味語曰澁如杜木理韌可為弓幹羔裘豹袪自我人居居豈無他人維子之故羔裘豹褎自我人究究豈無他人維子之好羔皮為裘豹皮為袪袂可回肘二尺二寸之節袪尺二寸袂口也居居究究惡也北風擕手同行碩鼠適彼樂國此則念其恩好不忍歸他人之國其情篤如此然深指曲沃以戒之也褏亦為褎肅肅鴇羽集于苞栩王事靡盬不能蓺稷黍父母何怙悠悠蒼天曷其有所肅肅鴇翼集于苞棘王事靡盬不能蓺黍稷父母何食悠悠蒼天曷其有極肅肅鴇行集于苞桑王事靡盬不能蓺稻粱父母何甞悠悠蒼天曷其有常肅肅聲也鴇連蹄不樹止喻不得所也王家之事無不攻緻盡力為之既無黍稷我之父母當為何所依怙乎悠悠乎逺者蒼蒼之上天何時乎俾我得其所免此征役之苦窮則反本困則吿天物叢生曰苞齊人名曰稹叢緻也根相廹迮梱緻貎栩杼也柞也櫟也其子皂斗其殻為汁可染皂京洛言杼汁昭元年左氏皿蟲為蠱榖之飛亦為蠱不堅緻不攻牢也不能者筋力疲極欲歸而不能也行列也豈曰無衣七兮不如子之衣安且吉兮豈曰無衣六兮不如子之衣安且燠兮按此萹永樂大典缺卷有杕之杜生于道左彼君子兮噬肯適我中心好之曷飲食之有杕之杜生于道周彼君子兮噬肯来逰中心好之曷飲食之杜生道左人所休息人不休息者由其孤特獨生陰凉寡薄也噬逮也至也周曲也君子之人噬肯来於我國義之與比求則得之君當中心誠實好而求之何但飲食而已葛生蒙楚蘞蔓于野予美亾此誰與獨處葛生蒙棘蘞蔓于域予美亾此誰與獨息角枕粲兮錦衾爛兮予美亾此誰與獨旦夏之日冬之夜百歲之後歸于其居冬之夜夏之日百歲之後歸于其室葛生蒙於楚木蘞生蔓於野中興婦人生於父母而外成於夫家也我所美之人亾誰與居乎婦人之怨也禮夫不在斂枕箧衾席韣而藏之采苓米苓首陽之巔人之為言茍亦無信舎旃舎旃茍亦無然人之為言胡得焉采苦采苦首陽之下人之為言茍亦無與舎旃舎旃茍亦無然人之為言胡得焉采葑采葑首陽之東人之為言茍亦無從舎旃舎旃茍亦無然人之為言胡得焉苓大苦首陽河曲之内苦苦菜荼也生山田及澤中得霜甜肥而美所謂堇荼如飴内則濡豚包苦人之䜛言謗訕人欲使見貶退稱薦人欲使見進用皆是也王肅諸本皆以為為偽舎而勿聴彼何得焉拒䜛之方也秦有車鄰鄰有馬白顛未見君子寺人之令阪有漆隰有栗既見君子並坐鼓瑟今者不樂逝者其耋阪有桑隰有楊既見君子並坐鼓簧今者不樂逝者其亾有車衆多其聲鄰鄰有馬衆多其中有白顛戴星之馬又始有侍御之臣欲見秦仲必先有寺人之官令請之周禮天官内小臣奄上士四人寺人王之正内五人齊有寺人貂晉有寺人披夏官天子有寺人掌内人及女官之戒令又有小臣掌𫝊命令諸侯寺人兼官内外阪上有漆木隰上有栗木既見秦仲並坐鼓瑟人皆願立其朝故曰今我不樂過此以徃徒自使老後於寵禄無有得樂之時矣古者朝燕於寝大夫坐於上士立於下耋者七八十歲之稱色如生鐵也亾者謂亾此樂也古者内小臣寺人以備宫中𫝊命令與夫汛埽之職然在君左右謂之近習不可假之以權倚之以事齊寺人貂漏師于多魚終有三孺之禍晉文公與寺人議以趙襄為原大夫識者譏之秦使寺人國人歌之其實初興之時已隐亾國之證其後始皇用趙髙亾國君子以為閹官如烏喙毒藥㫁不可委用也駟驖孔阜六轡在手公之媚子從公于狩奉時辰牡辰牡孔碩公曰左之舎㧞則獲逰于北園四馬既閑輶車鸞鑣載獫歇驕襄公乗一乗駟鐵色之驪馬既肥大又善良御人執其六轡在手不須控制之公之臣有能媚於上下之子從公而徃田狩驂馬内轡納之於觖故四馬而在手惟六轡大叔于田如手馬之進退如御者之手此言在手不假控制也文王四友予曰有䟽附能使䟽者親附二章言田獵之時虞人奉是應時肥大之牡獸驅以待射公戒御者曰從左而逐之公乃自射舎放矢括則得其獸矣鏃為首㧞為末家語孔子與子路論矢括而羽之鏃而礪之矢末為括也佐車田僕驅逆之車逐禽由左禮之常法三章逰于北園四種之馬既已閑習輶輕也調試輕車置轡於鑣以試戎馬既調和矣載始也又始試習獫與歇驕之田犬皆曉逹搏噬之事天子種馬戎馬齊馬道馬田馬駑馬諸侯無種戎長喙獫短喙歇驕乗車謂玉金象大戴保傅篇韓詩内𫝊鸞在衡和在軾此田車鸞在鑣小戎俴收五楘梁輈游環脅驅陰靷鋈續文茵暢轂駕我騏馵言念君子溫其如玉在其板屋亂我心曲四牡孔阜六轡在手騏駵是中騧驪是驂龍盾之合鋈以觼軜言念君子溫其在邑方何為期胡然我念之俴駟孔羣厹矛鋈錞蒙伐有苑虎韔鏤膺交韔二弓竹閉緄縢言念君子載寝載興厭厭良人秩秩徳音先啟行之車曰大戎後行曰小戎言卑小之戎車既淺短其收軫軫車前後兩端之横木收歛所載大車深八尺兵車四尺四寸故曰俴又有皮革五節束縛厯錄此梁輈使有文章楘厯錄之稱也輈轅也梁輈上曲鉤衡衡軛也輈從軫以前稍曲而上至衡居衡之上向下勾之衡横居輈下如屋梁焉又有㳺環在服馬之背以貫驂之外轡自衡至軫係以皮一條當服馬之外脅謂之脅驅以此皮止驂馬之内入陰板之前又有皮為靷以白金灌沃靷環相續之處飾靷端也輿下三面材以板木横側車前曰陰板垂輈上陰映此軓所以蔭鋈也皮靷係陰板上為驂之引衡長六尺六寸止容二服驂不當衡横軓之前别有驂之二靷以引車也驂首不與服齊左𫝊射兩軥註曰車軛又馬頸即衡之下有二服也兩靷將絶是别有驂二靷也車上又有虎皮之茵蓐又是長轂之戎車大車之轂長尺半兵車之轂三尺二寸又駕騏馵之馬騏青黒綦文後右足白曰馵其車馬之備如此二章言兵車所駕四牡之馬肥大而又善良御人執其六轡在手而已不假控制騏駵中服騧驪外驂驂兩騑也有騑乃成駟身鬛俱赤為騂赤身黒鬛為駵驪鐵驪黄馬黒喙曰騧盾以木為之畫龍合而載之以蔽車驂馬内轡之末鋈金以為觼軜之於軾前煎白金飾皮為觼以納物四馬八轡皆言六轡者二轡則係之也馬之有轡所以制馬之左右令之随逐人意驂馬欲入則偪於脅驅内轡不須牽挽故納驂内轡係於軾前其係之處以白金為觼也三章俴薄金甲以被四馬戰馬皆甲金厚則重此既得宜甚羣和矣三隅矛有三角鋭底曰鐏平底曰錞以白金為錞也繪畫雜羽所飾之盾文章苑然而美干伐皆盾别名司兵掌五盾註干櫓之属櫓為大盾伐為中干䝉謂雜色虎皮為弓室馬有金鏤之膺執其膺掲膺胷也盖金飾帶若唐婁胷巾車樊纓註如鞶帶之鞶馬犬帶乃在腹之帶此在胷之帶也交二弓於韔中顛倒安置之䪐弓檠也弛則縛之於弓裏備損傷以竹為之閉一名䪐紲繫也一曰置弓䪐裏以繩紲之弓人註紲弓䪐此義也緄縢以繩約弓納之韔二弓備折壊孔曰以竹為閉置於弓隈然後以繩約之玉金輅以玉金飾車此兵車但金飾馬之膺帶耳玉金𧰼樊及纓以五采罽飾之革路樊纓以絛絲飾之此兵車馬帶用力多用金為膺飾取其堅牢銅鐵亦金也既言車馬備具又言兵甲矛盾備具如此故序曰國人矜之也言念君子溫其如玉玉者所以比徳溫潤而澤仁也縝宻以栗知也㢘而不劌義也垂之如墜禮也孚尹旁逹信也鄭云五徳叩之其聲清越以長其終詘然樂也瑕不掩瑜瑜不掩瑕忠也氣如白虹天也精神見於山川地也圭璋特逹徳也記十徳天水隴西山多林木民以板為屋西戎亦板屋矣征伐不休婦人心中委曲念之二章言體性溫然在敵人之邑方欲以何時為還期乎何為了然不来使我念之也三章言我念君子有寝有興之勞體性厭然安静秩秩然有哲知其徳音逺聞如此善人乆供軍役故閔念之謂吾君何不使之覿徳徒使之覿兵乎蒹葭蒼蒼白露為霜所謂伊人在水一方遡洄從之道阻且長遡游從之宛在水中央蒹葭淒淒白露未晞所謂伊人在水之湄遡洄從之道阻且躋遡游從之宛在水中坻蒹葭采采白露未已所謂伊人在水之涘遡洄從之道阻且右遡游從之宛在水中沚蒹葭之草雖盛而未堪家用必待白露凝戾為霜戾燥也然後堅實中用八月九月霜降葭成葦可為曲薄充歲事葭之得霜猶國之得禮也所謂伊人在水一方逆流而從之則道險且長順流而從之則宛在水之中央望禮而未見之義也未已未晞皆言飽霜露也水草交曰湄湄水隒爾雅重甗曰隒隒是山岸湄水岸小洲曰渚小渚曰沚小沚曰坻不正相當出其左右皆迂迴取與涘沚為韻終南何有有條有梅君子至止錦衣狐裘顔如渥丹其君也哉終南何有有紀有堂君子至止黻衣繡裳佩玉將將夀考不忘孔曰君當務崇眀徳無使不宜言其宜以戒其不宜條山椒亦曰槄山榎也梅楠也郭璞以為似杏實酢陸璣以為柟木理細緻於豫樟終南山與上庸新城通多樟柟錦衣毛以為雜綵衣也鄭以為狐裘狐白裘上加錦衣為裼其上又加皮弁服玉藻注云君衣狐白素錦為衣覆之使可裼也袒而有衣曰裼必覆之者裘䙝也詩衣錦褧衣錦衣上復有衣鄭以裼衣𧰼裘色狐白之上素錦為衣皮弁服白布為之玉藻又云錦衣狐裘諸侯之服也錦為裘之䙝衣非裼上之正服也諸侯在國視朔及受鄰國之聘其皮弁服皆服麑裘在天子之朝廷服狐裘歸國則不服之孔子荅曾子天子賜諸侯冕弁服於太廟歸設奠服賜服此鄭義也紀基也終南山道名畢其邉若堂之牆盖畢道之側其崖如堂也周禮注黻皆在裳此言黻衣衣大名與繡裳異其文耳顔色容貎赭然如厚漬之丹其儀貎尊嚴如是其得人君之度也哉交交黄鳥止于棘誰從穆公子車奄息維此奄息百夫之特臨其穴惴惴其慄彼蒼者天殲我良人如可贖兮人百其身交交黄鳥止于桑誰從穆公子車仲行維此仲行百夫之防臨其穴惴惴其慄彼蒼者天殲我良人如可贖兮人百其身交交黄鳥止于楚誰從穆公子車鍼虎維此鍼虎百夫之禦臨其穴惴惴其慄彼蒼者天殲我良人如可贖兮人百其身交交然而小者黄鳥也徃来止于棘木之上得所也奄息百夫之中孤特秀立雄俊者也桑扈交交猶佼佼飛而徃来貎𫝊子車為子輿字異義同詩或名或字取其韻鴥彼晨風鬱彼北林未見君子憂心欽欽如何如何忘我實多山有苞櫟隰有六駮未見君子憂心靡樂如何如何忘我實多山有苞棣隰有樹檖未見君子憂心如醉如何如何忘我實多鴥然而疾飛者晨風之鳥也鬱積而茂盛者北林之木也木茂而鳥知歸矣穆公未見君子則憂既見君子則樂如何康公忘我實多乎櫟橡也有梂彚自裏秦人謂柞櫟其子房生為梂駁如白馬黒尾倨牙食虎豹音如鼓倨曲也山有木隰有獸國有賢也陸璣梓榆皮青白駁犖遥視似駁馬箋𫝊不然唐棣亦曰常棣檖赤羅山梨楊檖也一名鹿梨一名鼠梨豈曰無衣與子同袍王于興師脩我戈矛與子同仇豈曰無衣與子同澤王于興師脩我矛㦸與子偕作豈曰無衣與子同裳王于興師脩我甲兵與子偕行按此萹永樂大典缺卷我送舅氏曰至渭陽何以贈之路車乗黄我送舅氏悠悠我思何以贈之瓊瑰玉佩舅甥氏姓必異書𫝊通謂為舅氏舅之言舊尊長之稱謂母昆弟也雍在渭南水北曰陽晉在秦東行必渡渭至於渭陽者東行送舅於咸陽之地地理志右扶風渭城縣故咸陽也其地在渭水之北瓊者玉之美名瑰是美石之名佩玉天子用純諸侯玉石雜於我乎夏屋渠渠今也毎食無餘于嗟乎不承權輿於我乎毎食四簋今也毎食不飽于嗟乎不承權輿按此萹永樂大典缺卷
